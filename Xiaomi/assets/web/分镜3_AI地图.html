<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>分镜3 — AI地图 · EP 生产采购系统</title>
<style>
:root{
  --p:#1677ff;--ph:#4096ff;--pl:#e6f4ff;--pa:rgba(22,119,255,.06);
  --s:#52c41a;--sl:#f6ffed;
  --w:#faad14;--wl:#fffbe6;
  --d:#ff4d4f;--dl:#fff2f0;
  --purple:#722ed1;--purple-l:#f9f0ff;
  --cyan:#13c2c2;--cyan-l:#e6fffb;
  --orange:#fa8c16;--orange-l:#fff7e6;
  --g50:#fafafa;--g100:#f5f5f5;--g200:#e8e8e8;--g300:#d9d9d9;
  --g400:#bfbfbf;--g500:#8c8c8c;--g600:#595959;--g700:#434343;
  --g800:#262626;--g900:#1f1f1f;
  --r:10px;--rs:6px;--rl:14px;
  --sh:0 1px 3px rgba(0,0,0,.04);
  --shm:0 4px 12px rgba(0,0,0,.07);
  --shl:0 8px 24px rgba(0,0,0,.09);
  --tr:all .3s cubic-bezier(.4,0,.2,1);
  --nav-bg:#001529;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;color:var(--g800);font-size:13px;min-height:100vh}

/* Top Nav */
.topnav{background:var(--nav-bg);height:52px;display:flex;align-items:center;padding:0 20px;position:fixed;top:0;left:0;right:0;z-index:1000}
.topnav-logo{display:flex;align-items:center;gap:10px;margin-right:28px}
.topnav-logo .mi{width:30px;height:30px;background:linear-gradient(135deg,#ff6700,#ff4d00);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700}
.topnav-logo span{color:#fff;font-size:15px;font-weight:600;letter-spacing:.5px}
.topnav-menu{display:flex;align-items:center;gap:0;flex:1}
.topnav-item{padding:0 16px;height:52px;display:flex;align-items:center;color:rgba(255,255,255,.65);font-size:13px;cursor:pointer;white-space:nowrap;transition:all .2s;position:relative}
.topnav-item:hover{color:#fff;background:rgba(255,255,255,.08)}
.topnav-item.active{color:#fff;background:rgba(255,255,255,.12)}
.topnav-item.active::after{content:'';position:absolute;bottom:0;left:8px;right:8px;height:2px;background:var(--p);border-radius:2px 2px 0 0}
.topnav-right{display:flex;align-items:center;gap:14px;margin-left:auto;flex-shrink:0}
.topnav-right .icon{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.65);cursor:pointer;transition:all .2s;font-size:15px}
.topnav-right .icon:hover{background:rgba(255,255,255,.1);color:#fff}
.topnav-user{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.85);font-size:12px;cursor:pointer}
.topnav-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--p),#4096ff);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:600}

/* Page */
.page-content{height:calc(100vh - 52px);margin-top:52px;overflow-y:auto;padding:24px}
.page-title{margin-bottom:20px}
.page-title h2{font-size:18px;font-weight:700;color:var(--g900)}
.page-title p{font-size:12px;color:var(--g500);margin-top:4px}

/* ===== AI Map Visual ===== */
.ai-map-section{background:#fff;border-radius:var(--rl);border:1px solid var(--g200);padding:28px 32px;margin-bottom:20px;position:relative;overflow:hidden}
.ai-map-section::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(circle at 50% 50%,rgba(22,119,255,.02) 0%,transparent 70%);pointer-events:none}

.ai-map-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;position:relative;z-index:1}

.ai-category{background:#fff;border:1px solid var(--g200);border-radius:var(--rl);padding:20px;transition:var(--tr);position:relative}
.ai-category:hover{box-shadow:var(--shl);transform:translateY(-3px)}
.ai-cat-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--g100)}
.ai-cat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.ai-cat-icon.blue{background:linear-gradient(135deg,var(--p),#4096ff);color:#fff}
.ai-cat-icon.green{background:linear-gradient(135deg,var(--s),#73d13d);color:#fff}
.ai-cat-icon.orange{background:linear-gradient(135deg,var(--orange),#ffc069);color:#fff}
.ai-cat-icon.purple{background:linear-gradient(135deg,var(--purple),#b37feb);color:#fff}
.ai-cat-name{font-size:14px;font-weight:700;color:var(--g800)}
.ai-cat-count{font-size:10px;color:var(--g500);margin-top:2px}

.ai-feature-item{padding:8px 10px;border-radius:var(--rs);cursor:pointer;transition:var(--tr);display:flex;align-items:center;gap:8px;margin-bottom:6px}
.ai-feature-item:hover{background:var(--pl)}
.ai-feature-item.active{background:var(--pl);border:1px solid var(--p)}
.fi-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.fi-dot.blue{background:var(--p)}.fi-dot.green{background:var(--s)}.fi-dot.orange{background:var(--orange)}.fi-dot.purple{background:var(--purple)}
.fi-name{font-size:12px;color:var(--g700);font-weight:500;flex:1}
.fi-badge{font-size:9px;padding:1px 6px;border-radius:8px;font-weight:600}
.fi-badge.new{background:var(--dl);color:var(--d)}
.fi-badge.hot{background:var(--wl);color:#d46b08}

/* ===== Demo Panel ===== */
.demo-panel{background:#fff;border-radius:var(--rl);border:1px solid var(--g200);overflow:hidden}
.demo-hdr{padding:16px 24px;border-bottom:1px solid var(--g100);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#fff 0%,#f0f7ff 100%)}
.demo-hdr-left{display:flex;align-items:center;gap:10px}
.demo-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.demo-icon.blue{background:var(--p);color:#fff}
.demo-title{font-size:14px;font-weight:700;color:var(--g900)}
.demo-desc{font-size:11px;color:var(--g500);margin-top:2px}
.demo-body{padding:20px 24px;min-height:320px}

/* Demo: Price analysis */
.price-analysis-table{width:100%;border-collapse:collapse;font-size:12px}
.pa-table th{background:var(--g50);color:var(--g600);font-size:11px;font-weight:600;padding:10px 14px;text-align:left;border-bottom:2px solid var(--g200)}
.pa-table td{padding:9px 14px;border-bottom:1px solid var(--g100)}
.pa-table .best-price{background:#f6ffed;font-weight:700;color:var(--s)}
.pa-table .high-price{color:var(--d)}
.pa-table .normal{color:var(--g700)}
.best-badge{font-size:10px;padding:1px 6px;border-radius:4px;background:var(--s);color:#fff;font-weight:600}

/* Demo: Risk radar bars */
.risk-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.risk-card{border:1px solid var(--g200);border-radius:var(--rs);padding:16px}
.risk-card.warn{border-color:var(--w);background:var(--wl)}
.risk-card.danger{border-color:var(--d);background:var(--dl)}
.risk-card.safe{border-color:var(--s);background:var(--sl)}
.risk-card-title{font-size:13px;font-weight:700;margin-bottom:10px}
.risk-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.rbr-label{font-size:11px;color:var(--g600);width:56px;flex-shrink:0}
.rbr-track{flex:1;height:6px;background:var(--g100);border-radius:3px;overflow:hidden}
.rbr-fill{height:100%;border-radius:3px}
.rbr-val{font-size:10px;font-weight:600;width:32px;text-align:right}

/* AI thinking animation */
.ai-thinking{display:flex;align-items:center;gap:6px;padding:12px 16px;background:#f0f7ff;border-radius:var(--rs);margin-top:16px;font-size:12px;color:var(--p)}
.ai-dot-anim{display:flex;gap:3px}
.ai-dot-anim span{width:5px;height:5px;border-radius:50%;background:var(--p);animation:bounce 1.4s infinite}
.ai-dot-anim span:nth-child(2){animation-delay:.2s}
.ai-dot-anim span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}

.tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;font-weight:500}
.tag-red{background:var(--dl);color:var(--d)}
.tag-green{background:var(--sl);color:var(--s)}
.tag-orange{background:var(--wl);color:#d46b08}
.tag-blue{background:var(--pl);color:var(--p)}

.btn{border:none;padding:7px 16px;border-radius:var(--rs);font-size:12px;font-weight:500;cursor:pointer;transition:var(--tr);display:inline-flex;align-items:center;gap:5px;font-family:inherit}
.btn-p{background:var(--p);color:#fff;box-shadow:0 2px 6px rgba(22,119,255,.25)}.btn-p:hover{box-shadow:0 4px 12px rgba(22,119,255,.35);transform:translateY(-1px)}
.btn-o{background:#fff;color:var(--g700);border:1px solid var(--g300)}.btn-o:hover{color:var(--p);border-color:var(--p)}

/* Scene nav */
.scene-nav{position:fixed;bottom:20px;right:20px;display:flex;gap:8px;z-index:900}
.sn-dot{width:36px;height:36px;border-radius:50%;border:2px solid var(--g300);background:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--g600);cursor:pointer;transition:var(--tr);text-decoration:none}
.sn-dot:hover{border-color:var(--p);color:var(--p);box-shadow:var(--shm)}
.sn-dot.active{border-color:var(--p);background:var(--p);color:#fff}
</style>
</head>
<body>

<!-- Top Nav -->
<div class="topnav">
    <div class="topnav-logo"><div class="mi">MI</div><span>小米汽车 EP 生产采购系统</span></div>
    <div class="topnav-menu">
        <div class="topnav-item" onclick="location.href='分镜1_首页.html'">🏠 首页</div>

        <div class="ai-category" style="border-top:3px solid var(--s)">

</div>

<!-- ===== Demo Panel ===== -->

<script>
// Set active feature
function setActiveFeature(featureId) {
    document.querySelectorAll('.ai-feature-item').forEach(el => el.classList.remove('active'));
    const target = document.querySelector('[data-feature="'+featureId+'"]');
    if (target) target.classList.add('active');
}

// Demo content per feature
const demos = {
    'price-compare': {
        icon:'📊',color:'blue',title:'报价智能比价',desc:'AI自动比对多家供应商报价，识别最优方案与异常报价',
        content: function(){
            let h = '<table class="pa-table"><thead><tr><th>零件名称</th><th>供应商</th><th>报价(元)</th><th>vs基准</th><th>AI分析</th></tr></thead><tbody>';
            const rows = [
                {part:'电芯 LF105',supplier:'宁德时代',price:'¥485',vs:-3.2,note:'成本结构合理，建议首选',cls:'best-price'},
                {part:'电芯 LF105',supplier:'弗迪电池',price:'¥496',vs:-1.0,note:'价格适中，交期保障好',cls:'normal'},
                {part:'电芯 LF105',supplier:'中创新航',price:'¥526',vs:+5.0,note:'偏高，建议议价',cls:'high-price'},
                {part:'电池包 Pack',supplier:'弗迪电池',price:'¥32,800',vs:-2.5,note:'竞争力强，推荐',cls:'normal'},
                {part:'电池包 Pack',supplier:'宁德时代',price:'¥34,200',vs:+1.7,note:'品牌溢价，品质保障',cls:'normal'},
                {part:'BMS主控板',supplier:'宁德时代',price:'¥2,850',vs:-1.8,note:'技术成熟，首选',cls:'best-price'},
                {part:'BMS主控板',supplier:'国轩高科',price:'¥3,120',vs:+7.5,note:'严重偏高，需重点谈判',cls:'high-price'}
            ];
            rows.forEach(r => {
                let vsClass = r.vs < 0 ? 'tag-green' : 'tag-red';
                let best = r.cls === 'best-price' ? ' <span class="best-badge">最优</span>' : '';
                h += '<tr><td>'+r.part+'</td><td class="'+r.cls+'">'+r.supplier+best+'</td><td class="'+r.cls+'">'+r.price+'</td><td><span class="tag '+vsClass+'">'+r.vs+'%</span></td><td>'+r.note+'</td></tr>';
            });
            h += '</tbody></table>';
            h += '<div class="ai-thinking"><span>🤖 AI分析结论：</span>宁德时代在电芯和BMS品类综合最优；弗迪电池包Pack成本领先；建议与中创新航、国轩高科启动价格谈判，预期可再降3-5%。</div>';
            return h;
        }
    },
    'supply-risk': {
        icon:'⚠️',color:'orange',title:'供应链风险分析',desc:'AI实时监控供应链风险指标，自动识别高风险环节',
        content: function(){
            let h = '<div class="risk-grid">';
            // Card 1
            h += '<div class="risk-card danger"><div class="risk-card-title" style="color:var(--d)">🔴 独供风险</div>';
            h += '<div class="risk-bar-row"><span class="rbr-label">英飞凌 MCU</span><div class="rbr-track"><div class="rbr-fill" style="width:92%;background:var(--d)"></div></div><span class="rbr-val" style="color:var(--d)">92%</span></div>';
            h += '<div class="risk-bar-row"><span class="rbr-label">博世 ADAS</span><div class="rbr-track"><div class="rbr-fill" style="width:75%;background:var(--d)"></div></div><span class="rbr-val" style="color:var(--d)">75%</span></div>';
            h += '</div>';
            // Card 2
            h += '<div class="risk-card warn"><div class="risk-card-title" style="color:var(--w)">🟡 价格波动</div>';
            h += '<div class="risk-bar-row"><span class="rbr-label">电芯材料</span><div class="rbr-track"><div class="rbr-fill" style="width:65%;background:var(--w)"></div></div><span class="rbr-val" style="color:var(--w)">65%</span></div>';
            h += '<div class="risk-bar-row"><span class="rbr-label">铝材</span><div class="rbr-track"><div class="rbr-fill" style="width:48%;background:var(--w)"></div></div><span class="rbr-val" style="color:var(--w)">48%</span></div>';
            h += '</div>';
            // Card 3
            h += '<div class="risk-card warn"><div class="risk-card-title" style="color:var(--w)">🟡 交期风险</div>';
            h += '<div class="risk-bar-row"><span class="rbr-label">芯片交期</span><div class="rbr-track"><div class="rbr-fill" style="width:55%;background:var(--w)"></div></div><span class="rbr-val" style="color:var(--w)">55%</span></div>';
            h += '<div class="risk-bar-row"><span class="rbr-label">模具产能</span><div class="rbr-track"><div class="rbr-fill" style="width:40%;background:var(--w)"></div></div><span class="rbr-val" style="color:var(--w)">40%</span></div>';
            h += '</div>';
            // Card 4
            h += '<div class="risk-card safe"><div class="risk-card-title" style="color:var(--s)">🟢 安全</div>';
            h += '<div class="risk-bar-row"><span class="rbr-label">电池供应</span><div class="rbr-track"><div class="rbr-fill" style="width:18%;background:var(--s)"></div></div><span class="rbr-val" style="color:var(--s)">18%</span></div>';
            h += '<div class="risk-bar-row"><span class="rbr-label">座椅供应</span><div class="rbr-track"><div class="rbr-fill" style="width:12%;background:var(--s)"></div></div><span class="rbr-val" style="color:var(--s)">12%</span></div>';
