<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 600" width="100%" role="img">
  <title>白板风格：品类维度轻量化 AI 应用全景图</title>
  <desc>手绘风格示意图，展示 MVPS、品类树、定点供应商智能匹配、任务路由与通知、MCP 封装的完整链路</desc>

  <style>
    .wb-bg { fill: #FAFAF8; }
    .marker-black { stroke: #2C2C2A; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .marker-red { stroke: #D85A30; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    .marker-blue { stroke: #378ADD; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .marker-green { stroke: #1D9E75; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .marker-purple { stroke: #7F77DD; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .hand-text { font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .hand-text-red { font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; font-size: 13px; font-weight: 500; fill: #D85A30; }
    .hand-text-blue { font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; font-size: 13px; font-weight: 500; fill: #378ADD; }
    .hand-small { font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; font-size: 11px; font-weight: 400; fill: #5F5E5A; }
    .hand-x { font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; font-size: 18px; font-weight: 500; fill: #D85A30; }
    .fill-red { fill: #F5C4B3; }
    .fill-blue { fill: #B5D4F4; }
    .fill-green { fill: #9FE1CB; }
    .fill-purple { fill: #CECBF6; }
    .fill-white { fill: #FFFFFF; }
  </style>

  <rect x="0" y="0" width="680" height="600" class="wb-bg"/>

  <path class="marker-black" d="M240 55 Q250 40 270 45 Q290 30 320 40 Q350 30 370 45 Q390 40 400 60 Q410 75 390 85 Q370 95 350 85 Q320 100 290 85 Q260 95 245 80 Q230 70 240 55 Z"/>
  <text class="hand-text" x="320" y="67" text-anchor="middle" dominant-baseline="central">AI 轻量化增强点</text>

  <path class="marker-blue" d="M45 200 L60 195 L130 195 L145 200 L143 245 L130 250 L60 250 L47 245 Z"/>
  <text class="hand-text-blue" x="95" y="225" text-anchor="middle" dominant-baseline="central">MVPS</text>

  <path class="marker-blue" d="M145 220 Q165 220 185 220 L200 220"/>
  <path class="marker-blue" d="M195 215 L203 220 L195 225"/>
  <text class="hand-small" x="175" y="210" text-anchor="middle">ESB接口</text>

  <rect x="205" y="170" width="170" height="100" rx="12" class="fill-purple" stroke="#7F77DD" stroke-width="2"/>
  <text class="hand-text" x="290" y="205" text-anchor="middle" dominant-baseline="central" style="font-size:18px">品类树</text>
  <text class="hand-small" x="290" y="230" text-anchor="middle" dominant-baseline="central">GCM / SQE / 采购工程师</text>
  <text class="hand-small" x="290" y="248" text-anchor="middle" dominant-baseline="central">定点供应商 + 路由规则</text>

  <rect x="220" y="300" width="140" height="70" rx="10" class="fill-red" stroke="#D85A30" stroke-width="2"/>
  <text class="hand-text-red" x="290" y="325" text-anchor="middle" dominant-baseline="central">定点供应商</text>
  <text class="hand-text-red" x="290" y="345" text-anchor="middle" dominant-baseline="central">智能匹配</text>
  <text class="hand-small" x="290" y="360" text-anchor="middle" dominant-baseline="central" style="fill:#993C1D">Skill + Agent</text>

  <rect x="225" y="380" width="130" height="52" rx="6" class="fill-white" stroke="#D85A30" stroke-width="1.2"/>
  <text class="hand-small" x="290" y="398" text-anchor="middle" dominant-baseline="central">新建推荐 · RFQ自动</text>
  <text class="hand-small" x="290" y="412" text-anchor="middle" dominant-baseline="central">每日01:00 · 人工触发</text>

  <path class="marker-red" d="M290 270 L290 295"/>
  <path d="M285 288 L290 296 L295 288" fill="none" stroke="#D85A30" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <text class="hand-text" x="70" y="450" text-anchor="middle" dominant-baseline="central">任务源</text>

  <rect x="20" y="465" width="50" height="28" rx="6" class="fill-white" stroke="#5F5E5A" stroke-width="1.5"/>
  <text class="hand-text" x="45" y="482" text-anchor="middle" dominant-baseline="central" style="font-size:12px">EWO</text>

  <rect x="80" y="465" width="50" height="28" rx="6" class="fill-white" stroke="#5F5E5A" stroke-width="1.5"/>
  <text class="hand-text" x="105" y="482" text-anchor="middle" dominant-baseline="central" style="font-size:12px">SOR</text>

  <rect x="20" y="505" width="50" height="28" rx="6" class="fill-white" stroke="#5F5E5A" stroke-width="1.5"/>
  <text class="hand-text" x="45" y="522" text-anchor="middle" dominant-baseline="central" style="font-size:12px">BDL</text>

  <rect x="80" y="505" width="50" height="28" rx="6" class="fill-white" stroke="#5F5E5A" stroke-width="1.5"/>
  <text class="hand-text" x="105" y="522" text-anchor="middle" dominant-baseline="central" style="font-size:12px">RFQ</text>

  <rect x="20" y="545" width="50" height="28" rx="6" class="fill-white" stroke="#5F5E5A" stroke-width="1.5"/>
  <text class="hand-text" x="45" y="562" text-anchor="middle" dominant-baseline="central" style="font-size:12px">CWO</text>

  <rect x="80" y="545" width="50" height="28" rx="6" class="fill-white" stroke="#5F5E5A" stroke-width="1.5"/>
  <text class="hand-text" x="105" y="562" text-anchor="middle" dominant-baseline="central" style="font-size:12px">SWO</text>

  <path class="marker-black" d="M140 480 Q160 480 175 490"/>
  <path class="marker-black" d="M140 520 Q160 515 175 500"/>
  <path d="M170 485 L177 492 L168 494" fill="none" stroke="#2C2C2A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M170 505 L177 498 L168 496" fill="none" stroke="#2C2C2A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="180" y="465" width="140" height="70" rx="10" class="fill-blue" stroke="#378ADD" stroke-width="2"/>
  <text class="hand-text-blue" x="250" y="490" text-anchor="middle" dominant-baseline="central">Skill + Agent</text>
  <text class="hand-text-blue" x="250" y="510" text-anchor="middle" dominant-baseline="central">数据匹配</text>
  <text class="hand-small" x="250" y="525" text-anchor="middle" dominant-baseline="central" style="fill:#0C447C">人员树 + 路由规则</text>

  <path class="marker-purple" d="M290 270 L290 360 Q290 400 290 420 L290 460" stroke-dasharray="6 4"/>
  <text class="hand-small" x="305" y="420" text-anchor="start" dominant-baseline="central" style="fill:#534AB7">品类数据</text>

  <path class="marker-black" d="M320 500 Q340 500 360 500"/>
  <path d="M355 495 L363 500 L355 505" fill="none" stroke="#2C2C2A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="370" y="470" width="140" height="60" rx="10" class="fill-green" stroke="#1D9E75" stroke-width="2"/>
  <text class="hand-text" x="440" y="495" text-anchor="middle" dominant-baseline="central">角色 + 任务绑定</text>
  <text class="hand-small" x="440" y="515" text-anchor="middle" dominant-baseline="central">GCM / SQE / 采购</text>

  <path class="marker-black" d="M510 500 Q530 500 550 500"/>
  <path d="M545 495 L553 500 L545 505" fill="none" stroke="#2C2C2A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="560" y="470" width="110" height="60" rx="10" class="fill-white" stroke="#5F5E5A" stroke-width="2"/>
  <text class="hand-text" x="615" y="495" text-anchor="middle" dominant-baseline="central">任务执行</text>
  <text class="hand-small" x="615" y="515" text-anchor="middle" dominant-baseline="central">飞书通知 + 超时升级</text>

  <rect x="550" y="200" width="110" height="80" rx="8" class="fill-white" stroke="#D85A30" stroke-width="2" stroke-dasharray="8 4"/>
  <text class="hand-text-red" x="605" y="225" text-anchor="middle" dominant-baseline="central">一阶段</text>
  <text class="hand-small" x="605" y="245" text-anchor="middle" dominant-baseline="central">定点匹配</text>
  <text class="hand-small" x="605" y="262" text-anchor="middle" dominant-baseline="central">任务路由</text>

  <rect x="550" y="320" width="110" height="80" rx="8" class="fill-white" stroke="#378ADD" stroke-width="2" stroke-dasharray="8 4"/>
  <text class="hand-text-blue" x="605" y="345" text-anchor="middle" dominant-baseline="central">二阶段</text>
  <text class="hand-small" x="605" y="365" text-anchor="middle" dominant-baseline="central">MCP 封装</text>
  <text class="hand-small" x="605" y="382" text-anchor="middle" dominant-baseline="central">对外暴露</text>

  <path class="marker-blue" d="M605 280 L605 315"/>
  <path d="M600 308 L605 316 L610 308" fill="none" stroke="#378ADD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <text class="hand-x" x="75" y="320">×</text>
  <text class="hand-small" x="75" y="338" text-anchor="middle">手工维护</text>
  <text class="hand-small" x="75" y="353" text-anchor="middle">不做AI</text>

  <path class="marker-black" d="M75 310 Q90 280 110 260" stroke-dasharray="4 4"/>

  <text class="hand-small" x="340" y="585" text-anchor="middle">Skill = AI 推荐 / 规则配置   ·   Agent = 自动同步 / 路由 / 通知   ·   虚线 = 待MCP化</text>
</svg>
