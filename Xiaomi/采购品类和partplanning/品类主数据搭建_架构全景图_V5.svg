<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" width="1100" role="img">
  <title>品类主数据搭建 · Skill &amp; Agent 架构全景图</title>

  <defs>
    <style>
      .bg { fill: #FFFFFF; }
      .header-bg { fill: #F7F8FA; }
      .card-body { fill: #FFFFFF; stroke: #E8EAED; stroke-width: 1; }
      .card-top-orange { fill: #F5701A; }
      .card-top-purple { fill: #6C63FF; }
      .card-top-blue { fill: #378ADD; }
      .card-top-green { fill: #1D9E75; }
      .card-top-dashed { stroke: #9CA3AF; stroke-width: 2; stroke-dasharray: 6 4; fill: none; }
      .num-bg-orange { fill: #F5701A; }
      .num-bg-purple { fill: #6C63FF; }
      .num-bg-blue { fill: #378ADD; }
      .num-bg-green { fill: #1D9E75; }
      .num-bg-gray { fill: #9CA3AF; }
      .tag-skill { fill: #6C63FF; }
      .tag-agent { fill: #10B981; }
      .tag-cli { fill: #3B82F6; }
      .tag-skill-text { fill: #FFFFFF; font-size: 11px; font-weight: 600; font-family: system-ui, -apple-system, sans-serif; }
      .tag-agent-text { fill: #FFFFFF; font-size: 11px; font-weight: 600; font-family: system-ui, -apple-system, sans-serif; }
      .tag-cli-text { fill: #FFFFFF; font-size: 11px; font-weight: 600; font-family: system-ui, -apple-system, sans-serif; }
      .card-num { fill: #FFFFFF; font-size: 15px; font-weight: 700; font-family: system-ui, -apple-system, sans-serif; }
      .card-title { fill: #1F2937; font-size: 14px; font-weight: 600; font-family: system-ui, -apple-system, sans-serif; }
      .card-subtitle { fill: #6B7280; font-size: 11px; font-family: system-ui, -apple-system, sans-serif; }
      .card-line { fill: #374151; font-size: 11.5px; font-family: system-ui, -apple-system, sans-serif; }
      .header-title { fill: #1F2937; font-size: 20px; font-weight: 700; font-family: system-ui, -apple-system, sans-serif; }
      .header-sub { fill: #6B7280; font-size: 13px; font-family: system-ui, -apple-system, sans-serif; }
      .footer-text { fill: #9CA3AF; font-size: 11px; font-family: system-ui, -apple-system, sans-serif; }
      .divider { stroke: #E5E7EB; stroke-width: 1; }
    </style>
  </defs>

  <rect width="1100" height="820" class="bg"/>

  <!-- Header -->
  <rect x="0" y="0" width="1100" height="58" class="header-bg"/>
  <text x="30" y="36" class="header-title">品类主数据搭建 · Skill &amp; Agent 架构全景图</text>
  <text x="30" y="53" class="header-sub">品类维度轻量化 AI 能力建设</text>

  <!-- ========== Card 1 ========== -->
  <rect x="20" y="78" width="340" height="330" rx="6" class="card-body"/>
  <rect x="20" y="78" width="340" height="6" rx="3" class="card-top-orange"/>
  <circle cx="46" cy="108" r="14" class="num-bg-orange"/>
  <text x="46" y="113" text-anchor="middle" class="card-num">1</text>
  <text x="70" y="105" class="card-title">采购品类主数据搭建及与 MVPS 映射</text>
  <text x="70" y="120" class="card-subtitle">CLI + Skill</text>
  <line x1="30" y1="135" x2="350" y2="135" class="divider"/>

  <text x="38" y="157" class="card-line">构建采购品类树体系，支持多级品类</text>
  <text x="38" y="172" class="card-line">的新增、编辑与层级调整</text>
  <rect x="290" y="145" width="32" height="18" rx="9" class="tag-cli"/>
  <text x="306" y="157" text-anchor="middle" class="tag-cli-text">CLI</text>

  <text x="38" y="202" class="card-line">通过 CLI 对接 ESB 接口，定时拉取</text>
  <text x="38" y="217" class="card-line">MVPS 数据并解析为结构化品类信息</text>
  <rect x="290" y="190" width="32" height="18" rx="9" class="tag-cli"/>
  <text x="306" y="202" text-anchor="middle" class="tag-cli-text">CLI</text>

  <text x="38" y="247" class="card-line">通过 Skill 配置人员角色树（GCM / SQE /</text>
  <text x="38" y="262" class="card-line">采购工程师），建立采购品类→人员的映射关系</text>
  <rect x="290" y="235" width="40" height="18" rx="9" class="tag-skill"/>
  <text x="310" y="247" text-anchor="middle" class="tag-skill-text">Skill</text>

  <text x="38" y="297" class="card-line">支持品类及映射关系的生效 / 失效管理</text>
  <rect x="290" y="285" width="40" height="18" rx="9" class="tag-skill"/>
  <text x="310" y="297" text-anchor="middle" class="tag-skill-text">Skill</text>

  <!-- ========== Card 2 ========== -->
  <rect x="380" y="78" width="340" height="330" rx="6" class="card-body"/>
  <rect x="380" y="78" width="340" height="6" rx="3" class="card-top-purple"/>
  <circle cx="406" cy="108" r="14" class="num-bg-purple"/>
  <text x="406" y="113" text-anchor="middle" class="card-num">2</text>
  <text x="430" y="105" class="card-title">品类维度下的定点供应商智能匹配</text>
  <text x="430" y="120" class="card-subtitle">Skill + Agent</text>
  <line x1="390" y1="135" x2="710" y2="135" class="divider"/>

  <text x="398" y="157" class="card-line">品类数据新建时，自动触发定点</text>
  <text x="398" y="172" class="card-line">供应商智能匹配</text>
  <rect x="650" y="145" width="40" height="18" rx="9" class="tag-skill"/>
  <text x="670" y="157" text-anchor="middle" class="tag-skill-text">Skill</text>

  <text x="398" y="202" class="card-line">RFQ 定点完成后，Skill 自动更新</text>
  <text x="398" y="217" class="card-line">品类下的定点供应商</text>
  <rect x="650" y="190" width="42" height="18" rx="9" class="tag-agent"/>
  <text x="671" y="202" text-anchor="middle" class="tag-agent-text">Agent</text>

  <text x="398" y="247" class="card-line">定时任务（每日 01:00）批量校验</text>
  <text x="398" y="262" class="card-line">并更新品类定点供应商</text>
  <rect x="650" y="235" width="42" height="18" rx="9" class="tag-agent"/>
  <text x="671" y="247" text-anchor="middle" class="tag-agent-text">Agent</text>

  <text x="398" y="292" class="card-line">支持人工触发按需更新</text>
  <rect x="650" y="280" width="40" height="18" rx="9" class="tag-skill"/>
  <text x="670" y="292" text-anchor="middle" class="tag-skill-text">Skill</text>

  <!-- ========== Card 3 ========== -->
  <rect x="740" y="78" width="340" height="330" rx="6" class="card-body"/>
  <rect x="740" y="78" width="340" height="6" rx="3" class="card-top-blue"/>
  <circle cx="766" cy="108" r="14" class="num-bg-blue"/>
  <text x="766" y="113" text-anchor="middle" class="card-num">3</text>
  <text x="790" y="105" class="card-title">车型项目管控表应用</text>
  <line x1="750" y1="135" x2="1070" y2="135" class="divider"/>

  <text x="758" y="160" class="card-line">以「车型 + SOR 包」为维度，维护对应</text>
  <text x="758" y="178" class="card-line">采购品类的责任人员，支撑车型项目视角</text>
  <text x="758" y="196" class="card-line">的定点进度可视化追踪</text>

  <!-- ========== Row 2 ========== -->

  <!-- ========== Card 4 ========== -->
  <rect x="20" y="428" width="340" height="330" rx="6" class="card-body"/>
  <rect x="20" y="428" width="340" height="6" rx="3" class="card-top-green"/>
  <circle cx="46" cy="458" r="14" class="num-bg-green"/>
  <text x="46" y="463" text-anchor="middle" class="card-num">4</text>
  <text x="70" y="455" class="card-title">任务路由和通知</text>
  <text x="70" y="470" class="card-subtitle">Skill + Agent</text>
  <line x1="30" y1="485" x2="350" y2="485" class="divider"/>

  <text x="38" y="507" class="card-line">SOR / BDL / RFQ / EWO / CWO / SWO /</text>
  <text x="38" y="525" class="card-line">框架协议等任务新增时，通过品类-人员</text>
  <text x="38" y="543" class="card-line">映射树自动匹配负责人并分配任务</text>
  <rect x="290" y="495" width="42" height="18" rx="9" class="tag-agent"/>
  <text x="311" y="507" text-anchor="middle" class="tag-agent-text">Agent</text>

  <text x="38" y="578" class="card-line">Agent 通过飞书推送通知，同时支持</text>
  <text x="38" y="596" class="card-line">任务超时升级与自定义路由规则</text>
  <rect x="290" y="566" width="42" height="18" rx="9" class="tag-agent"/>
  <text x="311" y="578" text-anchor="middle" class="tag-agent-text">Agent</text>

  <!-- ========== Card 5 ========== -->
  <rect x="380" y="428" width="340" height="330" rx="6" class="card-body"/>
  <rect x="380" y="428" width="340" height="6" rx="3" class="card-top-green"/>
  <circle cx="406" cy="458" r="14" class="num-bg-green"/>
  <text x="406" y="463" text-anchor="middle" class="card-num">5</text>
  <text x="430" y="455" class="card-title">Skill 运行稳定后，封装成 MCP</text>
  <line x1="390" y1="485" x2="710" y2="485" class="divider"/>
  <text x="398" y="515" class="card-line">标准化接口，跨系统调用</text>
  <text x="398" y="545" class="card-line">多 Agent 协作</text>

  <!-- ========== Card 6 ========== -->
  <rect x="740" y="428" width="340" height="330" rx="6" class="card-body" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="6 4"/>
  <rect x="740" y="428" width="340" height="6" rx="3" class="card-top-dashed"/>
  <circle cx="766" cy="458" r="14" class="num-bg-gray"/>
  <text x="766" y="463" text-anchor="middle" class="card-num" fill="#9CA3AF">6</text>
  <text x="790" y="455" class="card-title" fill="#9CA3AF">资源池与策略基座</text>
  <line x1="750" y1="485" x2="1070" y2="485" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="758" y="515" class="card-line" fill="#9CA3AF">按品类维护合格供应商资源池，设定</text>
  <text x="758" y="535" class="card-line" fill="#9CA3AF">准入 / 评估 / 退出机制，为品类差异化</text>
  <text x="758" y="555" class="card-line" fill="#9CA3AF">采购策略（战略 / 杠杆 / 瓶颈 / 常规）</text>
  <text x="758" y="575" class="card-line" fill="#9CA3AF">提供基础</text>

  <!-- ========== Footer ========== -->
  <line x1="20" y1="778" x2="1080" y2="778" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="20" y="790" width="16" height="10" rx="5" class="tag-cli"/>
  <text x="42" y="799" class="footer-text">CLI 定时数据拉取</text>
  <rect x="148" y="790" width="40" height="10" rx="5" class="tag-skill"/>
  <text x="194" y="799" class="footer-text">Skill AI 语义理解 / 规则配置</text>
  <rect x="352" y="790" width="42" height="10" rx="5" class="tag-agent"/>
  <text x="400" y="799" class="footer-text">Agent 自动执行 / 定时调度 / 通知升级</text>
</svg>