<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 800" width="1140" role="img">
  <title>品类主数据搭建 · Skill &amp; Agent 架构全景图</title>

  <defs>
    <style>
      .bg { fill: #FFFFFF; }
      .header-bg { fill: #F7F8FA; }
      .card-body { fill: #FFFFFF; stroke: #E8EAED; stroke-width: 1; }
      .card-top-orange { fill: #F5701A; }
      .card-top-purple { fill: #6C63FF; }
      .card-top-blue { fill: #378ADD; }
      .card-top-green { fill: #1D9E75; }
      .card-top-dashed { stroke: #9CA3AF; stroke-width: 2; stroke-dasharray: 6 4; fill: none; }
      .num-bg-orange { fill: #F5701A; }
      .num-bg-purple { fill: #6C63FF; }
      .num-bg-blue { fill: #378ADD; }
      .num-bg-green { fill: #1D9E75; }
      .num-bg-gray { fill: #9CA3AF; }
      .tag-skill { fill: #6C63FF; }
      .tag-agent { fill: #10B981; }
      .tag-cli { fill: #3B82F6; }
      .tag-skill-text { fill: #FFFFFF; font-size: 10px; font-weight: 600; font-family: system-ui, -apple-system, sans-serif; }
      .tag-agent-text { fill: #FFFFFF; font-size: 10px; font-weight: 600; font-family: system-ui, -apple-system, sans-serif; }
      .tag-cli-text { fill: #FFFFFF; font-size: 10px; font-weight: 600; font-family: system-ui, -apple-system, sans-serif; }
      .card-num { fill: #FFFFFF; font-size: 14px; font-weight: 700; font-family: system-ui, -apple-system, sans-serif; }
      .card-title { fill: #1F2937; font-size: 13px; font-weight: 600; font-family: system-ui, -apple-system, sans-serif; }
      .card-subtitle { fill: #6B7280; font-size: 10px; font-family: system-ui, -apple-system, sans-serif; }
      .card-line { fill: #374151; font-size: 10.5px; font-family: system-ui, -apple-system, sans-serif; }
      .header-title { fill: #1F2937; font-size: 18px; font-weight: 700; font-family: system-ui, -apple-system, sans-serif; }
      .header-sub { fill: #6B7280; font-size: 12px; font-family: system-ui, -apple-system, sans-serif; }
      .footer-text { fill: #9CA3AF; font-size: 10px; font-family: system-ui, -apple-system, sans-serif; }
      .divider { stroke: #E5E7EB; stroke-width: 1; }
    </style>
  </defs>

  <rect width="1140" height="800" class="bg"/>

  <!-- Header -->
  <rect x="0" y="0" width="1140" height="52" class="header-bg"/>
  <text x="20" y="32" class="header-title">品类主数据搭建 · Skill &amp; Agent 架构全景图</text>
  <text x="20" y="47" class="header-sub">品类维度轻量化 AI 能力建设</text>

  <!-- ========== Card 1 ========== -->
  <!-- Row 1, Col 1: x=20 -->
  <rect x="20" y="68" width="350" height="330" rx="6" class="card-body"/>
  <rect x="20" y="68" width="350" height="6" rx="3" class="card-top-orange"/>
  <circle cx="46" cy="97" r="13" class="num-bg-orange"/>
  <text x="46" y="101.5" text-anchor="middle" class="card-num">1</text>
  <text x="68" y="93" class="card-title">采购品类主数据搭建及与 MVPS 映射</text>
  <text x="68" y="107" class="card-subtitle">CLI + Skill</text>
  <line x1="28" y1="120" x2="362" y2="120" class="divider"/>

  <text x="36" y="140" class="card-line">构建采购品类树体系，支持多级品类的</text>
  <text x="36" y="154" class="card-line">新增、编辑与层级调整</text>
  <rect x="298" y="128" width="32" height="17" rx="8.5" class="tag-cli"/>
  <text x="314" y="140" text-anchor="middle" class="tag-cli-text">CLI</text>

  <text x="36" y="178" class="card-line">通过 CLI 对接 ESB 接口，定时拉取 MVPS</text>
  <text x="36" y="192" class="card-line">数据并解析为结构化品类信息</text>
  <rect x="298" y="166" width="32" height="17" rx="8.5" class="tag-cli"/>
  <text x="314" y="178" text-anchor="middle" class="tag-cli-text">CLI</text>

  <text x="36" y="216" class="card-line">通过 Skill 配置人员角色树（GCM / SQE /</text>
  <text x="36" y="230" class="card-line">采购工程师），建立采购品类→人员的映射关系</text>
  <rect x="298" y="204" width="36" height="17" rx="8.5" class="tag-skill"/>
  <text x="316" y="216" text-anchor="middle" class="tag-skill-text">Skill</text>

  <text x="36" y="258" class="card-line">支持品类及映射关系的生效 / 失效管理</text>
  <rect x="298" y="246" width="36" height="17" rx="8.5" class="tag-skill"/>
  <text x="316" y="258" text-anchor="middle" class="tag-skill-text">Skill</text>

  <!-- ========== Card 2 ========== -->
  <!-- Row 1, Col 2: x=390 -->
  <rect x="395" y="68" width="350" height="330" rx="6" class="card-body"/>
  <rect x="395" y="68" width="350" height="6" rx="3" class="card-top-purple"/>
  <circle cx="421" cy="97" r="13" class="num-bg-purple"/>
  <text x="421" y="101.5" text-anchor="middle" class="card-num">2</text>
  <text x="443" y="93" class="card-title">品类维度下的定点供应商智能匹配</text>
  <text x="443" y="107" class="card-subtitle">Skill + Agent</text>
  <line x1="403" y1="120" x2="737" y2="120" class="divider"/>

  <text x="411" y="140" class="card-line">品类数据新建时，自动触发定点</text>
  <text x="411" y="154" class="card-line">供应商智能匹配</text>
  <rect x="673" y="128" width="36" height="17" rx="8.5" class="tag-skill"/>
  <text x="691" y="140" text-anchor="middle" class="tag-skill-text">Skill</text>

  <text x="411" y="178" class="card-line">RFQ 定点完成后，Skill 自动更新</text>
  <text x="411" y="192" class="card-line">品类下的定点供应商</text>
  <rect x="673" y="166" width="38" height="17" rx="8.5" class="tag-agent"/>
  <text x="692" y="178" text-anchor="middle" class="tag-agent-text">Agent</text>

  <text x="411" y="216" class="card-line">定时任务（每日 01:00）批量校验</text>
  <text x="411" y="230" class="card-line">并更新品类定点供应商</text>
  <rect x="673" y="204" width="38" height="17" rx="8.5" class="tag-agent"/>
  <text x="692" y="216" text-anchor="middle" class="tag-agent-text">Agent</text>

  <text x="411" y="258" class="card-line">支持人工触发按需更新</text>
  <rect x="673" y="246" width="36" height="17" rx="8.5" class="tag-skill"/>
  <text x="691" y="258" text-anchor="middle" class="tag-skill-text">Skill</text>

  <!-- ========== Card 3 ========== -->
  <!-- Row 1, Col 3: x=760 -->
  <rect x="770" y="68" width="350" height="330" rx="6" class="card-body"/>
  <rect x="770" y="68" width="350" height="6" rx="3" class="card-top-blue"/>
  <circle cx="796" cy="97" r="13" class="num-bg-blue"/>
  <text x="796" y="101.5" text-anchor="middle" class="card-num">3</text>
  <text x="818" y="93" class="card-title">车型项目管控表应用</text>
  <line x1="778" y1="120" x2="1112" y2="120" class="divider"/>

  <text x="786" y="145" class="card-line">以「车型 + SOR 包」为维度，维护对应</text>
  <text x="786" y="162" class="card-line">采购品类的责任人员，支撑车型项目视角</text>
  <text x="786" y="179" class="card-line">的定点进度可视化追踪</text>

  <!-- ========== Card 4 ========== -->
  <!-- Row 2, Col 1: x=20, y=418 -->
  <rect x="20" y="418" width="350" height="330" rx="6" class="card-body"/>
  <rect x="20" y="418" width="350" height="6" rx="3" class="card-top-green"/>
  <circle cx="46" cy="447" r="13" class="num-bg-green"/>
  <text x="46" y="451.5" text-anchor="middle" class="card-num">4</text>
  <text x="68" y="443" class="card-title">任务路由和通知</text>
  <text x="68" y="457" class="card-subtitle">Skill + Agent</text>
  <line x1="28" y1="470" x2="362" y2="470" class="divider"/>

  <text x="36" y="490" class="card-line">SOR / BDL / RFQ / EWO / CWO / SWO /</text>
  <text x="36" y="506" class="card-line">框架协议等任务新增时，通过品类-人员映射树</text>
  <text x="36" y="522" class="card-line">自动匹配负责人并分配任务</text>
  <rect x="298" y="478" width="38" height="17" rx="8.5" class="tag-agent"/>
  <text x="317" y="490" text-anchor="middle" class="tag-agent-text">Agent</text>

  <text x="36" y="552" class="card-line">Agent 通过飞书推送通知，同时支持</text>
  <text x="36" y="568" class="card-line">任务超时升级与自定义路由规则</text>
  <rect x="298" y="540" width="38" height="17" rx="8.5" class="tag-agent"/>
  <text x="317" y="552" text-anchor="middle" class="tag-agent-text">Agent</text>

  <!-- ========== Card 5 ========== -->
  <!-- Row 2, Col 2: x=395 -->
  <rect x="395" y="418" width="350" height="330" rx="6" class="card-body"/>
  <rect x="395" y="418" width="350" height="6" rx="3" class="card-top-green"/>
  <circle cx="421" cy="447" r="13" class="num-bg-green"/>
  <text x="421" y="451.5" text-anchor="middle" class="card-num">5</text>
  <text x="443" y="443" class="card-title">Skill 运行稳定后，封装成 MCP</text>
  <line x1="403" y1="470" x2="737" y2="470" class="divider"/>
  <text x="411" y="495" class="card-line">标准化接口，跨系统调用</text>
  <text x="411" y="515" class="card-line">多 Agent 协作</text>

  <!-- ========== Card 6 ========== -->
  <!-- Row 2, Col 3: x=770 -->
  <rect x="770" y="418" width="350" height="330" rx="6" class="card-body" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="6 4"/>
  <rect x="770" y="418" width="350" height="6" rx="3" class="card-top-dashed"/>
  <circle cx="796" cy="447" r="13" class="num-bg-gray"/>
  <text x="796" y="451.5" text-anchor="middle" class="card-num" fill="#9CA3AF">6</text>
  <text x="818" y="443" class="card-title" fill="#9CA3AF">资源池与策略基座</text>
  <line x1="778" y1="470" x2="1112" y2="470" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="786" y="498" class="card-line" fill="#9CA3AF">按品类维护合格供应商资源池，设定</text>
  <text x="786" y="516" class="card-line" fill="#9CA3AF">准入 / 评估 / 退出机制，为品类差异化</text>
  <text x="786" y="534" class="card-line" fill="#9CA3AF">采购策略（战略 / 杠杆 / 瓶颈 / 常规）</text>
  <text x="786" y="552" class="card-line" fill="#9CA3AF">提供基础</text>

  <!-- ========== Footer ========== -->
  <line x1="20" y1="765" x2="1120" y2="765" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="20" y="776" width="14" height="9" rx="4.5" class="tag-cli"/>
  <text x="40" y="784" class="footer-text">CLI 定时数据拉取</text>
  <rect x="148" y="776" width="36" height="9" rx="4.5" class="tag-skill"/>
  <text x="190" y="784" class="footer-text">Skill AI 语义理解 / 规则配置</text>
  <rect x="352" y="776" width="38" height="9" rx="4.5" class="tag-agent"/>
  <text x="396" y="784" class="footer-text">Agent 自动执行 / 定时调度 / 通知升级</text>
</svg>