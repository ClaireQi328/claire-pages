  <text x="80" y="556" font-size="10" font-weight="600" fill="#5E6278">图例</text>
  <rect x="114" y="548" width="9" height="9" rx="2.5" fill="#F59700"/>
  <text x="128" y="557" class="legend-text">品类主数据</text>
  <rect x="202" y="548" width="9" height="9" rx="2.5" fill="#7C6FD9"/>
  <text x="216" y="557" class="legend-text">Skill 智能推荐 / 规则配置</text>
  <rect x="358" y="548" width="9" height="9" rx="2.5" fill="#00BCD4"/>
  <text x="372" y="557" class="legend-text">Agent 自动执行 / 定时调度</text>
  <rect x="502" y="548" width="9" height="9" rx="2.5" fill="#2F80ED"/>
  <text x="516" y="557" class="legend-text">CLI 数据拉取与同步</text>
  <rect x="610" y="548" width="9" height="9" rx="2.5" fill="#90A4AE" stroke="#90A4AE" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="624" y="557" class="legend-text">未来规划</text>
  <line x1="64" y1="558" x2="74" y2="558" stroke="#C5CAD8" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#ah)"/>
  <text x="80" y="562" class="legend-text">数据流向</text>
</svg>
