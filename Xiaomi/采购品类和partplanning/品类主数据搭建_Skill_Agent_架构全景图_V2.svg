<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 600" width="100%" role="img">
  <title>品类主数据搭建 Skill Agent 架构全景图 V2</title>
  <desc>优化版架构全景图：CLI仅标注ESB接口、标签统一右上角、三层驱动架构、移除统计面板</desc>
  <defs>
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="115%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1a1a2e" flood-opacity="0.08"/></filter>
    <filter id="headerShadow" x="-5%" y="-5%" width="110%" height="120%"><feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#1a1a2e" flood-opacity="0.1"/></filter>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#F7F8FC"/><stop offset="100%" stop-color="#EEF1F8"/></linearGradient>
    <linearGradient id="hOrange" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#F59700"/><stop offset="100%" stop-color="#F07D00"/></linearGradient>
    <linearGradient id="hPurple" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#7C6FD9"/><stop offset="100%" stop-color="#6755D1"/></linearGradient>
    <linearGradient id="hGreen" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#00B4A6"/><stop offset="100%" stop-color="#009A8C"/></linearGradient>
    <linearGradient id="hBlue" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#2F80ED"/><stop offset="100%" stop-color="#1A6DD8"/></linearGradient>
    <linearGradient id="hTeal" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#00BCD4"/><stop offset="100%" stop-color="#0097A7"/></linearGradient>
    <marker id="ah" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#C5CAD8"/></marker>
  </defs>
  <style>
    text { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif; }
    .card { filter: url(#cardShadow); }
    .module-title { font-size: 12px; font-weight: 600; fill: #FFF; letter-spacing: 0.3px; }
    .module-sub { font-size: 9.5px; fill: rgba(255,255,255,0.82); font-weight: 400; }
    .item-title { font-size: 11.5px; font-weight: 600; fill: #1A1F36; }
    .item-desc { font-size: 10px; fill: #5E6278; }
    .tag-skill { font-size: 9px; font-weight: 700; fill: #FFF; }
    .tag-cli { font-size: 9px; font-weight: 700; fill: #FFF; }
    .tag-agent { font-size: 9px; font-weight: 700; fill: #FFF; }
    .layer-label { font-size: 11px; font-weight: 600; fill: #FFF; letter-spacing: 0.5px; }
    .layer-sub { font-size: 9px; fill: rgba(255,255,255,0.78); }
    .legend-text { font-size: 10px; fill: #5E6278; }
    .header-main { font-size: 14px; font-weight: 700; fill: #FFF; letter-spacing: 0.5px; }
    .header-sub { font-size: 9.5px; fill: rgba(255,255,255,0.6); }
  </style>

  <rect width="680" height="600" fill="url(#bgGrad)" rx="14"/>

  <!-- ===== HEADER ===== -->
  <rect x="16" y="14" width="648" height="50" rx="10" fill="#1A1F36" filter="url(#headerShadow)"/>
  <text x="36" y="36" class="header-main">品类主数据搭建 · Skill &amp; Agent 架构全景</text>
  <text x="36" y="52" class="header-sub">基于品类主数据的智能化能力架构  ·  支撑车型项目管控与任务分发全链路</text>
  <circle cx="626" cy="39" r="15" fill="rgba(255,255,255,0.04)"/>
  <circle cx="650" cy="39" r="10" fill="rgba(255,255,255,0.03)"/>

  <!-- ===== LEFT: 三层驱动 ===== -->
  <rect x="16" y="74" width="32" height="416" rx="8" fill="#1A1F36"/>
  <text x="32" y="288" text-anchor="middle" font-size="11" font-weight="700" fill="#FFF" letter-spacing="1" transform="rotate(-90, 32, 288)">三层驱动架构</text>

  <!-- ===== LAYER 1: 基础数据层 ===== -->
  <rect x="56" y="74" width="608" height="84" rx="0" fill="rgba(244,151,0,0.07)" stroke="rgba(244,151,0,0.2)" stroke-width="1"/>
  <rect x="56" y="74" width="608" height="26" rx="0" fill="rgba(244,151,0,0.15)"/>
  <text x="72" y="91" class="layer-label" fill="#C67A00">基础数据层</text>
  <text x="165" y="91" class="layer-sub" fill="#8B6914">品类树 · 人员角色树 · 定点供应商主数据</text>
  <text x="72" y="104" class="layer-sub" fill="#A07D30">MVPS 数据 · 车型项目配置 · 路由规则基座</text>

  <!-- ===== LAYER 2: 智能化能力层 ===== -->
  <rect x="56" y="160" width="608" height="168" rx="0" fill="rgba(124,111,217,0.05)" stroke="rgba(124,111,217,0.2)" stroke-width="1"/>
  <rect x="56" y="160" width="608" height="26" rx="0" fill="rgba(124,111,217,0.15)"/>
  <text x="72" y="177" class="layer-label" fill="#6755D1">智能化能力层</text>
  <text x="175" y="177" class="layer-sub" fill="#8B80D1">Skill 语义理解与规则配置  ·  Agent 自动执行与状态监控</text>
  <text x="72" y="190" class="layer-sub" fill="#8B80D1">ESB 数据同步  ·  定点供应商智能匹配  ·  任务路由与通知</text>

  <!-- ===== LAYER 3: 应用场景层 ===== -->
  <rect x="56" y="330" width="608" height="160" rx="0" fill="rgba(0,180,166,0.05)" stroke="rgba(0,180,166,0.2)" stroke-width="1"/>
  <rect x="56" y="330" width="608" height="26" rx="0" fill="rgba(0,180,166,0.15)"/>
  <text x="72" y="347" class="layer-label" fill="#009A8C">应用场景层</text>
  <text x="175" y="347" class="layer-sub" fill="#007A6A">车型项目管控  ·  SOR/BDL/RFQ/EWO/CWO/SWO/框架协议任务分发</text>
  <text x="72" y="360" class="layer-sub" fill="#007A6A">飞书通知聚合  ·  MCP 标准化封装  ·  供应商资源池策略基座</text>

  <!-- ===== MODULE 1: 采购品类主数据搭建 ===== -->
  <!-- Card -->
  <rect x="64" y="202" width="188" height="118" rx="9" class="card" fill="#FFF" stroke="#F0F2F8" stroke-width="1.5"/>
  <!-- Header -->
  <rect x="64" y="202" width="188" height="36" rx="9" fill="url(#hOrange)"/>
  <rect x="64" y="226" width="188" height="12" fill="url(#hOrange)"/>
  <text x="76" y="220" class="module-title">1. 采购品类主数据</text>
  <text x="76" y="232" class="module-title">搭建及 MVPS 映射</text>
  <text x="76" y="244" class="module-sub">CLI · Skill · Agent</text>

  <!-- Items -->
  <rect x="74" y="252" width="5" height="5" rx="1.5" fill="#F59700"/>
  <text x="84" y="258" class="item-title">品类树体系构建</text>
  <text x="84" y="268" class="item-desc">多级品类新增、编辑</text>

  <rect x="74" y="278" width="5" height="5" rx="1.5" fill="#2F80ED"/>
  <text x="84" y="284" class="item-title">ESB 接口拉取 MVPS</text>
  <text x="84" y="294" class="item-desc">定时拉取结构化品类</text>
  <rect x="170" y="274" width="42" height="16" rx="8" fill="#2F80ED"/>
  <text x="191" y="285" text-anchor="middle" class="tag-cli">CLI</text>

  <rect x="74" y="302" width="5" height="5" rx="1.5" fill="#7C6FD9"/>
  <text x="84" y="308" class="item-title">人员角色树配置</text>
  <text x="84" y="318" class="item-desc">GCM / SQE / 采购工程师</text>
  <rect x="170" y="298" width="42" height="16" rx="8" fill="#7C6FD9"/>
  <text x="191" y="309" text-anchor="middle" class="tag-skill">Skill</text>

  <!-- ===== MODULE 2: 定点供应商智能匹配 ===== -->
  <rect x="260" y="202" width="188" height="118" rx="9" class="card" fill="#FFF" stroke="#F0F2F8" stroke-width="1.5"/>
  <rect x="260" y="202" width="188" height="36" rx="9" fill="url(#hPurple)"/>
  <rect x="260" y="226" width="188" height="12" fill="url(#hPurple)"/>
  <text x="272" y="220" class="module-title">2. 定点供应商</text>
  <text x="272" y="232" class="module-title">智能匹配</text>
  <text x="272" y="244" class="module-sub">Skill · Agent</text>

  <rect x="270" y="252" width="5" height="5" rx="1.5" fill="#7C6FD9"/>
  <text x="280" y="258" class="item-title">品类数据新建时</text>
  <text x="280" y="268" class="item-desc">自动触发智能推荐</text>
  <rect x="366" y="252" width="42" height="16" rx="8" fill="#7C6FD9"/>
  <text x="387" y="263" text-anchor="middle" class="tag-skill">Skill</text>

  <rect x="270" y="278" width="5" height="5" rx="1.5" fill="#7C6FD9"/>
  <text x="280" y="284" class="item-title">RFQ 定点完成</text>
  <text x="280" y="294" class="item-desc">自动更新品类定点供应商</text>
  <rect x="366" y="278" width="42" height="16" rx="8" fill="#7C6FD9"/>
  <text x="387" y="289" text-anchor="middle" class="tag-skill">Skill</text>

  <rect x="270" y="302" width="5" height="5" rx="1.5" fill="#00BCD4"/>
  <text x="280" y="308" class="item-title">每日 01:00 定时更新</text>
  <text x="280" y="318" class="item-desc">批量校验并更新</text>
  <rect x="366" y="302" width="42" height="16" rx="8" fill="#00BCD4"/>
  <text x="387" y="313" text-anchor="middle" class="tag-agent">Agent</text>

  <!-- ===== MODULE 3: 车型项目管控表 ===== -->
  <rect x="456" y="202" width="200" height="118" rx="9" class="card" fill="#FFF" stroke="#F0F2F8" stroke-width="1.5"/>
  <rect x="456" y="202" width="200" height="36" rx="9" fill="url(#hGreen)"/>
  <rect x="456" y="226" width="200" height="12" fill="url(#hGreen)"/>
  <text x="468" y="220" class="module-title">3. 车型项目管控表</text>
  <text x="468" y="232" class="module-title">应用</text>
  <text x="468" y="244" class="module-sub">Part Planning 应用</text>

  <rect x="466" y="252" width="5" height="5" rx="1.5" fill="#00B4A6"/>
  <text x="476" y="258" class="item-title">车型 + SOR 包维度</text>
  <text x="476" y="268" class="item-desc">以车型项目视角维护</text>

  <rect x="466" y="278" width="5" height="5" rx="1.5" fill="#00B4A6"/>
  <text x="476" y="284" class="item-title">三层关联模型</text>
  <text x="476" y="294" class="item-desc">车型项目 → SOR 包</text>
  <text x="476" y="304" class="item-desc">→ 采购品类</text>

  <rect x="466" y="308" width="5" height="5" rx="1.5" fill="#00B4A6"/>
  <text x="476" y="314" class="item-title">定点进度可视化</text>
  <text x="476" y="324" class="item-desc">支撑车型项目进度追踪</text>

  <!-- ===== ARROWS ROW 1 ===== -->
  <line x1="252" y1="261" x2="260" y2="261" stroke="#D0D5E4" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#ah)"/>
  <line x1="448" y1="261" x2="456" y2="261" stroke="#D0D5E4" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#ah)"/>

  <!-- ===== MODULE 4: 任务路由和通知 (wide) ===== -->
  <rect x="64" y="350" width="394" height="110" rx="9" class="card" fill="#FFF" stroke="#F0F2F8" stroke-width="1.5"/>
  <rect x="64" y="350" width="394" height="36" rx="9" fill="url(#hBlue)"/>
  <rect x="64" y="374" width="394" height="12" fill="url(#hBlue)"/>
  <text x="76" y="368" class="module-title">4. 任务路由和通知</text>
  <text x="76" y="382" class="module-sub">Skill · Agent</text>

  <!-- Col 1 -->
  <rect x="74" y="394" width="5" height="5" rx="1.5" fill="#2F80ED"/>
  <text x="84" y="400" class="item-title">7 类任务自动匹配</text>
  <text x="84" y="410" class="item-desc">SOR / BDL / RFQ / EWO /</text>
  <text x="84" y="420" class="item-desc">CWO / SWO / 框架协议</text>
  <rect x="74" y="428" width="42" height="16" rx="8" fill="#00BCD4"/>
  <text x="95" y="439" text-anchor="middle" class="tag-agent">Agent</text>

  <!-- Col 2 -->
  <rect x="200" y="394" width="5" height="5" rx="1.5" fill="#2F80ED"/>
  <text x="210" y="400" class="item-title">飞书通知 · 聚合推送</text>
  <text x="210" y="410" class="item-desc">按人员聚合任务卡片</text>
  <text x="210" y="420" class="item-desc">减少通知打扰</text>
  <rect x="200" y="428" width="42" height="16" rx="8" fill="#00BCD4"/>
  <text x="221" y="439" text-anchor="middle" class="tag-agent">Agent</text>

  <!-- Col 3 -->
  <rect x="326" y="394" width="5" height="5" rx="1.5" fill="#7C6FD9"/>
  <text x="336" y="400" class="item-title">超时升级 · 自定义规则</text>
  <text x="336" y="410" class="item-desc">超时自动升级链路</text>
  <text x="336" y="420" class="item-desc">支持路由规则配置</text>
  <rect x="326" y="428" width="42" height="16" rx="8" fill="#7C6FD9"/>
  <text x="347" y="439" text-anchor="middle" class="tag-skill">Skill</text>

  <!-- ===== MODULE 5: MCP 标准化封装 ===== -->
  <rect x="466" y="350" width="190" height="110" rx="9" class="card" fill="#FFF" stroke="#F0F2F8" stroke-width="1.5"/>
  <rect x="466" y="350" width="190" height="36" rx="9" fill="url(#hTeal)"/>
  <rect x="466" y="374" width="190" height="12" fill="url(#hTeal)"/>
  <text x="478" y="368" class="module-title">5. MCP 标准化封装</text>
  <text x="478" y="382" class="module-sub">Skill 稳定后封装</text>

  <rect x="476" y="394" width="5" height="5" rx="1.5" fill="#00BCD4"/>
  <text x="486" y="400" class="item-title">标准化接口暴露</text>
  <text x="486" y="410" class="item-desc">供应商同步 / 任务路由</text>

  <rect x="476" y="414" width="5" height="5" rx="1.5" fill="#00BCD4"/>
  <text x="486" y="420" class="item-title">跨系统调用</text>
  <text x="486" y="430" class="item-desc">SRM / ERP / 合同 / 企微</text>

  <rect x="476" y="434" width="5" height="5" rx="1.5" fill="#00BCD4"/>
  <text x="486" y="440" class="item-title">多 Agent 协作编排</text>
  <text x="486" y="450" class="item-desc">Agent 间任务传递与同步</text>

  <line x1="458" y1="405" x2="466" y2="405" stroke="#D0D5E4" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#ah)"/>

  <!-- ===== MODULE 6: 资源池与策略基座 (Future) ===== -->
  <rect x="64" y="468" width="592" height="58" rx="9" class="card" fill="rgba(120,144,156,0.04)" stroke="#90A4AE" stroke-width="1.5" stroke-dasharray="7 5"/>
  <rect x="64" y="468" width="592" height="26" rx="9" fill="rgba(120,144,156,0.1)"/>
  <rect x="64" y="482" width="592" height="12" fill="rgba(120,144,156,0.1)"/>
  <text x="78" y="485" font-size="11" font-weight="600" fill="#607D8B">6. 资源池与策略基座</text>
  <text x="220" y="485" font-size="9" fill="rgba(96,125,139,0.7)">未来规划 · Future</text>
  <text x="78" y="502" font-size="10" fill="#78909C">按品类维护合格供应商资源池  ·  准入 / 评估 / 退出机制  ·  战略 / 杠杆 / 瓶颈 / 常规 差异化采购策略基座</text>

  <!-- ===== LEGEND ===== -->
