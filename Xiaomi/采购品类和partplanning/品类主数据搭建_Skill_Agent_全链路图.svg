  <rect x="30" y="203" width="48" height="20" rx="4" fill="#7C3AED"/>
  <text x="54" y="217" font-family="system-ui,Microsoft YaHei,PingFang SC,sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">Skill ×2</text>
  <text x="86" y="217" font-family="system-ui,Microsoft YaHei,PingFang SC,sans-serif" font-size="10" fill="#5B21B6">新品类供应商推荐 · 人工触发辅助更新</text>

