<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" width="100%" role="img">
  <title>品类主数据搭建：Skill / Agent 架构全链路图</title>
  <desc>架构图风格，展示 MVPS→品类树→Skill数据匹配→角色任务绑定→任务执行的全链路，标注 Skill 4 个、Agent 10 个</desc>

  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <filter id="shadowStrong" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowBlack" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#374151"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7C3AED"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#EA580C"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="720" height="560" fill="#F8FAFC"/>

  <!-- ===== HEADER ===== -->
  <rect x="0" y="0" width="720" height="52" fill="#1E293B"/>
  <text x="360" y="22" font-family="system-ui,Microsoft YaHei,PingFang SC,sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">品类主数据搭建：Skill / Agent 架构全链路图</text>
  <text x="360" y="42" font-family="system-ui,Microsoft YaHei,PingFang SC,sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">MVPS → 品类树 → 数据匹配 → 角色绑定 → 任务执行，全链路 Skill 4 个 + Agent 10 个</text>

  <!-- ===== SECTION DIVIDERS ===== -->
  <rect x="0" y="52" width="720" height="508" fill="#F8FAFC"/>

  <!-- Section 1: 主数据搭建 zone -->
