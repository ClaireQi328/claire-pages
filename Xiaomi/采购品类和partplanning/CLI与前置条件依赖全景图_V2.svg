    <text x="18" y="98" font-size="8" fill="#595959">CATEGORY_PERSONNEL（品类-人员）</text>
    <text x="18" y="110" font-size="8" fill="#595959">TODO_TASK · AUDIT_LOG · SYNC_LOG</text>
    <text x="12" y="128" font-size="8" fill="#d48806" font-weight="600">需改字段：</text>
