<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; background: #ffffff;">
  <defs>
