<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" width="1100" role="img">
  <title>品类主数据搭建 · Skill &amp; Agent 架构全景图</title>
  <desc>小米SRM品类主数据管理平台Skill与Agent应用架构全景图</desc>

  <defs>
    <style>
      .bg { fill: #FFFFFF; }
      .header-bg { fill: #F7F8FA; }
      .card-body { fill: #FFFFFF; stroke: #E8EAED; stroke-width: 1; }
      .card-top-orange { fill: #F5701A; }
      .card-top-purple { fill: #6C63FF; }
      .card-top-blue { fill: #378ADD; }
      .card-top-green { fill: #1D9E75; }
      .card-top-gray { fill: #9CA3AF; }
      .card-top-dashed { stroke: #9CA3AF; stroke-width: 2; stroke-dasharray: 6 4; fill: none; }
      .num-bg-orange { fill: #F5701A; }
      .num-bg-purple { fill: #6C63FF; }
      .num-bg-blue { fill: #378ADD; }
      .num-bg-green { fill: #1D9E75; }
      .num-bg-gray { fill: #9CA3AF; }
      .tag-skill { fill: #6C63FF; }
      .tag-agent { fill: #10B981; }
      .tag-cli { fill: #3B82F6; }
      .tag-skill-text { fill: #FFFFFF; font-size: 11px; font-weight: 600; font-family: system-ui, -apple-system, sans-serif; }
      .tag-agent-text { fill: #FFFFFF; font-size: 11px; font-weight: 600; font-family: system-ui, -apple-system, sans-serif; }
      .tag-cli-text { fill: #FFFFFF; font-size: 11px; font-weight: 600; font-family: system-ui, -apple-system, sans-serif; }
      .card-num { fill: #FFFFFF; font-size: 15px; font-weight: 700; font-family: system-ui, -apple-system, sans-serif; }
      .card-title { fill: #1F2937; font-size: 14px; font-weight: 600; font-family: system-ui, -apple-system, sans-serif; }
      .card-subtitle { fill: #374151; font-size: 12px; font-weight: 600; font-family: system-ui, -apple-system, sans-serif; }
      .card-line { fill: #6B7280; font-size: 11.5px; font-family: system-ui, -apple-system, sans-serif; }
      .header-title { fill: #1F2937; font-size: 20px; font-weight: 700; font-family: system-ui, -apple-system, sans-serif; }
      .header-sub { fill: #6B7280; font-size: 13px; font-family: system-ui, -apple-system, sans-serif; }
      .footer-text { fill: #9CA3AF; font-size: 11px; font-family: system-ui, -apple-system, sans-serif; }
      .divider { stroke: #E5E7EB; stroke-width: 1; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1100" height="820" class="bg"/>

  <!-- Header -->
  <rect x="0" y="0" width="1100" height="58" class="header-bg"/>
  <text x="30" y="36" class="header-title">品类主数据搭建 · Skill &amp; Agent 架构全景图</text>
  <text x="30" y="52" class="header-sub">品类维度轻量化 AI 能力建设 · 全链路 Skill × 4  /  Agent × 4</text>

  <!-- ========== Card 1: 采购品类主数据搭建及与MVPS映射 ========== -->
  <!-- Card background -->
  <rect x="20" y="78" width="340" height="330" rx="6" class="card-body"/>
  <!-- Top color bar -->
  <rect x="20" y="78" width="340" height="6" rx="3" class="card-top-orange"/>
  <!-- Number badge -->
  <circle cx="46" cy="108" r="14" class="num-bg-orange"/>
  <text x="46" y="113" text-anchor="middle" class="card-num">1</text>
  <!-- Title -->
  <text x="70" y="105" class="card-title">采购品类主数据搭建及与 MVPS 映射</text>
  <text x="70" y="120" class="card-subtitle">品类树体系构建 · 人员角色树配置</text>

  <!-- Divider -->
  <line x1="30" y1="135" x2="350" y2="135" class="divider"/>

  <!-- Lines with tags -->
  <!-- Line 1: CLI -->
  <text x="38" y="157" class="card-line">构建采购品类树体系，支持多级品类</text>
  <text x="38" y="157" class="card-line">的新增、编辑与层级调整</text>
  <rect x="290" y="145" width="32" height="18" rx="9" class="tag-cli"/>
  <text x="306" y="157" text-anchor="middle" class="tag-cli-text">CLI</text>

  <text x="38" y="185" class="card-line">对接 ESB 接口，定时拉取 MVPS 数据</text>
  <text x="38" y="200" class="card-line">解析为结构化品类信息</text>
  <rect x="290" y="173" width="32" height="18" rx="9" class="tag-cli"/>
  <text x="306" y="185" text-anchor="middle" class="tag-cli-text">CLI</text>

  <!-- Line 3: Skill -->
  <text x="38" y="230" class="card-line">配置人员角色树（GCM / SQE / 采购工程师），</text>
  <text x="38" y="245" class="card-line">建立采购品类 → 人员映射关系</text>
  <rect x="290" y="218" width="40" height="18" rx="9" class="tag-skill"/>
  <text x="310" y="230" text-anchor="middle" class="tag-skill-text">Skill</text>

  <!-- Line 4 -->
  <text x="38" y="275" class="card-line">品类及映射关系的生效 / 失效管理</text>

  <!-- Line 5: Skill -->
  <text x="38" y="300" class="card-line">品类定点供应商管理，支持新增、</text>
  <text x="38" y="315" class="card-line">编辑、导入、导出操作</text>
  <rect x="290" y="288" width="40" height="18" rx="9" class="tag-skill"/>
  <text x="310" y="300" text-anchor="middle" class="tag-skill-text">Skill</text>

  <!-- Line 6 -->
  <text x="38" y="345" class="card-line">品类关联 SOR 定点包管理</text>
  <text x="38" y="360" class="card-line">（Part Planning 应用基础）</text>

  <!-- Line 7: Skill -->
  <text x="38" y="385" class="card-line">品类-MVPS 映射关系建立与维护</text>
  <rect x="290" y="373" width="40" height="18" rx="9" class="tag-skill"/>
  <text x="310" y="385" text-anchor="middle" class="tag-skill-text">Skill</text>


  <!-- ========== Card 2: 定点供应商智能匹配 ========== -->
  <rect x="380" y="78" width="340" height="330" rx="6" class="card-body"/>
  <rect x="380" y="78" width="340" height="6" rx="3" class="card-top-purple"/>
  <circle cx="406" cy="108" r="14" class="num-bg-purple"/>
  <text x="406" y="113" text-anchor="middle" class="card-num">2</text>
  <text x="430" y="105" class="card-title">品类维度下的定点供应商智能匹配</text>
  <text x="430" y="120" class="card-subtitle">定点供应商智能匹配 · Skill + Agent</text>

  <line x1="390" y1="135" x2="710" y2="135" class="divider"/>

  <!-- Line 1: Skill -->
  <text x="398" y="157" class="card-line">品类数据新建时，自动触发</text>
  <text x="398" y="172" class="card-line">定点供应商智能匹配推荐</text>
  <rect x="650" y="145" width="40" height="18" rx="9" class="tag-skill"/>
  <text x="670" y="157" text-anchor="middle" class="tag-skill-text">Skill</text>

  <!-- Line 2: Agent -->
  <text x="398" y="202" class="card-line">RFQ 定点完成后，Skill 自动更新</text>
  <text x="398" y="217" class="card-line">品类下的定点供应商</text>
  <rect x="650" y="190" width="42" height="18" rx="9" class="tag-agent"/>
  <text x="671" y="202" text-anchor="middle" class="tag-agent-text">Agent</text>

  <!-- Line 3: Agent -->
  <text x="398" y="247" class="card-line">定时任务（每日 01:00）批量</text>
  <text x="398" y="262" class="card-line">校验并更新品类定点供应商</text>
  <rect x="650" y="235" width="42" height="18" rx="9" class="tag-agent"/>
  <text x="671" y="247" text-anchor="middle" class="tag-agent-text">Agent</text>

  <!-- Line 4: Skill -->
  <text x="398" y="292" class="card-line">支持人工触发，按需更新</text>
  <text x="398" y="307" class="card-line">品类定点供应商</text>
  <rect x="650" y="280" width="40" height="18" rx="9" class="tag-skill"/>
  <text x="670" y="292" text-anchor="middle" class="tag-skill-text">Skill</text>

  <!-- Line 5 -->
  <text x="398" y="337" class="card-line">定点供应商与品类映射关系管理</text>

  <!-- Line 6: Skill -->
  <text x="398" y="362" class="card-line">定点供应商多维度评分与排序推荐</text>
  <rect x="650" y="350" width="40" height="18" rx="9" class="tag-skill"/>
  <text x="670" y="362" text-anchor="middle" class="tag-skill-text">Skill</text>


  <!-- ========== Card 3: 车型项目管控表 ========== -->
  <rect x="740" y="78" width="340" height="330" rx="6" class="card-body"/>
  <rect x="740" y="78" width="340" height="6" rx="3" class="card-top-blue"/>
  <circle cx="766" cy="108" r="14" class="num-bg-blue"/>
  <text x="766" y="113" text-anchor="middle" class="card-num">3</text>
  <text x="790" y="105" class="card-title">车型项目管控表应用</text>
  <text x="790" y="120" class="card-subtitle">车型 + SOR 包维度 · 采购品类责任人员</text>

  <line x1="750" y1="135" x2="1070" y2="135" class="divider"/>

  <text x="758" y="157" class="card-line">以「车型 + SOR 包」为维度，</text>
  <text x="758" y="172" class="card-line">维护对应采购品类的责任人员</text>

  <text x="758" y="202" class="card-line">支撑车型项目视角的定点进度</text>
  <text x="758" y="217" class="card-line">可视化追踪</text>

  <text x="758" y="247" class="card-line">车型、SOR 包、采购品类三层</text>
  <text x="758" y="262" class="card-line">级联关联模型</text>

  <text x="758" y="292" class="card-line">查询、可视化、配置管理</text>

  <text x="758" y="322" class="card-line">关联 SOP 定点包内物料数量</text>
  <text x="758" y="337" class="card-line">统计与进度追踪</text>

  <text x="758" y="367" class="card-line">定点阶段人员交接与变更记录</text>


  <!-- ========== Row 2 ========== -->

  <!-- ========== Card 4: 任务路由和通知 ========== -->
  <rect x="20" y="428" width="340" height="330" rx="6" class="card-body"/>
  <rect x="20" y="428" width="340" height="6" rx="3" class="card-top-green"/>
  <circle cx="46" cy="458" r="14" class="num-bg-green"/>
  <text x="46" y="463" text-anchor="middle" class="card-num">4</text>
  <text x="70" y="455" class="card-title">任务路由和通知</text>
  <text x="70" y="470" class="card-subtitle">品类-人员映射树 · 飞书通知 · Skill + Agent</text>

  <line x1="30" y1="485" x2="350" y2="485" class="divider"/>

  <!-- Line 1: Agent -->
  <text x="38" y="507" class="card-line">SOR / BDL / RFQ / EWO / CWO / SWO / 框架协议</text>
  <text x="38" y="522" class="card-line">等任务新增时，自动匹配负责人并分配任务</text>
  <rect x="290" y="495" width="42" height="18" rx="9" class="tag-agent"/>
  <text x="311" y="507" text-anchor="middle" class="tag-agent-text">Agent</text>

  <!-- Line 2: Agent -->
  <text x="38" y="552" class="card-line">Agent 通过飞书推送任务通知，</text>
  <text x="38" y="567" class="card-line">支持任务聚合汇总</text>
  <rect x="290" y="540" width="42" height="18" rx="9" class="tag-agent"/>
  <text x="311" y="552" text-anchor="middle" class="tag-agent-text">Agent</text>

  <!-- Line 3: Agent -->
  <text x="38" y="597" class="card-line">支持任务超时自动升级</text>
  <rect x="290" y="585" width="42" height="18" rx="9" class="tag-agent"/>
  <text x="311" y="597" text-anchor="middle" class="tag-agent-text">Agent</text>

  <!-- Line 4: Skill -->
  <text x="38" y="627" class="card-line">支持自定义路由规则配置</text>
  <rect x="290" y="615" width="40" height="18" rx="9" class="tag-skill"/>
  <text x="310" y="627" text-anchor="middle" class="tag-skill-text">Skill</text>

  <!-- Line 5 -->
  <text x="38" y="662" class="card-line">飞书通知偏好设置</text>

  <!-- Line 6: Agent -->
  <text x="38" y="692" class="card-line">任务路由日志记录与追踪</text>
  <rect x="290" y="680" width="42" height="18" rx="9" class="tag-agent"/>
  <text x="311" y="692" text-anchor="middle" class="tag-agent-text">Agent</text>


  <!-- ========== Card 5: MCP 封装 ========== -->
  <rect x="380" y="428" width="340" height="330" rx="6" class="card-body"/>
  <rect x="380" y="428" width="340" height="6" rx="3" class="card-top-green"/>
  <circle cx="406" cy="458" r="14" class="num-bg-green"/>
  <text x="406" y="463" text-anchor="middle" class="card-num">5</text>
  <text x="430" y="455" class="card-title">Skill 运行稳定后封装成 MCP</text>
  <text x="430" y="470" class="card-subtitle">标准化接口 · 跨系统调用</text>

  <line x1="390" y1="485" x2="710" y2="485" class="divider"/>

  <text x="398" y="507" class="card-line">供应商智能匹配 MCP</text>
  <rect x="650" y="495" width="40" height="18" rx="9" class="tag-skill"/>
  <text x="670" y="507" text-anchor="middle" class="tag-skill-text">Skill</text>

  <text x="398" y="537" class="card-line">任务路由 MCP</text>
  <rect x="650" y="525" width="42" height="18" rx="9" class="tag-agent"/>
  <text x="671" y="537" text-anchor="middle" class="tag-agent-text">Agent</text>

  <text x="398" y="567" class="card-line">品类人员映射 MCP</text>
  <rect x="650" y="555" width="40" height="18" rx="9" class="tag-skill"/>
  <text x="670" y="567" text-anchor="middle" class="tag-skill-text">Skill</text>

  <text x="398" y="597" class="card-line">品类数据同步 MCP</text>
  <rect x="650" y="585" width="42" height="18" rx="9" class="tag-agent"/>
  <text x="671" y="597" text-anchor="middle" class="tag-agent-text">Agent</text>

  <text x="398" y="627" class="card-line">飞书通知 MCP</text>
  <rect x="650" y="615" width="42" height="18" rx="9" class="tag-agent"/>
  <text x="671" y="627" text-anchor="middle" class="tag-agent-text">Agent</text>

  <text x="398" y="662" class="card-line">面向内部系统统一数据分发</text>
  <text x="398" y="677" class="card-line">与能力调用</text>


  <!-- ========== Card 6: 资源池与策略基座（未来） ========== -->
  <rect x="740" y="428" width="340" height="330" rx="6" class="card-body" stroke-dasharray="6 4" stroke="#9CA3AF"/>
  <rect x="740" y="428" width="340" height="6" rx="3" class="card-top-dashed"/>
  <circle cx="766" cy="458" r="14" class="num-bg-gray"/>
  <text x="766" y="463" text-anchor="middle" class="card-num" fill="#9CA3AF">6</text>
  <text x="790" y="455" class="card-title" fill="#9CA3AF">资源池与策略基座</text>
  <text x="790" y="470" class="card-subtitle" fill="#B0B8C4">未来规划 · 待启动</text>

  <line x1="750" y1="485" x2="1070" y2="485" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="6 4"/>

  <text x="758" y="507" class="card-line" fill="#9CA3AF">按品类维护合格供应商资源池</text>

  <text x="758" y="537" class="card-line" fill="#9CA3AF">供应商准入 / 评估 / 退出机制</text>

  <text x="758" y="567" class="card-line" fill="#9CA3AF">品类差异化采购策略制定</text>
  <text x="758" y="582" class="card-line" fill="#9CA3AF">（战略 / 杠杆 / 瓶颈 / 常规）</text>

  <text x="758" y="612" class="card-line" fill="#9CA3AF">为品类定点决策提供数据基础</text>

  <text x="758" y="642" class="card-line" fill="#9CA3AF">供应商绩效评估与持续改进</text>

  <text x="758" y="672" class="card-line" fill="#9CA3AF">策略基座建设完成后，</text>
  <text x="758" y="687" class="card-line" fill="#9CA3AF">与定点供应商智能匹配深度联动</text>


  <!-- ========== Footer ========== -->
  <line x1="20" y1="778" x2="1080" y2="778" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="20" y="788" width="16" height="10" rx="5" class="tag-cli"/>
  <text x="42" y="797" class="footer-text">CLI 定时数据拉取</text>
  <rect x="148" y="788" width="40" height="10" rx="5" class="tag-skill"/>
  <text x="194" y="797" class="footer-text">Skill AI 语义理解 / 规则配置</text>
  <rect x="352" y="788" width="42" height="10" rx="5" class="tag-agent"/>
  <text x="400" y="797" class="footer-text">Agent 自动执行 / 定时调度 / 通知升级</text>
  <rect x="582" y="788" width="340" height="10" rx="5" fill="none" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="598" y="797" class="footer-text">虚线边框 = 未来规划模块</text>
</svg>