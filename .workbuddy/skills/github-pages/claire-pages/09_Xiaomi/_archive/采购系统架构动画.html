<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>采购系统架构 - 模块巡览</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: -apple-system, "Microsoft YaHei", sans-serif;
  }
  .wrap {
    position: relative;
    display: inline-block;
  }
  .bg {
    display: block;
    height: 80vh;
    max-height: 700px;
    border-radius: 6px;
    user-select: none;
  }
  .overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border-radius: 6px;
    z-index: 1;
  }
  .mask {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.73);
  }
  .hl {
    position: absolute;
    border: 2.5px solid #00d4ff;
    border-radius: 4px;
    box-shadow: 0 0 18px rgba(0,212,255,0.4), inset 0 0 12px rgba(0,212,255,0.08);
    opacity: 0;
    pointer-events: none;
  }
  .hl .inner {
    position: absolute;
    inset: 0;
    background: rgba(0, 212, 255, 0.07);
  }
  .tag {
    position: absolute;
    background: #00d4ff;
    color: #0a0a1e;
    font-size: 13px;
    font-weight: 700;
    padding: 3px 14px;
    border-radius: 12px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    z-index: 5;
    box-shadow: 0 2px 10px rgba(0,212,255,0.5);
  }

  /* ====== 模块坐标（百分比，相对于原图） ====== */
  /* 原图 2056x1095 */

  /* 1. 询报价管理：蓝色区域，中间行第3列 */
  .hl-1 { left: 40.5%; top: 32%; width: 10.2%; height: 43.5%; }
  /* 2. 品类管理：底部灰色条，左侧 */
  .hl-2 { left: 21%; top: 78.5%; width: 25.8%; height: 10%; }
  /* 3. 合同/订单管理：紫色区域，中间行第4列 */
  .hl-3 { left: 63.5%; top: 32%; width: 10.5%; height: 43.5%; }
  /* 4. 供应商管理：顶部黄色大区域 */
  .hl-4 { left: 21%; top: 18.5%; width: 78%; height: 13%; }
  /* 5. 价格中心：粉红色区域，中间行第3-4列之间 */
  .hl-5 { left: 51.5%; top: 32%; width: 11.5%; height: 43.5%; }

  /* 标签位置 */
  .tag-1 { left: 41%; top: calc(32% - 32px); }
  .tag-2 { left: 29%; top: calc(78.5% - 32px); }
  .tag-3 { left: 64%; top: calc(32% - 32px); }
  .tag-4 { left: 52%; top: calc(18.5% - 32px); }
  .tag-5 { left: 52%; top: calc(32% - 32px); }

  /* ====== 动画 ====== */
  @keyframes show { from, 2% { opacity: 0 } 4%, 18% { opacity: 1 } 20%, to { opacity: 0 } }
  @keyframes stag  { 0%,20%{opacity:0} 22%,38%{opacity:1} 40%,100%{opacity:0} }
  @keyframes stag2 { 0%,40%{opacity:0} 42%,58%{opacity:1} 60%,100%{opacity:0} }
  @keyframes stag3 { 0%,60%{opacity:0} 62%,78%{opacity:1} 80%,100%{opacity:0} }
  @keyframes stag4 { 0%,80%{opacity:0} 82%,98%{opacity:1} 100%{opacity:0} }

  .hl-1,.tag-1 { animation: show 15s ease-in-out infinite; }
  .hl-2,.tag-2 { animation: stag 15s ease-in-out infinite; }
  .hl-3,.tag-3 { animation: stag2 15s ease-in-out infinite; }
  .hl-4,.tag-4 { animation: stag3 15s ease-in-out infinite; }
  .hl-5,.tag-5 { animation: stag4 15s ease-in-out infinite; }

  /* 进度条 */
  .progress {
    position: absolute;
    bottom: -30px; left: 0;
    width: 100%; height: 3px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress i {
    display: block;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, #00d4ff, #7b61ff, #00d4ff);
    animation: bar 15s linear infinite;
  }
  @keyframes bar { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }

  /* 步骤指示 */
  .steps {
    position: absolute;
    bottom: -52px; left: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
  }
  .steps span {
    color: rgba(255,255,255,0.2);
    font-size: 11px;
  }
  @keyframes sn1 { 0%,2%{color:rgba(255,255,255,0.2)} 4%,18%{color:#00d4ff} 20%,100%{color:rgba(255,255,255,0.2)} }
  @keyframes sn2 { 0%,20%{color:rgba(255,255,255,0.2)} 22%,38%{color:#00d4ff} 40%,100%{color:rgba(255,255,255,0.2)} }
  @keyframes sn3 { 0%,40%{color:rgba(255,255,255,0.2)} 42%,58%{color:#00d4ff} 60%,100%{color:rgba(255,255,255,0.2)} }
  @keyframes sn4 { 0%,60%{color:rgba(255,255,255,0.2)} 62%,78%{color:#00d4ff} 80%,100%{color:rgba(255,255,255,0.2)} }
  @keyframes sn5 { 0%,80%{color:rgba(255,255,255,0.2)} 82%,98%{color:#00d4ff} 100%{color:rgba(255,255,255,0.2)} }
  .n1{animation:sn1 15s ease-in-out infinite}
  .n2{animation:sn2 15s ease-in-out infinite}
  .n3{animation:sn3 15s ease-in-out infinite}
  .n4{animation:sn4 15s ease-in-out infinite}
  .n5{animation:sn5 15s ease-in-out infinite}

  /* 调试模式 */
  .debug {
    position: fixed; top: 8px; right: 8px;
    background: rgba(0,0,0,0.85);
    color: #0f0;
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 4px;
    z-index: 999;
    font-family: monospace;
    display: none;
  }
  body.debug-on .debug { display: block; }
</style>
</head>
<body>

<div class="wrap" id="wrap">
  <img class="bg" id="bg"
       src="C:\Users\qi'yue\Desktop\Claire\Claire\20260122-20260603 小米\EP Agent\whiteboard_exported_image.png"
       alt="采购系统架构图" />
  <div class="overlay">
    <div class="mask"></div>

    <div class="hl hl-1"><div class="inner"></div></div>
    <div class="hl hl-2"><div class="inner"></div></div>
    <div class="hl hl-3"><div class="inner"></div></div>
    <div class="hl hl-4"><div class="inner"></div></div>
    <div class="hl hl-5"><div class="inner"></div></div>

    <div class="tag tag-1">① 询报价管理</div>
    <div class="tag tag-2">② 品类管理</div>
    <div class="tag tag-3">③ 合同/订单管理</div>
    <div class="tag tag-4">④ 供应商管理</div>
    <div class="tag tag-5">⑤ 价格中心</div>
  </div>

  <div class="progress"><i></i></div>
  <div class="steps">
    <span class="n1">① 询报价管理</span>
    <span class="n2">② 品类管理</span>
    <span class="n3">③ 合同/订单</span>
    <span class="n4">④ 供应商管理</span>
    <span class="n5">⑤ 价格中心</span>
  </div>
</div>

<div class="debug" id="debug"></div>

<script>
// 按 D 键开启调试模式：显示图片自然尺寸 + 鼠标坐标百分比
const bg = document.getElementById('bg');
const debug = document.getElementById('debug');
let debugOn = false;
document.addEventListener('keydown', e => {
  if (e.key === 'd' || e.key === 'D') {
    debugOn = !debugOn;
    document.body.classList.toggle('debug-on', debugOn);
  }
});
bg.addEventListener('mousemove', e => {
  if (!debugOn) return;
  const r = bg.getBoundingClientRect();
  const x = ((e.clientX - r.left) / r.width * 100).toFixed(1);
  const y = ((e.clientY - r.top) / r.height * 100).toFixed(1);
  debug.textContent = `natural: ${bg.naturalWidth}x${bg.naturalHeight} | pos: ${x}% ${y}% | px: ${Math.round(e.clientX-r.left)},${Math.round(e.clientY-r.top)}`;
});
</script>

</body>
</html>
