<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EP 生产采购系统 · 汇报演示</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:"Microsoft YaHei","PingFang SC",-apple-system,sans-serif; background:#f0f2f5; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  /* ========== Top Bar ========== */
  .top-bar {
    background: linear-gradient(135deg, #1a2b4a 0%, #2c3e6a 100%);
    height: 56px;
    display: flex;
    align-items: center;
    padding: 0 28px;
    flex-shrink: 0;
    box-shadow: 0 2px 12px rgba(0,0,0,.15);
    z-index: 100;
  }
  .top-bar .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-right: 36px;
    flex-shrink: 0;
  }
  .top-bar .logo .mi {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, #ff6700, #ff4d00);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 13px; font-weight: 800;
  }
  .top-bar .logo span {
    color: #fff; font-size: 15px; font-weight: 700; letter-spacing: .5px;
  }

  /* Page Tabs */
  .page-tabs {
    display: flex;
    gap: 0;
    flex: 1;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .page-tabs::-webkit-scrollbar { display: none; }
  .page-tab {
    padding: 0 22px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: rgba(255,255,255,.55);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: all .25s;
    position: relative;
    border-bottom: 3px solid transparent;
  }
  .page-tab:hover {
    color: rgba(255,255,255,.85);
    background: rgba(255,255,255,.06);
  }
  .page-tab.active {
    color: #fff;
    border-bottom-color: #4facfe;
  }
  .page-tab .tab-icon {
    font-size: 16px;
  }
  .page-tab .tab-badge {
    font-size: 10px;
    padding: 1px 8px;
    border-radius: 10px;
    background: rgba(255,255,255,.15);
    color: rgba(255,255,255,.7);
    font-weight: 600;
  }
  .page-tab.active .tab-badge {
    background: rgba(79,172,254,.3);
    color: #fff;
  }

  /* Page Indicator */
  .page-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: auto;
    flex-shrink: 0;
    padding-left: 16px;
  }
  .page-indicator .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,.2);
    cursor: pointer;
    transition: all .2s;
  }
  .page-indicator .dot.active {
    background: #4facfe;
    box-shadow: 0 0 8px rgba(79,172,254,.5);
  }
  .page-indicator .dot:hover {
    background: rgba(255,255,255,.5);
  }

  /* ========== Content Area ========== */
  .content-area {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .page-frame {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    border: none;
    display: none;
    width: 100%;
    height: 100%;
  }
  .page-frame.active {
    display: block;
  }

  /* ========== Keyboard Hint ========== */
  .kb-hint {
    position: fixed;
    bottom: 16px;
    right: 24px;
    z-index: 200;
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(26,43,74,.85);
    backdrop-filter: blur(8px);
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 11px;
    color: rgba(255,255,255,.6);
    pointer-events: none;
    animation: hintFade 4s ease forwards;
  }
  .kb-hint kbd {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 22px;
    height: 20px;
    padding: 0 5px;
    background: rgba(255,255,255,.15);
    border-radius: 4px;
    font-size: 10px;
    font-family: inherit;
    color: rgba(255,255,255,.8);
  }
  @keyframes hintFade {
    0%, 70% { opacity: 1; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>

<!-- ========== Top Navigation Bar ========== -->
<div class="top-bar">
  <div class="logo">
    <div class="mi">MI</div>
    <span>小米汽车 · EP 采购系统</span>
  </div>

  <div class="page-tabs" id="pageTabs">
    <div class="page-tab active" onclick="switchPage(0, this)">
      <span class="tab-icon">📊</span>
      规划总览
      <span class="tab-badge">Q3+Q4</span>
    </div>
    <div class="page-tab" onclick="switchPage(1, this)">
      <span class="tab-icon">🏠</span>
      SRM工作台
      <span class="tab-badge">AI能力地图</span>
    </div>
    <div class="page-tab" onclick="switchPage(2, this)">
      <span class="tab-icon">🤖</span>
      Agent架构
      <span class="tab-badge">CLI WAVE</span>
    </div>
  </div>

  <div class="page-indicator" id="pageIndicator">
    <div class="dot active" onclick="switchPage(0)"></div>
    <div class="dot" onclick="switchPage(1)"></div>
    <div class="dot" onclick="switchPage(2)"></div>
  </div>
</div>

<!-- ========== Page Content ========== -->
<div class="content-area">
  <iframe class="page-frame active" id="page0" src="20260122-20261010 Xiaomi/Q3 立项报告/EP采购系统规划总览_融合版.html"></iframe>
  <iframe class="page-frame" id="page1" src="workbench_only.html"></iframe>
  <iframe class="page-frame" id="page2" src="Agent架构.html"></iframe>
</div>

<!-- Keyboard Hint -->
<div class="kb-hint" id="kbHint">
  <kbd>←</kbd> <kbd>→</kbd> 切换页面 &nbsp;|&nbsp; <kbd>1</kbd> <kbd>2</kbd> 跳转
</div>

<script>
const pages = document.querySelectorAll('.page-frame');
const tabs = document.querySelectorAll('.page-tab');
const dots = document.querySelectorAll('.page-indicator .dot');
let current = 0;

function switchPage(idx, el) {
  if (idx < 0 || idx >= pages.length) return;
  current = idx;

  // Toggle frames
  pages.forEach((f, i) => f.classList.toggle('active', i === idx));

  // Toggle tabs
  tabs.forEach((t, i) => t.classList.toggle('active', i === idx));

  // Toggle dots
  dots.forEach((d, i) => d.classList.toggle('active', i === idx));
}

// Keyboard navigation
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    e.preventDefault();
    switchPage(Math.min(current + 1, pages.length - 1));
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault();
    switchPage(Math.max(current - 1, 0));
  } else if (e.key === '1') {
    switchPage(0);
  } else if (e.key === '2') {
    switchPage(1);
  }
});
</script>
</body>
</html>
