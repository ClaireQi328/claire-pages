        .container {

        .subtitle {

            color: #b0c4de;
            margin-bottom: 20px;
        }
        .stats {
            text-align: center;

            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            backdrop-filter: blur(10px);
        }
        .stats-item {
            display: inline-block;
            margin: 0 20px;
            padding: 8px 15px;
            background: rgba(255,255,255,0.15);

        }
        .controls {
            margin-bottom: 20px;
            text-align: center;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }
        button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        button:hover {

        }
        button.active {

        }

            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);

            cursor: pointer;
        }
        .node circle {
            stroke: #fff;
            stroke-width: 2.5px;
            transition: r 0.3s;
        }
        .node circle:hover {
            stroke-width: 4px;
        }
        .link {
            stroke-opacity: 0.6;
            stroke-width: 2px;
            transition: stroke-opacity 0.3s;
        }
        .link.structural {
            stroke: #4ECDC4;
            stroke-dasharray: 5,5;
        }
        .link.business {
            stroke: #FF6B6B;
        }
        .link-label {
            font-size: 9px;
            fill: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            pointer-events: none;
        }
        .legend {
            margin-top: 20px;
            text-align: center;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
        }
        .legend-section {
            margin: 10px 0;
        }
        .legend-title {
            font-weight: bold;
            margin-bottom: 8px;
            color: #FFD93D;
        }
        .legend-item {
            display: inline-block;
            margin: 5px 15px;
            padding: 5px 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }
        .legend-color {
            display: inline-block;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
        }
        .legend-line {
            display: inline-block;
            width: 30px;
            height: 3px;
            margin-right: 6px;
            vertical-align: middle;
        }
        .tooltip {
            position: absolute;
            padding: 12px;
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #4ECDC4;
            border-radius: 8px;
            pointer-events: none;
            font-size: 12px;

            font-size: 11px;
        }

</head>

                    </div>
                    <div class="tooltip-section">
                        <div class="tooltip-label">层级:</div>
                        <div class="tooltip-value">${d.layer}</div>
                    </div>
                    <div class="tooltip-section">
                        <div class="tooltip-label">包路径:</div>
                        <div class="tooltip-value" style="font-size: 10px;">${d.package || 'N/A'}</div>
                    </div>
                    <div class="tooltip-section">
                        <div class="tooltip-label">属性数量:</div>
                        <div class="tooltip-value">${d.attributes_count}</div>
                    </div>
                    <div class="tooltip-section">
                        <div class="tooltip-label">业务出向关系:</div>
                        <div class="tooltip-value">${d.business_outgoing} 个</div>
                        <div class="tooltip-value" style="font-size: 10px; color: #4ECDC4;">类型: ${businessTypes}</div>
                    </div>
                    <div class="tooltip-section">
                        <div class="tooltip-label">业务入向关系:</div>
                        <div class="tooltip-value">${d.business_incoming} 个</div>
                        <div class="tooltip-value" style="font-size: 10px; color: #4ECDC4;">类型: ${businessInTypes}</div>
                    </div>
                    ${d.description ? `<div class="tooltip-section"><div class="tooltip-label">描述:</div><div class="tooltip-value" style="font-size: 10px;">${d.description}</div></div>` : ''}
                `)
                    .style("left", (event.pageX + 15) + "px")
                    .style("top", (event.pageY - 10) + "px");
            })
            .on("mouseout", function() {
                tooltip.transition()
                    .duration(500)
                    .style("opacity", 0);
            });
        
        let nodeLabels = node.append("text")
            .text(d => d.name)
            .attr("dx", d => d.size + 6)
            .attr("dy", 4)
            .style("font-size", "11px")
            .style("fill", "#fff")
            .style("text-shadow", "1px 1px 2px rgba(0,0,0,0.8)")
            .style("opacity", d => showLabels ? 1 : 0);
        
        simulation.on("tick", () => {
            link
                .attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);
            
            linkLabels
                .attr("x", d => (d.source.x + d.target.x) / 2)
                .attr("y", d => (d.source.y + d.target.y) / 2);
            
            node.attr("transform", d => `translate(${d.x},${d.y})`);
        });
        
        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }
        
        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }
        
        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }
        
        function resetZoom() {
            svg.transition()
                .duration(750)
                .call(zoom.transform, d3.zoomIdentity);
        }
        
        function toggleLabels() {
            showLabels = !showLabels;
            nodeLabels.style("opacity", d => showLabels ? 1 : 0);
        }
        
        function filterByLayer(layer) {
            currentFilter = layer;
            node.style("opacity", d => {
                if (layer === 'all') return 1;
                return d.layer === layer ? 1 : 0.15;
            });
            link.style("opacity", d => {
                if (layer === 'all') {
                    if (d.category === 'structural' && !showStructural) return 0;
                    if (d.category === 'business' && !showBusiness) return 0;
                    return 0.6;
                }
                const sourceLayer = nodes.find(n => n.id === d.source.id)?.layer;
                const targetLayer = nodes.find(n => n.id === d.target.id)?.layer;
                const visible = (sourceLayer === layer || targetLayer === layer);
                if (!visible) return 0.05;
                if (d.category === 'structural' && !showStructural) return 0;
                if (d.category === 'business' && !showBusiness) return 0;
                return 0.6;
            });
        }
        
        function toggleRelationshipType(type) {
            if (type === 'structural') {
                showStructural = !showStructural;
                document.getElementById('btn-structural').classList.toggle('active', showStructural);
            } else if (type === 'business') {
                showBusiness = !showBusiness;
                document.getElementById('btn-business').classList.toggle('active', showBusiness);
            }
            
            link.style("opacity", d => {
                if (d.category === 'structural' && !showStructural) return 0;
                if (d.category === 'business' && !showBusiness) return 0;
                return 0.6;
            });
            
            linkLabels.style("opacity", d => {
                if (d.category === 'structural' && !showStructural) return 0;
                if (d.category === 'business' && !showBusiness) return 0;
                return 0.4;
            });
        }
        
        function showBusinessOnly() {
            showStructural = false;
            showBusiness = true;
            document.getElementById('btn-structural').classList.remove('active');
            document.getElementById('btn-business').classList.add('active');
            document.getElementById('btn-business-only').classList.add('active');
            
            link.style("opacity", d => d.category === 'business' ? 0.8 : 0);
            linkLabels.style("opacity", d => d.category === 'business' ? 0.6 : 0);
        }
    </script>
</body>
</html>
