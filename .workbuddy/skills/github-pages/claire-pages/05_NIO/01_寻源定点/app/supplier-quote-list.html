<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>供应商报价列表 — NIO 寻源定点</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: { primary:'#FF7A00', secondary:'#FFB400', neutral:{50:'#FAFAFA',100:'#F5F5F5',200:'#E5E5E5',300:'#D4D4D4',400:'#A3A3A3',500:'#737373',600:'#525252',700:'#404040',800:'#262626',900:'#171717'} },
        fontFamily: { sans:['Inter','system-ui','sans-serif'] },
        boxShadow: { 'card':'0 4px 20px 0 rgba(0,0,0,0.05)', 'card-hover':'0 10px 30px 0 rgba(0,0,0,0.1)' }
      }}
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap" rel="stylesheet">
  <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>
<body class="bg-neutral-50 min-h-screen flex">

  <!-- Sidebar -->
  <aside class="w-60 bg-white border-r border-neutral-200 flex-shrink-0 flex flex-col sticky top-0 h-screen z-30">
    <div class="p-4 border-b border-neutral-200">
      <a href="index.html" class="flex items-center gap-2">
        <div class="w-8 h-8 header-gradient rounded-lg flex items-center justify-center">
          <i class="fas fa-cubes text-white text-sm"></i>
        </div>
        <span class="font-bold text-neutral-800 text-sm">寻源定点</span>
      </a>
    </div>
    <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
      <div class="text-xs font-semibold text-neutral-400 uppercase tracking-wider px-4 py-2">寻源报价</div>
      <a class="nav-item" href="rfq-list.html"><i class="fas fa-file-invoice w-5 text-center"></i> 询报价管理</a>
      <a class="nav-item active" href="supplier-quote-list.html"><i class="fas fa-store w-5 text-center"></i> 供应商报价</a>
      <a class="nav-item" href="partner-evaluation.html"><i class="fas fa-user-check w-5 text-center"></i> 合作伙伴评估</a>
    </nav>
    <div class="p-3 border-t border-neutral-200">
      <a href="index.html" class="nav-item text-neutral-400"><i class="fas fa-arrow-left w-5 text-center"></i> 返回总览</a>
    </div>
  </aside>

  <div class="flex-1 flex flex-col min-w-0">
    <header class="bg-white border-b border-neutral-200 px-6 py-3 flex items-center justify-between sticky top-0 z-20">
      <div>
        <h1 class="text-lg font-bold text-neutral-800">供应商报价列表</h1>
        <p class="text-xs text-neutral-400">采购协同 / 生产报价列表</p>
      </div>
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-primary/10 rounded-full flex items-center justify-center">
          <span class="text-sm font-medium text-primary">V</span>
        </div>
      </div>
    </header>

    <main class="flex-1 p-6">
      <!-- Filters -->
      <div class="card mb-6">
        <div class="flex flex-wrap items-end gap-4">
          <div class="flex-1 min-w-[200px]">
            <label class="form-label">报价包编码</label>
            <input type="text" class="form-input" placeholder="输入编码..." id="sq-search">
          </div>
          <div class="flex-1 min-w-[200px]">
            <label class="form-label">报价包名称</label>
            <input type="text" class="form-input" placeholder="输入名称...">
          </div>
          <div class="flex-1 min-w-[200px]">
            <label class="form-label">报价状态</label>
            <select class="form-select" id="sq-status">
              <option value="">全部状态</option>
              <option>未报价</option>
              <option>已报价</option>
              <option>已关闭</option>
            </select>
          </div>
          <div class="flex-1 min-w-[200px]">
            <label class="form-label">创建时间</label>
            <input type="date" class="form-input">
          </div>
          <div class="flex gap-2">
            <button class="btn-primary" onclick="filterSQ()"><i class="fas fa-search"></i> 查询</button>
            <button class="btn-ghost" onclick="resetSQ()"><i class="fas fa-undo"></i> 重置</button>
          </div>
        </div>
      </div>

      <!-- Action Bar -->
      <div class="flex items-center justify-between mb-4">
        <button class="btn-secondary"><i class="fas fa-file-export mr-1"></i> 导出</button>
        <div class="text-sm text-neutral-500">共 <span class="font-semibold text-neutral-700" id="sq-total">6</span> 条</div>
      </div>

      <!-- Table -->
      <div class="table-wrapper bg-white">
        <table class="table-main table-zebra" id="sq-table">
          <thead>
            <tr>
              <th>报价包编码</th>
              <th>报价包名称</th>
              <th>报价状态</th>
              <th>轮次</th>
              <th>轮次截止时间</th>
              <th>创建时间</th>
              <th>定点通知函</th>
              <th class="w-28">操作</th>
            </tr>
          </thead>
          <tbody id="sq-tbody"></tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="flex items-center justify-end mt-4">
        <div class="flex items-center gap-1">
          <button class="page-btn"><i class="fas fa-chevron-left text-xs"></i></button>
          <button class="page-btn active">1</button>
          <button class="page-btn"><i class="fas fa-chevron-right text-xs"></i></button>
        </div>
      </div>
    </main>
  </div>

  <script>
    const SQ_DATA = [
      { code:'RFQ20221030100001', name:'Firefly Rear Knuckle后转向节', status:'未报价', round:1, deadline:'2022/7/27 20:00:00', created:'2022/6/27 13:43:00', letter:'-' },
      { code:'RFQ2022103100002', name:'Firefly Rear Knuckle前转向节', status:'已报价', round:2, deadline:'2022/7/27 20:00:00', created:'2022/6/27 13:33:00', letter:'已发送' },
      { code:'RFQ2022103100003', name:'LEO IDO 集成驱动模块', status:'未报价', round:1, deadline:'2022/7/27 20:00:00', created:'2022/6/27 13:13:00', letter:'-' },
      { code:'RFQ2022103100004', name:'ORION IDO 电驱总成', status:'已报价', round:2, deadline:'2022/7/27 20:00:00', created:'2022/6/26 16:53:00', letter:'已发送' },
      { code:'RFQ2022103100005', name:'Pegasus Seat System 座椅总成', status:'未报价', round:1, deadline:'2022/7/27 20:00:00', created:'2022/6/25 15:25:00', letter:'-' },
      { code:'RFQ2022103100006', name:'LEO Windshield 挡风玻璃', status:'已关闭', round:2, deadline:'2022/7/27 20:00:00', created:'2022/6/24 13:33:00', letter:'-' },
    ];

    function renderSQ(data) {
      const tbody = document.getElementById('sq-tbody');
      document.getElementById('sq-total').textContent = data.length;
      if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center py-16 text-neutral-400"><i class="fas fa-inbox text-3xl mb-2 block"></i>暂无数据</td></tr>';
        return;
      }
      tbody.innerHTML = data.map(r => `
        <tr>
          <td><a href="supplier-quote.html?code=${r.code}" class="text-primary font-medium hover:underline">${r.code}</a></td>
          <td class="max-w-[200px] truncate" title="${r.name}">${r.name}</td>
          <td>${r.status === '已报价' ? '<span class="badge-success">已报价</span>' : r.status === '未报价' ? '<span class="badge-warning">未报价</span>' : '<span class="badge-neutral">已关闭</span>'}</td>
          <td class="text-center">${r.round}</td>
          <td class="text-neutral-500">${r.deadline}</td>
          <td class="text-neutral-400 text-xs">${r.created}</td>
          <td>${r.letter === '已发送' ? '<span class="badge-info">已发送</span>' : '<span class="text-neutral-300">-</span>'}</td>
          <td>
            <div class="flex gap-1">
              ${r.status === '未报价' ? `<a href="supplier-quote.html?code=${r.code}" class="btn-primary btn-sm !py-1 !px-3">报价</a>` :
                r.status === '已报价' ? `<a href="supplier-quote.html?code=${r.code}" class="btn-secondary btn-sm !py-1 !px-3">修改</a>` :
                `<span class="text-neutral-300 text-xs">-</span>`}
            </div>
          </td>
        </tr>
      `).join('');
    }

    function filterSQ() {
      const search = document.getElementById('sq-search').value.toLowerCase();
      const status = document.getElementById('sq-status').value;
      renderSQ(SQ_DATA.filter(r => {
        if (search && !r.code.toLowerCase().includes(search) && !r.name.toLowerCase().includes(search)) return false;
        if (status && r.status !== status) return false;
        return true;
      }));
    }
    function resetSQ() {
      document.getElementById('sq-search').value = '';
      document.getElementById('sq-status').value = '';
      renderSQ(SQ_DATA);
    }

    renderSQ(SQ_DATA);
  </script>

</body>
</html>
