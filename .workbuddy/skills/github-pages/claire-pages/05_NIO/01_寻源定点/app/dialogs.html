<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>弹窗组件 — NIO 寻源定点</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: { primary:'#FF7A00', secondary:'#FFB400', neutral:{50:'#FAFAFA',100:'#F5F5F5',200:'#E5E5E5',300:'#D4D4D4',400:'#A3A3A3',500:'#737373',600:'#525252',700:'#404040',800:'#262626',900:'#171717'} },
        fontFamily: { sans:['Inter','system-ui','sans-serif'] },
        boxShadow: { 'card':'0 4px 20px 0 rgba(0,0,0,0.05)', 'card-hover':'0 10px 30px 0 rgba(0,0,0,0.1)' }
      }}
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap" rel="stylesheet">
  <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>
<body class="bg-neutral-50 min-h-screen">

  <!-- Header -->
  <header class="bg-white border-b border-neutral-200 px-6 py-4 sticky top-0 z-40">
    <div class="max-w-5xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="index.html" class="text-neutral-400 hover:text-neutral-600"><i class="fas fa-arrow-left"></i></a>
        <h1 class="text-lg font-bold text-neutral-800">弹窗组件展示</h1>
      </div>
      <a href="index.html" class="btn-ghost btn-sm"><i class="fas fa-home mr-1"></i>返回总览</a>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-8">
    <!-- Dialog Buttons Grid -->
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 mb-8">
      <button onclick="openDialog('material')" class="card-flat p-4 text-left hover:shadow-card transition-shadow cursor-pointer">
        <i class="fas fa-box text-primary mb-2 text-lg"></i>
        <p class="text-sm font-medium text-neutral-800">物料信息弹窗</p>
      </button>
      <button onclick="openDialog('partner')" class="card-flat p-4 text-left hover:shadow-card transition-shadow cursor-pointer">
        <i class="fas fa-building text-blue-500 mb-2 text-lg"></i>
        <p class="text-sm font-medium text-neutral-800">合作伙伴信息</p>
      </button>
      <button onclick="openDialog('person')" class="card-flat p-4 text-left hover:shadow-card transition-shadow cursor-pointer">
        <i class="fas fa-users text-emerald-500 mb-2 text-lg"></i>
        <p class="text-sm font-medium text-neutral-800">选择人员</p>
      </button>
      <button onclick="openDialog('add-material')" class="card-flat p-4 text-left hover:shadow-card transition-shadow cursor-pointer">
        <i class="fas fa-plus-square text-amber-500 mb-2 text-lg"></i>
        <p class="text-sm font-medium text-neutral-800">新增物料</p>
      </button>
      <button onclick="openDialog('temp-material')" class="card-flat p-4 text-left hover:shadow-card transition-shadow cursor-pointer">
        <i class="fas fa-clock text-purple-500 mb-2 text-lg"></i>
        <p class="text-sm font-medium text-neutral-800">新增临时物料</p>
      </button>
      <button onclick="openDialog('quote-round')" class="card-flat p-4 text-left hover:shadow-card transition-shadow cursor-pointer">
        <i class="fas fa-sync text-rose-500 mb-2 text-lg"></i>
        <p class="text-sm font-medium text-neutral-800">新增报价轮次</p>
      </button>
      <button onclick="openDialog('attachment')" class="card-flat p-4 text-left hover:shadow-card transition-shadow cursor-pointer">
        <i class="fas fa-paperclip text-neutral-500 mb-2 text-lg"></i>
        <p class="text-sm font-medium text-neutral-800">新增附件</p>
      </button>
      <button onclick="openDialog('ladder')" class="card-flat p-4 text-left hover:shadow-card transition-shadow cursor-pointer">
        <i class="fas fa-layer-group text-indigo-500 mb-2 text-lg"></i>
        <p class="text-sm font-medium text-neutral-800">设置阶梯</p>
      </button>
      <button onclick="openDialog('dimension')" class="card-flat p-4 text-left hover:shadow-card transition-shadow cursor-pointer">
        <i class="fas fa-ruler text-teal-500 mb-2 text-lg"></i>
        <p class="text-sm font-medium text-neutral-800">量纲查看</p>
      </button>
      <button onclick="openDialog('material-quote')" class="card-flat p-4 text-left hover:shadow-card transition-shadow cursor-pointer">
        <i class="fas fa-receipt text-orange-500 mb-2 text-lg"></i>
        <p class="text-sm font-medium text-neutral-800">查看物料报价</p>
      </button>
      <button onclick="openDialog('partner-quote')" class="card-flat p-4 text-left hover:shadow-card transition-shadow cursor-pointer">
        <i class="fas fa-file-invoice-dollar text-cyan-500 mb-2 text-lg"></i>
        <p class="text-sm font-medium text-neutral-800">查看合作伙伴报价</p>
      </button>
      <button onclick="openDialog('cancel')" class="card-flat p-4 text-left hover:shadow-card transition-shadow cursor-pointer">
        <i class="fas fa-ban text-red-500 mb-2 text-lg"></i>
        <p class="text-sm font-medium text-neutral-800">取消报价/询报价</p>
      </button>
      <button onclick="openDialog('sor')" class="card-flat p-4 text-left hover:shadow-card transition-shadow cursor-pointer">
        <i class="fas fa-file-signature text-green-600 mb-2 text-lg"></i>
        <p class="text-sm font-medium text-neutral-800">SOR 更新</p>
      </button>
      <button onclick="openDialog('download')" class="card-flat p-4 text-left hover:shadow-card transition-shadow cursor-pointer">
        <i class="fas fa-download text-blue-600 mb-2 text-lg"></i>
        <p class="text-sm font-medium text-neutral-800">文件下载</p>
      </button>
      <button onclick="openDialog('mold')" class="card-flat p-4 text-left hover:shadow-card transition-shadow cursor-pointer">
        <i class="fas fa-project-diagram text-violet-500 mb-2 text-lg"></i>
        <p class="text-sm font-medium text-neutral-800">模具对应物料号</p>
      </button>
      <button onclick="openDialog('select-material')" class="card-flat p-4 text-left hover:shadow-card transition-shadow cursor-pointer">
        <i class="fas fa-check-double text-lime-600 mb-2 text-lg"></i>
        <p class="text-sm font-medium text-neutral-800">选择定点物料</p>
      </button>
    </div>

    <p class="text-center text-neutral-400 text-sm">点击任意按钮查看弹窗效果</p>
  </main>

  <!-- Dialog Container -->
  <div id="dc"></div>

  <script>
    // Auto-open from URL param
    const urlDialog = new URLSearchParams(location.search).get('dialog');
    if (urlDialog) setTimeout(() => openDialog(urlDialog), 300);

    function closeDialog() { document.getElementById('dc').innerHTML = ''; }

    function openDialog(type) {
      const dc = document.getElementById('dc');
      let content = '';

      switch(type) {
        // ---- 物料信息弹窗 ----
        case 'material':
          content = dialogShell('物料信息', 700, `
            <div class="grid grid-cols-2 gap-4 text-sm">
              <div><span class="text-neutral-400">零部件号</span><p class="font-medium">P1000010100032</p></div>
              <div><span class="text-neutral-400">物料名称</span><p class="font-medium">A PILLAR LOWER LH</p></div>
              <div><span class="text-neutral-400">中文名称</span><p class="font-medium">左A柱下内饰板总成</p></div>
              <div><span class="text-neutral-400">单位</span><p class="font-medium">个</p></div>
              <div><span class="text-neutral-400">零部件类型</span><p class="font-medium">BOM件</p></div>
              <div><span class="text-neutral-400">开发策略</span><p class="font-medium">New</p></div>
              <div><span class="text-neutral-400">单车用量</span><p class="font-medium">1</p></div>
              <div><span class="text-neutral-400">装配比例</span><p class="font-medium">100%</p></div>
              <div><span class="text-neutral-400">技术方案变化</span><p><span class="badge-success">是</span></p></div>
              <div><span class="text-neutral-400">研发工程师</span><p class="font-medium">李大米</p></div>
              <div class="col-span-2"><span class="text-neutral-400">技术状态简述</span><p class="font-medium">采用新型铝合金材料，减重15%</p></div>
            </div>`,
            `<button class="btn-ghost" onclick="closeDialog()">关闭</button>`
          );
          break;

        // ---- 合作伙伴信息弹窗 ----
        case 'partner':
          content = dialogShell('合作伙伴信息', 600, `
            <div class="space-y-4">
              <div class="flex items-center gap-4 p-4 bg-neutral-50 rounded-xl">
                <div class="w-14 h-14 bg-blue-100 rounded-xl flex items-center justify-center text-xl font-bold text-blue-600">V</div>
                <div>
                  <p class="font-bold text-neutral-800">V21994</p>
                  <p class="text-sm text-neutral-500">培奇爱汽车配件（太仓）有限公司</p>
                  <p class="text-xs text-neutral-400">ShangHai · 联系人: 吴唯一</p>
                </div>
              </div>
              <div class="grid grid-cols-2 gap-4 text-sm">
                <div><span class="text-neutral-400">联系人邮箱</span><p class="text-primary">12345678@163.com</p></div>
                <div><span class="text-neutral-400">联系电话</span><p class="font-medium">138-0000-0000</p></div>
                <div><span class="text-neutral-400">技术评估</span><p><span class="badge-success">G</span></p></div>
                <div><span class="text-neutral-400">质量评估</span><p><span class="badge-success">G</span></p></div>
                <div><span class="text-neutral-400">财务评估</span><p><span class="badge-success">G</span></p></div>
                <div><span class="text-neutral-400">定点状态</span><p><span class="badge-success">定点</span></p></div>
              </div>
            </div>`,
            `<button class="btn-ghost" onclick="closeDialog()">关闭</button><button class="btn-primary" onclick="closeDialog()">查看报价</button>`
          );
          break;

        // ---- 选择人员 ----
        case 'person':
          content = dialogShell('选择人员', 500, `
            <div class="mb-4">
              <input type="text" class="form-input" placeholder="搜索姓名、工号..." id="person-search" oninput="filterPerson()">
            </div>
            <div class="space-y-2 max-h-[300px] overflow-y-auto" id="person-list">
              ${[
                { name:'张小米', role:'采购工程师', dept:'采购部' },
                { name:'Gavin TANG 唐帆', role:'Buyer', dept:'采购部' },
                { name:'李大米', role:'研发工程师', dept:'研发部' },
                { name:'Luca Luo 罗聪', role:'Buyer Team Leader', dept:'采购部' },
                { name:'Gary LIN 林雄', role:'Buyer Department Head', dept:'采购部' },
                { name:'Jack WANG 王意', role:'Buyer Department VP', dept:'采购部' },
                { name:'Essie DING 丁紫薇', role:'Applicant', dept:'采购部' },
                { name:'王大锤', role:'质量工程师', dept:'质量部' },
              ].map(p => `
                <label class="flex items-center gap-3 p-3 rounded-lg border border-neutral-200 cursor-pointer hover:bg-neutral-50 person-item">
                  <input type="radio" name="person" class="text-primary">
                  <div class="w-8 h-8 bg-primary/10 rounded-full flex items-center justify-center text-xs font-bold text-primary">${p.name[0]}</div>
                  <div class="flex-1">
                    <p class="text-sm font-medium text-neutral-800 person-name">${p.name}</p>
                    <p class="text-xs text-neutral-400">${p.role} · ${p.dept}</p>
                  </div>
                </label>
              `).join('')}
            </div>`,
            `<button class="btn-ghost" onclick="closeDialog()">取消</button><button class="btn-primary" onclick="closeDialog()">确定</button>`
          );
          break;

        // ---- 新增物料 ----
        case 'add-material':
          content = dialogShell('新增物料', 650, `
            <div class="mb-4">
              <input type="text" class="form-input" placeholder="搜索零部件号或名称...">
            </div>
            <div class="table-wrapper max-h-[300px] overflow-y-auto">
              <table class="table-main table-zebra text-xs">
                <thead><tr><th class="w-8"><input type="checkbox" class="rounded text-primary"></th><th>零部件号</th><th>名称</th><th>类型</th><th>工程师</th></tr></thead>
                <tbody>
                  <tr><td><input type="checkbox" class="rounded text-primary"></td><td class="font-medium">P1000010100034</td><td>B柱上内饰板 LH</td><td>BOM件</td><td>李大米</td></tr>
                  <tr><td><input type="checkbox" class="rounded text-primary"></td><td class="font-medium">P1000010100035</td><td>B柱上内饰板 RH</td><td>BOM件</td><td>李大米</td></tr>
                  <tr><td><input type="checkbox" class="rounded text-primary"></td><td class="font-medium">P1000010100036</td><td>顶棚总成</td><td>BOM件</td><td>王大锤</td></tr>
                  <tr><td><input type="checkbox" class="rounded text-primary"></td><td class="font-medium">P1000010100037</td><td>门槛内饰板 LH</td><td>BOM件</td><td>李大米</td></tr>
                  <tr><td><input type="checkbox" class="rounded text-primary"></td><td class="font-medium">P1000010100038</td><td>门槛内饰板 RH</td><td>BOM件</td><td>李大米</td></tr>
                </tbody>
              </table>
            </div>`,
            `<button class="btn-ghost" onclick="closeDialog()">取消</button><button class="btn-primary" onclick="closeDialog()">添加选中 (0)</button>`
          );
          break;

        // ---- 新增临时物料 ----
        case 'temp-material':
          content = dialogShell('新增临时物料', 500, `
            <div class="space-y-4">
              <div><label class="form-label">临时物料名称 <span class="text-red-500">*</span></label><input type="text" class="form-input" placeholder="输入临时物料名称"></div>
              <div><label class="form-label">描述</label><textarea class="form-input" rows="3" placeholder="输入描述..."></textarea></div>
              <div class="grid grid-cols-2 gap-4">
                <div><label class="form-label">单位</label><select class="form-select"><option>个</option><option>件</option><option>套</option><option>kg</option></select></div>
                <div><label class="form-label">单车用量</label><input type="number" class="form-input" value="1"></div>
              </div>
              <div class="p-3 bg-amber-50 rounded-lg border border-amber-200 text-sm text-amber-700">
                <i class="fas fa-exclamation-triangle mr-1"></i>临时物料需在正式物料系统中补录后方可定点。
              </div>
            </div>`,
            `<button class="btn-ghost" onclick="closeDialog()">取消</button><button class="btn-primary" onclick="closeDialog()">确定添加</button>`
          );
          break;

        // ---- 新增报价轮次 ----
        case 'quote-round':
          content = dialogShell('新增报价轮次', 500, `
            <div class="space-y-4">
              <div class="p-4 bg-neutral-50 rounded-lg text-sm">
                <p class="text-neutral-400">当前轮次</p>
                <p class="text-2xl font-bold text-neutral-800">第 2 轮</p>
              </div>
              <div><label class="form-label">新轮次截止时间 <span class="text-red-500">*</span></label><input type="datetime-local" class="form-input"></div>
              <div><label class="form-label">是否封标 <span class="text-red-500">*</span></label><select class="form-select"><option>是</option><option>否</option></select></div>
              <div><label class="form-label">备注</label><textarea class="form-input" rows="2" placeholder="本轮次说明..."></textarea></div>
              <div class="p-3 bg-blue-50 rounded-lg border border-blue-200 text-sm text-blue-700">
                <i class="fas fa-info-circle mr-1"></i>新增轮次后，所有供应商将收到新一轮报价通知。
              </div>
            </div>`,
            `<button class="btn-ghost" onclick="closeDialog()">取消</button><button class="btn-primary" onclick="closeDialog()">创建第 3 轮</button>`
          );
          break;

        // ---- 新增附件 ----
        case 'attachment':
          content = dialogShell('新增附件', 500, `
            <div class="space-y-4">
              <div class="border-2 border-dashed border-neutral-300 rounded-xl p-8 text-center hover:border-primary transition-colors cursor-pointer">
                <i class="fas fa-cloud-upload-alt text-3xl text-neutral-300 mb-2"></i>
                <p class="text-sm text-neutral-500">点击或拖拽文件到此处上传</p>
                <p class="text-xs text-neutral-400 mt-1">支持 PDF、Excel、Word、图片，单文件最大 50MB</p>
              </div>
              <div><label class="form-label">文件类型 <span class="text-red-500">*</span></label>
                <select class="form-select"><option>合同协议类</option><option>报价模板</option><option>技术规范</option><option>采购通则</option><option>其他</option></select>
              </div>
              <div><label class="form-label">文件所属部门</label><input type="text" class="form-input" placeholder="如: 采购部、质量部"></div>
            </div>`,
            `<button class="btn-ghost" onclick="closeDialog()">取消</button><button class="btn-primary" onclick="closeDialog()">上传</button>`
          );
          break;

        // ---- 设置阶梯 ----
        case 'ladder':
          content = dialogShell('设置阶梯报价', 600, `
            <div class="space-y-4">
              <p class="text-sm text-neutral-500">设置不同数量区间的单价，阶梯将自动应用到报价中。</p>
              <div class="table-wrapper">
                <table class="table-main text-sm" id="ladder-table">
                  <thead><tr><th>阶梯</th><th>起始数量</th><th>结束数量</th><th class="text-right">单价 (元)</th><th>操作</th></tr></thead>
                  <tbody>
                    <tr><td>1</td><td><input type="number" class="form-input !py-1" value="1"></td><td><input type="number" class="form-input !py-1" value="10000"></td><td><input type="number" class="form-input !py-1 text-right" value="156.00"></td><td></td></tr>
                    <tr><td>2</td><td><input type="number" class="form-input !py-1" value="10001"></td><td><input type="number" class="form-input !py-1" value="50000"></td><td><input type="number" class="form-input !py-1 text-right" value="148.20"></td><td><button class="btn-ghost btn-sm !p-1 text-red-400"><i class="fas fa-trash text-xs"></i></button></td></tr>
                    <tr><td>3</td><td><input type="number" class="form-input !py-1" value="50001"></td><td><input type="number" class="form-input !py-1" value="100000"></td><td><input type="number" class="form-input !py-1 text-right" value="142.00"></td><td><button class="btn-ghost btn-sm !p-1 text-red-400"><i class="fas fa-trash text-xs"></i></button></td></tr>
                    <tr><td>4</td><td><input type="number" class="form-input !py-1" value="100001"></td><td><input type="number" class="form-input !py-1" value="999999"></td><td><input type="number" class="form-input !py-1 text-right" value="136.50"></td><td><button class="btn-ghost btn-sm !p-1 text-red-400"><i class="fas fa-trash text-xs"></i></button></td></tr>
                  </tbody>
                </table>
              </div>
              <button class="btn-ghost btn-sm"><i class="fas fa-plus mr-1"></i>添加阶梯</button>
            </div>`,
            `<button class="btn-ghost" onclick="closeDialog()">取消</button><button class="btn-primary" onclick="closeDialog()">保存</button>`
          );
          break;

        // ---- 量纲查看 ----
        case 'dimension':
          content = dialogShell('量纲查看', 650, `
            <div class="table-wrapper">
              <table class="table-main table-zebra text-sm">
                <thead><tr><th>年份</th><th class="text-right">Q1</th><th class="text-right">Q2</th><th class="text-right">Q3</th><th class="text-right">Q4</th><th class="text-right">年度合计</th></tr></thead>
                <tbody>
                  <tr><td class="font-medium">2029</td><td class="text-right">12,000</td><td class="text-right">13,500</td><td class="text-right">12,500</td><td class="text-right">12,000</td><td class="text-right font-medium">50,000</td></tr>
                  <tr><td class="font-medium">2030</td><td class="text-right">18,000</td><td class="text-right">20,000</td><td class="text-right">22,000</td><td class="text-right">20,000</td><td class="text-right font-medium">80,000</td></tr>
                  <tr><td class="font-medium">2031</td><td class="text-right">23,000</td><td class="text-right">25,000</td><td class="text-right">27,000</td><td class="text-right">25,000</td><td class="text-right font-medium">100,000</td></tr>
                  <tr class="bg-neutral-100 font-bold"><td>合计</td><td class="text-right">53,000</td><td class="text-right">58,500</td><td class="text-right">61,500</td><td class="text-right">57,000</td><td class="text-right text-primary">230,000</td></tr>
                </tbody>
              </table>
            </div>`,
            `<button class="btn-ghost" onclick="closeDialog()">关闭</button><button class="btn-secondary" onclick="closeDialog()"><i class="fas fa-download mr-1"></i>导出</button>`
          );
          break;

        // ---- 查看物料报价 ----
        case 'material-quote':
          content = dialogShell('查看物料报价 — P1000010100032', 700, `
            <div class="space-y-4">
              <div class="flex items-center justify-between p-3 bg-neutral-50 rounded-lg">
                <div><p class="text-xs text-neutral-400">A PILLAR LOWER LH · 左A柱下内饰板总成</p></div>
                <span class="badge-success">已报价</span>
              </div>
              <div class="table-wrapper">
                <table class="table-main text-sm">
                  <thead><tr><th>成本项</th><th class="text-right">金额 (元)</th><th class="text-right">占比</th></tr></thead>
                  <tbody>
                    <tr><td>材料费</td><td class="text-right">68.50</td><td class="text-right">43.9%</td></tr>
                    <tr><td>加工费</td><td class="text-right">42.30</td><td class="text-right">27.1%</td></tr>
                    <tr><td>表面处理</td><td class="text-right">15.80</td><td class="text-right">10.1%</td></tr>
                    <tr><td>包装费</td><td class="text-right">3.20</td><td class="text-right">2.1%</td></tr>
                    <tr><td>运输费</td><td class="text-right">5.60</td><td class="text-right">3.6%</td></tr>

        case 'mold':

            <div class="table-wrapper">

        // ---- 选择定点物料 ----
        case 'select-material':
          content = dialogShell('选择定点物料', 600, `
            <div class="mb-4">
              <input type="text" class="form-input" placeholder="搜索零部件号或名称...">

                  <tr><td><input type="checkbox" class="rounded text-primary"></td><td class="font-medium">P1000010100032</td><td>左A柱下内饰板总成</td><td><span class="badge-success">已完成</span></td><td>V21994 培奇爱</td></tr>
                  <tr><td><input type="checkbox" class="rounded text-primary"></td><td class="font-medium">P1000010100033</td><td>右A柱下内饰板总成</td><td><span class="badge-success">已完成</span></td><td>V21994 培奇爱</td></tr>

            `<button class="btn-ghost" onclick="closeDialog()">取消</button><button class="btn-primary" onclick="closeDialog()">确认定点 (2)</button>`

        default:
          content = dialogShell('未知弹窗', 400, `<p class="text-neutral-500 text-center py-8">弹窗 "${type}" 未找到</p>`,
            `<button class="btn-ghost" onclick="closeDialog()">关闭</button>`);
      }

      dc.innerHTML = content;
    }

    function dialogShell(title, width, body, footer) {
      return `
        <div class="modal-overlay fade-in" onclick="if(event.target===this)closeDialog()">
          <div class="modal-box" style="width:${width}px;max-width:90vw">
            <div class="modal-header">
              <h3 class="font-bold text-neutral-800">${title}</h3>
              <button onclick="closeDialog()" class="text-neutral-400 hover:text-neutral-600 w-8 h-8 flex items-center justify-center rounded-lg hover:bg-neutral-100"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">${body}</div>
            <div class="modal-footer">${footer}</div>
          </div>
        </div>`;
    }

    function filterPerson() {
      const q = document.getElementById('person-search').value.toLowerCase();
      document.querySelectorAll('.person-item').forEach(el => {
        const name = el.querySelector('.person-name').textContent.toLowerCase();
        el.style.display = name.includes(q) ? '' : 'none';
      });
    }
  </script>
