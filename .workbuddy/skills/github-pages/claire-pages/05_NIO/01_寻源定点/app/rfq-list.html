<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>询报价列表 — NIO 寻源定点</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#FF7A00', secondary: '#FFB400',
            neutral: { 50:'#FAFAFA',100:'#F5F5F5',200:'#E5E5E5',300:'#D4D4D4',400:'#A3A3A3',500:'#737373',600:'#525252',700:'#404040',800:'#262626',900:'#171717' }
          },
          fontFamily: { sans: ['Inter','system-ui','sans-serif'] },
          boxShadow: { 'card':'0 4px 20px 0 rgba(0,0,0,0.05)', 'card-hover':'0 10px 30px 0 rgba(0,0,0,0.1)' }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap" rel="stylesheet">
  <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>
<body class="bg-neutral-50 min-h-screen flex">

  <!-- Sidebar -->
  <aside id="sidebar" class="w-60 bg-white border-r border-neutral-200 flex-shrink-0 flex flex-col sticky top-0 h-screen transition-all duration-300 z-30">
    <div class="p-4 border-b border-neutral-200">
      <a href="index.html" class="flex items-center gap-2">
        <div class="w-8 h-8 header-gradient rounded-lg flex items-center justify-center">
          <i class="fas fa-cubes text-white text-sm"></i>
        </div>
        <span class="font-bold text-neutral-800 text-sm">寻源定点</span>
      </a>
    </div>
    <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
      <div class="text-xs font-semibold text-neutral-400 uppercase tracking-wider px-4 py-2">寻源报价</div>
      <a class="nav-item active" href="rfq-list.html">
        <i class="fas fa-file-invoice w-5 text-center"></i> 询报价管理
      </a>
      <a class="nav-item" href="supplier-quote-list.html">
        <i class="fas fa-store w-5 text-center"></i> 供应商报价
      </a>
      <a class="nav-item" href="partner-evaluation.html">
        <i class="fas fa-user-check w-5 text-center"></i> 合作伙伴评估
      </a>
      <div class="text-xs font-semibold text-neutral-400 uppercase tracking-wider px-4 py-2 mt-4">工具</div>
      <a class="nav-item" href="price-comparison.html">
        <i class="fas fa-balance-scale w-5 text-center"></i> 价格比较
      </a>
      <a class="nav-item" href="dimension.html">
        <i class="fas fa-ruler w-5 text-center"></i> 量纲管理
      </a>
      <a class="nav-item" href="attachment-list.html">
        <i class="fas fa-folder w-5 text-center"></i> 附件管理
      </a>
    </nav>
    <div class="p-3 border-t border-neutral-200">
      <a href="index.html" class="nav-item text-neutral-400">
        <i class="fas fa-arrow-left w-5 text-center"></i> 返回总览
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col min-w-0">

    <!-- Top Bar -->
    <header class="bg-white border-b border-neutral-200 px-6 py-3 flex items-center justify-between sticky top-0 z-20">
      <div class="flex items-center gap-3">
        <button onclick="document.getElementById('sidebar').classList.toggle('-ml-60')" class="lg:hidden text-neutral-500 hover:text-neutral-700">
          <i class="fas fa-bars text-lg"></i>
        </button>
        <div>
          <h1 class="text-lg font-bold text-neutral-800">询报价管理</h1>
          <p class="text-xs text-neutral-400">寻源报价 / 询报价管理</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <button class="btn-ghost btn-sm"><i class="fas fa-bell"></i></button>
        <div class="w-8 h-8 bg-primary/10 rounded-full flex items-center justify-center">
          <span class="text-sm font-medium text-primary">张</span>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="flex-1 p-6">

      <!-- Search & Filter Bar -->
      <div class="card mb-6">
        <div class="flex flex-wrap items-end gap-4">
          <div class="flex-1 min-w-[200px]">
            <label class="form-label">报价包编码</label>
            <input type="text" class="form-input" placeholder="输入编码搜索..." id="search-code">
          </div>
          <div class="flex-1 min-w-[200px]">
            <label class="form-label">车型</label>
            <select class="form-select" id="filter-model">
              <option value="">全部车型</option>
              <option>Pegasus-G1.F</option>
              <option>Leo-G1.1</option>
              <option>Orion-G2</option>
              <option>Firefly</option>
            </select>
          </div>
          <div class="flex-1 min-w-[200px]">
            <label class="form-label">物料号</label>
            <input type="text" class="form-input" placeholder="输入物料号..." id="search-material">
          </div>
          <div class="flex-1 min-w-[200px]">
            <label class="form-label">报价状态</label>
            <select class="form-select" id="filter-status">
              <option value="">全部状态</option>
              <option>询报价</option>
              <option>竞价中</option>
              <option>已定点</option>
              <option>已关闭</option>
            </select>
          </div>
          <div class="flex gap-2">
            <button class="btn-primary" onclick="filterTable()"><i class="fas fa-search"></i> 查询</button>
            <button class="btn-ghost" onclick="resetFilters()"><i class="fas fa-undo"></i> 重置</button>
            <button class="btn-ghost text-neutral-400" onclick="toggleAdvanced()">
              <i class="fas fa-sliders-h"></i> 高级
            </button>
          </div>
        </div>

        <!-- Advanced Filters (hidden by default) -->
        <div id="advanced-filters" class="hidden mt-4 pt-4 border-t border-neutral-200">
          <div class="flex flex-wrap items-end gap-4">
            <div class="flex-1 min-w-[200px]">
              <label class="form-label">品类</label>
              <input type="text" class="form-input" placeholder="品类">
            </div>
            <div class="flex-1 min-w-[200px]">
              <label class="form-label">项目</label>
              <input type="text" class="form-input" placeholder="项目">
            </div>
            <div class="flex-1 min-w-[200px]">
              <label class="form-label">工厂</label>
              <select class="form-select">
                <option value="">全部工厂</option>
                <option>ShangHai</option>
                <option>HeFei</option>
                <option>Beijing</option>
              </select>
            </div>
            <div class="flex-1 min-w-[200px]">
              <label class="form-label">采购员</label>
              <input type="text" class="form-input" placeholder="采购员姓名">
            </div>
            <div class="flex-1 min-w-[200px]">
              <label class="form-label">创建时间</label>
              <input type="date" class="form-input">
            </div>
            <div class="flex-1 min-w-[200px]">
              <label class="form-label">是否封标</label>
              <select class="form-select">
                <option value="">全部</option>
                <option>是</option>
                <option>否</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <!-- Action Bar -->
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-2">
          <a href="rfq-create.html" class="btn-primary">
            <i class="fas fa-plus"></i> 新增
          </a>
          <button class="btn-secondary" onclick="alert('导出功能')">
            <i class="fas fa-file-export"></i> 导出
          </button>
        </div>
        <div class="text-sm text-neutral-500">
          共 <span class="font-semibold text-neutral-700" id="total-count">2300</span> 条
        </div>
      </div>

      <!-- Table -->
      <div class="table-wrapper bg-white">
        <table class="table-main table-zebra" id="rfq-table">
          <thead>
            <tr>
              <th class="w-10"><input type="checkbox" class="rounded text-primary" onclick="toggleAll(this)"></th>
              <th>报价包编码</th>
              <th>报价包名称</th>
              <th>竞价单号</th>
              <th>品类</th>
              <th>项目</th>
              <th>工厂</th>
              <th>是否需SOR</th>
              <th>SOR状态</th>
              <th>是否封标</th>
              <th>报价状态</th>
              <th>本轮截止时间</th>
              <th>采购员</th>
              <th>创建时间</th>
              <th class="w-20">操作</th>
            </tr>
          </thead>
          <tbody id="rfq-tbody">
            <!-- Dynamic rows -->
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="flex items-center justify-between mt-4">
        <div class="flex items-center gap-2 text-sm text-neutral-500">
          <span>每页</span>
          <select class="form-select w-20 py-1" id="page-size" onchange="changePageSize()">
            <option value="20">20条</option>
            <option value="50">50条</option>
            <option value="100">100条</option>
          </select>
        </div>
        <div class="flex items-center gap-1" id="pagination">
          <!-- Dynamic pagination -->
        </div>
      </div>

    </main>
  </div>

  <script>
    // ============================================================
    // Mock Data
    // ============================================================
    const MOCK_DATA = [
      { code:'RFQ20221030100001', name:'Firefly Rear Knuckle后转向节', bidNo:'BJ2022103001', category:'铝/纯铝/铝锭', project:'Pegasus-G1.F', factory:'ShangHai', needSor:'是', sorStatus:'Initial', sealed:'是', status:'询报价', deadline:'2022/8/27', buyer:'任亦喆 Yizhe REN', created:'2022/6/27 13:43:00' },
      { code:'RFQ2022103100002', name:'Firefly Rear Knuckle前转向节', bidNo:'BJ2022103102', category:'铝/纯铝/铝液', project:'Leo-G1.1', factory:'HeFei', needSor:'是', sorStatus:'Nomination', sealed:'是', status:'竞价中', deadline:'2022/8/27', buyer:'任亦喆 Yizhe REN', created:'2022/6/27 13:33:00' },
      { code:'RFQ2022103100003', name:'LEO IDO 集成驱动模块', bidNo:'BJ2022103103', category:'电子/传感器', project:'Leo-G1.1', factory:'ShangHai', needSor:'否', sorStatus:'-', sealed:'否', status:'已定点', deadline:'2022/8/20', buyer:'张小米', created:'2022/6/27 13:13:00' },
      { code:'RFQ2022103100004', name:'ORION IDO 电驱总成', bidNo:'BJ2022103104', category:'电驱/电机', project:'Orion-G2', factory:'Beijing', needSor:'是', sorStatus:'Approved', sealed:'是', status:'询报价', deadline:'2022/9/15', buyer:'李大米', created:'2022/6/26 16:53:00' },
      { code:'RFQ2022103100005', name:'Pegasus Seat System 座椅总成', bidNo:'BJ2022103105', category:'内饰/座椅', project:'Pegasus-G1.F', factory:'ShangHai', needSor:'是', sorStatus:'Initial', sealed:'是', status:'竞价中', deadline:'2022/9/1', buyer:'王大锤', created:'2022/6/25 15:25:00' },
      { code:'RFQ2022103100006', name:'LEO Windshield 挡风玻璃', bidNo:'BJ2022103106', category:'玻璃/外饰', project:'Leo-G1.1', factory:'HeFei', needSor:'否', sorStatus:'-', sealed:'否', status:'已关闭', deadline:'2022/7/30', buyer:'赵小刀', created:'2022/6/24 13:33:00' },
      { code:'RFQ2022103100007', name:'FORCE G1.F Rim 轮毂', bidNo:'BJ2022103107', category:'底盘/轮毂', project:'Pegasus-G1.F', factory:'ShangHai', needSor:'是', sorStatus:'Nomination', sealed:'是', status:'询报价', deadline:'2022/9/10', buyer:'孙大力', created:'2022/6/22 16:53:00' },
      { code:'RFQ2022103100008', name:'SU9 座椅总成-报价明细', bidNo:'BJ2022103108', category:'内饰/座椅', project:'SU9', factory:'Beijing', needSor:'是', sorStatus:'Approved', sealed:'是', status:'竞价中', deadline:'2025/12/31', buyer:'张小米', created:'2022/6/21 10:20:00' },
      { code:'RFQ2022103100009', name:'Battery Pack 电池包壳体', bidNo:'BJ2022103109', category:'电池/壳体', project:'Pegasus-G1.F', factory:'HeFei', needSor:'是', sorStatus:'Initial', sealed:'否', status:'询报价', deadline:'2022/9/20', buyer:'任亦喆 Yizhe REN', created:'2022/6/20 09:15:00' },
      { code:'RFQ2022103100010', name:'Thermal Management 热管理模块', bidNo:'BJ2022103110', category:'热管理/冷却', project:'Orion-G2', factory:'ShangHai', needSor:'否', sorStatus:'-', sealed:'是', status:'已定点', deadline:'2022/8/15', buyer:'李大米', created:'2022/6/19 14:45:00' },
    ];

    // ============================================================
    // Render
    // ============================================================
    let currentPage = 1;
    let pageSize = 20;
    let filteredData = [...MOCK_DATA];

    function renderTable() {
      const tbody = document.getElementById('rfq-tbody');
      const start = (currentPage - 1) * pageSize;
      const pageData = filteredData.slice(start, start + pageSize);

      if (pageData.length === 0) {
        tbody.innerHTML = `<tr><td colspan="15" class="text-center py-16">
          <div class="empty-state">
            <i class="fas fa-inbox"></i>
            <p class="text-neutral-400">暂无数据</p>
          </div>
        </td></tr>`;
        return;
      }

      tbody.innerHTML = pageData.map(row => `
        <tr class="hover:bg-neutral-50/80 transition-colors">
          <td><input type="checkbox" class="rounded text-primary row-check"></td>
          <td>
            <a href="rfq-detail.html?code=${row.code}" class="text-primary font-medium hover:underline">${row.code}</a>
          </td>
          <td class="max-w-[200px] truncate" title="${row.name}">${row.name}</td>
          <td class="text-neutral-500">${row.bidNo}</td>
          <td><span class="badge-neutral">${row.category}</span></td>
          <td>${row.project}</td>
          <td>${row.factory}</td>
          <td>${row.needSor === '是' ? '<span class="badge-primary">是</span>' : '<span class="badge-neutral">否</span>'}</td>
          <td>${renderSorStatus(row.sorStatus)}</td>
          <td>${row.sealed === '是' ? '<span class="badge-warning"><i class="fas fa-lock mr-1"></i>是</span>' : '<span class="badge-neutral">否</span>'}</td>
          <td>${renderStatus(row.status)}</td>
          <td class="text-neutral-500">${row.deadline}</td>
          <td>${row.buyer}</td>
          <td class="text-neutral-400 text-xs">${row.created}</td>
          <td>
            <div class="flex items-center gap-1">
              <a href="rfq-detail.html?code=${row.code}" class="btn-ghost btn-sm !p-1.5" title="查看"><i class="fas fa-eye text-xs"></i></a>
              <a href="rfq-create.html?edit=${row.code}" class="btn-ghost btn-sm !p-1.5" title="编辑"><i class="fas fa-pen text-xs"></i></a>
              <button class="btn-ghost btn-sm !p-1.5 text-red-400 hover:text-red-600" title="删除" onclick="deleteRow('${row.code}')"><i class="fas fa-trash text-xs"></i></button>
            </div>
          </td>
        </tr>
      `).join('');

      renderPagination();
    }

    function renderStatus(status) {
      const map = {
        '询报价': 'badge-info',
        '竞价中': 'badge-warning',
        '已定点': 'badge-success',
        '已关闭': 'badge-neutral',
      };
      return `<span class="${map[status] || 'badge-neutral'}">${status}</span>`;
    }

    function renderSorStatus(s) {
      if (s === '-') return '<span class="text-neutral-300">-</span>';
      const map = { 'Initial': 'badge-neutral', 'Nomination': 'badge-info', 'Approved': 'badge-success' };
      return `<span class="${map[s] || 'badge-neutral'}">${s}</span>`;
    }

    function renderPagination() {
      const total = filteredData.length;
      const totalPages = Math.ceil(total / pageSize) || 1;
      const pag = document.getElementById('pagination');

      let html = `<button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}><i class="fas fa-chevron-left text-xs"></i></button>`;
      for (let i = 1; i <= Math.min(totalPages, 7); i++) {
        html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
      }
      if (totalPages > 7) {
        html += `<span class="px-2 text-neutral-400">...</span>`;
        html += `<button class="page-btn" onclick="goPage(${totalPages})">${totalPages}</button>`;
      }
      html += `<button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}><i class="fas fa-chevron-right text-xs"></i></button>`;

      pag.innerHTML = html;
      document.getElementById('total-count').textContent = total;
    }

    // ============================================================
    // Actions
    // ============================================================
    function goPage(p) {
      const totalPages = Math.ceil(filteredData.length / pageSize) || 1;
      if (p < 1 || p > totalPages) return;
      currentPage = p;
      renderTable();
    }

    function changePageSize() {
      pageSize = parseInt(document.getElementById('page-size').value);
      currentPage = 1;
      renderTable();
    }

    function filterTable() {
      const code = document.getElementById('search-code').value.toLowerCase();
      const model = document.getElementById('filter-model').value;
      const material = document.getElementById('search-material').value.toLowerCase();
      const status = document.getElementById('filter-status').value;

      filteredData = MOCK_DATA.filter(row => {
        if (code && !row.code.toLowerCase().includes(code)) return false;
        if (model && row.project !== model) return false;
        if (material && !row.name.toLowerCase().includes(material)) return false;
        if (status && row.status !== status) return false;
        return true;
      });
      currentPage = 1;
      renderTable();
    }

    function resetFilters() {
      document.getElementById('search-code').value = '';
      document.getElementById('filter-model').value = '';
      document.getElementById('search-material').value = '';
      document.getElementById('filter-status').value = '';
      filteredData = [...MOCK_DATA];
      currentPage = 1;
      renderTable();
    }

    function toggleAdvanced() {
      document.getElementById('advanced-filters').classList.toggle('hidden');
    }

    function toggleAll(cb) {
      document.querySelectorAll('.row-check').forEach(c => c.checked = cb.checked);
    }

    function deleteRow(code) {
      if (confirm(`确定删除 ${code}？`)) {
        filteredData = filteredData.filter(r => r.code !== code);
        renderTable();
      }
    }

    // Init
    renderTable();
  </script>

</body>
</html>
