<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>齐岳 - 高级产品经理</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');

  :root {
    --accent: #FF6A00;
    --accent-light: #FFF4EC;
    --accent-muted: rgba(255, 106, 0, 0.12);
    --text-primary: #1A1A1A;
    --text-secondary: #5A5A5A;
    --text-muted: #8A8A8A;
    --bg: #FAFAFA;
    --card-bg: #FFFFFF;
    --border: #E8E8E8;
    --timeline-track: #E0E0E0;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ---- Layout ---- */
  .page {
    max-width: 820px;
    margin: 0 auto;
    padding: 48px 24px 64px;
  }

  /* ---- Header ---- */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 56px;
    gap: 24px;
  }

  .header-left h1 {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text-primary);
    line-height: 1.2;
  }

  .header-left .subtitle {
    font-size: 14px;
    color: var(--text-secondary);
    margin-top: 8px;
    font-weight: 400;
  }

  .header-left .subtitle span {
    margin-right: 8px;
  }

  .header-right {
    text-align: right;
    flex-shrink: 0;
  }

  .header-right .edu-line {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.8;
  }

  .edu-dot {
    display: inline-block;
    width: 4px;
    height: 4px;
    background: var(--text-muted);
    border-radius: 50%;
    margin: 0 8px;
    vertical-align: middle;
  }

  /* ---- Timeline ---- */
  .timeline-section {
    position: relative;
  }

  .timeline-track {
    position: absolute;
    left: 11px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--timeline-track);
  }

  .timeline-item {
    position: relative;
    padding-left: 40px;
    padding-bottom: 40px;
  }

  .timeline-item:last-child {
    padding-bottom: 0;
  }

  /* ---- Timeline Dot ---- */
  .timeline-dot {
    position: absolute;
    left: 4px;
    top: 6px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--card-bg);
    border: 3px solid var(--timeline-track);
    transition: border-color 0.3s ease;
    z-index: 2;
  }

  .timeline-item.active .timeline-dot {
    border-color: var(--accent);
    background: var(--accent-light);
  }

  .timeline-item.active .timeline-dot::after {
    content: '';
    position: absolute;
    inset: 2px;
    border-radius: 50%;
    background: var(--accent);
  }

  /* ---- Experience Card ---- */
  .exp-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 28px;
    transition: box-shadow 0.3s ease, border-color 0.3s ease;
  }

  .exp-card:hover {
    box-shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
  }

  .timeline-item.active .exp-card {
    border-color: var(--accent);
    border-width: 1.5px;
    box-shadow: 0 0 0 3px var(--accent-muted);
  }

  .exp-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
    gap: 12px;
    flex-wrap: wrap;
  }

  .exp-company {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .exp-date {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 400;
    flex-shrink: 0;
  }

  .timeline-item.active .exp-date {
    color: var(--accent);
    font-weight: 500;
  }

  .exp-role {
    font-size: 15px;
    color: var(--text-secondary);
    margin-bottom: 10px;
  }

  .exp-tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .exp-tag {
    display: inline-block;
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 4px;
    background: var(--accent-light);
    color: var(--accent);
    font-weight: 500;
  }

  .exp-tag.default {
    background: #F4F4F4;
    color: var(--text-muted);
  }

  /* ---- Footer Summary ---- */
  .summary-footer {
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }

  .summary-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
    color: var(--text-secondary);
  }

  .summary-badge strong {
    color: var(--accent);
    font-weight: 600;
  }

  .summary-divider {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--text-muted);
    opacity: 0.5;
  }

  /* ---- Entrance Animations ---- */
  .timeline-item {
    opacity: 0;
    transform: translateY(20px);
    animation: fadeInUp 0.5s ease forwards;
  }

  .timeline-item:nth-child(1) { animation-delay: 0.1s; }
  .timeline-item:nth-child(2) { animation-delay: 0.25s; }
  .timeline-item:nth-child(3) { animation-delay: 0.4s; }
  .timeline-item:nth-child(4) { animation-delay: 0.55s; }

  @keyframes fadeInUp {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .header {
    opacity: 0;
    animation: fadeInUp 0.6s ease 0s forwards;
  }

  .summary-footer {
    opacity: 0;
    animation: fadeInUp 0.5s ease 0.7s forwards;
  }

  /* ---- Mobile ---- */
  @media (max-width: 640px) {
    .page {
      padding: 32px 16px 48px;
    }

    .header {
      flex-direction: column;
      gap: 16px;
    }

    .header-right {
      text-align: left;
    }

    .header-left h1 {
      font-size: 26px;
    }

    .exp-card {
      padding: 18px 20px;
    }

    .exp-header {
      flex-direction: column;
      gap: 4px;
    }

    .exp-company {
      font-size: 16px;
    }

    .summary-footer {
      gap: 12px;
    }

    .summary-badge {
      font-size: 13px;
    }
  }

  /* ---- Reduced Motion ---- */
  @media (prefers-reduced-motion: reduce) {
    .timeline-item,
    .header,
    .summary-footer {
      opacity: 1;
      transform: none;
      animation: none;
    }
  }
</style>
</head>
<body>
  <div class="page">

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <h1>齐岳</h1>
        <div class="subtitle">
          <span>高级产品经理</span>
          <span>体系运营部</span>
          <span>职级 16</span>
        </div>
      </div>
      <div class="header-right">
        <div class="edu-line">上海交通大学<span class="edu-dot"></span>工程管理</div>
        <div class="edu-line">上海大学<span class="edu-dot"></span>工业工程</div>
      </div>
    </header>

    <!-- Timeline -->
    <section class="timeline-section">
      <div class="timeline-track"></div>

      <!-- 1. 延锋安道拓 -->
      <div class="timeline-item">
        <div class="timeline-dot"></div>
        <div class="exp-card">
          <div class="exp-header">
            <span class="exp-company">延锋安道拓</span>
            <span class="exp-date">2017.07 — 2020.12</span>
          </div>
          <div class="exp-role">物流规划</div>
          <div class="exp-tags">
            <span class="exp-tag default">汽车内饰供应链</span>
          </div>
        </div>
      </div>

      <!-- 2. 叮咚买菜 -->
      <div class="timeline-item">
        <div class="timeline-dot"></div>
        <div class="exp-card">
          <div class="exp-header">
            <span class="exp-company">叮咚买菜</span>
            <span class="exp-date">2020.12 — 2022.09</span>
          </div>
          <div class="exp-role">供应链产品运营</div>
          <div class="exp-tags">
            <span class="exp-tag default">生鲜供应链</span>
          </div>
        </div>
      </div>

      <!-- 3. 蔚来汽车 -->
      <div class="timeline-item">
        <div class="timeline-dot"></div>
        <div class="exp-card">
          <div class="exp-header">
            <span class="exp-company">蔚来汽车</span>
            <span class="exp-date">2022.09 — 2026.01</span>
          </div>
          <div class="exp-role">供应链产品经理</div>
          <div class="exp-tags">
            <span class="exp-tag default">寻源定点</span>
            <span class="exp-tag default">合作伙伴管理</span>
          </div>
        </div>
      </div>

      <!-- 4. 小米汽车 (Current) -->
      <div class="timeline-item active">
        <div class="timeline-dot"></div>
        <div class="exp-card">
          <div class="exp-header">
            <span class="exp-company">小米汽车</span>
            <span class="exp-date">2026.01 — 至今</span>
          </div>
          <div class="exp-role">供应链产品经理</div>
          <div class="exp-tags">
            <span class="exp-tag">EP 系统</span>
            <span class="exp-tag">采购数字化</span>
          </div>
        </div>
      </div>

    </section>

    <!-- Footer Summary -->
    <div class="summary-footer">
      <div class="summary-badge"><strong>8年+</strong> 供应链全链路经验</div>
      <div class="summary-divider"></div>
      <div class="summary-badge">制造业 → 互联网 → 汽车</div>
    </div>

  </div>
</body>
</html>
