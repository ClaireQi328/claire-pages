<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Supply Chain</title><style>﻿:root{--p:#1677ff;--ph:#4096ff;--pl:#e6f4ff;--s:#52c41a;--sl:#f6ffed;--w:#faad14;--d:#ff4d4f;--g50:#fafafa;--g100:#f5f5f5;--g200:#e8e8e8;--g300:#d9d9d9;--g400:#bfbfbf;--g500:#8c8c8c;--g600:#595959;--g700:#434343;--g800:#262626;--g900:#1f1f1f;--r:10px;--rs:6px;--rl:14px;--shm:0 4px 12px rgba(0,0,0,.07);--tr:all .2s ease;--nav-bg:#001529;--nav-w:240px}*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;background:#f0f2f5;color:var(--g800);line-height:1.6;font-size:13px;overflow:hidden;height:100vh}
.layout{display:flex;height:100vh}.sidebar{width:var(--nav-w);background:var(--nav-bg);color:rgba(255,255,255,.85);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar .logo{padding:16px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:8px}
.sidebar .logo .mi{width:28px;height:28px;background:linear-gradient(135deg,#ff6700,#ff4d00);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700}
.sidebar .logo span{font-size:14px;font-weight:600}
.menu-label{font-size:10px;color:rgba(255,255,255,.35);padding:12px 16px 4px;text-transform:uppercase;letter-spacing:.5px}
.menu-item{display:flex;align-items:center;gap:8px;padding:7px 16px;margin:1px 8px;border-radius:6px;cursor:pointer;font-size:12px;color:rgba(255,255,255,.6);transition:all .15s}
.menu-item:hover{background:rgba(255,255,255,.08);color:#fff}
.menu-item.active{background:rgba(22,119,255,.25);color:#fff;font-weight:500}
.menu-item .icon{width:16px;text-align:center;font-size:12px}
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:44px;background:#fff;border-bottom:1px solid var(--g200);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0}
.topbar h1{font-size:15px;font-weight:600}
.topbar .actions{display:flex;gap:8px;align-items:center;font-size:11px;color:var(--g500)}
.content{flex:1;overflow-y:auto;padding:16px 20px}
.view{display:none}.view.active{display:block}
.card{background:#fff;border:1px solid var(--g200);border-radius:var(--r);padding:14px;margin-bottom:10px}
.card h2{font-size:13px;font-weight:700;margin-bottom:8px}
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:var(--g50);border:1px solid var(--g200);padding:5px 8px;text-align:left;font-weight:600;color:var(--g700);font-size:10px}
td{border:1px solid var(--g200);padding:5px 8px;color:var(--g700)}
tr:hover td{background:#e6f4ff}
.tag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:500}
.tag-b{background:#e6f4ff;color:#1677ff}.tag-g{background:#f6ffed;color:#52c41a}.tag-o{background:#fffbe6;color:#d46b08}.tag-r{background:#fff2f0;color:#ff4d4f}.tag-p{background:#f9f0ff;color:#722ed1}
.metric{display:flex;flex-direction:column;justify-content:center;padding:12px;background:#fff;border:1px solid var(--g200);border-radius:var(--r);cursor:pointer;transition:var(--tr)}
.metric:hover{border-color:var(--p);box-shadow:var(--shm)}
.metric .num{font-size:18px;font-weight:700;color:var(--g900)}.metric .label{font-size:10px;color:var(--g500);margin-top:2px}
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.section{margin-bottom:14px}.section-title{font-size:12px;font-weight:700;color:var(--g900);margin-bottom:6px;padding-bottom:4px;border-bottom:2px solid var(--p)}
.btn{padding:4px 10px;border:none;border-radius:var(--rs);font-size:10px;cursor:pointer;background:var(--p);color:#fff;font-weight:500;transition:var(--tr)}
.btn:hover{background:var(--ph)}.btn-o{background:#fff;color:var(--g700);border:1px solid var(--g300)}.btn-o:hover{border-color:var(--p);color:var(--p)}
.btn-s{background:var(--g100);color:var(--g600);border:1px solid var(--g200)}.btn-d{background:none;color:var(--d);border:none;font-size:10px}
.filter-bar{display:flex;gap:6px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.filter-bar select,.filter-bar input{padding:4px 8px;border:1px solid var(--g300);border-radius:var(--rs);font-size:11px;background:#fff}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.toolbar h3{font-size:13px;font-weight:600}
.modal-mask{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center}.modal-mask.show{display:flex}
.modal{background:#fff;border-radius:var(--rl);width:680px;max-height:85vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.18)}
.modal-header{padding:14px 18px;border-bottom:1px solid var(--g200);display:flex;justify-content:space-between;align-items:center}.modal-header h3{font-size:14px;font-weight:600}
.modal-body{padding:16px 18px}.modal-footer{padding:10px 18px;border-top:1px solid var(--g200);display:flex;justify-content:flex-end;gap:6px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-item label{display:block;font-size:10px;color:var(--g500);margin-bottom:3px}
.form-item input,.form-item select,.form-item textarea{width:100%;padding:5px 8px;border:1px solid var(--g300);border-radius:var(--rs);font-size:11px}
.form-item textarea{height:50px;resize:vertical}
.form-item input:focus,.form-item select:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 2px rgba(22,119,255,.1)}
.network-viz{background:#fff;border:1px solid var(--g200);border-radius:var(--r);padding:14px;margin-bottom:10px}
.network-viz svg{width:100%;height:360px}
.node{cursor:pointer;transition:all .15s}.node:hover{filter:drop-shadow(0 2px 6px rgba(0,0,0,.15))}
.calc-panel{background:#fff;border:1px solid var(--g200);border-radius:var(--r);padding:14px;margin-bottom:10px}
.calc-row{display:flex;gap:10px;align-items:center;margin-bottom:6px}
.calc-label{width:100px;font-size:11px;color:var(--g700);flex-shrink:0}
.calc-input{flex:1;padding:5px 8px;border:1px solid var(--g300);border-radius:var(--rs);font-size:11px}
.calc-result{background:var(--pl);padding:10px;border-radius:var(--rs);margin-top:10px}
.calc-result .label{font-size:10px;color:var(--g500)}.calc-result .value{font-size:16px;font-weight:700;color:var(--p)}
.sim-timeline{position:relative;padding-left:18px;border-left:2px solid var(--g200)}
.sim-event{position:relative;padding:6px 0 6px 14px;border-bottom:1px solid var(--g100)}
.sim-event::before{content:'';position:absolute;left:-5px;top:10px;width:8px;height:8px;border-radius:50%;background:var(--p);border:2px solid #fff}
.sim-event.warn::before{background:var(--w)}.sim-event.ok::before{background:var(--s)}
.sim-event .time{font-size:9px;color:var(--g500)}.sim-event .desc{font-size:11px;color:var(--g800)}
.toast{position:fixed;top:52px;right:20px;background:var(--s);color:#fff;padding:8px 16px;border-radius:var(--rs);font-size:11px;z-index:2000;display:none;box-shadow:var(--shm)}.toast.show{display:block}
</style></head><body>

<div class="sidebar">
