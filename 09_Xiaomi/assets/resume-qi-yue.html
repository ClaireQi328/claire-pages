<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>齐岳 - 高级产品经理</title>
<style>
  /* ===== Reset & Base ===== */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --accent: #FF6900;
    --accent-light: #FFF4EC;
    --accent-glow: rgba(255, 105, 0, 0.12);
    --text-primary: #1a1a2e;
    --text-secondary: #5a5a72;
    --text-tertiary: #8e8ea0;
    --bg-page: #f8f7f4;
    --bg-card: #ffffff;
    --bg-card-hover: #fffaf7;
    --border: #e8e6e1;
    --border-light: #f0eeea;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 20px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.08);
    --shadow-accent: 0 4px 24px rgba(255, 105, 0, 0.15);
    --font-sans: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
    --font-mono: "SF Mono", "Fira Code", "Cascadia Code", monospace;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-sans);
    background: var(--bg-page);
    color: var(--text-primary);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100dvh;
  }

  /* ===== Layout ===== */
  .page {
    max-width: 960px;
    margin: 0 auto;
    padding: 60px 24px 80px;
  }

  /* ===== Hero / Header ===== */
  .hero {
    text-align: center;
    margin-bottom: 56px;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
  }

  .hero-name {
    font-size: 3rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--text-primary);
    line-height: 1.1;
    margin-bottom: 12px;
  }

  .hero-title {
    font-size: 1.05rem;
    font-weight: 400;
    color: var(--text-secondary);
    letter-spacing: 0.02em;
    margin-bottom: 20px;
  }

  .hero-title .dot {
    display: inline-block;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--text-tertiary);
    margin: 0 10px;
    vertical-align: middle;
    position: relative;
    top: -1px;
  }

  .hero-edu {
    display: flex;
    justify-content: center;
    gap: 28px;
    flex-wrap: wrap;
  }

  .edu-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.88rem;
    color: var(--text-tertiary);
  }

  .edu-icon {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--accent-glow);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .edu-icon svg {
    width: 10px;
    height: 10px;
    stroke: var(--accent);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* ===== Divider ===== */
  .divider {
    width: 48px;
    height: 3px;
    border-radius: 2px;
    background: var(--accent);
    margin: 0 auto 48px;
    opacity: 0;
    animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
  }

  /* ===== Timeline ===== */
  .timeline {
    position: relative;
    padding-left: 40px;
  }

  .timeline::before {
    content: "";
    position: absolute;
    left: 15px;
    top: 8px;
    bottom: 8px;
    width: 2px;
    background: linear-gradient(to bottom, var(--accent), var(--border));
    border-radius: 1px;
  }

  .timeline-item {
    position: relative;
    margin-bottom: 28px;
    opacity: 0;
    transform: translateY(24px);
  }

  .timeline-item:last-child {
    margin-bottom: 0;
  }

  /* Dot on timeline */
  .timeline-dot {
    position: absolute;
    left: -33px;
    top: 28px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--bg-card);
    border: 2.5px solid var(--accent);
    z-index: 2;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .timeline-item:hover .timeline-dot {
    background: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-glow);
  }

  .timeline-item.current .timeline-dot {
    background: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-glow);
    animation: pulse 2s ease-in-out infinite;
  }

  /* Card */
  .card {
    background: var(--bg-card);
    border-radius: var(--radius);
    padding: 28px 32px;
    border: 1px solid var(--border-light);
    box-shadow: var(--shadow-sm);
    transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 4px;
    height: 100%;
    background: var(--accent);
    border-radius: 0 2px 2px 0;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .card:hover {
    border-color: var(--accent-glow);
    box-shadow: var(--shadow-md);
    transform: translateY(-2px);
    background: var(--bg-card-hover);
  }

  .card:hover::before {
    opacity: 1;
  }

  .timeline-item.current .card {
    border-color: rgba(255, 105, 0, 0.2);
    box-shadow: var(--shadow-accent);
  }

  .timeline-item.current .card::before {
    opacity: 1;
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 12px;
  }

  .card-company {
    font-size: 1.2rem;
    font-weight: 650;
    color: var(--text-primary);
    letter-spacing: -0.01em;
  }

  .timeline-item.current .card-company {
    color: var(--accent);
  }

  .card-date {
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text-tertiary);
    white-space: nowrap;
    background: var(--bg-page);
    padding: 4px 12px;
    border-radius: 20px;
    flex-shrink: 0;
    letter-spacing: 0.01em;
  }

  .timeline-item.current .card-date {
    background: var(--accent-light);
    color: var(--accent);
  }

  .card-role {
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  .card-tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--text-tertiary);
    background: var(--bg-page);
    padding: 4px 12px;
    border-radius: 6px;
    letter-spacing: 0.01em;
    transition: all 0.2s ease;
  }

  .card:hover .tag {
    background: var(--accent-light);
    color: var(--accent);
  }

  /* ===== Values Section ===== */
  .values {
    margin-top: 48px;
  }

  .values-title {
    font-size: 1.35rem;
    font-weight: 700;
    color: var(--text-primary);
    text-align: center;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
    opacity: 0;
    transform: translateY(16px);
  }

  .values-subtitle {
    font-size: 0.82rem;
    color: var(--text-tertiary);
    text-align: center;
    margin-bottom: 24px;
    opacity: 0;
    transform: translateY(16px);
  }

  .values-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .value-card {
    background: var(--bg-card);
    border-radius: var(--radius-sm);
    padding: 20px 22px;
    border: 1px solid var(--border-light);
    box-shadow: var(--shadow-sm);
    position: relative;
    overflow: hidden;
    transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    opacity: 0;
    transform: translateY(24px);
  }

  .value-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }

  .value-card::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
  }

  .value-card--orange::after {
    background: linear-gradient(90deg, var(--accent), rgba(255, 105, 0, 0.3));
  }

  .value-card--blue::after {
    background: linear-gradient(90deg, #3b82f6, rgba(59, 130, 246, 0.3));
  }

  .value-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 12px;
    position: relative;
  }

  .value-icon::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    opacity: 0.1;
  }

  .value-card--orange .value-icon {
    background: var(--accent-light);
  }

  .value-card--orange .value-icon::before {
    background: var(--accent);
  }

  .value-card--blue .value-icon {
    background: #eff6ff;
  }

  .value-card--blue .value-icon::before {
    background: #3b82f6;
  }

  .value-icon svg {
    width: 16px;
    height: 16px;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    position: relative;
    z-index: 1;
  }

  .value-card--orange .value-icon svg {
    stroke: var(--accent);
  }

  .value-card--blue .value-icon svg {
    stroke: #3b82f6;
  }

  .value-name {
    font-size: 1rem;
    font-weight: 650;
    color: var(--text-primary);
    margin-bottom: 4px;
    letter-spacing: -0.01em;
  }

  .value-lead {
    font-size: 0.8rem;
    color: var(--text-tertiary);
    margin-bottom: 14px;
    line-height: 1.45;
  }

  .value-steps {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .value-step {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .step-num {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.65rem;
    font-weight: 650;
    margin-top: 1px;
  }

  .value-card--orange .step-num {
    background: var(--accent-light);
    color: var(--accent);
  }

  .value-card--blue .step-num {
    background: #eff6ff;
    color: #3b82f6;
  }

  .step-body {
    flex: 1;
    min-width: 0;
  }

  .step-title {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 1px;
    line-height: 1.4;
  }

  .step-desc {
    font-size: 0.75rem;
    color: var(--text-tertiary);
    line-height: 1.5;
  }

  /* ===== Achievements Section ===== */
  .achievements {
    margin-top: 48px;
  }

  .achievements-title {
    font-size: 1.35rem;
    font-weight: 700;
    color: var(--text-primary);
    text-align: center;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
    opacity: 0;
    transform: translateY(16px);
  }

  .achievements-subtitle {
    font-size: 0.82rem;
    color: var(--text-tertiary);
    text-align: center;
    margin-bottom: 24px;
    opacity: 0;
    transform: translateY(16px);
  }

  .achievements-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .achieve-card {
    background: var(--bg-card);
    border-radius: var(--radius-sm);
    padding: 20px 22px;
    border: 1px solid var(--border-light);
    box-shadow: var(--shadow-sm);
    position: relative;
    overflow: hidden;
    transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    opacity: 0;
    transform: translateY(24px);
  }

  .achieve-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }

  .achieve-card::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
  }

  .achieve-card--green::after {
    background: linear-gradient(90deg, #10b981, rgba(16, 185, 129, 0.3));
  }

  .achieve-card--purple::after {
    background: linear-gradient(90deg, #8b5cf6, rgba(139, 92, 246, 0.3));
  }

  .achieve-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .achieve-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
  }

  .achieve-icon::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    opacity: 0.1;
  }

  .achieve-card--green .achieve-icon {
    background: #ecfdf5;
  }

  .achieve-card--green .achieve-icon::before {
    background: #10b981;
  }

  .achieve-card--purple .achieve-icon {
    background: #f5f3ff;
  }

  .achieve-card--purple .achieve-icon::before {
    background: #8b5cf6;
  }

  .achieve-icon svg {
    width: 16px;
    height: 16px;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    position: relative;
    z-index: 1;
  }

  .achieve-card--green .achieve-icon svg {
    stroke: #10b981;
  }

  .achieve-card--purple .achieve-icon svg {
    stroke: #8b5cf6;
  }

  .achieve-name {
    font-size: 1rem;
    font-weight: 650;
    color: var(--text-primary);
    letter-spacing: -0.01em;
  }

  .achieve-badge {
    font-size: 0.65rem;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    letter-spacing: 0.02em;
    flex-shrink: 0;
  }

  .achieve-card--green .achieve-badge {
    background: #ecfdf5;
    color: #10b981;
  }

  .achieve-card--purple .achieve-badge {
    background: #f5f3ff;
    color: #8b5cf6;
  }

  .achieve-goal {
    font-size: 0.8rem;
    color: var(--text-tertiary);
    margin-bottom: 14px;
    line-height: 1.45;
    padding-left: 42px;
  }

  .achieve-steps {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .achieve-step {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .achieve-step-num {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.65rem;
    font-weight: 650;
    margin-top: 1px;
  }

  .achieve-card--green .achieve-step-num {
    background: #ecfdf5;
    color: #10b981;
  }

  .achieve-card--purple .achieve-step-num {
    background: #f5f3ff;
    color: #8b5cf6;
  }

  .achieve-step-body {
    flex: 1;
    min-width: 0;
  }

  .achieve-step-title {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 1px;
    line-height: 1.4;
  }

  .achieve-step-desc {
    font-size: 0.75rem;
    color: var(--text-tertiary);
    line-height: 1.5;
  }

  .achieve-step-desc code {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    background: var(--bg-page);
    padding: 1px 5px;
    border-radius: 3px;
    color: var(--text-secondary);
  }

  /* ===== Footer Summary ===== */
  .summary {
    margin-top: 56px;
    text-align: center;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.9s forwards;
  }

  .summary-inner {
    display: inline-flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: 60px;
    padding: 16px 36px;
    box-shadow: var(--shadow-sm);
  }

  .summary-text {
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text-secondary);
  }

  .summary-text strong {
    color: var(--accent);
    font-weight: 650;
  }

  .summary-sep {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--border);
  }

  .summary-arrow {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.88rem;
    color: var(--text-tertiary);
  }

  .summary-arrow span {
    font-size: 0.7rem;
    color: var(--accent);
  }

  /* ===== Animations ===== */
  @keyframes fadeUp {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 4px var(--accent-glow); }
    50% { box-shadow: 0 0 0 8px rgba(255, 105, 0, 0.06); }
  }

  /* Timeline item stagger - handled by JS for cleaner control */
  .timeline-item.visible {
    animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  /* ===== Responsive ===== */
  @media (max-width: 640px) {
    .page {
      padding: 40px 16px 60px;
    }

    .hero-name {
      font-size: 2.2rem;
    }

    .hero-title {
      font-size: 0.92rem;
    }

    .hero-title .dot {
      margin: 0 6px;
    }

    .hero-edu {
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .timeline {
      padding-left: 32px;
    }

    .timeline::before {
      left: 11px;
    }

    .timeline-dot {
      left: -29px;
      width: 10px;
      height: 10px;
    }

    .card {
      padding: 20px 22px;
    }

    .card-header {
      flex-direction: column;
      gap: 8px;
    }

    .card-date {
      align-self: flex-start;
    }

    .values-grid {
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .value-card {
      padding: 18px;
    }

    .achievements-grid {
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .achieve-card {
      padding: 18px;
    }

    .achieve-goal {
      padding-left: 0;
    }

    .summary-inner {
      padding: 14px 24px;
      flex-direction: column;
      gap: 8px;
      border-radius: var(--radius);
    }

    .summary-sep {
      display: none;
    }

    .summary-arrow {
      flex-wrap: wrap;
      justify-content: center;
    }
  }

  /* ===== Reduced Motion ===== */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
    .hero, .divider, .timeline-item, .summary, .values-title, .values-subtitle, .value-card, .achievements-title, .achievements-subtitle, .achieve-card {
      opacity: 1;
      transform: none;
    }
  }
</style>
</head>
<body>

<div class="page">

  <!-- Hero -->
  <header class="hero">
    <h1 class="hero-name">齐岳</h1>
    <p class="hero-title">
      高级产品经理
      <span class="dot"></span>
      体系运营部
      <span class="dot"></span>
      职级 16
    </p>
    <div class="hero-edu">
      <div class="edu-item">
        <div class="edu-icon">
          <svg viewBox="0 0 24 24"><path d="M12 3L1 9l11 6 9-4.91V17M5 13.18v4L12 21l7-3.82v-4"/></svg>
        </div>
        上海交通大学 · 工程管理
      </div>
      <div class="edu-item">
        <div class="edu-icon">
          <svg viewBox="0 0 24 24"><path d="M12 3L1 9l11 6 9-4.91V17M5 13.18v4L12 21l7-3.82v-4"/></svg>
        </div>
        上海大学 · 工业工程
      </div>
    </div>
  </header>

  <div class="divider"></div>

  <!-- Timeline -->
  <section class="timeline">

    <!-- 延锋安道拓 -->
    <div class="timeline-item" data-delay="0.4">
      <div class="timeline-dot"></div>
      <div class="card">
        <div class="card-header">
          <h2 class="card-company">延锋安道拓</h2>
          <span class="card-date">2017.07 - 2020.12</span>
        </div>
        <p class="card-role">物流规划</p>
        <div class="card-tags">
          <span class="tag">汽车内饰供应链</span>
        </div>
      </div>
    </div>

    <!-- 叮咚买菜 -->
    <div class="timeline-item" data-delay="0.55">
      <div class="timeline-dot"></div>
      <div class="card">
        <div class="card-header">
          <h2 class="card-company">叮咚买菜</h2>
          <span class="card-date">2020.12 - 2022.09</span>
        </div>

<script>
  // Intersection Observer for timeline items and value cards
  (function() {
    const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    // Elements that use data-delay for staggered entry
    const animatables = document.querySelectorAll('.timeline-item');

    if (prefersReduced) {
      animatables.forEach(el => {
        el.style.opacity = '1';
        el.style.transform = 'none';
      });
      return;
    }

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const delay = parseFloat(entry.target.dataset.delay) || 0;
          setTimeout(() => {
            entry.target.style.opacity = '1';
            entry.target.style.transform = 'translateY(0)';
            entry.target.style.transition = 'opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1)';
          }, delay * 1000);
          observer.unobserve(entry.target);
        }
      });
    }, {
      threshold: 0.12,
      rootMargin: '0px 0px -30px 0px'
    });

    animatables.forEach(item => observer.observe(item));
  })();
</script>
