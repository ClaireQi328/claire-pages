<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EP 供应链网络</title>
<style>
:root{
  --bg:#f0f2f5;--card:#fff;--bg2:#f7f8fa;--border:#e5e7eb;--text:#111827;--t2:#4b5563;--tm:#9ca3af;
  --blue:#2563eb;--bl:#eff6ff;--green:#059669;--gl:#ecfdf5;--orange:#d97706;--ol:#fffbeb;
  --red:#dc2626;--rl:#fef2f2;--purple:#7c3aed;--pl:#f5f3ff;--teal:#0891b2;--tl:#ecfeff;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC','Microsoft YaHei',sans-serif;
  --r:10px;--sh:0 1px 2px rgba(0,0,0,.06);--shl:0 8px 24px rgba(0,0,0,.12);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--bg);color:var(--text);overflow:hidden;height:100vh;}

/* ─── Topbar ─── */
.topbar{height:48px;background:#1e293b;display:flex;align-items:center;padding:0 20px;gap:16px;z-index:100;position:relative;}
.topbar .logo{display:flex;align-items:center;gap:8px;color:#fff;font-weight:700;font-size:14px;}
.topbar .logo span{background:var(--blue);color:#fff;width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;}
.topbar nav{display:flex;gap:2px;margin-left:24px;}
.topbar nav a{padding:6px 16px;border-radius:6px;font-size:13px;font-weight:500;color:rgba(255,255,255,.6);cursor:pointer;transition:all .15s;text-decoration:none;}
.topbar nav a:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.08);}
.topbar nav a.active{color:#fff;background:rgba(255,255,255,.12);font-weight:600;}
.topbar .spacer{flex:1;}
.topbar .user{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.7);font-size:12px;}
.topbar .avatar{width:28px;height:28px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;}

/* ─── Layout ─── */
.layout{display:flex;height:calc(100vh - 48px);}

/* ─── Sidebar ─── */
.sidebar{width:200px;background:#1e293b;border-right:1px solid rgba(255,255,255,.06);padding:12px 0;flex-shrink:0;overflow-y:auto;}
.sb-group{margin-bottom:8px;}
.sb-label{font-size:10px;font-weight:600;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.8px;padding:8px 16px 4px;}
.sb-item{display:flex;align-items:center;gap:8px;padding:7px 16px;font-size:12px;color:rgba(255,255,255,.6);cursor:pointer;transition:all .12s;border-left:3px solid transparent;}
.sb-item:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.05);}
.sb-item.active{color:#fff;background:rgba(255,255,255,.08);border-left-color:var(--blue);}
.sb-item .icon{width:18px;text-align:center;font-size:13px;}

/* ─── Content ─── */
.content{flex:1;overflow-y:auto;padding:20px 24px 24px;position:relative;}
.page{display:none;animation:fadeIn .3s ease;}
.page.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* ─── Page Header ─── */
.pg-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.pg-head h2{font-size:18px;font-weight:700;}
.pg-head .meta{font-size:12px;color:var(--tm);display:flex;gap:16px;}
.pg-head .meta span{display:flex;align-items:center;gap:4px;}
.pg-actions{display:flex;gap:8px;}
.pg-btn{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--t2);transition:all .12s;}
.pg-btn:hover{border-color:var(--blue);color:var(--blue);}
.pg-btn.primary{background:var(--blue);color:#fff;border-color:var(--blue);}
.pg-btn.primary:hover{background:#1d4ed8;}

/* ─── KPI Row ─── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
.kpi{background:var(--card);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh);border:1px solid var(--border);}
.kpi .kv{font-size:22px;font-weight:800;}
.kpi .kl{font-size:11px;color:var(--tm);margin-top:2px;}
.kpi .kd{font-size:10px;margin-top:4px;font-weight:600;}
.kpi .kd.up{color:var(--green);}
.kpi .kd.down{color:var(--red);}

/* ─── Main Canvas ─── */
.canvas-wrap{display:grid;grid-template-columns:1fr 280px;gap:16px;height:calc(100vh - 210px);min-height:520px;}
.canvas-card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--border);overflow:hidden;position:relative;}
.canvas-card .card-bar{height:36px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;}
.card-bar .cb-title{font-size:12px;font-weight:600;}
.card-bar .cb-tag{font-size:9px;padding:2px 6px;border-radius:4px;background:var(--bl);color:var(--blue);font-weight:600;}
.card-bar .cb-spacer{flex:1;}
.card-bar .cb-btn{font-size:10px;padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:var(--card);color:var(--tm);cursor:pointer;}
.card-bar .cb-btn:hover{border-color:var(--blue);color:var(--blue);}
.card-bar .cb-btn.active{background:var(--bl);color:var(--blue);border-color:var(--blue);}
.canvas-body{position:relative;width:100%;height:calc(100% - 36px);}
.canvas-body svg{width:100%;height:100%;}

/* Right Panel */
.right-panel{display:flex;flex-direction:column;gap:12px;overflow-y:auto;}
.rp-card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--border);overflow:hidden;}
.rp-head{padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;}
.rp-body{padding:12px 14px;}

/* Legend */
.leg-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--bg2);cursor:pointer;transition:background .1s;}
.leg-row:last-child{border-bottom:none;}
.leg-row:hover{background:var(--bg2);margin:0 -14px;padding:5px 14px;}
.leg-row.active{background:var(--bl);margin:0 -14px;padding:5px 14px;border-radius:6px;}
.leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
.leg-name{font-size:11px;font-weight:600;}
.leg-info{font-size:10px;color:var(--tm);margin-left:auto;white-space:nowrap;}

/* Detail Panel */
.dp-title{font-size:13px;font-weight:700;margin-bottom:8px;}
.dp-row{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:11px;}
.dp-row .name{font-weight:600;min-width:60px;}
.dp-bar{flex:1;height:5px;border-radius:3px;background:var(--bg2);overflow:hidden;}
.dp-bar-fill{height:100%;border-radius:3px;}
.dp-row .pct{font-weight:700;min-width:30px;text-align:right;}
.dp-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.dp-chip{font-size:9px;padding:3px 7px;border-radius:4px;background:var(--bg2);color:var(--t2);}

/* ─── Tooltip ─── */
.tip{position:fixed;background:var(--card);border-radius:8px;padding:12px 14px;box-shadow:var(--shl);border:1px solid var(--border);pointer-events:none;z-index:1000;min-width:200px;opacity:0;transition:opacity .12s;font-size:11px;}
.tip.show{opacity:1;}
.tip .tn{font-weight:700;font-size:13px;margin-bottom:3px;}
.tip .tc{font-size:10px;color:var(--tm);margin-bottom:6px;}
.tip .tr{display:flex;justify-content:space-between;padding:2px 0;}
.tip .tl{color:var(--t2);}
.tip .tv{font-weight:600;}
.tip .tb{height:3px;border-radius:2px;background:var(--bg2);margin-top:6px;}
.tip .tbf{height:100%;border-radius:2px;}

/* ─── Supplier Page ─── */
.sp-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.sp-card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--border);overflow:hidden;}
.sp-head{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.sp-head .ico{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;flex-shrink:0;}
.sp-head h3{font-size:12px;font-weight:700;}
.sp-body{padding:12px 14px;}
.sp-full{grid-column:1/-1;}

/* Supply chain map */
.scn{position:relative;width:100%;height:300px;background:linear-gradient(135deg,#eef2ff 0%,#f0f9ff 100%);border-radius:8px;overflow:hidden;}
.scn .grid{position:absolute;inset:0;background-image:linear-gradient(rgba(37,99,235,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(37,99,235,.04) 1px,transparent 1px);background-size:20px 20px;}
.scn-p{position:absolute;cursor:pointer;z-index:2;transition:transform .15s;}
.scn-p:hover{transform:scale(1.15);z-index:3;}
.scn-d{width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 6px rgba(0,0,0,.18);}
.scn-d.wh{border-radius:3px;width:12px;height:12px;}
.scn-pulse{position:absolute;top:-5px;left:-5px;width:24px;height:24px;border-radius:50%;border:2px solid;opacity:0;animation:pulse 2.5s infinite;}
@keyframes pulse{0%{transform:scale(.8);opacity:.5;}100%{transform:scale(1.8);opacity:0;}}
.scn-lb{position:absolute;top:17px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:8px;font-weight:700;background:var(--card);padding:1px 5px;border-radius:3px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.scn-lb small{font-weight:400;color:var(--tm);display:block;font-size:7px;}

/* Cap bars */
.ci{margin-bottom:10px;}.ci:last-child{margin-bottom:0;}
.ci-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.ci-name{font-size:11px;font-weight:600;}
.ci-pct{font-size:11px;font-weight:700;}
.ci-bar{height:6px;border-radius:3px;background:var(--bg2);overflow:hidden;}
.ci-fill{height:100%;border-radius:3px;}
.ci-det{font-size:9px;color:var(--tm);margin-top:2px;}

/* Cust */
.cr{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.cr:last-child{margin-bottom:0;}
.cr-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.cr-name{font-size:11px;font-weight:600;min-width:64px;}
.cr-bw{flex:1;height:4px;border-radius:2px;background:var(--bg2);overflow:hidden;}
.cr-bf{height:100%;border-radius:2px;}
.cr-p{font-size:10px;font-weight:700;min-width:28px;text-align:right;}

/* Risk rings */
.rg{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;}
.ri{text-align:center;padding:8px 4px;border-radius:8px;background:var(--bg2);}
.rr{width:44px;height:44px;margin:0 auto 4px;position:relative;}
.rr svg{width:100%;height:100%;transform:rotate(-90deg);}
.rr circle{fill:none;stroke-width:4;}
.rr .rbg{stroke:var(--border);}
.rr .rfg{stroke-linecap:round;}
.rv{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;}
.rl{font-size:9px;font-weight:600;color:var(--t2);}

/* Products */
.pg{display:flex;flex-wrap:wrap;gap:4px;}
.pc{font-size:9px;font-weight:600;padding:3px 8px;border-radius:4px;background:var(--bl);color:var(--blue);border:1px solid rgba(37,99,235,.1);}

/* Coop */
.cg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.cs{text-align:center;padding:10px 6px;border-radius:8px;background:var(--bg2);}
.cs .csv{font-size:16px;font-weight:800;}
.cs .csl{font-size:9px;color:var(--tm);margin-top:1px;}
</style>
</head>

</div>

// STATE

let curCat='all', curMode='topology', curRisk=null;

// ═══════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════
function navTo(p){
  document.querySelectorAll('.topbar nav a').forEach(a=>a.classList.remove('active'));
  event.target.classList.add('active');
  showPage(p);
}
function showPage(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.getElementById('sbNet').classList.toggle('active',p==='network');
  document.getElementById('sbSup').classList.toggle('active',p==='supplier');
}

function setMode(m){
  curMode=m;
  document.getElementById('btnTopology').classList.toggle('active',m==='topology');
  document.getElementById('btnExplode').classList.toggle('active',m==='explode');
  document.getElementById('modeTag').textContent=m==='topology'?'TOPOLOGY':'EXPLODE';
  buildMain();
}

function filterCat(c){
  curCat=c;curRisk=null;
  document.querySelectorAll('.sb-item[data-cat]').forEach(b=>b.classList.toggle('active',b.dataset.cat===c));
  document.getElementById('filterHint').textContent=c==='all'?'显示全部品类':CN[c];
  buildMain();
}
function filterRisk(r){
  curRisk=curRisk===r?null:r;
  document.getElementById('filterHint').textContent=curRisk?{mid:'中风险供应商',high:'高风险供应商'}[curRisk]:'显示全部品类';
  buildMain();
}

// MAIN SVG
// ═══════════════════════════════════════════════
function buildMain(){
  const svg=document.getElementById('mainSvg');
  if(curMode==='topology') buildTopology(svg);
  else buildExplode(svg);
  buildRightPanel();
}

function vis(s){
  if(curRisk) return s.risk===curRisk;
  return curCat==='all'||s.cat===curCat;
}

function buildTopology(svg){
  let h=`<defs><radialGradient id="og"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1e40af"/></radialGradient></defs>`;
  const t1p=[];
  tier1.forEach((s,i)=>{
    const a=(i/tier1.length)*Math.PI*2-Math.PI/2;
    t1p.push({x:CX+220*Math.cos(a),y:CY+175*Math.sin(a),...s});
  });
  // Lines OEM→T1
  t1p.forEach(s=>{
    const o=vis(s)?.2:.04;
    h+=`<line x1="${CX}" y1="${CY}" x2="${s.x}" y2="${s.y}" stroke="${C[s.cat]}" stroke-width="1.2" stroke-dasharray="4 3" opacity="${o}"/>`;
  });
  // Tier2
  tier2.forEach(t2=>{
    const par=t1p.find(x=>x.id===t2.p);if(!par)return;
    const catOk=curCat==='all'||t2.cat===curCat;
    const o=catOk?.12:.02;
    const tx=par.x+(t2.x/100*860-par.x)*.32+(hashStr(t2.n)-.5)*28;
    const ty=par.y+(t2.y/100*520-par.y)*.32+(hashStr(t2.n+'y')-.5)*18;
    h+=`<line x1="${par.x}" y1="${par.y}" x2="${tx}" y2="${ty}" stroke="${C[t2.cat]}" stroke-width=".6" opacity="${o}" stroke-dasharray="2 2"/>`;
    h+=`<circle cx="${tx}" cy="${ty}" r="7" fill="${C[t2.cat]}" opacity="${o*4}" stroke="${C[t2.cat]}" stroke-width=".8" opacity="${o}"/>`;
    h+=`<text x="${tx}" y="${ty+3}" text-anchor="middle" font-size="5.5" font-weight="600" fill="${C[t2.cat]}" opacity="${o}">${t2.n.slice(0,3)}</text>`;
  });
  // T1 nodes
  t1p.forEach(s=>{
    const v=vis(s);const o=v?1:.15;
    h+=`<g class="net-node" opacity="${o}" onmouseenter="showTip(event,'${s.id}')" onmouseleave="hideTip()" onclick="openSupplier('${s.id}')" style="cursor:pointer">`;
    h+=`<circle cx="${s.x}" cy="${s.y}" r="16" fill="${C[s.cat]}" opacity=".12" stroke="${C[s.cat]}" stroke-width="1.8"/>`;
    h+=`<circle cx="${s.x}" cy="${s.y}" r="11" fill="${C[s.cat]}" opacity=".85"/>`;
    h+=`<circle cx="${s.x+12}" cy="${s.y-12}" r="3.5" fill="${RC[s.risk]}" stroke="#fff" stroke-width="1.5"/>`;
    h+=`<text x="${s.x}" y="${s.y+12}" text-anchor="middle" font-size="9" font-weight="700" fill="var(--text)">${s.name.length>4?s.name.slice(0,4):s.name}</text>`;
    h+=`<text x="${s.x}" y="${s.y+22}" text-anchor="middle" font-size="7" fill="var(--tm)">${CN[s.cat]}</text>`;
    h+=`</g>`;
  });
  // OEM
  h+=`<circle cx="${CX}" cy="${CY}" r="34" fill="url(#og)" opacity=".06"/>`;
  h+=`<circle cx="${CX}" cy="${CY}" r="26" fill="url(#og)"/>`;
  h+=`<text x="${CX}" y="${CY-4}" text-anchor="middle" font-size="10" font-weight="800" fill="#fff">小米</text>`;
  h+=`<text x="${CX}" y="${CY+8}" text-anchor="middle" font-size="8" font-weight="600" fill="rgba(255,255,255,.75)">汽车</text>`;
  svg.innerHTML=h;
}

function buildExplode(svg){
  let h=``;
  // Car wireframe - tech/holographic style
  h+=`<g transform="translate(160,30)" opacity=".18">
    <path d="M60,380 L80,300 Q100,250 160,210 L220,180 Q260,165 300,160 L400,158 Q440,158 460,165 L500,180 Q540,195 560,215 L575,235 Q585,255 585,275 L585,380" fill="none" stroke="var(--blue)" stroke-width="1.5" stroke-dasharray="6 3"/>
    <path d="M60,380 L80,300 Q100,250 160,210 L220,180 Q260,165 300,160 L400,158 Q440,158 460,165 L500,180 Q540,195 560,215 L575,235 Q585,255 585,275 L585,380" fill="var(--blue)" opacity=".04"/>
    <line x1="220" y1="180" x2="220" y2="380" stroke="var(--blue)" stroke-width=".5" stroke-dasharray="3 4" opacity=".5"/>
    <line x1="400" y1="158" x2="400" y2="380" stroke="var(--blue)" stroke-width=".5" stroke-dasharray="3 4" opacity=".5"/>
    <line x1="60" y1="280" x2="585" y2="280" stroke="var(--blue)" stroke-width=".5" stroke-dasharray="3 4" opacity=".3"/>
    <line x1="60" y1="200" x2="585" y2="200" stroke="var(--blue)" stroke-width=".5" stroke-dasharray="3 4" opacity=".2"/>
    <ellipse cx="170" cy="385" rx="38" ry="38" fill="none" stroke="var(--blue)" stroke-width="1.5" stroke-dasharray="4 3"/>
    <ellipse cx="170" cy="385" rx="20" ry="20" fill="none" stroke="var(--blue)" stroke-width="1" opacity=".5"/>
    <ellipse cx="500" cy="385" rx="38" ry="38" fill="none" stroke="var(--blue)" stroke-width="1.5" stroke-dasharray="4 3"/>
    <ellipse cx="500" cy="385" rx="20" ry="20" fill="none" stroke="var(--blue)" stroke-width="1" opacity=".5"/>
    <circle cx="320" cy="200" r="3" fill="var(--blue)" opacity=".4"/><circle cx="350" cy="195" r="2" fill="var(--blue)" opacity=".3"/>
    <circle cx="280" cy="250" r="2" fill="var(--blue)" opacity=".3"/><circle cx="400" cy="240" r="3" fill="var(--blue)" opacity=".4"/>
  </g>`;

  // Zone overlays
  Object.entries(EXPLODE).forEach(([k,z])=>{
    const clr=C[k];const v=curCat==='all'||curCat===k;
    h+=`<rect x="${z.x}" y="${z.y}" width="${z.w}" height="${z.h}" rx="6" fill="${clr}" opacity="${v?.1:.03}" stroke="${clr}" stroke-width="${v?1.5:.8}" stroke-dasharray="${v?'6 3':'3 3'}" style="cursor:pointer" onclick="filterCat('${k}');setMode('topology');"/>`;
    h+=`<text x="${z.x+z.w/2}" y="${z.y+z.h/2+4}" text-anchor="middle" font-size="10" font-weight="700" fill="${clr}" opacity="${v?.9:.3}" style="pointer-events:none">${z.label}</text>`;
    // Callout
    const ex=z.lx<400?z.x:z.x+z.w;
    h+=`<line x1="${ex}" y1="${z.y+z.h/2}" x2="${z.lx}" y2="${z.ly+8}" stroke="${clr}" stroke-width=".8" opacity="${v?.4:.1}" stroke-dasharray="3 2"/>`;
    h+=`<circle cx="${z.lx}" cy="${z.ly+8}" r="3" fill="${clr}" opacity="${v?.6:.2}"/>`;
  });

  // Animated scan line
  h+=`<line x1="60" y1="0" x2="60" y2="520" stroke="var(--blue)" stroke-width="1" opacity=".08"><animate attributeName="x1" from="60" to="640" dur="4s" repeatCount="indefinite"/><animate attributeName="x2" from="60" to="640" dur="4s" repeatCount="indefinite"/></line>`;

  svg.innerHTML=h;
}

  // Supplier list
  const list=tier1.filter(s=>vis(s));
  let items=list.map(s=>{
    const cc=s.cap>=80?'var(--green)':s.cap>=60?'var(--orange)':'var(--red)';
    return `<div class="leg-row" onclick="openSupplier('${s.id}')" onmouseenter="highlightNode('${s.id}')" onmouseleave="unhighlightNode()">
      <span class="leg-dot" style="background:${C[s.cat]}"></span>
      <span class="leg-name">${s.name}</span>
      <span class="leg-info" style="color:${cc}">${s.cap}%</span>
    </div>`;
  }).join('');

  rp.innerHTML=`
    <div class="rp-card">
      <div class="rp-head">📋 供应商列表 <span style="font-size:10px;color:var(--tm);margin-left:auto">${list.length} 家</span></div>
      <div class="rp-body" style="max-height:300px;overflow-y:auto">${items}</div>
    </div>
    <div class="rp-card">
      <div class="rp-head">📊 品类概览</div>
      <div class="rp-body">${buildCatSummary()}</div>
    </div>`;
}

function buildExplodePanel(rp){
  let items=Object.entries(EXPLODE).map(([k,z])=>{
    const sups=tier1.filter(s=>s.cat===k);
    const avgCap=Math.round(sups.reduce((a,s)=>a+s.cap,0)/sups.length);
    return `<div class="leg-row" onclick="filterCat('${k}');setMode('topology');">
      <span class="leg-dot" style="background:${C[k]}"></span>
      <span class="leg-name">${z.label}</span>
      <span class="leg-info">${z.cost}% · ${sups.length}家</span>
    </div>`;
  }).join('');

  rp.innerHTML=`
    <div class="rp-card">
      <div class="rp-head">🧩 品类分布</div>
      <div class="rp-body">${items}</div>
    </div>
    <div class="rp-card">
      <div class="rp-head">💡 点击品类</div>
      <div class="rp-body" style="font-size:11px;color:var(--t2);line-height:1.6;">
        点击车身区域可跳转到拓扑视图，查看该品类的完整供应商网络关系。
      </div>
    </div>`;
}

function buildCatSummary(){
  return Object.entries(CN).map(([k,v])=>{
    const sups=tier1.filter(s=>s.cat===k);
    const avg=Math.round(sups.reduce((a,s)=>a+s.cap,0)/sups.length);
    const cc=avg>=80?'var(--green)':avg>=60?'var(--orange)':'var(--red)';
    return `<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--bg2);font-size:11px;">
      <span style="width:8px;height:8px;border-radius:2px;background:${C[k]};flex-shrink:0"></span>
      <span style="font-weight:600;min-width:52px">${v}</span>
      <div style="flex:1;height:4px;border-radius:2px;background:var(--bg2);overflow:hidden"><div style="height:100%;width:${avg}%;border-radius:2px;background:${cc}"></div></div>
      <span style="font-weight:700;color:${cc};min-width:28px;text-align:right">${avg}%</span>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════
// TOOLTIP
// ═══════════════════════════════════════════════
function showTip(e,id){
  const s=tier1.find(x=>x.id===id);if(!s)return;
  const rl={low:'低风险',mid:'中风险',high:'高风险'}[s.risk];
  const cc=s.cap>=80?'var(--green)':s.cap>=60?'var(--orange)':'var(--red)';
  const t=document.getElementById('tip');
  t.innerHTML=`<div class="tn" style="color:${C[s.cat]}">${s.name}</div>
    <div class="tc">${CN[s.cat]} · ${s.city}，${s.ctry}</div>
    <div class="tr"><span class="tl">产能利用率</span><span class="tv" style="color:${cc}">${s.cap}%</span></div>
    <div class="tb"><div class="tbf" style="width:${s.cap}%;background:${cc}"></div></div>
    <div class="tr"><span class="tl">供货占比</span><span class="tv">${s.vol}</span></div>
    <div class="tr"><span class="tl">风险等级</span><span class="tv" style="color:${RC[s.risk]}">${rl}</span></div>
    <div class="tr"><span class="tl">年营收</span><span class="tv">${s.rev}</span></div>
    <div style="margin-top:6px;font-size:9px;color:var(--tm);text-align:center">点击查看详情 →</div>`;
  t.classList.add('show');moveTip(e);
}
function moveTip(e){const t=document.getElementById('tip');let x=e.clientX+14,y=e.clientY+14;if(x+220>innerWidth)x=e.clientX-230;if(y+180>innerHeight)y=e.clientY-190;t.style.left=x+'px';t.style.top=y+'px';}
function hideTip(){document.getElementById('tip').classList.remove('show');}
document.addEventListener('mousemove',e=>{if(document.getElementById('tip').classList.contains('show'))moveTip(e);});

function highlightNode(id){/* future: dim others */}
function unhighlightNode(){}

// ═══════════════════════════════════════════════
// SUPPLIER DETAIL PAGE
// ═══════════════════════════════════════════════
function openSupplier(id){
  const s=tier1.find(x=>x.id===id);if(!s)return;hideTip();
  showPage('supplier');
  const color=C[s.cat];
  const rl={low:'低风险 ✅',mid:'中风险 ⚠️',high:'高风险 🔴'}[s.risk];
  document.getElementById('spTitle').innerHTML=`<span style="color:${color}">${s.name}</span>`;
  document.getElementById('spMeta').innerHTML=`<span>📍 ${s.city}，${s.ctry}</span><span>🏭 ${s.fac.length} 工厂</span><span>📦 ${s.wh.length} 仓库</span><span>💰 ${s.rev}</span>`;

  // Network nodes
  const allN=[...s.fac,...s.wh];
  const nodeHtml=allN.map(n=>{
    const isW=!!n.inv;
    return `<div class="scn-p" style="left:${n.x}%;top:${n.y}%"><div class="scn-pulse" style="border-color:${color}"></div><div class="scn-d ${isW?'wh':''}" style="background:${color}${isW?';opacity:.6':''}"></div><div class="scn-lb">${isW?'📦':'🏭'} ${n.n}<small>${n.l} · ${isW?n.inv:n.o}</small></div></div>`;
  }).join('');

  // Lines
  const facs=s.fac,whs=s.wh;
  let lines='';
  whs.forEach(w=>{
    const cf=facs.reduce((b,f)=>{const d=Math.hypot(f.x-w.x,f.y-w.y);return d<b.d?{d,f}:b},{d:Infinity,f:null});
    if(cf.f) lines+=`<line x1="${cf.f.x}%" y1="${cf.f.y}%" x2="${w.x}%" y2="${w.y}%" stroke="${color}" stroke-width="1" stroke-dasharray="4 3" opacity=".3"/>`;
  });
  facs.forEach(f=>{lines+=`<line x1="50%" y1="50%" x2="${f.x}%" y2="${f.y}%" stroke="${color}" stroke-width="1" opacity=".15" stroke-dasharray="6 4"/>`;});

  // Capacity
  const capHtml=allN.map(n=>{
    const c=n.c||70;const cc=c>=80?'var(--green)':c>=60?'var(--orange)':'var(--red)';
    return `<div class="ci"><div class="ci-top"><span class="ci-name">${n.inv?'📦':'🏭'} ${n.n}</span><span class="ci-pct" style="color:${cc}">${c}%</span></div><div class="ci-bar"><div class="ci-fill" style="width:${c}%;background:${cc}"></div></div><div class="ci-det">${n.l} · ${n.inv||n.o}</div></div>`;
  }).join('');

  // Customers
  const cc2=['#2563eb','#7c3aed','#059669','#d97706','#9ca3af'];
  const custHtml=s.cust.map((c,i)=>`<div class="cr"><span class="cr-dot" style="background:${cc2[i]}"></span><span class="cr-name">${c.n}</span><div class="cr-bw"><div class="cr-bf" style="width:${c.p}%;background:${cc2[i]}"></div></div><span class="cr-p">${c.p}%</span></div>`).join('');

  // Risk
  const riskHtml=[{l:'财务',v:s.sc.f},{l:'质量',v:s.sc.q},{l:'供应',v:s.sc.s},{l:'合规',v:s.sc.c}].map(r=>{
    const c=r.v>=85?'var(--green)':r.v>=70?'var(--orange)':'var(--red)';
    const circ=2*Math.PI*18;const off=circ*(1-r.v/100);
    return `<div class="ri"><div class="rr"><svg viewBox="0 0 44 44"><circle class="rbg" cx="22" cy="22" r="18"/><circle class="rfg" cx="22" cy="22" r="18" stroke="${c}" stroke-dasharray="${circ}" stroke-dashoffset="${off}"/></svg><div class="rv" style="color:${c}">${r.v}</div></div><div class="rl">${r.l}</div></div>`;
  }).join('');

  document.getElementById('spContent').innerHTML=`
    <div class="sp-grid">
      <div class="sp-card sp-full">
        <div class="sp-head"><div class="ico" style="background:${color}">🌐</div><h3>供应链网络</h3><span style="font-size:10px;color:var(--tm);margin-left:auto">🏭 工厂 · 📦 仓库 · --- 物流</span></div>
        <div class="sp-body"><div class="scn"><div class="grid"></div><svg style="position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none">${lines}</svg>${nodeHtml}</div></div>
      </div>
      <div class="sp-card"><div class="sp-head"><div class="ico" style="background:var(--orange)">📊</div><h3>产能利用率</h3></div><div class="sp-body">${capHtml}</div></div>
      <div class="sp-card"><div class="sp-head"><div class="ico" style="background:var(--purple)">🏢</div><h3>客户组合</h3></div><div class="sp-body">${custHtml}</div></div>
      <div class="sp-card"><div class="sp-head"><div class="ico" style="background:var(--red)">🛡️</div><h3>风险评估</h3></div><div class="sp-body"><div class="rg">${riskHtml}</div></div></div>
      <div class="sp-card"><div class="sp-head"><div class="ico" style="background:var(--teal)">📦</div><h3>产品组合</h3></div><div class="sp-body"><div class="pg">${s.prod.map(p=>`<span class="pc">${p}</span>`).join('')}</div></div></div>
      <div class="sp-card sp-full"><div class="sp-head"><div class="ico" style="background:var(--green)">🤝</div><h3>与小米的合作</h3></div><div class="sp-body"><div class="cg">
        <div class="cs"><div class="csv" style="color:${color}">${s.cr}</div><div class="csl">绩效评级</div></div>
        <div class="cs"><div class="csv" style="color:var(--blue)">${s.vol}</div><div class="csl">供货占比</div></div>
        <div class="cs"><div class="csv" style="color:var(--green)">${s.cs}</div><div class="csl">合作起始</div></div>
        <div class="cs"><div class="csv" style="color:var(--t2)">${s.fac.length+s.wh.length}</div><div class="csl">网络节点</div></div>
      </div><div style="margin-top:10px;padding:8px 12px;background:var(--bg2);border-radius:6px;font-size:11px;"><strong>供货范围：</strong>${s.cp}</div></div></div>
    </div>`;
}

function hashStr(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return(h&0x7fffffff)/0x7fffffff;}

buildMain();
</script>
