<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>供应链网络全景 — 主机厂 × 供应商双视角</title>
<style>
:root {
  --bg:#f8f9fc;--card:#fff;--bg2:#f1f3f8;--border:#e2e6ef;--text:#1a1f36;--t2:#4a5568;--tm:#8492a6;
  --blue:#3b82f6;--bl:#eff6ff;--green:#10b981;--gl:#ecfdf5;--orange:#f59e0b;--ol:#fffbeb;
  --red:#ef4444;--rl:#fef2f2;--purple:#8b5cf6;--pl:#f5f3ff;--teal:#06b6d4;--tl:#ecfeff;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;
  --r:14px;--sh:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);--shl:0 8px 30px rgba(0,0,0,.12);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--bg);color:var(--text);overflow-x:hidden;}

/* ─── Header ─── */
.header{padding:28px 48px 0;text-align:center;}
.header h1{font-size:26px;font-weight:800;letter-spacing:-.5px;}
.header .sub{font-size:13px;color:var(--tm);margin-top:4px;}
.view-tabs{display:flex;justify-content:center;gap:8px;margin-top:16px;}
.view-tab{padding:8px 22px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--card);color:var(--t2);transition:all .2s;}
.view-tab:hover{border-color:var(--blue);color:var(--blue);}
.view-tab.active{background:var(--blue);color:#fff;border-color:var(--blue);}

/* ─── Sub-tabs (OEM) ─── */
.oem-sub{display:flex;justify-content:center;gap:6px;margin:14px 0 0;}
.oem-sub-btn{padding:6px 18px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--tm);transition:all .15s;}
.oem-sub-btn:hover{border-color:var(--blue);color:var(--blue);}
.oem-sub-btn.active{background:var(--bl);color:var(--blue);border-color:var(--blue);}

/* ─── View Container ─── */
.view{display:none;padding:20px 48px 48px;}
.view.active{display:block;animation:fadeUp .35s ease;}
.oem-sub-view{display:none;}
.oem-sub-view.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

/* ─── OEM: Network ─── */
.oem-layout{display:grid;grid-template-columns:200px 1fr;gap:16px;}
.oem-sidebar{display:flex;flex-direction:column;gap:10px;}
.filter-card{background:var(--card);border-radius:var(--r);padding:14px;box-shadow:var(--sh);border:1px solid var(--border);}
.filter-card h3{font-size:11px;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}
.cat-btn{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;border:1.5px solid transparent;transition:all .15s;margin-bottom:3px;background:none;width:100%;text-align:left;}
.cat-btn:hover{background:var(--bg2);}
.cat-btn.active{border-color:var(--blue);background:var(--bl);color:var(--blue);}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.stat-mini{background:var(--card);border-radius:10px;padding:10px;box-shadow:var(--sh);border:1px solid var(--border);text-align:center;}
.stat-mini .val{font-size:20px;font-weight:800;color:var(--blue);}
.stat-mini .lbl{font-size:9px;color:var(--tm);margin-top:2px;}
.network-panel{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--border);position:relative;overflow:hidden;min-height:560px;}
.network-panel svg{width:100%;height:100%;}
.net-node{cursor:pointer;transition:filter .2s;}
.net-node:hover{filter:drop-shadow(0 4px 12px rgba(0,0,0,.2));}
.net-node.oem:hover{filter:none;}

/* ─── OEM: Exploded View ─── */
.explode-wrap{display:grid;grid-template-columns:1fr 280px;gap:20px;min-height:560px;}
.explode-car{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--border);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.explode-car svg{width:100%;height:100%;}
.explode-info{display:flex;flex-direction:column;gap:12px;}
.explode-legend{background:var(--card);border-radius:var(--r);padding:16px;box-shadow:var(--sh);border:1px solid var(--border);}
.explode-legend h3{font-size:11px;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;}
.leg-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;cursor:pointer;transition:all .15s;margin-bottom:3px;border:1.5px solid transparent;}
.leg-item:hover{background:var(--bg2);}
.leg-item.active{border-color:var(--blue);background:var(--bl);}
.leg-color{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
.leg-name{font-size:12px;font-weight:600;}
.leg-count{font-size:10px;color:var(--tm);margin-left:auto;}
.explode-detail{background:var(--card);border-radius:var(--r);padding:16px;box-shadow:var(--sh);border:1px solid var(--border);flex:1;overflow-y:auto;}
.explode-detail h4{font-size:13px;font-weight:700;margin-bottom:10px;}
.ed-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bg2);font-size:11px;}
.ed-row:last-child{border-bottom:none;}
.ed-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.ed-name{font-weight:600;min-width:70px;}
.ed-bar-wrap{flex:1;height:5px;border-radius:3px;background:var(--bg2);overflow:hidden;}
.ed-bar{height:100%;border-radius:3px;}
.ed-pct{font-size:11px;font-weight:700;min-width:32px;text-align:right;}

/* ─── Tooltip ─── */
.tooltip{position:fixed;background:var(--card);border-radius:10px;padding:14px 16px;box-shadow:var(--shl);border:1px solid var(--border);pointer-events:none;z-index:1000;min-width:220px;opacity:0;transition:opacity .15s;font-size:12px;}
.tooltip.show{opacity:1;}
.tooltip .tt-name{font-weight:700;font-size:14px;margin-bottom:4px;}
.tooltip .tt-cat{font-size:10px;color:var(--tm);margin-bottom:8px;}
.tooltip .tt-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--bg2);}
.tooltip .tt-row:last-child{border-bottom:none;}
.tooltip .tt-label{color:var(--t2);}
.tooltip .tt-val{font-weight:600;}
.tooltip .tt-bar{height:4px;border-radius:2px;background:var(--bg2);margin-top:8px;}
.tooltip .tt-bar-fill{height:100%;border-radius:2px;}

/* ─── Supplier View ─── */
.sv-back{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;background:var(--card);border:1px solid var(--border);font-size:12px;font-weight:600;cursor:pointer;color:var(--t2);margin-bottom:14px;transition:all .15s;}
.sv-back:hover{border-color:var(--blue);color:var(--blue);}
.sv-header{background:var(--card);border-radius:var(--r);padding:22px 26px;box-shadow:var(--sh);border:1px solid var(--border);margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;}
.sv-header-left h2{font-size:20px;font-weight:800;}
.sv-header-left .sv-meta{display:flex;gap:14px;margin-top:5px;font-size:12px;color:var(--tm);}
.sv-header-left .sv-meta span{display:flex;align-items:center;gap:4px;}
.sv-tags{display:flex;gap:6px;}
.sv-tag{font-size:10px;font-weight:600;padding:4px 10px;border-radius:6px;}
.sv-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.sv-card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--border);overflow:hidden;}
.sv-card-head{padding:12px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.sv-card-head .icon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;flex-shrink:0;}
.sv-card-head h3{font-size:13px;font-weight:700;}
.sv-card-body{padding:14px 16px;}

/* Supply Chain Network Map (Supplier View) */
.scn-map{position:relative;width:100%;height:360px;background:linear-gradient(135deg,#e8f4fd 0%,#f0f7ff 100%);border-radius:10px;overflow:hidden;}
.scn-map .map-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(59,130,246,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.05) 1px,transparent 1px);background-size:24px 24px;}
.scn-node{position:absolute;cursor:pointer;transition:transform .2s;z-index:2;}
.scn-node:hover{transform:scale(1.15);z-index:3;}
.scn-dot{width:16px;height:16px;border-radius:50%;border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.scn-dot.warehouse{border-radius:3px;}
.scn-pulse{position:absolute;top:-6px;left:-6px;width:28px;height:28px;border-radius:50%;border:2px solid;opacity:0;animation:pulse 2s infinite;}
@keyframes pulse{0%{transform:scale(.8);opacity:.6;}100%{transform:scale(1.8);opacity:0;}}
.scn-label{position:absolute;top:20px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:9px;font-weight:700;background:var(--card);padding:2px 6px;border-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.1);}
.scn-label small{font-weight:400;color:var(--tm);display:block;font-size:8px;}
.scn-legend{position:absolute;bottom:10px;right:12px;background:rgba(255,255,255,.92);border-radius:8px;padding:8px 12px;display:flex;gap:12px;font-size:9px;font-weight:600;color:var(--t2);backdrop-filter:blur(4px);box-shadow:0 1px 4px rgba(0,0,0,.08);}
.scn-legend span{display:flex;align-items:center;gap:4px;}
.scn-legend .ld{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.scn-legend .ld.wh{border-radius:2px;}

/* KPI strip */
.kpi-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px;}
.kpi-card{text-align:center;padding:12px 8px;border-radius:10px;background:var(--bg2);}
.kpi-card .kv{font-size:18px;font-weight:800;}
.kpi-card .kl{font-size:10px;color:var(--tm);margin-top:2px;}

/* Capacity Bars */
.cap-item{margin-bottom:12px;}.cap-item:last-child{margin-bottom:0;}
.cap-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.cap-name{font-size:12px;font-weight:600;}
.cap-pct{font-size:12px;font-weight:700;}
.cap-bar{height:7px;border-radius:4px;background:var(--bg2);overflow:hidden;}
.cap-fill{height:100%;border-radius:4px;transition:width .6s ease;}
.cap-detail{font-size:10px;color:var(--tm);margin-top:2px;}

/* Customer Bars */
.cust-list{display:flex;flex-direction:column;gap:7px;}
.cust-row{display:flex;align-items:center;gap:8px;}
.cust-dot{width:9px;height:9px;border-radius:3px;flex-shrink:0;}
.cust-name{font-size:12px;font-weight:600;min-width:72px;}
.cust-bar-wrap{flex:1;height:5px;border-radius:3px;background:var(--bg2);overflow:hidden;}
.cust-bar{height:100%;border-radius:3px;}
.cust-pct{font-size:11px;font-weight:700;min-width:32px;text-align:right;}

/* Risk */
.risk-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.risk-item{text-align:center;padding:10px 6px;border-radius:10px;background:var(--bg2);}
.risk-ring{width:52px;height:52px;margin:0 auto 5px;position:relative;}
.risk-ring svg{width:100%;height:100%;transform:rotate(-90deg);}
.risk-ring circle{fill:none;stroke-width:5;}
.risk-ring .bg{stroke:var(--border);}
.risk-ring .fg{stroke-linecap:round;transition:stroke-dashoffset .8s ease;}
.risk-val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;}
.risk-label{font-size:10px;font-weight:600;color:var(--t2);}

/* Products */
.prod-grid{display:flex;flex-wrap:wrap;gap:5px;}
.prod-chip{font-size:10px;font-weight:600;padding:4px 9px;border-radius:5px;background:var(--bl);color:var(--blue);border:1px solid rgba(59,130,246,.15);}

/* Cooperation */
.coop-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.coop-stat{text-align:center;padding:12px;border-radius:10px;background:var(--bg2);}
.coop-stat .val{font-size:18px;font-weight:800;}
.coop-stat .lbl{font-size:10px;color:var(--tm);margin-top:2px;}
</style>
</head>
<body>

<div class="header">
  <h1>🔗 供应链网络全景</h1>
  <p class="sub">主机厂 × 供应商双视角 · 产能 · 布局 · 风险</p>
  <div class="view-tabs">
    <div class="view-tab active" onclick="switchView('oem')">🏭 主机厂视角</div>
    <div class="view-tab" onclick="switchView('supplier')">🏢 供应商视角</div>
  </div>
  <!-- OEM Sub-tabs -->
  <div class="oem-sub" id="oemSub">
    <div class="oem-sub-btn active" onclick="switchOemSub('network')">🌐 网络拓扑</div>
    <div class="oem-sub-btn" onclick="switchOemSub('explode')">🚗 品类爆炸图</div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════ -->
<!-- OEM VIEW -->
<!-- ════════════════════════════════════════════════════ -->
<div class="view active" id="view-oem">

  <!-- Sub: Network -->
  <div class="oem-sub-view active" id="oem-network">
    <div class="oem-layout">
      <div class="oem-sidebar">
        <div class="filter-card">
          <h3>品类筛选</h3>
          <button class="cat-btn active" data-cat="all" onclick="filterCat('all')"><span class="cat-dot" style="background:#3b82f6"></span>全部</button>
          <button class="cat-btn" data-cat="powertrain" onclick="filterCat('powertrain')"><span class="cat-dot" style="background:#ef4444"></span>动力总成</button>
          <button class="cat-btn" data-cat="chassis" onclick="filterCat('chassis')"><span class="cat-dot" style="background:#8b5cf6"></span>底盘</button>
          <button class="cat-btn" data-cat="body" onclick="filterCat('body')"><span class="cat-dot" style="background:#f59e0b"></span>车身</button>
          <button class="cat-btn" data-cat="interior" onclick="filterCat('interior')"><span class="cat-dot" style="background:#10b981"></span>内饰</button>
          <button class="cat-btn" data-cat="electronics" onclick="filterCat('electronics')"><span class="cat-dot" style="background:#06b6d4"></span>电子电气</button>
        </div>
        <div class="stats-row">
          <div class="stat-mini"><div class="val">15</div><div class="lbl">Tier 1</div></div>
          <div class="stat-mini"><div class="val">19</div><div class="lbl">Tier 2</div></div>
        </div>
        <div class="stats-row">
          <div class="stat-mini"><div class="val">5</div><div class="lbl">品类</div></div>
          <div class="stat-mini"><div class="val">3</div><div class="lbl">风险预警</div></div>
        </div>
        <div class="filter-card" style="margin-top:2px">
          <h3>风险等级</h3>
          <div style="display:flex;gap:10px;font-size:10px;color:var(--t2);flex-wrap:wrap;">
            <span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:8px;border-radius:3px;background:#10b981"></span>低</span>
            <span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:8px;border-radius:3px;background:#f59e0b"></span>中</span>
            <span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:8px;border-radius:3px;background:#ef4444"></span>高</span>
          </div>
        </div>
      </div>
      <div class="network-panel"><svg id="netSvg" viewBox="0 0 900 580"></svg></div>
    </div>
  </div>

  <!-- Sub: Exploded View -->
  <div class="oem-sub-view" id="oem-explode">
    <div class="explode-wrap">
      <div class="explode-car"><svg id="explodeSvg" viewBox="0 0 800 520"></svg></div>
      <div class="explode-info">
        <div class="explode-legend">
          <h3>品类组件分布</h3>
          <div id="explodeLegend"></div>
        </div>
        <div class="explode-detail" id="explodeDetail">
          <h4>👈 点击左侧品类查看详情</h4>
          <p style="font-size:11px;color:var(--tm);margin-top:8px;line-height:1.6;">
            爆炸图展示了整车 BOM 按品类拆分的结构。每个色块对应一个供应链品类区域，点击可查看该品类下的供应商分布、成本占比和风险状况。
          </p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════ -->
<!-- SUPPLIER VIEW -->
<!-- ════════════════════════════════════════════════════ -->
<div class="view" id="view-supplier">
  <button class="sv-back" onclick="switchView('oem')">← 返回主机厂视角</button>
  <div id="supplierContent"></div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>

const tier1=[
  {id:'catl',name:'宁德时代',cat:'powertrain',city:'宁德',country:'中国',cap:92,risk:'low',vol:'35%',revenue:'680亿',

// OEM: NETWORK TOPOLOGY
// ═══════════════════════════════════════════════
const CX=450,CY=290,OEM_R=30,T1_R=17;
let currentCat='all';

function buildNetwork(){
  const svg=document.getElementById('netSvg');let h='';
  h+=`<defs><radialGradient id="oG"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#1d4ed8"/></radialGradient></defs>`;
  const t1p=[];
  tier1.forEach((s,i)=>{
    const a=(i/tier1.length)*Math.PI*2-Math.PI/2;
    t1p.push({x:CX+235*Math.cos(a),y:CY+185*Math.sin(a),...s});
  });
  t1p.forEach(s=>{
    const o=(currentCat==='all'||s.cat===currentCat)?.25:.06;
    h+=`<line x1="${CX}" y1="${CY}" x2="${s.x}" y2="${s.y}" stroke="${C[s.cat]}" stroke-width="1.5" stroke-dasharray="4 3" opacity="${o}"/>`;
  });
  tier2.forEach(t2=>{
    const p=t1p.find(x=>x.id===t2.parent);if(!p)return;
    const o=(currentCat==='all'||t2.cat===currentCat)?.15:.03;
    const tx=p.x+(t2.x/100*900-p.x)*.35+(Math.random()-.5)*30;
    const ty=p.y+(t2.y/100*580-p.y)*.35+(Math.random()-.5)*20;
    h+=`<line x1="${p.x}" y1="${p.y}" x2="${tx}" y2="${ty}" stroke="${C[t2.cat]}" stroke-width=".8" opacity="${o}" stroke-dasharray="2 2"/>`;
    const to=(currentCat==='all'||t2.cat===currentCat)?.8:.12;
    h+=`<circle cx="${tx}" cy="${ty}" r="9" fill="${C[t2.cat]}" opacity="${to*.3}" stroke="${C[t2.cat]}" stroke-width="1" opacity="${to}"/>`;
    h+=`<text x="${tx}" y="${ty+3}" text-anchor="middle" font-size="6" font-weight="600" fill="${C[t2.cat]}" opacity="${to}">${t2.name.slice(0,3)}</text>`;
  });
  t1p.forEach(s=>{
    const o=(currentCat==='all'||s.cat===currentCat)?1:.2;
    h+=`<g class="net-node" opacity="${o}" onmouseenter="showTip(event,'${s.id}')" onmouseleave="hideTip()" onclick="openSupplier('${s.id}')">`;
    h+=`<circle cx="${s.x}" cy="${s.y}" r="${T1_R}" fill="${C[s.cat]}" opacity=".15" stroke="${C[s.cat]}" stroke-width="2"/>`;
    h+=`<circle cx="${s.x}" cy="${s.y}" r="${T1_R-4}" fill="${C[s.cat]}" opacity=".9"/>`;
    h+=`<circle cx="${s.x+T1_R-4}" cy="${s.y-T1_R+4}" r="4" fill="${RC[s.risk]}" stroke="#fff" stroke-width="1.5"/>`;
    h+=`<text x="${s.x}" y="${s.y+T1_R+13}" text-anchor="middle" font-size="10" font-weight="700">${s.name}</text>`;
    h+=`<text x="${s.x}" y="${s.y+T1_R+24}" text-anchor="middle" font-size="8" fill="var(--tm)">${CN[s.cat]}</text>`;
    h+=`</g>`;
  });
  h+=`<circle cx="${CX}" cy="${CY}" r="${OEM_R+8}" fill="url(#oG)" opacity=".08"/>`;
  h+=`<circle cx="${CX}" cy="${CY}" r="${OEM_R}" fill="url(#oG)"/>`;
  h+=`<text x="${CX}" y="${CY-5}" text-anchor="middle" font-size="11" font-weight="800" fill="#fff">小米</text>`;
  h+=`<text x="${CX}" y="${CY+8}" text-anchor="middle" font-size="9" font-weight="600" fill="rgba(255,255,255,.8)">汽车</text>`;
  svg.innerHTML=h;
}
function filterCat(c){currentCat=c;document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active',b.dataset.cat===c));buildNetwork();}

  Object.entries(zones).forEach(([key,z])=>{
    const clr=C[key];
    // Zone rectangle on car
    h+=`<rect x="${z.x}" y="${z.y}" width="${z.w}" height="${z.h}" rx="8" fill="${clr}" opacity=".12" stroke="${clr}" stroke-width="1.5" stroke-dasharray="4 3" class="exp-zone" data-cat="${key}" style="cursor:pointer" onclick="selectExplodeCat('${key}')"/>`;
    // Label inside
    h+=`<text x="${z.x+z.w/2}" y="${z.y+z.h/2+4}" text-anchor="middle" font-size="11" font-weight="700" fill="${clr}" style="pointer-events:none">${z.label}</text>`;
    // Callout line to info panel
    h+=`<line x1="${z.lx<400?z.x:z.x+z.w}" y1="${z.y+z.h/2}" x2="${z.lx}" y2="${z.ly+10}" stroke="${clr}" stroke-width="1" opacity=".3" marker-end="url(#arr)"/>`;
    // Dot at end
    h+=`<circle cx="${z.lx}" cy="${z.ly+10}" r="4" fill="${clr}" opacity=".6"/>`;
  });

  svg.innerHTML=h;

  // Legend
  let leg='';
  Object.entries(zones).forEach(([key,z])=>{
    const suppliers=tier1.filter(s=>s.cat===key);
    leg+=`<div class="leg-item" data-cat="${key}" onclick="selectExplodeCat('${key}')">
      <span class="leg-color" style="background:${C[key]}"></span>
      <span class="leg-name">${z.label}</span>
      <span class="leg-count">${z.costPct}% · ${suppliers.length}家</span>
    </div>`;
  });
  document.getElementById('explodeLegend').innerHTML=leg;
}

function selectExplodeCat(cat){
  const z=EXPLODE_ZONES[cat];
  const suppliers=tier1.filter(s=>s.cat===cat);
  // Highlight zones
  document.querySelectorAll('.leg-item').forEach(el=>el.classList.toggle('active',el.dataset.cat===cat));
  document.querySelectorAll('.exp-zone').forEach(el=>{
    el.setAttribute('opacity',el.dataset.cat===cat?'.25':'.06');
    el.setAttribute('stroke-width',el.dataset.cat===cat?'2.5':'1');
  });

  const d=document.getElementById('explodeDetail');
  const riskLabel={low:'低风险 ✅',mid:'中风险 ⚠️',high:'高风险 🔴'}[z.risk];
  let rows=suppliers.map(s=>{
    const cc=s.cap>=80?'var(--green)':s.cap>=60?'var(--orange)':'var(--red)';
    return `<div class="ed-row">
      <span class="ed-dot" style="background:${C[cat]}"></span>
      <span class="ed-name">${s.name}</span>
      <div class="ed-bar-wrap"><div class="ed-bar" style="width:${s.cap}%;background:${cc}"></div></div>
      <span class="ed-pct" style="color:${cc}">${s.cap}%</span>
    </div>`;
  }).join('');

  d.innerHTML=`
    <h4 style="color:${C[cat]}">${z.label} <span style="font-size:11px;font-weight:400;color:var(--tm)">· 成本占比 ${z.costPct}%</span></h4>
    <div style="display:flex;gap:8px;margin:8px 0 12px;flex-wrap:wrap;">
      <span style="font-size:10px;padding:3px 8px;border-radius:5px;background:${C[cat]}15;color:${C[cat]}">${riskLabel}</span>
      <span style="font-size:10px;padding:3px 8px;border-radius:5px;background:var(--bg2);color:var(--t2)">${suppliers.length} 家 Tier 1</span>
    </div>
    <div style="font-size:11px;font-weight:600;color:var(--t2);margin-bottom:8px;">供应商产能</div>
    ${rows}
    <div style="font-size:11px;font-weight:600;color:var(--t2);margin:12px 0 6px;">核心零部件</div>
    <div style="display:flex;flex-wrap:wrap;gap:4px;">
      ${z.parts.map(p=>`<span style="font-size:9px;padding:3px 7px;border-radius:4px;background:${C[cat]}10;color:${C[cat]};border:1px solid ${C[cat]}20">${p}</span>`).join('')}
    </div>
    <div style="margin-top:12px;font-size:10px;color:var(--tm);text-align:center;cursor:pointer;color:${C[cat]}" onclick="filterCat('${cat}');switchOemSub('network');">→ 切换到网络拓扑查看完整关系</div>
  `;
}

// ═══════════════════════════════════════════════
// TOOLTIP
// ═══════════════════════════════════════════════
function showTip(e,id){
  const s=tier1.find(x=>x.id===id);if(!s)return;
  const rl={low:'低风险',mid:'中风险',high:'高风险'}[s.risk];
  const cc=s.cap>=80?'var(--green)':s.cap>=60?'var(--orange)':'var(--red)';
  const tt=document.getElementById('tooltip');
  tt.innerHTML=`<div class="tt-name" style="color:${C[s.cat]}">${s.name}</div>
    <div class="tt-cat">${CN[s.cat]} · ${s.city}，${s.country}</div>
    <div class="tt-row"><span class="tt-label">产能利用率</span><span class="tt-val" style="color:${cc}">${s.cap}%</span></div>
    <div class="tt-bar"><div class="tt-bar-fill" style="width:${s.cap}%;background:${cc}"></div></div>
    <div class="tt-row"><span class="tt-label">供货占比</span><span class="tt-val">${s.vol}</span></div>
    <div class="tt-row"><span class="tt-label">风险等级</span><span class="tt-val" style="color:${RC[s.risk]}">${rl}</span></div>
    <div class="tt-row"><span class="tt-label">年营收</span><span class="tt-val">${s.revenue}</span></div>
    <div style="margin-top:8px;font-size:10px;color:var(--tm);text-align:center">点击查看详情 →</div>`;
  tt.classList.add('show');moveTip(e);
}
function moveTip(e){const tt=document.getElementById('tooltip');let x=e.clientX+16,y=e.clientY+16;if(x+240>innerWidth)x=e.clientX-250;if(y+200>innerHeight)y=e.clientY-200;tt.style.left=x+'px';tt.style.top=y+'px';}
function hideTip(){document.getElementById('tooltip').classList.remove('show');}
document.addEventListener('mousemove',e=>{if(document.getElementById('tooltip').classList.contains('show'))moveTip(e);});

// ═══════════════════════════════════════════════
// SUPPLIER VIEW
// ═══════════════════════════════════════════════
function openSupplier(id){
  const s=tier1.find(x=>x.id===id);if(!s)return;hideTip();
  const color=C[s.cat];
  const rl={low:'低风险 ✅',mid:'中风险 ⚠️',high:'高风险 🔴'}[s.risk];

  // Supply chain network nodes (factory + warehouse)
  const allNodes=[...(s.factories||[]),...(s.warehouses||[])];
  const nodeHtml=allNodes.map(n=>{
    const isW=n.type==='warehouse';
    const shape=isW?`border-radius:3px;width:14px;height:14px;`:`border-radius:50%;width:16px;height:16px;`;
    const label=isW?`📦 ${n.name}`:`🏭 ${n.name}`;
    return `<div class="scn-node" style="left:${n.x}%;top:${n.y}%" title="${n.name}">
      <div class="scn-pulse" style="border-color:${color};background:${color}"></div>
      <div class="scn-dot" style="background:${color};${shape}"></div>
      <div class="scn-label">${label}<small>${n.loc} · ${n.type==='factory'?n.output:n.capacity}</small></div>
    </div>`;
  }).join('');

  // Lines between factories and warehouses (SVG overlay)
  const fLines=[];
  const factories=allNodes.filter(n=>n.type==='factory');
  const warehouses=allNodes.filter(n=>n.type==='warehouse');
  warehouses.forEach(w=>{
    const closest=factories.reduce((best,f)=>{
      const d=Math.hypot(f.x-w.x,f.y-w.y);
      return d<best.d?{d,f}:best;
    },{d:Infinity,f:null});
    if(closest.f){
      fLines.push(`<line x1="${closest.f.x}%" y1="${closest.f.y}%" x2="${w.x}%" y2="${w.y}%" stroke="${color}" stroke-width="1" stroke-dasharray="4 3" opacity=".35"/>`);
    }
  });
  // Lines from OEM (center ~50%,50%) to each factory
  factories.forEach(f=>{
    fLines.push(`<line x1="50%" y1="50%" x2="${f.x}%" y2="${f.y}%" stroke="${color}" stroke-width="1.2" opacity=".2" stroke-dasharray="6 4"/>`);
  });

  // Capacity bars
  const capBars=allNodes.map(n=>{
    const c=n.cap||70;const cc=c>=80?'var(--green)':c>=60?'var(--orange)':'var(--red)';
    const icon=n.type==='factory'?'🏭':'📦';
    return `<div class="cap-item">
      <div class="cap-top"><span class="cap-name">${icon} ${n.name}</span><span class="cap-pct" style="color:${cc}">${c}%</span></div>
      <div class="cap-bar"><div class="cap-fill" style="width:${c}%;background:${cc}"></div></div>
      <div class="cap-detail">${n.loc} · ${n.type==='factory'?n.output:n.inventory||'-'}</div>
    </div>`;
  }).join('');

  // KPIs
  const factoryCount=s.factories.length;
  const whCount=(s.warehouses||[]).length;
  const avgCap=Math.round(allNodes.reduce((a,n)=>a+(n.cap||70),0)/allNodes.length);

  // Customer bars
  const cc2=['#3b82f6','#8b5cf6','#10b981','#f59e0b','#94a3b8'];
  const custBars=s.customers.map((c,i)=>`<div class="cust-row">
    <span class="cust-dot" style="background:${cc2[i]}"></span>
    <span class="cust-name">${c.n}</span>
    <div class="cust-bar-wrap"><div class="cust-bar" style="width:${c.p}%;background:${cc2[i]}"></div></div>
    <span class="cust-pct">${c.p}%</span>
  </div>`).join('');

  // Risk rings
  const riskItems=[{label:'财务',val:s.scores.finance},{label:'质量',val:s.scores.quality},{label:'供应',val:s.scores.supply},{label:'合规',val:s.scores.compliance}].map(r=>{
    const c2=r.val>=85?'var(--green)':r.val>=70?'var(--orange)':'var(--red)';
    const circ=2*Math.PI*22;const off=circ*(1-r.val/100);
    return `<div class="risk-item"><div class="risk-ring"><svg viewBox="0 0 56 56"><circle class="bg" cx="28" cy="28" r="22"/><circle class="fg" cx="28" cy="28" r="22" stroke="${c2}" stroke-dasharray="${circ}" stroke-dashoffset="${off}"/></svg><div class="risk-val" style="color:${c2}">${r.val}</div></div><div class="risk-label">${r.label}</div></div>`;
  }).join('');

  const prods=s.products.map(p=>`<div class="prod-chip">${p}</div>`).join('');

  document.getElementById('supplierContent').innerHTML=`
    <div class="sv-header">
      <div class="sv-header-left">
        <h2 style="color:${color}">${s.name}</h2>
        <div class="sv-meta">
          <span>📍 ${s.city}，${s.country}</span>
          <span>🏭 ${factoryCount} 座工厂</span>
          <span>📦 ${whCount} 个仓库</span>
          <span>💰 年营收 ${s.revenue}</span>
          <span>📅 合作自 ${s.coopSince}</span>
        </div>
      </div>
      <div class="sv-tags">
        <span class="sv-tag" style="background:${color}15;color:${color};border:1px solid ${color}30">${CN[s.cat]}</span>
        <span class="sv-tag" style="background:${RC[s.risk]}15;color:${RC[s.risk]};border:1px solid ${RC[s.risk]}30">${rl}</span>
      </div>
    </div>

    <div class="sv-grid">
      <!-- Supply Chain Network Map -->
      <div class="sv-card" style="grid-column:1/-1">
        <div class="sv-card-head">
          <div class="icon" style="background:${color}">🌐</div>
          <h3>供应链网络地图</h3>
          <span style="font-size:10px;color:var(--tm);margin-left:auto">🏭 工厂 · 📦 仓库 · --- 物流路线</span>
        </div>
        <div class="sv-card-body">
          <div class="scn-map">
            <div class="map-grid"></div>
            <svg style="position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none">${fLines.join('')}</svg>
            ${nodeHtml}
            <div class="scn-legend">
              <span><span class="ld" style="background:${color}"></span>工厂</span>
              <span><span class="ld wh" style="background:${color};opacity:.6"></span>仓库</span>
              <span><span style="display:inline-block;width:16px;border-top:2px dashed ${color};opacity:.4"></span>物流</span>
            </div>
          </div>
          <div class="kpi-strip">
            <div class="kpi-card"><div class="kv" style="color:${color}">${factoryCount}</div><div class="kl">全球工厂</div></div>
            <div class="kpi-card"><div class="kv" style="color:var(--orange)">${whCount}</div><div class="kl">中转/VMI 仓</div></div>
            <div class="kpi-card"><div class="kv" style="color:var(--green)">${avgCap}%</div><div class="kl">平均产能利用</div></div>
            <div class="kpi-card"><div class="kv" style="color:var(--blue)">${s.vol}</div><div class="kl">小米供货占比</div></div>
          </div>
        </div>
      </div>

      <!-- Capacity -->
      <div class="sv-card">
        <div class="sv-card-head"><div class="icon" style="background:var(--orange)">📊</div><h3>产能利用率</h3></div>
        <div class="sv-card-body">${capBars}</div>
      </div>

      <!-- Customers -->
      <div class="sv-card">
        <div class="sv-card-head"><div class="icon" style="background:var(--purple)">🏢</div><h3>客户组合</h3></div>
        <div class="sv-card-body"><div class="cust-list">${custBars}</div></div>
      </div>

      <!-- Risk -->
      <div class="sv-card">
        <div class="sv-card-head"><div class="icon" style="background:var(--red)">🛡️</div><h3>风险评估</h3></div>
        <div class="sv-card-body"><div class="risk-grid">${riskItems}</div></div>
      </div>

      <!-- Products -->
      <div class="sv-card">
        <div class="sv-card-head"><div class="icon" style="background:var(--teal)">📦</div><h3>产品组合</h3></div>
        <div class="sv-card-body"><div class="prod-grid">${prods}</div></div>
      </div>

      <!-- Cooperation -->
      <div class="sv-card" style="grid-column:1/-1">
        <div class="sv-card-head"><div class="icon" style="background:var(--green)">🤝</div><h3>与小米的合作详情</h3></div>
        <div class="sv-card-body">
          <div class="coop-grid">
            <div class="coop-stat"><div class="val" style="color:${color}">${s.coopScore}</div><div class="lbl">绩效评级</div></div>
            <div class="coop-stat"><div class="val" style="color:var(--blue)">${s.vol}</div><div class="lbl">供货占比</div></div>
            <div class="coop-stat"><div class="val" style="color:var(--green)">${s.coopSince}</div><div class="lbl">合作起始</div></div>
          </div>
          <div style="margin-top:12px;padding:10px 14px;background:var(--bg2);border-radius:8px;font-size:12px;">
            <strong>供货范围：</strong>${s.coopParts}
          </div>
        </div>
      </div>
    </div>`;
  switchView('supplier');
}

// ═══════════════════════════════════════════════
// VIEW SWITCH
// ═══════════════════════════════════════════════
function switchView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.view-tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.view-tab')[v==='oem'?0:1].classList.add('active');
  document.getElementById('oemSub').style.display=v==='oem'?'flex':'none';
}
function switchOemSub(sub){
  document.querySelectorAll('.oem-sub-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.oem-sub-view').forEach(v=>v.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('oem-'+sub).classList.add('active');
}

// Init
buildNetwork();
buildExplode();
</script>
</body>
</html>
