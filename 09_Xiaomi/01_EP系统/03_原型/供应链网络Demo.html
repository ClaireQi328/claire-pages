<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>供应链网络全景 — 主机厂 × 供应商双视角</title>
<style>
:root {
  --bg: #f8f9fc; --card: #ffffff; --bg-section: #f1f3f8;
  --border: #e2e6ef; --text: #1a1f36; --text-secondary: #4a5568;
  --text-muted: #8492a6; --blue: #3b82f6; --blue-light: #eff6ff;
  --green: #10b981; --green-light: #ecfdf5; --orange: #f59e0b;
  --orange-light: #fffbeb; --red: #ef4444; --red-light: #fef2f2;
  --purple: #8b5cf6; --purple-light: #f5f3ff; --teal: #06b6d4;
  --teal-light: #ecfeff; --gray: #6b7280; --gray-light: #f3f4f6;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
  --radius: 14px; --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
  --shadow-lg: 0 8px 30px rgba(0,0,0,.12);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: var(--font); background: var(--bg); color: var(--text); overflow-x: hidden; }

/* ─── Header ─── */
.header { padding: 32px 48px 0; text-align: center; }
.header h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
.header .sub { font-size: 13px; color: var(--text-muted); margin-top: 6px; }
.view-tabs { display: flex; justify-content: center; gap: 8px; margin-top: 18px; }
.view-tab { padding: 8px 24px; border-radius: 8px; font-size: 13px; font-weight: 600;
  cursor: pointer; border: 1.5px solid var(--border); background: var(--card); color: var(--text-secondary);
  transition: all .2s; }
.view-tab:hover { border-color: var(--blue); color: var(--blue); }
.view-tab.active { background: var(--blue); color: #fff; border-color: var(--blue); }

/* ─── View Container ─── */
.view { display: none; padding: 24px 48px 48px; }
.view.active { display: block; animation: fadeUp .35s ease; }
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

/* ─── OEM View ─── */
.oem-layout { display: grid; grid-template-columns: 220px 1fr; gap: 20px; }
.oem-sidebar { display: flex; flex-direction: column; gap: 12px; }
.filter-card { background: var(--card); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); border: 1px solid var(--border); }
.filter-card h3 { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 10px; }
.cat-btn { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; border: 1.5px solid transparent; transition: all .15s; margin-bottom: 4px; background: none; width: 100%; text-align: left; }
.cat-btn:hover { background: var(--bg-section); }
.cat-btn.active { border-color: var(--blue); background: var(--blue-light); color: var(--blue); }
.cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

.stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.stat-mini { background: var(--card); border-radius: 10px; padding: 12px; box-shadow: var(--shadow); border: 1px solid var(--border); text-align: center; }
.stat-mini .val { font-size: 22px; font-weight: 800; color: var(--blue); }
.stat-mini .lbl { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

/* Network SVG */
.network-panel { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); position: relative; overflow: hidden; min-height: 600px; }
.network-panel svg { width: 100%; height: 100%; }
.net-node { cursor: pointer; transition: filter .2s; }
.net-node:hover { filter: drop-shadow(0 4px 12px rgba(0,0,0,.2)); }
.net-node.oem:hover { filter: none; }
.net-line { stroke-linecap: round; }

/* Tooltip */
.tooltip { position: fixed; background: var(--card); border-radius: 10px; padding: 14px 16px; box-shadow: var(--shadow-lg); border: 1px solid var(--border); pointer-events: none; z-index: 1000; min-width: 220px; opacity: 0; transition: opacity .15s; font-size: 12px; }
.tooltip.show { opacity: 1; }
.tooltip .tt-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
.tooltip .tt-cat { font-size: 10px; color: var(--text-muted); margin-bottom: 8px; }
.tooltip .tt-row { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid var(--bg-section); }
.tooltip .tt-row:last-child { border-bottom: none; }
.tooltip .tt-label { color: var(--text-secondary); }
.tooltip .tt-val { font-weight: 600; }
.tooltip .tt-bar { height: 4px; border-radius: 2px; background: var(--bg-section); margin-top: 8px; }
.tooltip .tt-bar-fill { height: 100%; border-radius: 2px; transition: width .3s; }

/* ─── Supplier View ─── */
.sv-back { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; background: var(--card); border: 1px solid var(--border); font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text-secondary); margin-bottom: 16px; transition: all .15s; }
.sv-back:hover { border-color: var(--blue); color: var(--blue); }

.sv-header { background: var(--card); border-radius: var(--radius); padding: 24px 28px; box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
.sv-header-left h2 { font-size: 22px; font-weight: 800; }
.sv-header-left .sv-meta { display: flex; gap: 16px; margin-top: 6px; font-size: 12px; color: var(--text-muted); }
.sv-header-left .sv-meta span { display: flex; align-items: center; gap: 4px; }
.sv-tags { display: flex; gap: 6px; }
.sv-tag { font-size: 10px; font-weight: 600; padding: 4px 10px; border-radius: 6px; }

.sv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.sv-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; }
.sv-card-head { padding: 14px 18px 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.sv-card-head .icon { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #fff; flex-shrink: 0; }
.sv-card-head h3 { font-size: 13px; font-weight: 700; }
.sv-card-body { padding: 16px 18px; }

/* Factory Map */
.factory-map { position: relative; width: 100%; height: 320px; background: linear-gradient(135deg, #e8f4fd 0%, #f0f7ff 100%); border-radius: 10px; overflow: hidden; }
.factory-map .map-grid { position: absolute; inset: 0; background-image:
  linear-gradient(rgba(59,130,246,.06) 1px, transparent 1px),
  linear-gradient(90deg, rgba(59,130,246,.06) 1px, transparent 1px);
  background-size: 30px 30px; }
.factory-pin { position: absolute; cursor: pointer; transition: transform .2s; z-index: 2; }
.factory-pin:hover { transform: scale(1.2); z-index: 3; }
.pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2.5px solid #fff; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
.pin-pulse { position: absolute; top: -5px; left: -5px; width: 24px; height: 24px; border-radius: 50%; border: 2px solid; opacity: 0; animation: pulse 2s infinite; }
@keyframes pulse { 0% { transform: scale(.8); opacity:.6; } 100% { transform: scale(1.8); opacity:0; } }
.pin-label { position: absolute; top: 18px; left: 50%; transform: translateX(-50%); white-space: nowrap;
  font-size: 9px; font-weight: 700; background: var(--card); padding: 2px 6px; border-radius: 4px;
  box-shadow: 0 1px 4px rgba(0,0,0,.1); }

/* Capacity Bars */
.cap-item { margin-bottom: 14px; }
.cap-item:last-child { margin-bottom: 0; }
.cap-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.cap-name { font-size: 12px; font-weight: 600; }
.cap-pct { font-size: 12px; font-weight: 700; }
.cap-bar { height: 8px; border-radius: 4px; background: var(--bg-section); overflow: hidden; }
.cap-fill { height: 100%; border-radius: 4px; transition: width .6s ease; }
.cap-detail { font-size: 10px; color: var(--text-muted); margin-top: 3px; }

/* Customer Pie (CSS only) */
.cust-list { display: flex; flex-direction: column; gap: 8px; }
.cust-row { display: flex; align-items: center; gap: 10px; }
.cust-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
.cust-name { font-size: 12px; font-weight: 600; min-width: 80px; }
.cust-bar-wrap { flex: 1; height: 6px; border-radius: 3px; background: var(--bg-section); overflow: hidden; }
.cust-bar { height: 100%; border-radius: 3px; transition: width .5s; }
.cust-pct { font-size: 11px; font-weight: 700; min-width: 36px; text-align: right; }

/* Risk Gauges */
.risk-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.risk-item { text-align: center; padding: 12px 8px; border-radius: 10px; background: var(--bg-section); }
.risk-ring { width: 56px; height: 56px; margin: 0 auto 6px; position: relative; }
.risk-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.risk-ring circle { fill: none; stroke-width: 5; }
.risk-ring .bg { stroke: var(--border); }
.risk-ring .fg { stroke-linecap: round; transition: stroke-dashoffset .8s ease; }
.risk-val { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; }
.risk-label { font-size: 10px; font-weight: 600; color: var(--text-secondary); }

/* Products */
.prod-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.prod-chip { font-size: 10px; font-weight: 600; padding: 5px 10px; border-radius: 6px; background: var(--blue-light); color: var(--blue); border: 1px solid rgba(59,130,246,.15); }

/* Cooperation */
.coop-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.coop-stat { text-align: center; padding: 14px; border-radius: 10px; background: var(--bg-section); }
.coop-stat .val { font-size: 20px; font-weight: 800; }
.coop-stat .lbl { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

.sv-full { grid-column: 1 / -1; }
</style>
</head>

// ═══════════════════════════════════════════════
// SVG NETWORK
// ═══════════════════════════════════════════════
const CX = 450, CY = 300, OEM_R = 32, T1_R = 18, T2_R = 10;
let currentCat = 'all';

function buildNetwork() {
  const svg = document.getElementById('netSvg');
  let html = '';

  // Defs
  html += `<defs>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="oemGrad"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#1d4ed8"/></radialGradient>
  </defs>`;

  // Tier 1 positions (elliptical layout)
  const t1Positions = [];
  const cats = ['powertrain','powertrain','powertrain','chassis','chassis','chassis','body','body','body','interior','interior','interior','electronics','electronics','electronics'];
  tier1.forEach((s, i) => {
    const angle = (i / tier1.length) * Math.PI * 2 - Math.PI/2;
    const rx = 240, ry = 190;
    const x = CX + rx * Math.cos(angle);
    const y = CY + ry * Math.sin(angle);
    t1Positions.push({ x, y, ...s });
  });

  // Draw lines: OEM → Tier1
  t1Positions.forEach(s => {
    const opacity = (currentCat === 'all' || s.cat === currentCat) ? 0.25 : 0.06;
    const color = COLORS[s.cat];
    html += `<line x1="${CX}" y1="${CY}" x2="${s.x}" y2="${s.y}" stroke="${color}" stroke-width="1.5" stroke-dasharray="4 3" opacity="${opacity}" class="net-line"/>`;
  });

  // Draw Tier 2 lines + nodes
  tier2.forEach(t2 => {
    const parent = t1Positions.find(p => p.id === t2.parent);
    if (!parent) return;
    const opacity = (currentCat === 'all' || t2.cat === currentCat) ? 0.15 : 0.03;
    const color = COLORS[t2.cat];
    const tx = parent.x + (t2.x / 100 * 900 - parent.x) * 0.35 + (Math.random() - 0.5) * 30;
    const ty = parent.y + (t2.y / 100 * 600 - parent.y) * 0.35 + (Math.random() - 0.5) * 20;
    t2.sx = tx; t2.sy = ty;
    html += `<line x1="${parent.x}" y1="${parent.y}" x2="${tx}" y2="${ty}" stroke="${color}" stroke-width="0.8" opacity="${opacity}" stroke-dasharray="2 2"/>`;
    const t2opacity = (currentCat === 'all' || t2.cat === currentCat) ? 0.8 : 0.12;
    html += `<circle cx="${tx}" cy="${ty}" r="${T2_R}" fill="${color}" opacity="${t2opacity * 0.3}" stroke="${color}" stroke-width="1" opacity="${t2opacity}"/>`;
    html += `<text x="${tx}" y="${ty + 3.5}" text-anchor="middle" font-size="6" font-weight="600" fill="${color}" opacity="${t2opacity}">${t2.name.slice(0,3)}</text>`;
  });

  // Draw Tier 1 nodes
  t1Positions.forEach(s => {
    const opacity = (currentCat === 'all' || s.cat === currentCat) ? 1 : 0.2;
    const color = COLORS[s.cat];
    const r = T1_R;
    html += `<g class="net-node" opacity="${opacity}" data-id="${s.id}"
      onmouseenter="showTip(event,'${s.id}')" onmouseleave="hideTip()" onclick="openSupplier('${s.id}')">`;
    html += `<circle cx="${s.x}" cy="${s.y}" r="${r}" fill="${color}" opacity="0.15" stroke="${color}" stroke-width="2"/>`;
    html += `<circle cx="${s.x}" cy="${s.y}" r="${r-5}" fill="${color}" opacity="0.9"/>`;
    // Risk dot
    const riskColor = RISK_COLOR[s.risk];
    html += `<circle cx="${s.x + r - 4}" cy="${s.y - r + 4}" r="4" fill="${riskColor}" stroke="#fff" stroke-width="1.5"/>`;
    // Label
    const labelY = s.y + r + 14;
    html += `<text x="${s.x}" y="${labelY}" text-anchor="middle" font-size="10" font-weight="700" fill="var(--text)">${s.name}</text>`;
    html += `<text x="${s.x}" y="${labelY + 12}" text-anchor="middle" font-size="8" fill="var(--text-muted)">${CAT_NAMES[s.cat]}</text>`;
    html += `</g>`;
  });

  // OEM center
  html += `<g class="net-node oem">`;
  html += `<circle cx="${CX}" cy="${CY}" r="${OEM_R + 8}" fill="url(#oemGrad)" opacity="0.08"/>`;
  html += `<circle cx="${CX}" cy="${CY}" r="${OEM_R}" fill="url(#oemGrad)"/>`;
  html += `<text x="${CX}" y="${CY - 6}" text-anchor="middle" font-size="11" font-weight="800" fill="#fff">小米</text>`;
  html += `<text x="${CX}" y="${CY + 8}" text-anchor="middle" font-size="9" font-weight="600" fill="rgba(255,255,255,.8)">汽车</text>`;
  html += `</g>`;

  svg.innerHTML = html;
}

function filterCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  buildNetwork();
}

// TOOLTIP
// ═══════════════════════════════════════════════
function showTip(e, id) {
  const s = tier1.find(x => x.id === id);
  if (!s) return;
  const riskLabel = { low:'低风险', mid:'中风险', high:'高风险' }[s.risk];
  const capColor = s.cap >= 80 ? 'var(--green)' : s.cap >= 60 ? 'var(--orange)' : 'var(--red)';
  const tt = document.getElementById('tooltip');
  tt.innerHTML = `
    <div class="tt-name" style="color:${COLORS[s.cat]}">${s.name}</div>
    <div class="tt-cat">${CAT_NAMES[s.cat]} · ${s.city}，${s.country}</div>
    <div class="tt-row"><span class="tt-label">产能利用率</span><span class="tt-val" style="color:${capColor}">${s.cap}%</span></div>
    <div class="tt-bar"><div class="tt-bar-fill" style="width:${s.cap}%;background:${capColor}"></div></div>
    <div class="tt-row"><span class="tt-label">供货占比</span><span class="tt-val">${s.vol}</span></div>
    <div class="tt-row"><span class="tt-label">风险等级</span><span class="tt-val" style="color:${RISK_COLOR[s.risk]}">${riskLabel}</span></div>
    <div class="tt-row"><span class="tt-label">年营收</span><span class="tt-val">${s.revenue}</span></div>
    <div style="margin-top:8px;font-size:10px;color:var(--text-muted);text-align:center">点击查看详情 →</div>
  `;
  tt.classList.add('show');
  moveTip(e);
}
function moveTip(e) {
  const tt = document.getElementById('tooltip');
  let x = e.clientX + 16, y = e.clientY + 16;
  if (x + 240 > window.innerWidth) x = e.clientX - 250;
  if (y + 200 > window.innerHeight) y = e.clientY - 200;
  tt.style.left = x + 'px'; tt.style.top = y + 'px';
}
function hideTip() { document.getElementById('tooltip').classList.remove('show'); }
document.addEventListener('mousemove', e => { if (document.getElementById('tooltip').classList.contains('show')) moveTip(e); });

        <div class="sv-card-body">
          <div class="coop-grid">
            <div class="coop-stat"><div class="val" style="color:${color}">${s.coopScore}</div><div class="lbl">绩效评级</div></div>
            <div class="coop-stat"><div class="val" style="color:var(--blue)">${s.vol}</div><div class="lbl">供货占比</div></div>
            <div class="coop-stat"><div class="val" style="color:var(--green)">${s.coopSince}</div><div class="lbl">合作起始</div></div>
          </div>
          <div style="margin-top:14px;padding:12px;background:var(--bg-section);border-radius:8px;font-size:12px;">
            <strong>供货范围：</strong>${s.coopParts}
          </div>
        </div>
      </div>
    </div>
  `;

  switchView('supplier');
}

// ═══════════════════════════════════════════════
// VIEW SWITCH
// ═══════════════════════════════════════════════
function switchView(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  document.querySelectorAll('.view-tab')[view === 'oem' ? 0 : 1].classList.add('active');
}

// Init
buildNetwork();
</script>
</body>
</html>
