<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EP 供应链网络</title>
<style>
:root{
  --bg:#f0f2f5;--card:#fff;--bg2:#f7f8fa;--border:#e5e7eb;--text:#111827;--t2:#4b5563;--tm:#9ca3af;
  --blue:#2563eb;--bl:#eff6ff;--green:#059669;--gl:#ecfdf5;--orange:#d97706;--ol:#fffbeb;
  --red:#dc2626;--rl:#fef2f2;--purple:#7c3aed;--pl:#f5f3ff;--teal:#0891b2;--tl:#ecfeff;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC','Microsoft YaHei',sans-serif;
  --r:10px;--sh:0 1px 2px rgba(0,0,0,.06);--shl:0 8px 24px rgba(0,0,0,.12);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--bg);color:var(--text);overflow:hidden;height:100vh;}

.topbar{height:48px;background:#1e293b;display:flex;align-items:center;padding:0 20px;gap:16px;z-index:100;position:relative;}
.topbar .logo{display:flex;align-items:center;gap:8px;color:#fff;font-weight:700;font-size:14px;}
.topbar .logo span{background:var(--blue);color:#fff;width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;}
.topbar nav{display:flex;gap:2px;margin-left:24px;}
.topbar nav a{padding:6px 16px;border-radius:6px;font-size:13px;font-weight:500;color:rgba(255,255,255,.6);cursor:pointer;transition:all .15s;text-decoration:none;}
.topbar nav a:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.08);}
.topbar nav a.active{color:#fff;background:rgba(255,255,255,.12);font-weight:600;}
.topbar .spacer{flex:1;}
.topbar .user{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.7);font-size:12px;}
.topbar .avatar{width:28px;height:28px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;}

.layout{display:flex;height:calc(100vh - 48px);}
.sidebar{width:200px;background:#1e293b;border-right:1px solid rgba(255,255,255,.06);padding:12px 0;flex-shrink:0;overflow-y:auto;}
.sb-group{margin-bottom:8px;}
.sb-label{font-size:10px;font-weight:600;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.8px;padding:8px 16px 4px;}
.sb-item{display:flex;align-items:center;gap:8px;padding:7px 16px;font-size:12px;color:rgba(255,255,255,.6);cursor:pointer;transition:all .12s;border-left:3px solid transparent;}
.sb-item:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.05);}
.sb-item.active{color:#fff;background:rgba(255,255,255,.08);border-left-color:var(--blue);}
.sb-item .icon{width:18px;text-align:center;font-size:13px;}

.content{flex:1;overflow:hidden;padding:16px 20px 16px;}
.page{display:none;animation:fadeIn .3s ease;}
.page.active{display:block;height:100%;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

.pg-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.pg-head h2{font-size:17px;font-weight:700;}
.pg-head .meta{font-size:11px;color:var(--tm);display:flex;gap:14px;}
.pg-head .meta span{display:flex;align-items:center;gap:4px;}

.canvas-card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--border);overflow:hidden;height:calc(100% - 60px);}
.card-bar{height:34px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;}
.card-bar .cb-title{font-size:12px;font-weight:600;}
.card-bar .cb-tag{font-size:9px;padding:2px 6px;border-radius:4px;background:var(--bl);color:var(--blue);font-weight:600;}
.card-bar .cb-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.card-bar .filter-pill{font-size:10px;padding:3px 10px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--t2);cursor:pointer;font-weight:500;}
.filter-pill:hover{border-color:var(--blue);color:var(--blue);}
.filter-pill.active{background:var(--bl);color:var(--blue);border-color:var(--blue);}
.canvas-body{position:relative;width:100%;height:calc(100% - 34px);}
.canvas-body svg{width:100%;height:100%;}

/* Sidebar capacity list */
.cap-list{padding:8px 16px;}
.cap-row{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:11px;color:rgba(255,255,255,.5);}
.cap-row:last-child{border-bottom:none;}
.cap-row .cd{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.cap-row .cn{flex:1;font-weight:500;}
.cap-row .cv{font-weight:700;min-width:30px;text-align:right;}
.cap-bar-sb{width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,.08);overflow:hidden;flex-shrink:0;}
.cap-bar-fill-sb{height:100%;border-radius:2px;}

.tip{position:fixed;background:var(--card);border-radius:8px;padding:12px 14px;box-shadow:var(--shl);border:1px solid var(--border);pointer-events:none;z-index:1000;min-width:200px;opacity:0;transition:opacity .12s;font-size:11px;}
.tip.show{opacity:1;}
.tip .tn{font-weight:700;font-size:13px;margin-bottom:3px;}
.tip .tc{font-size:10px;color:var(--tm);margin-bottom:6px;}
.tip .tr{display:flex;justify-content:space-between;padding:2px 0;}
.tip .tl{color:var(--t2);}.tip .tv{font-weight:600;}
.tip .tb{height:3px;border-radius:2px;background:var(--bg2);margin-top:6px;}
.tip .tbf{height:100%;border-radius:2px;}

/* Supplier Detail */
.sp-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;height:calc(100% - 70px);overflow-y:auto;}
.sp-card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--border);overflow:hidden;}
.sp-head{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.sp-head .ico{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;flex-shrink:0;}
.sp-head h3{font-size:12px;font-weight:700;}
.sp-body{padding:12px 14px;}
.sp-full{grid-column:1/-1;}
.scn{position:relative;width:100%;height:260px;background:linear-gradient(135deg,#eef2ff 0%,#f0f9ff 100%);border-radius:8px;overflow:hidden;}
.scn .grid{position:absolute;inset:0;background-image:linear-gradient(rgba(37,99,235,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(37,99,235,.04) 1px,transparent 1px);background-size:20px 20px;}
.scn-p{position:absolute;cursor:pointer;z-index:2;transition:transform .15s;}
.scn-p:hover{transform:scale(1.15);z-index:3;}
.scn-d{width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 6px rgba(0,0,0,.18);}
.scn-d.wh{border-radius:3px;width:12px;height:12px;}
.scn-pulse{position:absolute;top:-5px;left:-5px;width:24px;height:24px;border-radius:50%;border:2px solid;opacity:0;animation:pulse 2.5s infinite;}
@keyframes pulse{0%{transform:scale(.8);opacity:.5;}100%{transform:scale(1.8);opacity:0;}}
.scn-lb{position:absolute;top:17px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:8px;font-weight:700;background:var(--card);padding:1px 5px;border-radius:3px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.scn-lb small{font-weight:400;color:var(--tm);display:block;font-size:7px;}
.ci{margin-bottom:10px;}.ci:last-child{margin-bottom:0;}
.ci-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.ci-name{font-size:11px;font-weight:600;}.ci-pct{font-size:11px;font-weight:700;}
.ci-bar{height:6px;border-radius:3px;background:var(--bg2);overflow:hidden;}
.ci-fill{height:100%;border-radius:3px;}
.ci-det{font-size:9px;color:var(--tm);margin-top:2px;}
.cr{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.cr:last-child{margin-bottom:0;}
.cr-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.cr-name{font-size:11px;font-weight:600;min-width:64px;}
.cr-bw{flex:1;height:4px;border-radius:2px;background:var(--bg2);overflow:hidden;}
.cr-bf{height:100%;border-radius:2px;}
.cr-p{font-size:10px;font-weight:700;min-width:28px;text-align:right;}
.rg{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;}
.ri{text-align:center;padding:8px 4px;border-radius:8px;background:var(--bg2);}
.rr{width:44px;height:44px;margin:0 auto 4px;position:relative;}
.rr svg{width:100%;height:100%;transform:rotate(-90deg);}
.rr circle{fill:none;stroke-width:4;}
.rr .rbg{stroke:var(--border);}.rr .rfg{stroke-linecap:round;}
.rv{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;}
.rl{font-size:9px;font-weight:600;color:var(--t2);}
.pg{display:flex;flex-wrap:wrap;gap:4px;}
.pc{font-size:9px;font-weight:600;padding:3px 8px;border-radius:4px;background:var(--bl);color:var(--blue);border:1px solid rgba(37,99,235,.1);}
.cg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.cs{text-align:center;padding:10px 6px;border-radius:8px;background:var(--bg2);}
.cs .csv{font-size:16px;font-weight:800;}
.cs .csl{font-size:9px;color:var(--tm);margin-top:1px;}
</style>
</head>

// ─── NAV ───
function navTo(p){document.querySelectorAll('.topbar nav a').forEach(a=>a.classList.remove('active'));event.target.classList.add('active');showPage(p);}
function showPage(p){document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));document.getElementById('page-'+p).classList.add('active');document.getElementById('sbNet').classList.toggle('active',p==='network');document.getElementById('sbSup').classList.toggle('active',p==='supplier');}
function filterCat(c){curCat=c;document.querySelectorAll('.sb-item[data-cat]').forEach(b=>b.classList.toggle('active',b.dataset.cat===c));buildMap();}
function filterView(v){curView=v;document.querySelectorAll('.filter-pill').forEach(b=>b.classList.toggle('active',b.dataset.f===v));buildMap();}

// ─── MAP ───
function buildMap(){
  const svg=document.getElementById('mapSvg');
  let h=`<defs>
    <radialGradient id="og"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1e40af"/></radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arr" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto"><path d="M0,0.5 L5,2.5 L0,4.5" fill="none" stroke-width=".8"/></marker>
  </defs>`;

  // China outline (simplified)
  h+=`<path d="M380,60 Q420,50 460,55 L500,50 Q540,45 580,50 L620,48 Q660,45 690,55 L720,65 Q740,80 750,100 L755,130 Q750,160 740,180 L735,200 Q740,220 745,240 L740,260 Q730,280 715,295 L700,310 Q690,325 680,340 L670,360 Q665,375 660,390 L650,405 Q640,415 625,420 L605,425 Q590,430 575,425 L560,418 Q545,410 535,400 L520,390 Q505,385 490,380 L470,375 Q450,370 435,360 L420,345 Q405,335 395,320 L385,305 Q375,290 370,275 L365,255 Q360,240 355,225 L350,210 Q340,200 335,185 L330,165 Q325,145 330,130 L340,110 Q350,95 360,80 Z" fill="rgba(37,99,235,.03)" stroke="rgba(37,99,235,.12)" stroke-width="1"/>`;

  // City markers (faint background dots)
  Object.entries(CITY).forEach(([k,p])=>{
    if(k==='beijing'||k==='shanghai'||k==='shenzhen'||k==='chengdu'||k==='wuhan'||k==='changchun'){
      h+=`<circle cx="${p.x}" cy="${p.y}" r="3" fill="rgba(37,99,235,.15)"/>`;
      h+=`<text x="${p.x+6}" y="${p.y+3}" font-size="7" fill="rgba(37,99,235,.25)" font-weight="500">${{beijing:'北京',shanghai:'上海',shenzhen:'深圳',chengdu:'成都',wuhan:'武汉',changchun:'长春'}[k]||k}</text>`;
    }
  });

  // OEM factory (Xiaomi Yizhuang) - pulsing target
  h+=`<circle cx="${OEM.x}" cy="${OEM.y}" r="28" fill="#2563eb" opacity=".04"><animate attributeName="r" values="28;38;28" dur="3s" repeatCount="indefinite"/><animate attributeName="opacity" values=".04;.01;.04" dur="3s" repeatCount="indefinite"/></circle>`;
  h+=`<circle cx="${OEM.x}" cy="${OEM.y}" r="8" fill="url(#og)" filter="url(#glow)"/>`;
  h+=`<text x="${OEM.x}" y="${OEM.y-14}" text-anchor="middle" font-size="9" font-weight="700" fill="#2563eb">🏭 小米亦庄工厂</text>`;

  // Supplier nodes
  tier1.forEach(s=>{
    const vis=curCat==='all'||s.cat===curCat;
    const cityPos=CITY[s.city];
    if(!cityPos)return;

    // Distance filter
    const d=dist(cityPos);
    if(curView==='near'&&d>500)return;
    if(curView==='far'&&d<=500)return;
    if(curView==='risk'&&s.risk==='low')return;

    const op=vis?1:.15;
    const clr=C[s.cat];
    const cc=s.cap>=80?'var(--green)':s.cap>=60?'var(--orange)':'var(--red)';
    const isNear=d<=500;

    // Distance line (dashed)
    h+=`<line x1="${OEM.x}" y1="${OEM.y}" x2="${cityPos.x}" y2="${cityPos.y}" stroke="${clr}" stroke-width="${isNear?1.2:.7}" stroke-dasharray="${isNear?'4 3':'6 4'}" opacity="${op*.2}"/>`;

    // Distance label
    const mx=(OEM.x+cityPos.x)/2,my=(OEM.y+cityPos.y)/2;
    if(vis&&d>100){
      h+=`<text x="${mx}" y="${my-4}" text-anchor="middle" font-size="7" fill="${clr}" opacity="${op*.5}" font-weight="600">${d}km</text>`;
    }

    // Node
    const r=isNear?12:9;
    h+=`<g class="net-node" opacity="${op}" style="cursor:pointer" onmouseenter="showTip(event,'${s.id}')" onmouseleave="hideTip()" onclick="openSupplier('${s.id}')">`;

    // Capacity ring (outer ring shows capacity)
    const capArc=s.cap/100*2*Math.PI*r;
    h+=`<circle cx="${cityPos.x}" cy="${cityPos.y}" r="${r+3}" fill="none" stroke="${cc}" stroke-width="2" opacity="${op*.3}" stroke-dasharray="${capArc} ${2*Math.PI*(r+3)-capArc}" stroke-dashoffset="${2*Math.PI*(r+3)/4}" transform="rotate(-90 ${cityPos.x} ${cityPos.y})"/>`;

    h+=`<circle cx="${cityPos.x}" cy="${cityPos.y}" r="${r}" fill="${clr}" opacity=".15" stroke="${clr}" stroke-width="1.5"/>`;
    h+=`<circle cx="${cityPos.x}" cy="${cityPos.y}" r="${r-4}" fill="${clr}" opacity=".85"/>`;

    // Risk dot
    h+=`<circle cx="${cityPos.x+r}" cy="${cityPos.y-r}" r="3" fill="${RC[s.risk]}" stroke="#fff" stroke-width="1.5"/>`;

    // Name + capacity
    const nm=s.name.length>5?s.name.slice(0,5)+'…':s.name;
    const labelY=cityPos.y+r+14;
    h+=`<text x="${cityPos.x}" y="${labelY}" text-anchor="middle" font-size="9" font-weight="700" fill="var(--text)">${nm}</text>`;
    h+=`<text x="${cityPos.x}" y="${labelY+11}" text-anchor="middle" font-size="7" fill="var(--tm)">${s.cap}% · ${d}km</text>`;
    h+=`</g>`;
  });

  // Legend
  h+=`<g transform="translate(20,${520-55})">`;
  h+=`<rect x="-8" y="-12" width="200" height="55" rx="6" fill="var(--card)" opacity=".9" stroke="var(--border)" stroke-width=".5"/>`;
  Object.entries(CN).forEach(([k,v],i)=>{h+=`<circle cx="4" cy="${i*10}" r="3.5" fill="${C[k]}" opacity=".8"/><text x="12" y="${i*10+3}" font-size="8" font-weight="600" fill="var(--t2)">${v}</text>`;});
  h+=`<g transform="translate(70,0)"><circle cx="4" cy="0" r="3" fill="var(--green)"/><text x="10" y="3" font-size="7" fill="var(--tm)">&lt;500km</text></g>`;
  h+=`<g transform="translate(70,10)"><circle cx="4" cy="0" r="2" fill="var(--tm)"/><text x="10" y="3" font-size="7" fill="var(--tm)">&gt;500km</text></g>`;
  h+=`<g transform="translate(70,20)"><text font-size="7" fill="var(--tm)">○ 产能环</text></g>`;
  h+=`<g transform="translate(130,0)"><circle cx="4" cy="0" r="3" fill="var(--green)"/><text x="10" y="3" font-size="7" fill="var(--tm)">低风险</text></g>`;
  h+=`<g transform="translate(130,10)"><circle cx="4" cy="0" r="3" fill="var(--orange)"/><text x="10" y="3" font-size="7" fill="var(--tm)">中风险</text></g>`;
  h+=`<g transform="translate(130,20)"><circle cx="4" cy="0" r="3" fill="var(--red)"/><text x="10" y="3" font-size="7" fill="var(--tm)">高风险</text></g>`;
  h+=`</g>`;

  svg.innerHTML=h;
  buildCapSidebar();
}

function buildCapSidebar(){
  const list=tier1.filter(s=>curCat==='all'||s.cat===curCat).sort((a,b)=>b.cap-a.cap);
  const el=document.getElementById('capSidebar');
  el.innerHTML=list.map(s=>{
    const cc=s.cap>=80?'#4ade80':s.cap>=60?'#fbbf24':'#f87171';
    const d=dist(CITY[s.city]);
    return `<div class="cap-row" style="cursor:pointer" onclick="openSupplier('${s.id}')">
      <span class="cd" style="background:${C[s.cat]}"></span>
      <span class="cn">${s.name.length>4?s.name.slice(0,4)+'…':s.name}</span>
      <div class="cap-bar-sb"><div class="cap-bar-fill-sb" style="width:${s.cap}%;background:${cc}"></div></div>
      <span class="cv" style="color:${cc}">${s.cap}%</span>
    </div>`;
  }).join('');
}

// ─── TOOLTIP ───
function showTip(e,id){
  const s=tier1.find(x=>x.id===id);if(!s)return;
  const rl={low:'低风险',mid:'中风险',high:'高风险'}[s.risk];
  const cc=s.cap>=80?'var(--green)':s.cap>=60?'var(--orange)':'var(--red)';
  const d=dist(CITY[s.city]);
  const t=document.getElementById('tip');
  t.innerHTML=`<div class="tn" style="color:${C[s.cat]}">${s.name}</div>
    <div class="tc">${CN[s.cat]} · ${s.ctry} · 距亦庄 ${d}km</div>
    <div class="tr"><span class="tl">产能利用率</span><span class="tv" style="color:${cc}">${s.cap}%</span></div>
    <div class="tb"><div class="tbf" style="width:${s.cap}%;background:${cc}"></div></div>
    <div class="tr"><span class="tl">供货占比</span><span class="tv">${s.vol}</span></div>
    <div class="tr"><span class="tl">风险等级</span><span class="tv" style="color:${RC[s.risk]}">${rl}</span></div>
    <div class="tr"><span class="tl">年营收</span><span class="tv">${s.rev}</span></div>
    <div class="tr"><span class="tl">工厂数</span><span class="tv">${s.fac.length} 座</span></div>
    <div style="margin-top:6px;font-size:9px;color:var(--tm);text-align:center">点击查看详情 →</div>`;
  t.classList.add('show');moveTip(e);
}
function moveTip(e){const t=document.getElementById('tip');let x=e.clientX+14,y=e.clientY+14;if(x+220>innerWidth)x=e.clientX-230;if(y+200>innerHeight)y=e.clientY-210;t.style.left=x+'px';t.style.top=y+'px';}
function hideTip(){document.getElementById('tip').classList.remove('show');}
document.addEventListener('mousemove',e=>{if(document.getElementById('tip').classList.contains('show'))moveTip(e);});

// ─── SUPPLIER DETAIL ───
function openSupplier(id){
  const s=tier1.find(x=>x.id===id);if(!s)return;hideTip();
  showPage('supplier');
  const color=C[s.cat];
  const rl={low:'低风险 ✅',mid:'中风险 ⚠️',high:'高风险 🔴'}[s.risk];
  const d=dist(CITY[s.city]);
  document.getElementById('spTitle').innerHTML=`<span style="color:${color}">${s.name}</span>`;
  document.getElementById('spMeta').innerHTML=`<span>📍 距亦庄 ${d}km</span><span>🏭 ${s.fac.length} 工厂</span><span>📦 ${s.wh.length} 仓库</span><span>💰 ${s.rev}</span>`;

  const allN=[...s.fac,...s.wh];
  const nodeHtml=allN.map(n=>{
    const isW=!!n.inv;const cp=CITY[n.loc]||CITY[s.city];
    return `<div class="scn-p" style="left:${cp.x/9}%;top:${cp.y/5.2}%"><div class="scn-pulse" style="border-color:${color}"></div><div class="scn-d ${isW?'wh':''}" style="background:${color}${isW?';opacity:.6':''}"></div><div class="scn-lb">${isW?'📦':'🏭'} ${n.n}<small>${isW?n.inv:n.o}</small></div></div>`;
  }).join('');

  let lines='';
  s.wh.forEach(w=>{
    const wp=CITY[w.loc]||CITY[s.city];
    const cf=s.fac.reduce((b,f)=>{const fp=CITY[f.loc]||CITY[s.city];const dd=Math.hypot(fp.x-wp.x,fp.y-wp.y);return dd<b.d?{d:dd,f}:b},{d:Infinity,f:null});
    if(cf.f){const fp=CITY[cf.f.loc]||CITY[s.city];
      lines+=`<line x1="${fp.x/9}%" y1="${fp.y/5.2}%" x2="${wp.x/9}%" y2="${wp.y/5.2}%" stroke="${color}" stroke-width="1" stroke-dasharray="4 3" opacity=".3"/>`;
    }
  });
  s.fac.forEach(f=>{const fp=CITY[f.loc]||CITY[s.city];
    lines+=`<line x1="50%" y1="50%" x2="${fp.x/9}%" y2="${fp.y/5.2}%" stroke="${color}" stroke-width="1" opacity=".15" stroke-dasharray="6 4"/>`;
  });

  const capHtml=allN.map(n=>{
    const c=n.c||70;const cc=c>=80?'var(--green)':c>=60?'var(--orange)':'var(--red)';
    return `<div class="ci"><div class="ci-top"><span class="ci-name">${n.inv?'📦':'🏭'} ${n.n}</span><span class="ci-pct" style="color:${cc}">${c}%</span></div><div class="ci-bar"><div class="ci-fill" style="width:${c}%;background:${cc}"></div></div><div class="ci-det">${n.inv||n.o}</div></div>`;
  }).join('');

  const cc2=['#2563eb','#7c3aed','#059669','#d97706','#9ca3af'];
  const custHtml=s.cust.map((c,i)=>`<div class="cr"><span class="cr-dot" style="background:${cc2[i]}"></span><span class="cr-name">${c.n}</span><div class="cr-bw"><div class="cr-bf" style="width:${c.p}%;background:${cc2[i]}"></div></div><span class="cr-p">${c.p}%</span></div>`).join('');

  const riskHtml=[{l:'财务',v:s.sc.f},{l:'质量',v:s.sc.q},{l:'供应',v:s.sc.s},{l:'合规',v:s.sc.c}].map(r=>{
    const c=r.v>=85?'var(--green)':r.v>=70?'var(--orange)':'var(--red)';
    const circ=2*Math.PI*18;const off=circ*(1-r.v/100);
    return `<div class="ri"><div class="rr"><svg viewBox="0 0 44 44"><circle class="rbg" cx="22" cy="22" r="18"/><circle class="rfg" cx="22" cy="22" r="18" stroke="${c}" stroke-dasharray="${circ}" stroke-dashoffset="${off}"/></svg><div class="rv" style="color:${c}">${r.v}</div></div><div class="rl">${r.l}</div></div>`;
  }).join('');

  document.getElementById('spContent').innerHTML=`
    <div class="sp-grid">
      <div class="sp-card sp-full">
        <div class="sp-head"><div class="ico" style="background:${color}">🌐</div><h3>供应链网络</h3><span style="font-size:10px;color:var(--tm);margin-left:auto">🏭 工厂 · 📦 仓库 · --- 物流</span></div>
        <div class="sp-body"><div class="scn"><div class="grid"></div><svg style="position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none">${lines}</svg>${nodeHtml}</div></div>
      </div>
      <div class="sp-card"><div class="sp-head"><div class="ico" style="background:var(--orange)">📊</div><h3>产能利用率</h3></div><div class="sp-body">${capHtml}</div></div>
      <div class="sp-card"><div class="sp-head"><div class="ico" style="background:var(--purple)">🏢</div><h3>客户组合</h3></div><div class="sp-body">${custHtml}</div></div>
      <div class="sp-card"><div class="sp-head"><div class="ico" style="background:var(--red)">🛡️</div><h3>风险评估</h3></div><div class="sp-body"><div class="rg">${riskHtml}</div></div></div>
      <div class="sp-card"><div class="sp-head"><div class="ico" style="background:var(--teal)">📦</div><h3>产品组合</h3></div><div class="sp-body"><div class="pg">${s.prod.map(p=>`<span class="pc">${p}</span>`).join('')}</div></div></div>
      <div class="sp-card sp-full"><div class="sp-head"><div class="ico" style="background:var(--green)">🤝</div><h3>与小米的合作</h3></div><div class="sp-body"><div class="cg">
        <div class="cs"><div class="csv" style="color:${color}">${s.cr}</div><div class="csl">绩效评级</div></div>
        <div class="cs"><div class="csv" style="color:var(--blue)">${s.vol}</div><div class="csl">供货占比</div></div>
        <div class="cs"><div class="csv" style="color:var(--green)">${s.cs}</div><div class="csl">合作起始</div></div>
        <div class="cs"><div class="csv" style="color:var(--t2)">${d}km</div><div class="csl">距亦庄</div></div>
      </div><div style="margin-top:10px;padding:8px 12px;background:var(--bg2);border-radius:6px;font-size:11px;"><strong>供货范围：</strong>${s.cp}</div></div></div>
    </div>`;
}

buildMap();
</script>
