<style>
:root{
  --p:#1677ff;--ph:#4096ff;--pl:#e6f4ff;--pa:rgba(22,119,255,.06);
  --s:#52c41a;--sl:#f6ffed;
  --w:#faad14;--wl:#fffbe6;
  --d:#ff4d4f;--dl:#fff2f0;
  --purple:#722ed1;--purple-l:#f9f0ff;
  --cyan:#13c2c2;--cyan-l:#e6fffb;
  --orange:#fa8c16;--orange-l:#fff7e6;
  --g50:#fafafa;--g100:#f5f5f5;--g200:#e8e8e8;--g300:#d9d9d9;
  --g400:#bfbfbf;--g500:#8c8c8c;--g600:#595959;--g700:#434343;
  --g800:#262626;--g900:#1f1f1f;
  --r:10px;--rs:6px;--rl:14px;
  --sh:0 1px 3px rgba(0,0,0,.04);
  --shm:0 4px 12px rgba(0,0,0,.07);
  --shl:0 8px 24px rgba(0,0,0,.09);
  --tr:all .3s cubic-bezier(.4,0,.2,1);
  --nav-bg:#001529;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;color:var(--g800);font-size:13px;min-height:100vh;overflow:hidden}

/* Top Nav */
.topnav{background:var(--nav-bg);height:52px;display:flex;align-items:center;padding:0 20px;position:fixed;top:0;left:0;right:0;z-index:1000}
.topnav-logo{display:flex;align-items:center;gap:10px;margin-right:28px;flex-shrink:0}
.topnav-logo .mi{width:30px;height:30px;background:linear-gradient(135deg,#ff6700,#ff4d00);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700}
.topnav-logo span{color:#fff;font-size:15px;font-weight:600;letter-spacing:.5px}
.topnav-menu{display:flex;align-items:center;gap:0;flex:1}
.topnav-item{padding:0 16px;height:52px;display:flex;align-items:center;color:rgba(255,255,255,.65);font-size:13px;cursor:pointer;white-space:nowrap;transition:all .2s;position:relative}
.topnav-item:hover{color:#fff;background:rgba(255,255,255,.08)}
.topnav-item.active{color:#fff;background:rgba(255,255,255,.12)}
.topnav-item.active::after{content:'';position:absolute;bottom:0;left:8px;right:8px;height:2px;background:var(--p);border-radius:2px 2px 0 0}
.topnav-right{display:flex;align-items:center;gap:14px;margin-left:auto;flex-shrink:0}
.topnav-right .icon{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.65);cursor:pointer;transition:all .2s;font-size:15px;position:relative}
.topnav-right .icon:hover{background:rgba(255,255,255,.1);color:#fff}
.topnav-right .icon .dot{position:absolute;top:6px;right:6px;width:8px;height:8px;background:var(--d);border-radius:50%;border:1.5px solid var(--nav-bg)}
.topnav-user{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.85);font-size:12px;cursor:pointer}
.topnav-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--p),#4096ff);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:600}

/* Main */
.main-content{height:calc(100vh - 52px);margin-top:52px;overflow-y:auto;padding:0}
.main-inner{padding:24px}

/* Page Title */
.page-title{margin-bottom:20px}
.page-title h2{font-size:18px;font-weight:700;color:var(--g900)}
.page-title p{font-size:12px;color:var(--g500);margin-top:4px}

/* ========== PIPELINE ========== */
.pipeline{display:flex;align-items:stretch;gap:0;margin-bottom:24px;background:#fff;border-radius:var(--r);border:1px solid var(--g200);overflow:hidden;position:relative}
.pipe-stage{flex:1;padding:24px 20px;cursor:pointer;transition:var(--tr);position:relative;border-right:1px solid var(--g100);text-align:center}
.pipe-stage:last-child{border-right:none}
.pipe-stage:hover{background:#f0f7ff}
.pipe-stage.active{background:linear-gradient(180deg,#f0f7ff 0%,#fff 30%)}
.pipe-stage.active::before{content:'';position:absolute;top:0;left:8px;right:8px;height:3px;background:var(--p);border-radius:0 0 3px 3px}
.pipe-icon{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 12px;transition:var(--tr)}
.pipe-stage.active .pipe-icon{transform:scale(1.1)}
.pipe-icon.sor{background:linear-gradient(135deg,#e6f4ff,#d6e8ff);color:var(--p)}
.pipe-icon.bdl{background:linear-gradient(135deg,#f6ffed,#d9f7be);color:var(--s)}
.pipe-icon.rfq{background:linear-gradient(135deg,#fffbe6,#ffe58f);color:#d46b08}
.pipe-icon.nom{background:linear-gradient(135deg,#f9f0ff,#efdbff);color:var(--purple)}
.pipe-name{font-size:14px;font-weight:700;color:var(--g800);margin-bottom:6px}
.pipe-desc{font-size:10px;color:var(--g500);margin-bottom:10px}
.pipe-count{font-size:26px;font-weight:800;color:var(--g900)}
.pipe-sub{font-size:10px;color:var(--g500);margin-top:2px}
.pipe-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:3px 8px;border-radius:10px;margin-top:8px;font-weight:600}
.pipe-badge.red{background:var(--dl);color:var(--d)}
.pipe-badge.orange{background:var(--wl);color:#d46b08}
.pipe-badge.green{background:var(--sl);color:var(--s)}

/* Connector arrows between stages */
.pipe-arrow{display:flex;align-items:center;justify-content:center;width:40px;flex-shrink:0;color:var(--g300);font-size:20px;background:#fff;position:relative;z-index:1}

/* ========== Stage Detail Panel ========== */
.stage-detail{background:#fff;border-radius:var(--r);border:1px solid var(--g200);overflow:hidden;margin-bottom:20px}
.sd-hdr{padding:16px 20px;border-bottom:1px solid var(--g100);display:flex;align-items:center;justify-content:space-between;background:var(--g50)}
.sd-title{font-size:14px;font-weight:700;color:var(--g900);display:flex;align-items:center;gap:8px}
.sd-title .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sd-title .dot.blue{background:var(--p)}.sd-title .dot.green{background:var(--s)}.sd-title .dot.orange{background:var(--w)}.sd-title .dot.purple{background:var(--purple)}
.sd-actions{display:flex;gap:8px}
.sd-body{padding:16px 20px}

/* Task Table */
.task-table{width:100%;border-collapse:collapse;font-size:12px}
.task-table th{background:var(--g50);color:var(--g600);font-size:11px;font-weight:600;padding:10px 14px;text-align:left;border-bottom:2px solid var(--g200)}
.task-table td{padding:10px 14px;border-bottom:1px solid var(--g100);vertical-align:middle}
.task-table tbody tr{transition:var(--tr);cursor:pointer}
.task-table tbody tr:hover td{background:#f0f7ff}
.task-table .cell-status{font-weight:600}
.task-table .cell-id{color:var(--p);font-weight:500;font-family:monospace;font-size:11px}
.task-table .cell-name{font-weight:500}
.task-table .cell-owner{display:flex;align-items:center;gap:6px}
.owner-avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;flex-shrink:0}

/* Tags */
.tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;font-weight:500;white-space:nowrap}
.tag-blue{background:var(--pl);color:var(--p)}
.tag-green{background:var(--sl);color:var(--s)}
.tag-orange{background:var(--wl);color:#d46b08}
.tag-red{background:var(--dl);color:var(--d)}
.tag-purple{background:var(--purple-l);color:var(--purple)}

/* Progress mini */
.prog-mini{display:flex;align-items:center;gap:6px}
.prog-mini-track{width:60px;height:5px;background:var(--g100);border-radius:3px;overflow:hidden}
.prog-mini-fill{height:100%;border-radius:3px}
.prog-mini-pct{font-size:10px;color:var(--g500)}

/* Buttons */
.btn{border:none;padding:7px 16px;border-radius:var(--rs);font-size:12px;font-weight:500;cursor:pointer;transition:var(--tr);display:inline-flex;align-items:center;gap:5px;white-space:nowrap;font-family:inherit}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--p);color:#fff;box-shadow:0 2px 6px rgba(22,119,255,.25)}
.btn-p:hover{box-shadow:0 4px 12px rgba(22,119,255,.35);transform:translateY(-1px)}
.btn-o{background:#fff;color:var(--g700);border:1px solid var(--g300)}.btn-o:hover{color:var(--p);border-color:var(--p)}
.btn-s{padding:4px 10px;font-size:11px}

/* Animation */
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.stage-detail{animation:fadeSlideIn .4s ease}

/* Modal overlay */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.35);z-index:2000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal-box{background:#fff;border-radius:var(--rl);width:680px;max-width:95vw;max-height:85vh;overflow-y:auto;box-shadow:var(--shl);padding:28px 32px;transform:translateY(10px);transition:transform .3s}
.modal-overlay.show .modal-box{transform:translateY(0)}

.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--g200)}
.modal-hdr h3{font-size:16px;font-weight:700;color:var(--g900)}
.modal-close{width:28px;height:28px;border-radius:50%;border:1px solid var(--g200);background:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.modal-close:hover{background:var(--dl);color:var(--d);border-color:var(--d)}

.task-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 24px}
.td-item{display:flex;flex-direction:column;gap:3px}
.td-label{font-size:11px;color:var(--g500)}
.td-val{font-size:13px;font-weight:500;color:var(--g800)}

.timeline-steps{display:flex;align-items:flex-start;margin-top:20px;padding:16px;background:var(--g50);border-radius:var(--r)}
.ts-step{flex:1;text-align:center;position:relative}
.ts-step::after{content:'';position:absolute;top:14px;left:55%;right:-45%;height:2px;background:var(--g200)}
.ts-step:last-child::after{display:none}
.ts-step.done::after{background:var(--s)}
.ts-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 6px;font-size:12px}
.ts-dot.done{background:var(--s);color:#fff}
.ts-dot.active{background:var(--p);color:#fff}
.ts-dot.pending{background:var(--g200);color:var(--g400)}
.ts-label{font-size:10px;color:var(--g600);font-weight:500}
.ts-step.done .ts-label{color:var(--s)}
.ts-step.active .ts-label{color:var(--p);font-weight:700}

/* Scene navigation */
.scene-nav{position:fixed;bottom:20px;right:20px;display:flex;gap:8px;z-index:900}
.sn-dot{width:36px;height:36px;border-radius:50%;border:2px solid var(--g300);background:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--g600);cursor:pointer;transition:var(--tr);text-decoration:none}
.sn-dot:hover{border-color:var(--p);color:var(--p);box-shadow:var(--shm)}
.sn-dot.active{border-color:var(--p);background:var(--p);color:#fff}
</style>
</head>

            {id:'NOM-2024-0085',name:'智能驾驶·博世·定点申请',owner:'周经理(采购)',status:'审批中',statusTag:'tag-blue',progress:65,progressColor:'var(--p)',date:'2024-06-17',cars:'MS11',amount:'¥4.5亿'},
            {id:'NOM-2024-0082',name:'电驱系统·汇川技术·定点完成',owner:'吴经理(采购)',status:'已定点',statusTag:'tag-green',progress:100,progressColor:'var(--s)',date:'2024-06-10',cars:'SU7',amount:'¥1.8亿'},
            {id:'NOM-2024-0080',name:'白车身·华域汽车·定点完成',owner:'齐岳(采购)',status:'已定点',statusTag:'tag-green',progress:100,progressColor:'var(--s)',date:'2024-06-03',cars:'SU7',amount:'¥2.5亿'}
        ]
    }
};

let currentStage = 'sor';

function selectStage(stage) {
    currentStage = stage;
    // Update active state
    document.querySelectorAll('.pipe-stage').forEach(el => el.classList.remove('active'));
    document.querySelector('.pipe-stage[data-stage="'+stage+'"]').classList.add('active');
    renderStageDetail(stage);
}

function renderStageDetail(stage) {
    const sd = stageData[stage];
    let totalAmount = 0;
    sd.tasks.forEach(t => { if(t.amount) totalAmount += parseFloat(t.amount.replace('¥','').replace('亿',''))*100; });

    let html = '<div class="sd-hdr">';
    html += '<div class="sd-title"><span class="dot '+sd.dot+'"></span>'+sd.title+'<span style="font-size:11px;color:var(--g500);font-weight:400">'+sd.desc+'</span></div>';
    html += '<div class="sd-actions"><button class="btn btn-o btn-s">📥 导出</button><button class="btn btn-p btn-s" onclick="showNextStageHint()">▶ 下一阶段</button></div>';
    html += '</div><div class="sd-body"><table class="task-table"><thead><tr>';
    html += '<th>任务编号</th><th>任务名称</th><th>负责人</th><th>状态</th><th>进度</th><th>日期</th><th>车型</th>';
    if(stage==='rfq'||stage==='nom') html += '<th>金额</th>';
    html += '<th>操作</th></tr></thead><tbody>';

    sd.tasks.forEach((t,i) => {
        const initials = t.owner.split('(')[0].slice(0,1);
        const avatarColors = ['#1677ff','#52c41a','#722ed1','#fa8c16','#13c2c2'];
        html += '<tr onclick="openTaskDetail(\''+stage+'\','+i+')">';
        html += '<td class="cell-id">'+t.id+'</td>';
        html += '<td class="cell-name">'+t.name+'</td>';
        html += '<td><div class="cell-owner"><div class="owner-avatar" style="background:'+avatarColors[i%5]+'">'+initials+'</div>'+t.owner+'</div></td>';
        html += '<td class="cell-status"><span class="tag '+t.statusTag+'">'+t.status+'</span></td>';
        html += '<td><div class="prog-mini"><div class="prog-mini-track"><div class="prog-mini-fill" style="width:'+t.progress+'%;background:'+t.progressColor+'"></div></div><span class="prog-mini-pct">'+t.progress+'%</span></div></td>';
        html += '<td style="color:var(--g600)">'+t.date+'</td>';
        html += '<td>'+t.cars+'</td>';
        if(stage==='rfq'||stage==='nom') html += '<td style="font-weight:600;color:var(--g800)">'+t.amount+'</td>';
        html += '<td><button class="btn btn-o btn-s" onclick="event.stopPropagation();openTaskDetail(\''+stage+'\','+i+')">详情</button></td>';
        html += '</tr>';
    });
    html += '</tbody></table></div>';

    document.getElementById('stageDetail').innerHTML = html;
}

function openTaskDetail(stage, idx) {
    const t = stageData[stage].tasks[idx];
    const steps = stage === 'sor' ? ['起草','技术评审','采购确认','发布','供应商接收'] :
                  stage === 'bdl' ? ['SOR获取','供方筛选','长名单编制','评审会','确认发布'] :
                  stage === 'rfq' ? ['RFQ编制','发出询价','供方报价','开标分析','定标建议'] :
                  ['定点建议','价格审批','法务审核','管理层审批','定点通知'];
    const stepIdx = Math.floor(t.progress / 20);

    let html = '<div class="modal-hdr"><h3>'+t.id+' · '+t.name+'</h3><button class="modal-close" onclick="closeModal()">✕</button></div>';
    html += '<div class="task-detail-grid">';
    html += '<div class="td-item"><span class="td-label">任务编号</span><span class="td-val" style="font-family:monospace">'+t.id+'</span></div>';
    html += '<div class="td-item"><span class="td-label">当前状态</span><span class="td-val"><span class="tag '+t.statusTag+'">'+t.status+'</span></span></div>';
    html += '<div class="td-item"><span class="td-label">负责人</span><span class="td-val">'+t.owner+'</span></div>';
    html += '<div class="td-item"><span class="td-label">创建日期</span><span class="td-val">'+t.date+'</span></div>';
    html += '<div class="td-item"><span class="td-label">关联车型</span><span class="td-val">'+t.cars+'</span></div>';
    html += '<div class="td-item"><span class="td-label">完成进度</span><span class="td-val">'+t.progress+'%</span></div>';
    if(t.amount) html += '<div class="td-item"><span class="td-label">预估金额</span><span class="td-val" style="font-weight:700;color:var(--p)">'+t.amount+'</span></div>';
    html += '</div>';

    // Timeline
    html += '<div class="timeline-steps">';
    steps.forEach((s,i) => {
        let cls = i < stepIdx ? 'done' : i === stepIdx ? 'active' : 'pending';
        let icon = i < stepIdx ? '✓' : i === stepIdx ? '●' : '○';
        html += '<div class="ts-step '+cls+'"><div class="ts-dot '+cls+'">'+icon+'</div><div class="ts-label">'+s+'</div></div>';
    });
    html += '</div>';

    document.getElementById('modalBox').innerHTML = html;
    document.getElementById('modal').classList.add('show');
}

function closeModal() {
    document.getElementById('modal').classList.remove('show');
}
document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});

function showNextStageHint() {
    const nextMap = {sor:'bdl',bdl:'rfq',rfq:'nom',nom:'sor'};
    const next = nextMap[currentStage];
    selectStage(next);
    // Scroll to top
    document.querySelector('.main-content').scrollTo({top:0,behavior:'smooth'});
}

// Init
renderStageDetail('sor');
</script>

</body>
</html>
