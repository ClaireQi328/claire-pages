<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人经历时间线</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 40px 20px;
  }
  .container {
    width: 900px;
    background: #fff;
  }
  .header {
    text-align: center;
    margin-bottom: 48px;
  }
  .name {
    font-size: 28px;
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: 2px;
  }
  .subtitle {
    font-size: 14px;
    color: #8c8c8c;
    margin-top: 8px;
  }
  .timeline {
    position: relative;
    padding: 0 0 0 0;
  }
  .timeline::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    width: 2px;
    background: linear-gradient(180deg, #FF6700 0%, #FF6700 100%);
    transform: translateX(-50%);
  }
  .item {
    display: flex;
    align-items: flex-start;
    margin-bottom: 32px;
    position: relative;
  }
  .item:last-child { margin-bottom: 0; }
  .item.left .content {
    width: 45%;
    text-align: right;
    padding-right: 40px;
  }
  .item.right .content {
    width: 45%;
    text-align: left;
    padding-left: 40px;
    margin-left: 55%;
  }
  .dot {
    position: absolute;
    left: 50%;
    top: 8px;
    width: 14px;
    height: 14px;
    background: #FF6700;
    border: 3px solid #fff;
    border-radius: 50%;
    transform: translateX(-50%);
    box-shadow: 0 0 0 2px #FF6700;
    z-index: 2;
  }
  .item.current .dot {
    width: 18px;
    height: 18px;
    background: #FF6700;
    box-shadow: 0 0 0 2px #FF6700, 0 0 0 6px rgba(255,103,0,0.2);
  }
  .year {
    font-size: 13px;
    font-weight: 600;
    color: #FF6700;
    margin-bottom: 4px;
  }
  .company {
    font-size: 18px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 4px;
  }
  .role {
    font-size: 13px;
    color: #666;
    line-height: 1.6;
  }
  .edu-section {
    margin-top: 48px;
    padding-top: 32px;
    border-top: 1px solid #f0f0f0;
  }
  .edu-title {
    font-size: 14px;
    font-weight: 600;
    color: #8c8c8c;
    text-align: center;
    margin-bottom: 20px;
    letter-spacing: 4px;
  }
  .edu-items {
    display: flex;
    justify-content: center;
    gap: 48px;
  }
  .edu-item {
    text-align: center;
  }
  .edu-school {
    font-size: 16px;
    font-weight: 600;
    color: #1a1a1a;
  }
  .edu-major {
    font-size: 13px;
    color: #666;
    margin-top: 4px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="name">齐 岳</div>
    <div class="subtitle">高级产品经理 · 体系运营部</div>
  </div>

  <div class="timeline">
    <div class="item left">
      <div class="content">
        <div class="year">2018 — 2021</div>
        <div class="company">延锋安道拓</div>
        <div class="role">汽车内饰供应链</div>
      </div>
      <div class="dot"></div>
    </div>

    <div class="item right">
      <div class="content">
        <div class="year">2021 — 2023</div>
        <div class="company">叮咚买菜</div>
        <div class="role">生鲜供应链</div>
      </div>
      <div class="dot"></div>
    </div>

    <div class="item left">
      <div class="content">
        <div class="year">2023 — 2025</div>
        <div class="company">蔚来汽车</div>
        <div class="role">寻源定点 · 合作伙伴管理</div>
      </div>
      <div class="dot"></div>
    </div>

    <div class="item right current">
      <div class="content">
        <div class="year">2026.01 — 至今</div>
        <div class="company">小米汽车</div>
        <div class="role">EP 系统 · 采购数字化</div>
      </div>
      <div class="dot"></div>
    </div>
  </div>

  <div class="edu-section">
    <div class="edu-title">教 育 背 景</div>
    <div class="edu-items">
      <div class="edu-item">
        <div class="edu-school">上海大学</div>
        <div class="edu-major">工业工程</div>
      </div>
      <div class="edu-item">
        <div class="edu-school">上海交通大学</div>
        <div class="edu-major">工程管理</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
