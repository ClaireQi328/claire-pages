<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人经历</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 32px 20px;
  }
  .card {
    width: 880px;
    padding: 40px 48px 32px;
  }
  /* 顶部 */
  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 32px;
  }
  .left {}
  .name {
    font-size: 28px;
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: 3px;
  }
  .meta {
    margin-top: 8px;
    font-size: 13px;
    color: #999;
    display: flex;
    gap: 20px;
  }
  .right {
    text-align: right;
    font-size: 13px;
    color: #888;
    line-height: 1.8;
  }

  /* 经历行 */
  .exp-row {
    display: flex;
    align-items: center;
    padding: 18px 0;
    border-bottom: 1px solid #f5f5f5;
  }
  .exp-row:last-child { border-bottom: none; }
  .exp-left {
    width: 200px;
    flex-shrink: 0;
  }
  .exp-company {
    font-size: 18px;
    font-weight: 700;
    color: #1a1a1a;
  }
  .exp-mid {
    flex: 1;
    padding: 0 24px;
  }
  .exp-role {
    font-size: 14px;
    color: #555;
  }
  .exp-right {
    flex-shrink: 0;
    text-align: right;
  }
  .exp-tags {
    display: flex;
    gap: 6px;
    justify-content: flex-end;
  }
  .exp-tag {
    font-size: 11px;
    color: #999;
    background: #f5f5f5;
    padding: 3px 10px;
    border-radius: 4px;
  }

  /* 底部教育 */
  .edu {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid #f0f0f0;
    display: flex;
    gap: 32px;
    justify-content: center;
    font-size: 13px;
    color: #888;
  }
  .edu span { font-weight: 500; color: #555; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="left">
      <div class="name">齐 岳</div>
      <div class="meta">
        <span>高级产品经理</span>
        <span>体系运营部</span>
        <span>职级 16</span>
      </div>
    </div>
    <div class="right">
      <div><span>上海交通大学</span> · 工程管理</div>
      <div><span>上海大学</span> · 工业工程</div>
    </div>
  </div>

  <div class="exp-row">
    <div class="exp-left">
      <div class="exp-company">小米汽车</div>
    </div>
    <div class="exp-mid">
      <div class="exp-role">EP 系统 · 采购数字化</div>
    </div>
    <div class="exp-right">
      <div class="exp-tags"><span class="exp-tag">至今</span></div>
    </div>
  </div>

  <div class="exp-row">
    <div class="exp-left">
      <div class="exp-company">蔚来汽车</div>
    </div>
    <div class="exp-mid">
      <div class="exp-role">寻源定点 · 合作伙伴管理</div>
    </div>
    <div class="exp-right">
      <div class="exp-tags"><span class="exp-tag">3年+</span></div>
    </div>
  </div>

  <div class="exp-row">
    <div class="exp-left">
      <div class="exp-company">叮咚买菜</div>
    </div>
    <div class="exp-mid">
      <div class="exp-role">生鲜供应链</div>
    </div>
    <div class="exp-right">
      <div class="exp-tags"><span class="exp-tag">1年+</span></div>
    </div>
  </div>

  <div class="exp-row">
    <div class="exp-left">
      <div class="exp-company">延锋安道拓</div>
    </div>
    <div class="exp-mid">
      <div class="exp-role">汽车内饰供应链</div>
    </div>
    <div class="exp-right">
      <div class="exp-tags"><span class="exp-tag">3年+</span></div>
    </div>
  </div>

  <div class="edu">
    <div><span>8年+</span> 供应链全链路经验</div>
    <div>制造业 → 互联网 → 汽车</div>
  </div>
</div>
</body>
</html>
