<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人经历</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 32px 20px;
  }
  .card {
    width: 920px;
    padding: 40px 48px 32px;
  }
  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 36px;
  }
  .name {
    font-size: 28px;
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: 3px;
  }
  .meta {
    margin-top: 8px;
    font-size: 13px;
    color: #999;
    display: flex;
    gap: 20px;
  }
  .right {
    text-align: right;
    font-size: 13px;
    color: #888;
    line-height: 1.8;
  }
  .right span { font-weight: 500; color: #555; }

  /* 时间线横条 */
  .timeline {
    display: flex;
    align-items: center;
    margin-bottom: 8px;
    padding: 0 2px;
  }
  .tl-seg {
    height: 3px;
    background: #e0e0e0;
    border-radius: 2px;
    position: relative;
  }
  .tl-seg:not(:last-child) { margin-right: 4px; }
  .tl-dot {
    width: 8px;
    height: 8px;
    background: #333;
    border-radius: 50%;
    flex-shrink: 0;
    position: relative;
    z-index: 2;
  }
  .tl-dot:first-child { margin-right: 4px; }

  /* 经历卡片行 */
  .exp-row {
    display: flex;
    align-items: flex-start;
    padding: 20px 0;
    border-bottom: 1px solid #f0f0f0;
  }
  .exp-row:last-child { border-bottom: none; }
  .exp-left {
    width: 180px;
    flex-shrink: 0;
  }
  .exp-company {
    font-size: 18px;
    font-weight: 700;
    color: #1a1a1a;
  }
  .exp-mid {
    flex: 1;
    padding: 0 24px;
  }
  .exp-role {
    font-size: 14px;
    color: #444;
    font-weight: 500;
  }
  .exp-desc {
    font-size: 12px;
    color: #999;
    margin-top: 4px;
  }
  .exp-right {
    flex-shrink: 0;
    text-align: right;
    width: 120px;
  }
  .exp-date {
    font-size: 12px;
    color: #999;
    line-height: 1.6;
  }

  /* 底部 */
  .footer {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid #f0f0f0;
    display: flex;
    gap: 24px;
    justify-content: center;
    font-size: 13px;
    color: #888;
  }
  .footer span { font-weight: 500; color: #555; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div>
      <div class="name">齐 岳</div>
      <div class="meta">
        <span>高级产品经理</span>
        <span>体系运营部</span>
        <span>职级 16</span>
      </div>
    </div>
    <div class="right">
      <div><span>上海交通大学</span> · 工程管理</div>
      <div><span>上海大学</span> · 工业工程</div>
    </div>
  </div>

  <div class="exp-row">
    <div class="exp-left">
      <div class="exp-company">小米汽车</div>
    </div>
    <div class="exp-mid">
      <div class="exp-role">供应链产品经理</div>
      <div class="exp-desc">EP 系统 · 采购数字化</div>
    </div>
    <div class="exp-right">
      <div class="exp-date">2026.01 — 至今</div>
    </div>
  </div>

  <div class="exp-row">
    <div class="exp-left">
      <div class="exp-company">蔚来汽车</div>
    </div>
    <div class="exp-mid">
      <div class="exp-role">供应链产品经理</div>
      <div class="exp-desc">寻源定点 · 合作伙伴管理</div>
    </div>
    <div class="exp-right">
      <div class="exp-date">2022.09 — 2026.01</div>
    </div>
  </div>

  <div class="exp-row">
    <div class="exp-left">
      <div class="exp-company">叮咚买菜</div>
    </div>
    <div class="exp-mid">
      <div class="exp-role">供应链产品运营</div>
      <div class="exp-desc">生鲜供应链</div>
    </div>
    <div class="exp-right">
      <div class="exp-date">2020.12 — 2022.09</div>
    </div>
  </div>

  <div class="exp-row">
    <div class="exp-left">
      <div class="exp-company">延锋安道拓</div>
    </div>
    <div class="exp-mid">
      <div class="exp-role">物流规划</div>
      <div class="exp-desc">汽车内饰供应链</div>
    </div>
    <div class="exp-right">
      <div class="exp-date">2017.07 — 2020.12</div>
    </div>
  </div>

  <div class="footer">
    <div><span>8年+</span> 供应链全链路经验</div>
    <div>制造业 → 互联网 → 汽车</div>
  </div>
</div>
</body>
</html>
