<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人经历</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 24px 16px;
  }
  .card {
    width: 680px;
    padding: 28px 32px 24px;
  }
  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .name {
    font-size: 22px;
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: 2px;
  }
  .meta {
    margin-top: 6px;
    font-size: 12px;
    color: #999;
    display: flex;
    gap: 16px;
  }
  .right {
    text-align: right;
    font-size: 12px;
    color: #888;
    line-height: 1.7;
  }
  .right span { font-weight: 500; color: #555; }

  /* 横向时间线 */
  .timeline {
    position: relative;
    margin: 0 0 28px 0;
  }
  .tl-line {
    position: absolute;
    top: 6px;
    left: 0;
    right: 0;
    height: 2px;
    background: #FF6700;
    border-radius: 1px;
  }
  .tl-dots {
    display: flex;
    justify-content: space-between;
    position: relative;
    z-index: 2;
  }
  .tl-dot {
    width: 10px;
    height: 10px;
    background: #FF6700;
    border: 2px solid #fff;
    border-radius: 50%;
    box-shadow: 0 0 0 1.5px #FF6700;
  }
  .tl-dot:last-child {
    width: 14px;
    height: 14px;
    box-shadow: 0 0 0 1.5px #FF6700, 0 0 0 5px rgba(255,103,0,0.15);
  }

  /* 横向卡片 */
  .cards {
    display: flex;
    gap: 8px;
  }
  .card-item {
    flex: 1;
    border: 1px solid #f0f0f0;
    border-radius: 8px;
    padding: 14px 12px;
  }
  .card-item:last-child {
    border-color: #FF6700;
    background: #FFF8F2;
  }
  .c-company {
    font-size: 14px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 4px;
  }
  .card-item:last-child .c-company { color: #FF6700; }
  .c-role {
    font-size: 11px;
    color: #555;
    font-weight: 500;
  }
  .c-desc {
    font-size: 10px;
    color: #999;
    margin-top: 3px;
  }
  .c-date {
    font-size: 10px;
    color: #bbb;
    margin-top: 6px;
  }

  .footer {
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px solid #f0f0f0;
    display: flex;
    gap: 20px;
    justify-content: center;
    font-size: 12px;
    color: #888;
  }
  .footer span { font-weight: 500; color: #555; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div>
      <div class="name">齐 岳</div>
      <div class="meta">
        <span>高级产品经理</span>
        <span>体系运营部</span>
        <span>职级 16</span>
      </div>
    </div>
    <div class="right">
      <div><span>上海交通大学</span> · 工程管理</div>
      <div><span>上海大学</span> · 工业工程</div>
    </div>
  </div>

  <div class="timeline">
    <div class="tl-line"></div>
    <div class="tl-dots">
      <div class="tl-dot"></div>
      <div class="tl-dot"></div>
      <div class="tl-dot"></div>
      <div class="tl-dot"></div>
    </div>
  </div>

  <div class="cards">
    <div class="card-item">
      <div class="c-company">延锋安道拓</div>
      <div class="c-role">物流规划</div>
      <div class="c-desc">汽车内饰供应链</div>
      <div class="c-date">2017.07 — 2020.12</div>
    </div>
    <div class="card-item">
      <div class="c-company">叮咚买菜</div>
      <div class="c-role">供应链产品运营</div>
      <div class="c-desc">生鲜供应链</div>
      <div class="c-date">2020.12 — 2022.09</div>
    </div>
    <div class="card-item">
      <div class="c-company">蔚来汽车</div>
      <div class="c-role">供应链产品经理</div>
      <div class="c-desc">寻源定点 · 合作伙伴管理</div>
      <div class="c-date">2022.09 — 2026.01</div>
    </div>
    <div class="card-item">
      <div class="c-company">小米汽车</div>
      <div class="c-role">供应链产品经理</div>
      <div class="c-desc">EP 系统 · 采购数字化</div>
      <div class="c-date">2026.01 — 至今</div>
    </div>
  </div>

  <div class="footer">
    <div><span>8年+</span> 供应链全链路经验</div>
    <div>制造业 → 互联网 → 汽车</div>
  </div>
</div>
</body>
</html>
