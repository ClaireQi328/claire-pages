<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人经历时间线</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 32px 20px;
  }
  .card {
    width: 960px;
    background: #fff;
    border: 1px solid #f0f0f0;
    border-radius: 16px;
    padding: 40px 48px 36px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }
  /* 顶部信息区 */
  .top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 36px;
  }
  .top-left {}
  .name {
    font-size: 26px;
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: 2px;
  }
  .info-row {
    display: flex;
    gap: 24px;
    margin-top: 10px;
    font-size: 13px;
    color: #666;
  }
  .info-row span { white-space: nowrap; }
  .info-label { color: #999; margin-right: 4px; }
  .top-right {
    text-align: right;
    flex-shrink: 0;
  }
  .edu-item {
    font-size: 13px;
    color: #444;
    line-height: 1.8;
  }
  .edu-school { font-weight: 600; }
  .edu-major { color: #888; }

  /* 时间线 */
  .timeline-section {
    position: relative;
    padding-top: 16px;
  }
  .timeline-bar {
    position: relative;
    height: 4px;
    background: #f0f0f0;
    border-radius: 2px;
    margin: 0 0 0 0;
  }
  .timeline-bar .fill {
    position: absolute;
    height: 100%;
    background: linear-gradient(90deg, #FF6700, #FF8533);
    border-radius: 2px;
  }
  /* 四段，按比例：3.5年 / 1.75年 / 3.33年 / 至今(约0.5年) = 3.5:1.75:3.33:0.5 */
  /* 总长 = 3.5+1.75+3.33+0.5 = 9.08，用百分比 */
  .fill { left: 0; width: 100%; }

  .segments {
    display: flex;
    position: relative;
    margin-top: -2px;
  }
  .seg {
    position: relative;
    text-align: center;
  }
  .seg .dot {
    width: 12px;
    height: 12px;
    background: #FF6700;
    border: 3px solid #fff;
    border-radius: 50%;
    position: absolute;
    top: -4px;
    left: 50%;
    transform: translateX(-50%);
    box-shadow: 0 0 0 2px #FF6700;
    z-index: 2;
  }
  .seg:last-child .dot {
    width: 16px;
    height: 16px;
    top: -6px;
    box-shadow: 0 0 0 2px #FF6700, 0 0 0 6px rgba(255,103,0,0.15);
  }
  .seg:first-child .dot { left: 0; transform: none; }

  /* 内容卡片 */
  .cards {
    display: flex;
    gap: 0;
    margin-top: 28px;
  }
  .card-item {
    flex: 1;
    padding: 20px 16px;
    border-radius: 10px;
    position: relative;
  }
  .card-item:not(:last-child) {
    margin-right: 12px;
  }
  .card-item:nth-child(1) { background: #FFF7F0; }
  .card-item:nth-child(2) { background: #F0F7FF; }
  .card-item:nth-child(3) { background: #F5F0FF; }
  .card-item:nth-child(4) { background: #E8F8EE; }

  .card-date {
    font-size: 11px;
    color: #999;
    margin-bottom: 6px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  .card-company {
    font-size: 17px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 4px;
  }
  .card-role {
    font-size: 12px;
    color: #666;
    line-height: 1.6;
  }
  .card-duration {
    display: inline-block;
    margin-top: 8px;
    font-size: 11px;
    color: #FF6700;
    background: rgba(255,103,0,0.08);
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 500;
  }

  /* 底部标签 */
  .tags {
    display: flex;
    gap: 8px;
    margin-top: 20px;
    justify-content: center;
  }
  .tag {
    font-size: 11px;
    color: #888;
    background: #f5f5f5;
    padding: 4px 12px;
    border-radius: 20px;
  }
</style>
</head>
<body>
<div class="card">
  <!-- 顶部：姓名 + 教育 -->
  <div class="top">
    <div class="top-left">
      <div class="name">齐 岳</div>
      <div class="info-row">
        <span><span class="info-label">岗位</span>高级产品经理</span>
        <span><span class="info-label">部门</span>体系运营部</span>
        <span><span class="info-label">职级</span>16</span>
        <span><span class="info-label">入职</span>2026.01.22</span>
      </div>
    </div>
    <div class="top-right">
      <div class="edu-item"><span class="edu-school">上海交通大学</span> · <span class="edu-major">工程管理</span></div>
      <div class="edu-item"><span class="edu-school">上海大学</span> · <span class="edu-major">工业工程</span></div>
    </div>
  </div>

  <!-- 时间线 -->
  <div class="timeline-section">
    <div class="timeline-bar">
      <div class="fill"></div>
    </div>
  </div>

  <!-- 四段经历卡片 -->
  <div class="cards">
    <div class="card-item">
      <div class="card-date">2017.07 — 2020.12</div>
      <div class="card-company">延锋安道拓</div>
      <div class="card-role">汽车内饰供应链</div>
      <div class="card-duration">3年5个月</div>
    </div>
    <div class="card-item">
      <div class="card-date">2020.12 — 2022.09</div>
      <div class="card-company">叮咚买菜</div>
      <div class="card-role">生鲜供应链</div>
      <div class="card-duration">1年9个月</div>
    </div>
    <div class="card-item">
      <div class="card-date">2022.09 — 2026.01</div>
      <div class="card-company">蔚来汽车</div>
      <div class="card-role">寻源定点 · 合作伙伴管理</div>
      <div class="card-duration">3年4个月</div>
    </div>
    <div class="card-item">
      <div class="card-date">2026.01 — 至今</div>
      <div class="card-company">小米汽车</div>
      <div class="card-role">EP系统 · 采购数字化</div>
      <div class="card-duration">在职</div>
    </div>
  </div>

  <!-- 底部标签 -->
  <div class="tags">
    <span class="tag">8年+ 供应链经验</span>
    <span class="tag">制造业 → 互联网 → 汽车</span>
    <span class="tag">采购数字化</span>
  </div>
</div>
</body>
</html>
