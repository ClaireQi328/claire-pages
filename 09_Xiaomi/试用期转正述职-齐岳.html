<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>试用期转正述职 - 齐岳</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');

:root {
  --orange: #FF6900;
  --orange-hover: #E85D00;
  --orange-50: #FFF8F0;
  --orange-100: #FFE8CC;
  --dark: #111111;
  --ink: #1a1a1a;
  --body: #444;
  --muted: #888;
  --surface: #ffffff;
  --canvas: #f4f4f5;
  --border: #e4e4e7;
  --radius: 8px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--canvas);
  color: var(--ink);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ── Top Bar ── */
.topbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 52px;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  z-index: 100;
}

.topbar-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.01em;
}

.topbar-title em {
  font-style: normal;
  color: var(--orange);
  font-weight: 900;
}

.topbar-nav {
  display: flex;
  gap: 2px;
}

.topbar-nav a {
  display: flex;
  align-items: center;
  justify-content: center;
  min-width: 28px;
  height: 28px;
  padding: 0 6px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  text-decoration: none;
  transition: all 0.15s ease;
}

.topbar-nav a:hover {
  color: var(--ink);
  background: var(--canvas);
}

.topbar-nav a.active {
  color: #fff;
  background: var(--orange);
}

.topbar-count {
  font-size: 12px;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
}

/* ── Main Content ── */
.main {
  padding: 72px 0 48px;
  max-width: 960px;
  margin: 0 auto;
}

/* ── Slide Block ── */
.slide {
  margin-bottom: 40px;
  scroll-margin-top: 64px;
}

.slide-head {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 10px;
  padding: 0 2px;
}

.slide-idx {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  background: var(--orange);
  color: #fff;
  border-radius: 5px;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
  position: relative;
  top: -1px;
}

.slide-label {
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  letter-spacing: 0.01em;
}

.slide-frame {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.25s ease, border-color 0.25s ease;
}

.slide-frame:hover {
  box-shadow: var(--shadow-md);
  border-color: #d4d4d8;
}

.slide-frame img {
  width: 100%;
  height: auto;
  display: block;
}

/* ── Progress Indicator ── */
.progress {
  position: fixed;
  top: 52px;
  left: 0;
  height: 2px;
  background: var(--orange);
  z-index: 101;
  transition: width 0.1s linear;
}

/* ── Scroll to Top ── */
.to-top {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 40px;
  height: 40px;
  background: var(--orange);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
  opacity: 0;
  transform: translateY(8px);
  transition: all 0.2s ease;
  z-index: 99;
  box-shadow: 0 2px 8px rgba(255,105,0,0.25);
}

.to-top.show {
  opacity: 1;
  transform: translateY(0);
}

.to-top:hover {
  background: var(--orange-hover);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(255,105,0,0.35);
}

/* ── Footer ── */
.footer {
  text-align: center;
  padding: 32px 20px 48px;
}

.footer-bar {
  width: 40px;
  height: 2px;
  background: var(--orange);
  margin: 0 auto 12px;
  border-radius: 1px;
}

.footer p {
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.02em;
}

/* ── Reveal Animation ── */
.slide {
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 0.4s ease, transform 0.4s ease;
}

.slide.visible {
  opacity: 1;
  transform: translateY(0);
}

@media (prefers-reduced-motion: reduce) {
  .slide { opacity: 1; transform: none; transition: none; }
  html { scroll-behavior: auto; }
}
</style>
</head>
<body>

<!-- Top Bar -->
<header class="topbar">
  <div class="topbar-title">试用期转正述职 · <em>齐岳</em></div>
  <nav class="topbar-nav" id="topNav"></nav>
  <div class="topbar-count">18 页</div>
</header>

<!-- Progress -->
<div class="progress" id="progress"></div>

<!-- Slides -->
<main class="main" id="main"></main>

<!-- Footer -->
<footer class="footer">
  <div class="footer-bar"></div>
  <p>试用期转正述职 · 齐岳 · 2026年7月</p>
</footer>

<!-- Scroll to Top -->
<button class="to-top" id="toTop" aria-label="回到顶部">↑</button>

<script>
const N = 18;
const titles = {
  1:'封面', 2:'个人介绍', 3:'工作成果总览',
  4:'成果1 · 报价结构 Why', 5:'成果1 · 报价结构 How',
  6:'成果1 · 系统实现', 7:'成果1 · 运营数据',
  8:'成果1 · 比价与运营', 9:'成果2 · CLI建设',
  10:'成果2 · CLI示例', 11:'成果2 · Agent探索',
  12:'思考与规划', 13:'价值观', 14:'下一步计划',
  15:'Q3/Q4计划', 16:'致谢', 17:'附录', 18:'附录'
};

// Build nav
const nav = document.getElementById('topNav');
for (let i = 1; i <= N; i++) {
  const a = document.createElement('a');
  a.href = '#p' + i;
  a.textContent = i;
  a.dataset.p = i;
  nav.appendChild(a);
}

// Build slides
const main = document.getElementById('main');
for (let i = 1; i <= N; i++) {
  const pad = String(i).padStart(2, '0');
  const title = titles[i] || '';
  const el = document.createElement('div');
  el.className = 'slide';
  el.id = 'p' + i;
  el.innerHTML =
    '<div class="slide-head">' +
      '<span class="slide-idx">' + i + '</span>' +
      '<span class="slide-label">' + title + '</span>' +
    '</div>' +
    '<div class="slide-frame">' +
      '<img src="assets/pdf_pages/page_' + pad + '.png" alt="第' + i + '页 ' + title + '" loading="lazy">' +
    '</div>';
  main.appendChild(el);
}

// Active nav
const links = nav.querySelectorAll('a');
const sections = document.querySelectorAll('.slide');
const obsNav = new IntersectionObserver(es => {
  es.forEach(e => {
    if (e.isIntersecting) {
      const n = e.target.id.replace('p', '');
      links.forEach(l => l.classList.remove('active'));
      const a = nav.querySelector('[data-p="' + n + '"]');
      if (a) a.classList.add('active');
    }
  });
}, { threshold: 0.4, rootMargin: '-64px 0px -40% 0px' });
sections.forEach(s => obsNav.observe(s));

// Reveal on scroll
const obsReveal = new IntersectionObserver(es => {
  es.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obsReveal.unobserve(e.target); }});
}, { threshold: 0.05 });
sections.forEach(s => obsReveal.observe(s));

// Progress bar
const progress = document.getElementById('progress');
window.addEventListener('scroll', () => {
  const h = document.documentElement;
  const pct = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100;
  progress.style.width = pct + '%';
});

// To top
const toTop = document.getElementById('toTop');
window.addEventListener('scroll', () => {
  toTop.classList.toggle('show', window.scrollY > 400);
});
toTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
</script>

</body>
</html>
