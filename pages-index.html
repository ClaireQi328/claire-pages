<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claire Pages</title>
<style>
:root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424; --border: #333;
    --text: #e0e0e0; --text2: #888; --accent: #4a9eff; --accent-dim: rgba(74,158,255,0.12);
    --green: #4caf50; --red: #ef5350; --orange: #ff9800; --radius: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

/* ── Header ── */
header { padding:12px 20px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:16px; flex-shrink:0; }
header h1 { font-size:18px; font-weight:600; white-space:nowrap; }
.search-box { flex:1; max-width:400px; position:relative; }
.search-box input { width:100%; padding:7px 12px 7px 32px; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-size:14px; outline:none; }
.search-box input:focus { border-color:var(--accent); }
.search-box::before { content:"🔍"; position:absolute; left:10px; top:50%; transform:translateY(-50%); font-size:13px; }
.badge { background:var(--accent-dim); color:var(--accent); padding:3px 10px; border-radius:12px; font-size:12px; white-space:nowrap; }

/* ── Toolbar ── */
.toolbar { padding:8px 20px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; gap:8px; align-items:center; flex-shrink:0; flex-wrap:wrap; }
.toolbar button { padding:5px 12px; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-size:12px; cursor:pointer; white-space:nowrap; }
.toolbar button:hover { border-color:var(--accent); color:var(--accent); }
.toolbar button.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
.toolbar button.primary:hover { opacity:0.85; }
.toolbar button.danger { color:var(--red); border-color:var(--red); }
.toolbar .spacer { flex:1; }
.toolbar .selection-info { font-size:12px; color:var(--text2); }

/* ── Tree ── */
.tree-container { flex:1; overflow-y:auto; padding:12px 20px; }
.tree-node { user-select:none; }
.tree-row { display:flex; align-items:center; gap:6px; padding:4px 8px; border-radius:6px; cursor:pointer; position:relative; }
.tree-row:hover { background:var(--surface2); }
.tree-row.selected { background:var(--accent-dim); }
.tree-row .arrow { width:16px; text-align:center; font-size:10px; color:var(--text2); transition:transform 0.15s; flex-shrink:0; }
.tree-row .arrow.open { transform:rotate(90deg); }
.tree-row .arrow.leaf { visibility:hidden; }
.tree-row .icon { font-size:14px; flex-shrink:0; }
.tree-row .name { font-size:13px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tree-row .name a { color:var(--text); text-decoration:none; }
.tree-row .name a:hover { color:var(--accent); text-decoration:underline; }
.tree-row .count { font-size:11px; color:var(--text2); background:var(--surface2); padding:1px 7px; border-radius:10px; flex-shrink:0; }
.tree-row .path-hint { font-size:11px; color:var(--text2); margin-left:4px; flex-shrink:0; }
.tree-row input[type=checkbox] { accent-color:var(--accent); flex-shrink:0; }
.tree-children { padding-left:20px; }
.tree-children.collapsed { display:none; }
.match-highlight { background:rgba(255,235,59,0.25); border-radius:2px; }

/* ── Modal ── */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:100; align-items:center; justify-content:center; }
.modal-overlay.show { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:24px; min-width:400px; max-width:500px; }
.modal h3 { margin-bottom:16px; font-size:16px; }
.modal label { display:block; font-size:13px; color:var(--text2); margin-bottom:4px; margin-top:12px; }
.modal input, .modal select { width:100%; padding:8px 12px; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-size:13px; outline:none; }
.modal input:focus, .modal select:focus { border-color:var(--accent); }
.modal .actions { margin-top:20px; display:flex; gap:8px; justify-content:flex-end; }
.modal .actions button { padding:7px 16px; border-radius:var(--radius); font-size:13px; cursor:pointer; border:1px solid var(--border); background:var(--surface2); color:var(--text); }
.modal .actions button.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
.modal .file-list { max-height:150px; overflow-y:auto; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); padding:8px; margin-top:8px; }
.modal .file-list .item { font-size:12px; padding:3px 6px; color:var(--text2); border-bottom:1px solid var(--border); }
.modal .file-list .item:last-child { border-bottom:none; }

/* ── Toast ── */
.toast { position:fixed; bottom:20px; right:20px; padding:12px 20px; background:var(--green); color:#fff; border-radius:var(--radius); font-size:13px; z-index:200; display:none; }
.toast.show { display:block; animation:fadeIn 0.2s; }
.toast.error { background:var(--red); }
@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

/* ── Stats ── */
footer { padding:8px 20px; background:var(--surface); border-top:1px solid var(--border); font-size:11px; color:var(--text2); text-align:center; flex-shrink:0; }
</style>
</head>
<body>

<header>
    <h1>📂 Claire Pages</h1>
    <div class="search-box"><input type="text" id="searchInput" placeholder="Search files and folders..."></div>
    <span class="badge" id="fileCount">—</span>
</header>

<div class="toolbar">
    <button onclick="selectAll()">Select All</button>
    <button onclick="deselectAll()">Deselect</button>
    <button onclick="expandAll()">Expand All</button>
    <button onclick="collapseAll()">Collapse All</button>
    <span class="spacer"></span>
    <span class="selection-info" id="selectionInfo"></span>
    <button onclick="openNewFolderModal()">+ New Folder</button>
    <button class="primary" onclick="openMoveModal()">Move To...</button>
    <button class="danger" onclick="openDeleteModal()">Delete</button>
</div>

<div class="tree-container" id="treeContainer"></div>

<footer id="footer">Loading...</footer>

<!-- Move Modal -->
<div class="modal-overlay" id="moveModal">
    <div class="modal">
        <h3>Move Files</h3>
        <p style="font-size:13px;color:var(--text2)" id="moveFileCount"></p>
        <label>Destination folder</label>
        <select id="moveDest"></select>
        <div class="file-list" id="moveFileList"></div>
        <div class="actions">
            <button onclick="closeModal('moveModal')">Cancel</button>
            <button class="primary" onclick="executeMove()">Move</button>
        </div>
    </div>
</div>

<!-- New Folder Modal -->
<div class="modal-overlay" id="newFolderModal">
    <div class="modal">
        <h3>Create New Folder</h3>
        <label>Folder path (relative to repo root)</label>
        <input type="text" id="newFolderPath" placeholder="e.g. Xiaomi/NewProject">
        <div class="actions">
            <button onclick="closeModal('newFolderModal')">Cancel</button>
            <button class="primary" onclick="executeNewFolder()">Create</button>
        </div>
    </div>
</div>

<!-- Delete Modal -->
<div class="modal-overlay" id="deleteModal">
    <div class="modal">
        <h3>Delete Files</h3>
        <p style="font-size:13px;color:var(--red);margin-bottom:8px">This will remove the files from the pages repo. The original vault files are NOT affected.</p>
        <div class="file-list" id="deleteFileList"></div>
        <div class="actions">
            <button onclick="closeModal('deleteModal')">Cancel</button>
            <button class="danger" style="background:var(--red);color:#fff;border-color:var(--red)" onclick="executeDelete()">Delete</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Data ──
let allFiles = [];      // [{name, path, url}]
let treeData = null;    // tree structure
let overrides = {};     // {originalPath: {action, newPath, ...}}
const STORAGE_KEY = 'claire-pages-overrides';

// ── Load ──
async function init() {
    try {
        const resp = await fetch('data.json');
        allFiles = await resp.json();
    } catch(e) {
        allFiles = [];
    }
    overrides = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    applyOverrides();
    treeData = buildTree(allFiles);
    renderTree();
    document.getElementById('fileCount').textContent = allFiles.length + ' files';
    document.getElementById('footer').textContent = 'Generated ' + new Date().toISOString().slice(0,16).replace('T',' ') + ' · Synced from Claire Vault';
}

function applyOverrides() {
    for (const [orig, ov] of Object.entries(overrides)) {
        if (ov.action === 'move') {
            const f = allFiles.find(x => x.path === orig);
            if (f) { f.path = ov.newPath; f.name = ov.newPath.split('/').pop(); }
        } else if (ov.action === 'delete') {
            allFiles = allFiles.filter(x => x.path !== orig);
        }
    }
}

// ── Tree Builder ──
function buildTree(files) {
    const root = { children: {}, files: [] };
    for (const f of files) {
        const parts = f.path.split('/');
        let node = root;
        for (let i = 0; i < parts.length - 1; i++) {
            if (!node.children[parts[i]]) node.children[parts[i]] = { children: {}, files: [] };
            node = node.children[parts[i]];
        }
        node.files.push(f);
    }
    return root;
}

function flattenTree(node, prefix = '') {
    const result = [];
    for (const [name, child] of Object.entries(node.children)) {
        const path = prefix ? prefix + '/' + name : name;
        result.push({ type: 'folder', name, path, child });
        result.push(...flattenTree(child, path));
    }
    for (const f of node.files) {
        result.push({ type: 'file', ...f });
    }
    return result;
}

// ── Render ──
const expanded = new Set();
const selected = new Set(); // paths

function renderTree(filter = '') {
    const container = document.getElementById('treeContainer');
    container.innerHTML = '';
    const lf = filter.toLowerCase();
    renderNode(treeData, container, '', lf);
    updateSelectionInfo();
}

function renderNode(node, parent, path, filter) {
    const sortedFolders = Object.keys(node.children).sort();
    const sortedFiles = [...node.files].sort((a,b) => a.name.localeCompare(b.name));

    for (const folderName of sortedFolders) {
        const child = node.children[folderName];
        const folderPath = path ? path + '/' + folderName : folderName;
        const childCount = countFiles(child);

        // Check if this folder or any descendant matches the filter
        const matches = !filter || folderMatches(child, folderName, folderPath, filter);
        if (!matches) continue;

        const div = document.createElement('div');
        div.className = 'tree-node';

        const isOpen = filter ? true : expanded.has(folderPath);
        const row = document.createElement('div');
        row.className = 'tree-row' + (selected.has(folderPath) ? ' selected' : '');
        row.innerHTML = `
            <span class="arrow ${isOpen ? 'open' : ''}">▶</span>
            <span class="icon">📁</span>
            <input type="checkbox" ${selected.has(folderPath) ? 'checked' : ''} data-folder="${folderPath}">
            <span class="name">${filter ? highlight(folderName, filter) : folderName}</span>
            <span class="count">${childCount}</span>
        `;

        row.querySelector('.arrow').onclick = (e) => {
            e.stopPropagation();
            toggleExpand(folderPath, div);
        };
        row.onclick = (e) => {
            if (e.target.tagName === 'INPUT') return;
            toggleExpand(folderPath, div);
        };
        row.querySelector('input').onchange = (e) => {
            toggleSelect(folderPath, e.target.checked, true);
        };

        const childContainer = document.createElement('div');
        childContainer.className = 'tree-children' + (isOpen ? '' : ' collapsed');
        renderNode(child, childContainer, folderPath, filter);

        div.appendChild(row);
        div.appendChild(childContainer);
        parent.appendChild(div);
    }

    for (const file of sortedFiles) {
        if (filter && !file.name.toLowerCase().includes(filter) && !file.path.toLowerCase().includes(filter)) continue;

        const div = document.createElement('div');
        div.className = 'tree-node';
        const row = document.createElement('div');
        row.className = 'tree-row' + (selected.has(file.path) ? ' selected' : '');
        row.innerHTML = `
            <span class="arrow leaf">▶</span>
            <span class="icon">📄</span>
            <input type="checkbox" ${selected.has(file.path) ? 'checked' : ''} data-file="${file.path}">
            <span class="name"><a href="${file.url}" target="_blank">${filter ? highlight(file.name, filter) : file.name}</a></span>
            ${filter ? '<span class="path-hint">' + file.path + '</span>' : ''}
        `;
        row.querySelector('input').onchange = (e) => {
            toggleSelect(file.path, e.target.checked);
        };
        div.appendChild(row);
        parent.appendChild(div);
    }
}

function folderMatches(node, name, path, filter) {
    if (name.toLowerCase().includes(filter)) return true;
    if (path.toLowerCase().includes(filter)) return true;
    for (const f of node.files) {
        if (f.name.toLowerCase().includes(filter) || f.path.toLowerCase().includes(filter)) return true;
    }
    for (const [n, c] of Object.entries(node.children)) {
        if (folderMatches(c, n, path + '/' + n, filter)) return true;
    }
    return false;
}

function countFiles(node) {
    let c = node.files.length;
    for (const child of Object.values(node.children)) c += countFiles(child);
    return c;
}

function highlight(text, filter) {
    const i = text.toLowerCase().indexOf(filter.toLowerCase());
    if (i < 0) return text;
    return text.slice(0,i) + '<span class="match-highlight">' + text.slice(i, i+filter.length) + '</span>' + text.slice(i+filter.length);
}

// ── Expand/Collapse ──
function toggleExpand(path, nodeDiv) {
    const arrow = nodeDiv.querySelector(':scope > .tree-row .arrow');
    const children = nodeDiv.querySelector(':scope > .tree-children');
    if (!children) return;
    const isOpen = !children.classList.contains('collapsed');
    if (isOpen) { expanded.delete(path); arrow.classList.remove('open'); children.classList.add('collapsed'); }
    else { expanded.add(path); arrow.classList.add('open'); children.classList.remove('collapsed'); }
}

function expandAll() {
    const walk = (node, path) => {
        for (const [name, child] of Object.entries(node.children)) {
            const p = path ? path + '/' + name : name;
            expanded.add(p);
            walk(child, p);
        }
    };
    walk(treeData, '');
    renderTree(document.getElementById('searchInput').value);
}

function collapseAll() {
    expanded.clear();
    renderTree(document.getElementById('searchInput').value);
}

// ── Selection ──
function toggleSelect(path, checked, isFolder) {
    if (checked) {
        selected.add(path);
        // If folder, select all children
        if (isFolder) {
            const node = getNodeAtPath(path);
            if (node) selectAllInNode(node, path);
        }
    } else {
        selected.delete(path);
        if (isFolder) {
            const node = getNodeAtPath(path);
            if (node) deselectAllInNode(node, path);
        }
    }
    renderTree(document.getElementById('searchInput').value);
}

function getNodeAtPath(path) {
    const parts = path.split('/');
    let node = treeData;
    for (const p of parts) {
        if (!node.children[p]) return null;
        node = node.children[p];
    }
    return node;
}

function selectAllInNode(node, path) {
    for (const f of node.files) selected.add(f.path);
    for (const [name, child] of Object.entries(node.children)) {
        const p = path + '/' + name;
        selected.add(p);
        selectAllInNode(child, p);
    }
}

function deselectAllInNode(node, path) {
    for (const f of node.files) selected.delete(f.path);
    for (const [name, child] of Object.entries(node.children)) {
        const p = path + '/' + name;
        selected.delete(p);
        deselectAllInNode(child, p);
    }
}

function selectAll() {
    const walk = (node, path) => {
        for (const f of node.files) selected.add(f.path);
        for (const [name, child] of Object.entries(node.children)) {
            const p = path ? path + '/' + name : name;
            selected.add(p);
            walk(child, p);
        }
    };
    walk(treeData, '');
    renderTree(document.getElementById('searchInput').value);
}

function deselectAll() {
    selected.clear();
    renderTree(document.getElementById('searchInput').value);
}

function updateSelectionInfo() {
    const info = document.getElementById('selectionInfo');
    if (selected.size === 0) { info.textContent = ''; return; }
    let files = 0, folders = 0;
    for (const s of selected) {
        if (allFiles.find(f => f.path === s)) files++;
        else folders++;
    }
    info.textContent = `${files} files, ${folders} folders selected`;
}

function getSelectedFiles() {
    return [...selected].filter(s => allFiles.find(f => f.path === s));
}

// ── Move ──
function openMoveModal() {
    const files = getSelectedFiles();
    if (files.length === 0) { showToast('Select files first', true); return; }

    document.getElementById('moveFileCount').textContent = files.length + ' file(s) will be moved:';
    document.getElementById('moveFileList').innerHTML = files.map(f => '<div class="item">' + f.path + '</div>').join('');

    // Build folder list
    const folders = getAllFolders(treeData, '');
    const select = document.getElementById('moveDest');
    select.innerHTML = '<option value="">(root)</option>' + folders.map(f => '<option value="' + f + '">' + f + '</option>').join('');

    document.getElementById('moveModal').classList.add('show');
}

function getAllFolders(node, path) {
    const result = [];
    for (const [name, child] of Object.entries(node.children)) {
        const p = path ? path + '/' + name : name;
        result.push(p);
        result.push(...getAllFolders(child, p));
    }
    return result.sort();
}

function executeMove() {
    const dest = document.getElementById('moveDest').value;
    const files = getSelectedFiles();
    for (const f of files) {
        const fileName = f.path.split('/').pop();
        const newPath = dest ? dest + '/' + fileName : fileName;
        overrides[f.path] = { action: 'move', newPath, dest, fileName };
        // Update in-memory
        f.path = newPath;
        f.name = fileName;
    }
    saveOverrides();
    selected.clear();
    treeData = buildTree(allFiles);
    renderTree();
    closeModal('moveModal');
    showToast(files.length + ' file(s) moved to ' + (dest || '(root)'));
}

// ── New Folder ──
function openNewFolderModal() {
    document.getElementById('newFolderPath').value = '';
    document.getElementById('newFolderModal').classList.add('show');
}

function executeNewFolder() {
    const path = document.getElementById('newFolderPath').value.trim();
    if (!path) return;
    // Add to tree so it shows up
    const parts = path.split('/');
    let node = treeData;
    for (const p of parts) {
        if (!node.children[p]) node.children[p] = { children: {}, files: [] };
        node = node.children[p];
    }
    expanded.add(path);
    renderTree();
    closeModal('newFolderModal');
    showToast('Folder "' + path + '" created (will persist after sync)');
}

// ── Delete ──
function openDeleteModal() {
    const files = getSelectedFiles();
    if (files.length === 0) { showToast('Select files first', true); return; }
    document.getElementById('deleteFileList').innerHTML = files.map(f => '<div class="item">' + f.path + '</div>').join('');
    document.getElementById('deleteModal').classList.add('show');
}

function executeDelete() {
    const files = getSelectedFiles();
    for (const f of files) {
        overrides[f.path] = { action: 'delete' };
    }
    allFiles = allFiles.filter(f => !selected.has(f.path));
    saveOverrides();
    selected.clear();
    treeData = buildTree(allFiles);
    renderTree();
    closeModal('deleteModal');
    showToast(files.length + ' file(s) removed from listing');
}

// ── Persistence ──
function saveOverrides() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(overrides));
    // Also try to save as a downloadable changes file
    generateChangesFile();
}

function generateChangesFile() {
    const changes = Object.entries(overrides).map(([orig, ov]) => ({
        action: ov.action,
        source: orig,
        ...(ov.action === 'move' ? { destination: ov.newPath, destFolder: ov.dest } : {})
    }));
    // Store for download
    window._pendingChanges = changes;
}

function downloadChanges() {
    if (!window._pendingChanges || window._pendingChanges.length === 0) {
        showToast('No pending changes', true);
        return;
    }
    const blob = new Blob([JSON.stringify(window._pendingChanges, null, 2)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'changes.json';
    a.click();
    showToast('Downloaded changes.json — place it in claire-pages repo root and run sync-pages.ps1');
}

// ── Modal helpers ──
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
document.querySelectorAll('.modal-overlay').forEach(m => {
    m.addEventListener('click', e => { if (e.target === m) m.classList.remove('show'); });
});

// ── Toast ──
function showToast(msg, isError) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => t.className = 'toast', 3000);
}

// ── Search ──
document.getElementById('searchInput').addEventListener('input', (e) => {
    renderTree(e.target.value.trim());
});

// ── Keyboard ──
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        document.querySelectorAll('.modal-overlay.show').forEach(m => m.classList.remove('show'));
    }
});

// ── Init ──
init();
</script>
</body>
</html>
