  <script>
  // ============================================================
  // ROUTER
  // ============================================================
  const ROUTES = {};
  function registerRoute(name, fn) { ROUTES[name] = fn; }
  function navigate(name, params) {
    location.hash = name + (params ? '?' + new URLSearchParams(params).toString() : '');
  }
  function getRoute() {
    const [name, qs] = location.hash.slice(1).split('?');
    return { name: name || 'home', params: qs ? Object.fromEntries(new URLSearchParams(qs)) : {} };
  }
  function render() {
    const { name, params } = getRoute();
    const route = ROUTES[name];
    if (!route) { ROUTES.home(); return; }
    route(params);
    // highlight sidebar
    document.querySelectorAll('#side-nav .nav-item').forEach(el => {
      el.classList.toggle('active', el.dataset.route === name);
    });
    window.scrollTo(0, 0);
  }
  window.addEventListener('hashchange', render);

  // ============================================================
  // SIDEBAR NAV
  // ============================================================
  function buildNav() {
    document.getElementById('side-nav').innerHTML = `

      <a class="nav-item" data-route="dimension" onclick="navigate('dimension')"><i class="fas fa-ruler w-5 text-center"></i> 量纲管理</a>
      <a class="nav-item" data-route="ladder" onclick="navigate('ladder')"><i class="fas fa-layer-group w-5 text-center"></i> 阶梯价</a>
      <a class="nav-item" data-route="attachment" onclick="navigate('attachment')"><i class="fas fa-folder w-5 text-center"></i> 附件管理</a>
    `;
  }

  // ============================================================
  // DIALOG SYSTEM
  // ============================================================
  function showDialog(type, opts) {
    const dc = document.getElementById('dc');
    const w = opts?.width || 600;
    dc.innerHTML = `<div class="modal-overlay fade-in" onclick="if(event.target===this)closeDialog()">
      <div class="modal-box" style="width:${w}px;max-width:90vw">
        <div class="modal-header"><h3 class="font-bold text-neutral-800">${opts?.title||type}</h3>
          <button onclick="closeDialog()" class="text-neutral-400 hover:text-neutral-600 w-8 h-8 flex items-center justify-center rounded-lg hover:bg-neutral-100"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">${opts?.body||''}</div>
        <div class="modal-footer">${opts?.footer||'<button class="btn btn-ghost" onclick="closeDialog()">关闭</button>'}</div>
      </div>
    </div>`;
  }
  function closeDialog() { document.getElementById('dc').innerHTML = ''; }

  // ============================================================
  // PAGE HELPERS
  // ============================================================
  function setPage(title, breadcrumb, actions, html) {
    document.getElementById('page-title').textContent = title;
    document.getElementById('page-breadcrumb').innerHTML = breadcrumb || '';
    document.getElementById('page-actions').innerHTML = actions || '';
    document.getElementById('app').innerHTML = html;
  }
  function renderStatus(s) {
    const m = {'询报价':'badge-info','竞价中':'badge-warning','已定点':'badge-success','已关闭':'badge-neutral','未报价':'badge-warning','已报价':'badge-success'};
    return `<span class="${m[s]||'badge-neutral'}">${s}</span>`;
  }

  function renderSQTable() {
    const data = window._sqFiltered || SQ_DATA;
    const tb = document.getElementById('sq-tbody');
    if (!tb) return;
    tb.innerHTML = data.map(r => `<tr>
      <td><a class="text-primary font-medium cursor-pointer hover:underline" onclick="navigate('supplier-quote',{code:'${r.code}'})">${r.code}</a></td>
      <td class="max-w-[200px] truncate">${r.name}</td>
      <td>${renderStatus(r.status)}</td><td class="text-center">${r.round}</td>
      <td class="text-neutral-500">${r.deadline}</td><td class="text-neutral-400 text-xs">${r.created}</td>
      <td>${r.status==='未报价'?`<a class="btn btn-primary btn-sm !py-1 cursor-pointer" onclick="navigate('supplier-quote',{code:'${r.code}'})">报价</a>`:r.status==='已报价'?`<a class="btn btn-secondary btn-sm !py-1 cursor-pointer" onclick="navigate('supplier-quote',{code:'${r.code}'})">修改</a>`:'<span class="text-neutral-300 text-xs">-</span>'}</td>
    </tr>`).join('');
  }
  function filterSQ() {
    const code = (document.getElementById('sq-code')?.value||'').toLowerCase();
    const st = document.getElementById('sq-st')?.value||'';
    window._sqFiltered = SQ_DATA.filter(r => {
      if (code && !r.code.toLowerCase().includes(code) && !r.name.toLowerCase().includes(code)) return false;
      if (st && r.status !== st) return false;
      return true;
    });
    renderSQTable();
  }

// Override openDialog to use DIALOGS map
const _origOpenDialog = window.openDialog;
window.openDialog = function(type) {
  const d = DIALOGS[type];
  if (!d) { _origOpenDialog(type); return; }
  const dc = document.getElementById('dc');
  dc.innerHTML = `<div class="modal-overlay fade-in" onclick="if(event.target===this)closeDialog()">
    <div class="modal-box" style="width:${d.w||600}px;max-width:90vw">
      <div class="modal-header"><h3 class="font-bold text-neutral-800">${d.title}</h3><button onclick="closeDialog()" class="text-neutral-400 hover:text-neutral-600 w-8 h-8 flex items-center justify-center rounded-lg hover:bg-neutral-100"><i class="fas fa-times"></i></button></div>
      <div class="modal-body">${d.body}</div>
      <div class="modal-footer">${d.footer||'<button class="btn btn-ghost" onclick="closeDialog()">关闭</button>'}</div>
    </div>
  </div>`;
};

// Navigate to home on first load
if (!location.hash) navigate('home');
