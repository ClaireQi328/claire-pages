<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阶梯价 — NIO 寻源定点</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: { primary:'#FF7A00', secondary:'#FFB400', neutral:{50:'#FAFAFA',100:'#F5F5F5',200:'#E5E5E5',300:'#D4D4D4',400:'#A3A3A3',500:'#737373',600:'#525252',700:'#404040',800:'#262626',900:'#171717'} },
        fontFamily: { sans:['Inter','system-ui','sans-serif'] },
        boxShadow: { 'card':'0 4px 20px 0 rgba(0,0,0,0.05)', 'card-hover':'0 10px 30px 0 rgba(0,0,0,0.1)' }
      }}
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap" rel="stylesheet">
  <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
  <script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
</head>
<body class="bg-neutral-50 min-h-screen flex">

  <aside class="w-60 bg-white border-r border-neutral-200 flex-shrink-0 flex flex-col sticky top-0 h-screen z-30">
    <div class="p-4 border-b border-neutral-200">
      <a href="index.html" class="flex items-center gap-2">
        <div class="w-8 h-8 header-gradient rounded-lg flex items-center justify-center"><i class="fas fa-cubes text-white text-sm"></i></div>
        <span class="font-bold text-neutral-800 text-sm">寻源定点</span>
      </a>
    </div>
    <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
      <div class="text-xs font-semibold text-neutral-400 uppercase tracking-wider px-4 py-2">寻源报价</div>
      <a class="nav-item" href="rfq-list.html"><i class="fas fa-file-invoice w-5 text-center"></i> 询报价管理</a>
      <a class="nav-item" href="supplier-quote-list.html"><i class="fas fa-store w-5 text-center"></i> 供应商报价</a>
      <a class="nav-item" href="partner-evaluation.html"><i class="fas fa-user-check w-5 text-center"></i> 合作伙伴评估</a>
      <div class="text-xs font-semibold text-neutral-400 uppercase tracking-wider px-4 py-2 mt-4">工具</div>
      <a class="nav-item" href="price-comparison.html"><i class="fas fa-balance-scale w-5 text-center"></i> 价格比较</a>
      <a class="nav-item" href="dimension.html"><i class="fas fa-ruler w-5 text-center"></i> 量纲管理</a>
      <a class="nav-item" href="attachment-list.html"><i class="fas fa-folder w-5 text-center"></i> 附件管理</a>
    </nav>
    <div class="p-3 border-t border-neutral-200"><a href="index.html" class="nav-item text-neutral-400"><i class="fas fa-arrow-left w-5 text-center"></i> 返回总览</a></div>
  </aside>

  <div class="flex-1 flex flex-col min-w-0">
    <header class="bg-white border-b border-neutral-200 px-6 py-3 flex items-center justify-between sticky top-0 z-20">
      <div>
        <h1 class="text-lg font-bold text-neutral-800">阶梯价管理</h1>
        <p class="text-xs text-neutral-400">P1000010100032 · 左A柱下内饰板总成 · V21994 培奇爱</p>
      </div>
      <div class="flex gap-2">
        <button class="btn-secondary btn-sm" onclick="alert('导出中...')"><i class="fas fa-file-export mr-1"></i>导出</button>
        <button class="btn-primary btn-sm" onclick="saveLadder()"><i class="fas fa-save mr-1"></i>保存</button>
      </div>
    </header>

    <main class="flex-1 p-6 overflow-y-auto">
      <!-- Summary -->
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
        <div class="card flex items-center gap-3">
          <div class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center"><i class="fas fa-layer-group text-primary"></i></div>
          <div><p class="text-xs text-neutral-400">阶梯数</p><p class="text-xl font-bold text-neutral-800">4</p></div>
        </div>
        <div class="card flex items-center gap-3">
          <div class="w-10 h-10 rounded-lg bg-emerald-100 flex items-center justify-center"><i class="fas fa-tag text-emerald-500"></i></div>
          <div><p class="text-xs text-neutral-400">基准单价</p><p class="text-xl font-bold text-emerald-600">¥156.00</p></div>
        </div>
        <div class="card flex items-center gap-3">
          <div class="w-10 h-10 rounded-lg bg-blue-100 flex items-center justify-center"><i class="fas fa-percentage text-blue-500"></i></div>
          <div><p class="text-xs text-neutral-400">最大降幅</p><p class="text-xl font-bold text-blue-600">-12.5%</p></div>
        </div>
        <div class="card flex items-center gap-3">
          <div class="w-10 h-10 rounded-lg bg-amber-100 flex items-center justify-center"><i class="fas fa-chart-line text-amber-500"></i></div>
          <div><p class="text-xs text-neutral-400">预计采购量</p><p class="text-xl font-bold text-amber-600">230,000</p></div>
        </div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <!-- Ladder Table -->
        <div class="card">
          <div class="flex items-center justify-between mb-4">
            <h2 class="font-bold text-neutral-800 flex items-center gap-2">
              <i class="fas fa-list-ol text-primary"></i> 阶梯设置
            </h2>
            <button class="btn-ghost btn-sm" onclick="addLadder()"><i class="fas fa-plus mr-1"></i>添加阶梯</button>
          </div>
          <div class="table-wrapper">
            <table class="table-main" id="ladder-table">
              <thead>
                <tr>
                  <th>阶梯</th>
                  <th>起始数量</th>
                  <th>结束数量</th>
                  <th class="text-right">单价 (元)</th>
                  <th class="text-right">降幅</th>
                  <th class="text-right">适用数量</th>
                  <th class="text-right">小计 (元)</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="ladder-tbody">
                <!-- JS generated -->
              </tbody>
              <tfoot>
                <tr class="bg-neutral-50 font-bold">
                  <td colspan="5">加权平均单价</td>
                  <td class="text-right" id="total-qty">-</td>
                  <td class="text-right text-primary" id="total-amount">-</td>
                  <td></td>
                </tr>
              </tfoot>
            </table>
          </div>
        </div>

        <!-- Chart -->
        <div class="card">
          <h2 class="font-bold text-neutral-800 mb-4 flex items-center gap-2">
            <i class="fas fa-chart-area text-primary"></i> 阶梯价格曲线
          </h2>
          <div id="ladder-chart" class="w-full h-[300px]"></div>
          <div class="mt-4 p-4 bg-neutral-50 rounded-xl">
            <h3 class="text-sm font-medium text-neutral-600 mb-2">成本分析</h3>
            <div class="grid grid-cols-2 gap-3 text-sm">
              <div><span class="text-neutral-400">加权平均单价</span><p class="font-bold text-primary" id="avg-price">-</p></div>
              <div><span class="text-neutral-400">总成本（含模具分摊）</span><p class="font-bold text-neutral-800" id="total-cost">-</p></div>
              <div><span class="text-neutral-400">模具分摊单价</span><p class="font-medium text-neutral-800">¥1.65</p></div>
              <div><span class="text-neutral-400">含模具加权单价</span><p class="font-bold text-primary" id="weighted-price">-</p></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const ladderData = [
      { from:1, to:10000, price:156.00 },
      { from:10001, to:50000, price:148.20 },
      { from:50001, to:100000, price:142.00 },
      { from:100001, to:230000, price:136.50 },
    ];
    const moldPerUnit = 1.65;

    function renderLadder() {
      const tbody = document.getElementById('ladder-tbody');
      const basePrice = ladderData[0].price;
      let totalQty = 0, totalAmount = 0;

      tbody.innerHTML = ladderData.map((l, i) => {
        const applicableQty = l.to - l.from + 1;
        const subtotal = applicableQty * l.price;
        const discount = ((basePrice - l.price) / basePrice * 100).toFixed(1);
        totalQty += applicableQty;
        totalAmount += subtotal;
        return `<tr>
          <td class="font-medium">${i + 1}</td>
          <td><input type="number" class="form-input !py-1 text-right" value="${l.from}" onchange="updateLadder(${i},'from',this.value)"></td>
          <td><input type="number" class="form-input !py-1 text-right" value="${l.to}" onchange="updateLadder(${i},'to',this.value)"></td>
          <td class="text-right"><input type="number" class="form-input !py-1 text-right w-24" value="${l.price}" step="0.10" onchange="updateLadder(${i},'price',this.value)"></td>
          <td class="text-right"><span class="badge-success">-${discount}%</span></td>
          <td class="text-right text-neutral-500">${applicableQty.toLocaleString()}</td>
          <td class="text-right font-medium">¥${subtotal.toLocaleString(undefined,{minimumFractionDigits:2})}</td>
          <td>${i > 0 ? `<button class="btn-ghost btn-sm !p-1 text-red-400" onclick="removeLadder(${i})"><i class="fas fa-trash text-xs"></i></button>` : ''}</td>
        </tr>`;
      }).join('');

      document.getElementById('total-qty').textContent = totalQty.toLocaleString();
      document.getElementById('total-amount').textContent = '¥' + totalAmount.toLocaleString(undefined,{minimumFractionDigits:2});

      const avgPrice = totalAmount / totalQty;
      document.getElementById('avg-price').textContent = '¥' + avgPrice.toFixed(2);
      document.getElementById('total-cost').textContent = '¥' + (totalAmount + moldPerUnit * totalQty).toLocaleString(undefined,{minimumFractionDigits:2});
      document.getElementById('weighted-price').textContent = '¥' + (avgPrice + moldPerUnit).toFixed(2);

      renderChart();
    }

    function updateLadder(i, field, val) {
      ladderData[i][field] = parseFloat(val);
      renderLadder();
    }

    function addLadder() {
      const last = ladderData[ladderData.length - 1];
      ladderData.push({ from: last.to + 1, to: last.to + 50000, price: (last.price * 0.95).toFixed(2) * 1 });
      renderLadder();
    }

    function removeLadder(i) {
      ladderData.splice(i, 1);
      renderLadder();
    }

    function saveLadder() { alert('阶梯价已保存'); }

    function renderChart() {
      const chart = echarts.init(document.getElementById('ladder-chart'));
      chart.setOption({
        color: ['#FF7A00'],
        tooltip: { trigger:'axis', formatter: p => `${p[0].name}<br/>单价: ¥${p[0].value}` },
        grid: { left:'3%', right:'4%', bottom:'3%', containLabel:true },
        xAxis: { type:'category', data: ladderData.map((l,i) => `阶梯${i+1}\n${l.from.toLocaleString()}-${l.to.toLocaleString()}`) },
        yAxis: { type:'value', name:'元', min: v => Math.floor(v.min * 0.95) },
        series: [{
          type:'line', data: ladderData.map(l => l.price), smooth: true,
          areaStyle: { color: { type:'linear', x:0, y:0, x2:0, y2:1, colorStops:[{offset:0,color:'rgba(255,122,0,0.3)'},{offset:1,color:'rgba(255,122,0,0)'}] } },
          lineStyle: { width:3 }, symbol:'circle', symbolSize:8,
          itemStyle: { borderWidth:2, borderColor:'#fff' }
        }]
      });
      window.addEventListener('resize', () => chart.resize());
    }

    renderLadder();
  </script>

</body>
</html>
