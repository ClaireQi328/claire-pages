:root{--bg:#0f172a;--s1:#1e293b;--s2:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#38bdf8;--green:#22c55e;--purple:#a78bfa;--orange:#fb923c;--pink:#f472b6}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
.hero{text-align:center;padding:40px 20px 20px;background:linear-gradient(135deg,#1e293b,#0f172a)}
.hero h1{font-size:1.8em;background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--muted);font-size:.9em;margin-top:6px}
.stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:16px 0}
.stat{background:var(--s1);padding:8px 16px;border-radius:8px;font-size:.85em;border:1px solid var(--s2)}
.stat b{color:var(--accent)}
.search-bar{max-width:500px;margin:16px auto;padding:0 20px}
.search-bar input{width:100%;padding:10px 16px;border-radius:8px;border:1px solid var(--s2);background:var(--s1);color:var(--text);font-size:.95em;outline:none}
.search-bar input:focus{border-color:var(--accent)}
.container{max-width:1200px;margin:0 auto;padding:0 20px 40px}
.group{margin:20px 0}
.group-header{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--s1);border-radius:10px;cursor:pointer;user-select:none;border:1px solid var(--s2);transition:all .2s}
.group-header:hover{border-color:var(--accent)}
.group-header .icon{font-size:1.2em}
.group-header h2{font-size:1.05em;flex:1}
.group-header .count{background:var(--s2);padding:2px 10px;border-radius:12px;font-size:.8em;color:var(--muted)}
.group-header .arrow{transition:transform .2s;color:var(--muted)}
.group-header.open .arrow{transform:rotate(90deg)}
.subgroup{margin:8px 0 8px 20px;display:none}
.group-header.open + .subgroup{display:block}
.subgroup-title{font-size:.85em;color:var(--muted);padding:6px 0;cursor:pointer;display:flex;align-items:center;gap:6px}
.subgroup-title::before{content:'▸';font-size:.7em;transition:transform .2s}
.subgroup-title.open::before{transform:rotate(90deg)}
.file-list{display:none;margin:4px 0 8px 16px}
.subgroup-title.open + .file-list{display:block}
.file-item{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:6px;font-size:.88em;transition:background .15s;text-decoration:none;color:var(--text)}
.file-item:hover{background:var(--s2)}
.file-item .name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-item .badge{font-size:.7em;padding:1px 6px;border-radius:4px;background:var(--s2);color:var(--muted);flex-shrink:0}
.hidden{display:none!important}
@media(max-width:768px){.container{padding:0 12px 40px}.group-header{padding:10px 12px}}
</style>
</head>

const BASE='https://claireqi328.github.io/claire-pages/';
const ICONS={ByteDance:'🎵',NIO:'🚗',Self:'🧠',SJTU:'🎓',Xiaomi:'📱'};
const COLORS={ByteDance:'#6366f1',NIO:'#3b82f6',Self:'#22c55e',SJTU:'#f59e0b',Xiaomi:'#ef4444'};

// Group
const groups={};
DATA.forEach(([top,sub,name,path])=>{
  if(!groups[top])groups[top]={};
  if(!groups[top][sub])groups[top][sub]=[];
  groups[top][sub].push({name,path});
});

// Stats
const statsEl=document.getElementById('stats');
const totalCount=DATA.length;
const topCounts=Object.entries(groups).map(([k,v])=>({k,n:Object.values(v).flat().length})).sort((a,b)=>b.n-a.n);
statsEl.innerHTML=`<div class="stat">共 <b>${totalCount}</b> 个报告</div>`+topCounts.map(c=>`<div class="stat">${ICONS[c.k]||''} ${c.k} <b>${c.n}</b></div>`).join('');

// Render
const container=document.getElementById('container');
Object.entries(groups).sort((a,b)=>b[1].__count-a[1].__count).forEach(([top,subs])=>{
  const total=Object.values(subs).flat().length;
  const gDiv=document.createElement('div');gDiv.className='group';gDiv.dataset.top=top;
  const hdr=document.createElement('div');hdr.className='group-header';
  hdr.innerHTML=`<span class="icon">${ICONS[top]||'📁'}</span><h2>${top}</h2><span class="count">${total}</span><span class="arrow">▸</span>`;
  hdr.onclick=()=>hdr.classList.toggle('open');
  gDiv.appendChild(hdr);
  const sgDiv=document.createElement('div');sgDiv.className='subgroup';
  Object.entries(subs).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([sub,files])=>{
    const sgTitle=document.createElement('div');sgTitle.className='subgroup-title';
    sgTitle.textContent=sub+' ('+files.length+')';
    sgTitle.onclick=()=>sgTitle.classList.toggle('open');
    sgDiv.appendChild(sgTitle);
    const fl=document.createElement('div');fl.className='file-list';
    files.forEach(f=>{
      const a=document.createElement('a');a.className='file-item';a.href=BASE+encodeURI(f.path);a.target='_blank';a.dataset.search=(f.name+' '+f.path).toLowerCase();
      a.innerHTML=`<span class="name">${f.name}</span><span class="badge">${f.path.split('/').pop()}</span>`;
      fl.appendChild(a);
    });
    sgDiv.appendChild(fl);
  });
  gDiv.appendChild(sgDiv);
  container.appendChild(gDiv);
});

// Search
document.getElementById('search').addEventListener('input',function(){
  const q=this.value.toLowerCase().trim();
  document.querySelectorAll('.file-item').forEach(a=>{
    a.style.display=!q||a.dataset.search.includes(q)?'':'none';
  });
  document.querySelectorAll('.group').forEach(g=>{
    const hasVisible=g.querySelector('.file-item:not([style*="display: none"])');
    g.style.display=!q||hasVisible?'':'none';
    if(q&&hasVisible){g.querySelector('.group-header').classList.add('open');g.querySelectorAll('.subgroup-title').forEach(s=>{if(s.nextElementSibling.querySelector('.file-item:not([style*="display: none"])'))s.classList.add('open');});}
  });
});
