<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AB 点供应与供应链韧性 — 交互式演示</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card-hover: #22263a;
    --border: #2a2e3e;
    --text: #e4e4e7;
    --text-dim: #9ca3af;
    --accent: #6366f1;
    --accent-light: #818cf8;
    --green: #22c55e;
    --green-dim: rgba(34,197,94,.15);
    --red: #ef4444;
    --red-dim: rgba(239,68,68,.12);
    --yellow: #eab308;
    --yellow-dim: rgba(234,179,8,.12);
    --blue: #3b82f6;
    --blue-dim: rgba(59,130,246,.12);
    --orange: #f97316;
    --cyan: #06b6d4;
    --radius: 12px;
    --shadow: 0 2px 16px rgba(0,0,0,.35);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, 'SF Pro Display', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }

  .container { max-width: 1400px; margin: 0 auto; padding: 32px 24px; }

  /* Header */
  .header { text-align: center; margin-bottom: 40px; }
  .header h1 { font-size: 2rem; font-weight: 700; background: linear-gradient(135deg, var(--accent-light), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header p { color: var(--text-dim); margin-top: 8px; font-size: .95rem; }

  /* Tab nav */
  .tab-nav { display: flex; gap: 4px; margin-bottom: 28px; background: var(--card); border-radius: var(--radius); padding: 4px; width: fit-content; margin-left: auto; margin-right: auto; }
  .tab-btn { padding: 10px 24px; border: none; background: transparent; color: var(--text-dim); font-size: .9rem; cursor: pointer; border-radius: 8px; transition: all .2s; font-weight: 500; }
  .tab-btn.active { background: var(--accent); color: #fff; }
  .tab-btn:hover:not(.active) { color: var(--text); background: rgba(99,102,241,.1); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Cards */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; box-shadow: var(--shadow); }
  .card-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

  /* Grid */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  @media (max-width: 900px) { .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; } }

  /* Network visualization */
  .network-canvas { position: relative; width: 100%; height: 520px; background: linear-gradient(135deg, #0d1020 0%, #151825 100%); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
  .node { position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; font-weight: 600; font-size: .82rem; cursor: pointer; transition: all .4s cubic-bezier(.4,0,.2,1); z-index: 2; border: 2px solid transparent; text-align: center; padding: 8px; }
  .node:hover { transform: scale(1.08); z-index: 3; }
  .node-factory { width: 120px; height: 70px; background: linear-gradient(135deg, #1e3a5f, #1a2744); border-color: var(--blue); }
  .node-supplier-a { width: 110px; height: 65px; background: linear-gradient(135deg, #1a3328, #162920); border-color: var(--green); }
  .node-supplier-b { width: 110px; height: 65px; background: linear-gradient(135deg, #3b2e1a, #2d2416); border-color: var(--yellow); }
  .node-supplier-c { width: 110px; height: 65px; background: linear-gradient(135deg, #2d1a3b, #241630); border-color: var(--accent-light); }
  .node.down { opacity: .4; border-color: var(--red) !important; animation: pulse-red 1.5s infinite; }
  .node-label { font-size: .75rem; color: var(--text-dim); margin-top: 4px; }
  .node-icon { font-size: 1.3rem; margin-bottom: 2px; }
  .node-quota { font-size: .7rem; margin-top: 2px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
  .quota-a { background: var(--green-dim); color: var(--green); }
  .quota-b { background: var(--yellow-dim); color: var(--yellow); }
  .quota-c { background: rgba(99,102,241,.15); color: var(--accent-light); }
  .quota-0 { background: var(--red-dim); color: var(--red); }

  @keyframes pulse-red { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,.4); } 50% { box-shadow: 0 0 20px 4px rgba(239,68,68,.3); } }

  /* SVG lines */
  .network-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
  .supply-line { stroke-width: 2.5; fill: none; transition: all .4s; }
  .supply-line.active { stroke-dasharray: none; }
  .supply-line.inactive { stroke-dasharray: 6 4; opacity: .25; }
  .supply-line.switching { stroke-dasharray: 12 6; animation: dash-flow 1s linear infinite; stroke-width: 3.5; }
  @keyframes dash-flow { to { stroke-dashoffset: -18; } }

  /* Controls */
  .control-group { display: flex; flex-direction: column; gap: 6px; }
  .control-label { font-size: .8rem; color: var(--text-dim); font-weight: 500; }
  .slider-row { display: flex; align-items: center; gap: 12px; }
  input[type=range] { flex: 1; accent-color: var(--accent); height: 6px; -webkit-appearance: none; background: var(--border); border-radius: 3px; outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--accent); cursor: pointer; }
  .slider-val { font-size: .85rem; font-weight: 600; min-width: 42px; text-align: right; color: var(--accent-light); }

  /* Buttons */
  .btn { padding: 10px 24px; border: none; border-radius: 8px; font-size: .9rem; font-weight: 600; cursor: pointer; transition: all .2s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-danger:hover { background: #dc2626; transform: translateY(-1px); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #4f46e5; }
  .btn-success { background: var(--green); color: #fff; }
  .btn-success:hover { background: #16a34a; }
  .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent-light); }
  .btn-sm { padding: 6px 14px; font-size: .8rem; }

  /* Status badges */
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 12px; border-radius: 20px; font-size: .78rem; font-weight: 600; }
  .badge-green { background: var(--green-dim); color: var(--green); }
  .badge-red { background: var(--red-dim); color: var(--red); }
  .badge-yellow { background: var(--yellow-dim); color: var(--yellow); }
  .badge-blue { background: var(--blue-dim); color: var(--blue); }

  /* Stats */
  .stat { text-align: center; padding: 16px; }
  .stat-value { font-size: 2rem; font-weight: 700; }
  .stat-label { font-size: .8rem; color: var(--text-dim); margin-top: 4px; }
  .stat-change { font-size: .78rem; margin-top: 4px; font-weight: 600; }
  .stat-change.up { color: var(--green); }
  .stat-change.down { color: var(--red); }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: .85rem; }
  th { text-align: left; padding: 10px 14px; background: rgba(99,102,241,.08); color: var(--accent-light); font-weight: 600; border-bottom: 1px solid var(--border); }
  td { padding: 10px 14px; border-bottom: 1px solid rgba(42,46,62,.5); }
  tr:hover td { background: rgba(255,255,255,.02); }

  /* Event log */
  .event-log { max-height: 320px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
  .event-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px; border-radius: 8px; font-size: .82rem; border-left: 3px solid; background: rgba(255,255,255,.02); }
  .event-item.info { border-color: var(--blue); }
  .event-item.warn { border-color: var(--yellow); }
  .event-item.error { border-color: var(--red); }
  .event-item.success { border-color: var(--green); }
  .event-time { color: var(--text-dim); font-size: .75rem; white-space: nowrap; }
  .event-icon { font-size: 1rem; }

  /* Gauge */
  .gauge-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .gauge-label { font-size: .82rem; min-width: 100px; color: var(--text-dim); }
  .gauge-bar { flex: 1; height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .gauge-fill { height: 100%; border-radius: 5px; transition: width .8s cubic-bezier(.4,0,.2,1); }
  .gauge-val { font-size: .85rem; font-weight: 600; min-width: 50px; text-align: right; }

  /* Scenario cards */
  .scenario-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; cursor: pointer; transition: all .25s; }
  .scenario-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 20px rgba(99,102,241,.15); }
  .scenario-card.selected { border-color: var(--accent); background: rgba(99,102,241,.06); }
  .scenario-title { font-weight: 600; margin-bottom: 6px; font-size: .95rem; }
  .scenario-desc { font-size: .8rem; color: var(--text-dim); line-height: 1.5; }
  .scenario-impact { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }

  /* Responsive */
  @media (max-width: 768px) {
    .container { padding: 16px 12px; }
    .header h1 { font-size: 1.4rem; }
    .network-canvas { height: 420px; }
    .node-factory { width: 90px; height: 55px; font-size: .72rem; }
    .node-supplier-a, .node-supplier-b, .node-supplier-c { width: 85px; height: 50px; font-size: .7rem; }
  }

  /* Pulse animation for switching */
  .switching-badge { animation: pulse-badge .8s ease-in-out 3; }
  @keyframes pulse-badge { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }

  /* Insight callout */
  .insight { background: rgba(99,102,241,.06); border: 1px solid rgba(99,102,241,.2); border-radius: var(--radius); padding: 16px 20px; font-size: .88rem; line-height: 1.7; margin-top: 16px; }
  .insight strong { color: var(--accent-light); }

  .hidden { display: none; }
  .mt-12 { margin-top: 12px; }
  .mt-20 { margin-top: 20px; }
  .mb-12 { margin-bottom: 12px; }
  .flex-between { display: flex; justify-content: space-between; align-items: center; }
  .gap-12 { gap: 12px; }
  .text-dim { color: var(--text-dim); }
  .text-sm { font-size: .82rem; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🏭 AB 点供应与供应链韧性</h1>
    <p>多工厂 × 多源 × 多业务属性 — 交互式模拟器</p>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('tab1')">🌐 供应网络</button>
    <button class="tab-btn" onclick="switchTab('tab2')">⚡ 断供模拟</button>
    <button class="tab-btn" onclick="switchTab('tab3')">📊 韧性仪表盘</button>
    <button class="tab-btn" onclick="switchTab('tab4')">📋 配额矩阵</button>
  </div>

  <!-- TAB 1: Supply Network -->
  <div id="tab1" class="tab-panel active">
    <div class="grid-2">
      <div class="card">
        <div class="card-title">🔗 供应网络拓扑</div>
        <div class="network-canvas" id="networkCanvas">
          <svg class="network-svg" id="networkSvg"></svg>
          <!-- Nodes injected by JS -->
        </div>
        <div class="mt-12 text-sm text-dim">
          💡 点击供应商节点可模拟断供，拖动滑块调整配额比例
        </div>
      </div>

      <div class="card">
        <div class="card-title">🎛️ 配额调节器</div>
        <div id="quotaControls"></div>

        <div class="mt-20">
          <div class="card-title" style="font-size:.95rem">📝 事件日志</div>
          <div class="event-log" id="eventLog"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- TAB 2: Disruption Simulation -->
  <div id="tab2" class="tab-panel">
    <div class="card mb-12">
      <div class="card-title">⚡ 选择断供场景</div>
      <div class="grid-3" id="scenarioGrid"></div>
    </div>
    <div class="grid-2">
      <div class="card">
        <div class="card-title">🔄 切换过程模拟</div>
        <div id="simResult"></div>
      </div>
      <div class="card">
        <div class="card-title">📈 影响评估</div>
        <div id="impactAssessment"></div>
      </div>
    </div>
  </div>

  <!-- TAB 3: Resilience Dashboard -->
  <div id="tab3" class="tab-panel">
    <div class="grid-4 mb-12" id="resilienceKPIs"></div>
    <div class="grid-2">
      <div class="card">
        <div class="card-title">🎯 韧性维度评分</div>
        <div id="resilienceGauges"></div>
      </div>
      <div class="card">
        <div class="card-title">📉 断供恢复时间对比</div>
        <div id="recoveryComparison"></div>
      </div>
    </div>
    <div class="card mt-20">
      <div class="card-title">💡 韧性洞察</div>
      <div id="resilienceInsights"></div>
    </div>
  </div>

  <!-- TAB 4: Quota Matrix -->
  <div id="tab4" class="tab-panel">
    <div class="grid-2">
      <div class="card">
        <div class="card-title">📋 工厂 × 供应商 配额矩阵（物料：铝合金型材 AL-001）</div>
        <div class="table-wrap" id="quotaMatrix"></div>
      </div>
      <div class="card">
        <div class="card-title">🔧 多业务属性兼容表</div>
        <div class="table-wrap" id="bizAttrTable"></div>
      </div>
    </div>
    <div class="card mt-20">
      <div class="card-title">🧮 切换规则引擎配置</div>
      <div class="table-wrap" id="ruleEngine"></div>
    </div>
  </div>
</div>

<script>
// ─── Data Model ───
const factories = [
  { id: 'F1', name: '上海工厂', x: 50, y: 220, icon: '🏭', color: '#3b82f6' },
  { id: 'F2', name: '武汉工厂', x: 50, y: 340, icon: '🏭', color: '#06b6d4' },
  { id: 'F3', name: '匈牙利工厂', x: 50, y: 455, icon: '🏭', color: '#8b5cf6' },
];

const suppliers = [
  { id: 'SA', name: '忠旺铝业', short: '忠旺', x: 820, y: 100, icon: '🟢', type: 'a', color: '#22c55e' },
  { id: 'SB', name: '诺贝丽斯', short: '诺贝丽斯', x: 820, y: 250, icon: '🟡', type: 'b', color: '#eab308' },
  { id: 'SC', name: '海德鲁', short: '海德鲁', x: 820, y: 400, icon: '🟣', type: 'c', color: '#818cf8' },
];

// sourcing: factory × supplier → { quota, vmi, cert, maxCap, status }
let sourcing = {
  F1_SA: { quota: 70, vmi: true, cert: 'certified', maxCap: 8000, status: 'active', switchLT: 3 },
  F1_SB: { quota: 30, vmi: false, cert: 'certified', maxCap: 5000, status: 'active', switchLT: 7 },
  F1_SC: { quota: 0, vmi: false, cert: 'pending', maxCap: 3000, status: 'inactive', switchLT: 30 },
  F2_SA: { quota: 60, vmi: false, cert: 'certified', maxCap: 6000, status: 'active', switchLT: 5 },
  F2_SB: { quota: 20, vmi: false, cert: 'certified', maxCap: 4000, status: 'active', switchLT: 7 },
  F2_SC: { quota: 20, vmi: false, cert: 'certified', maxCap: 3000, status: 'active', switchLT: 14 },
  F3_SA: { quota: 0, vmi: false, cert: 'not_certified', maxCap: 0, status: 'inactive', switchLT: 90 },
  F3_SB: { quota: 80, vmi: true, cert: 'certified', maxCap: 7000, status: 'active', switchLT: 5 },
  F3_SC: { quota: 20, vmi: false, cert: 'certified', maxCap: 3000, status: 'active', switchLT: 14 },
};

let supplierDown = {}; // { SA: false, SB: false, SC: false }
let eventLogs = [];

const demand = { F1: 10000, F2: 8000, F3: 9000 };

// ─── Tab switching ───
function switchTab(id) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
  if (id === 'tab1') drawNetwork();
  if (id === 'tab3') renderResilienceDashboard();
}

// ─── Network Drawing ───
function drawNetwork() {
  const canvas = document.getElementById('networkCanvas');
  const svg = document.getElementById('networkSvg');
  // Clear old nodes
  canvas.querySelectorAll('.node').forEach(n => n.remove());
  svg.innerHTML = '';

  const canvasRect = canvas.getBoundingClientRect();
  const w = canvasRect.width || 960;
  const h = canvasRect.height || 520;

  // Scale positions
  const sx = w / 960, sy = h / 520;

  // Draw factories
  factories.forEach(f => {
    const node = document.createElement('div');
    node.className = 'node node-factory';
    node.style.left = (f.x * sx) + 'px';
    node.style.top = (f.y * sy) + 'px';
    node.innerHTML = `<span class="node-icon">${f.icon}</span><span>${f.name}</span><span class="node-label">需求 ${demand[f.id].toLocaleString()}/月</span>`;
    canvas.appendChild(node);
  });

  // Draw suppliers
  suppliers.forEach(s => {
    const isDown = supplierDown[s.id];
    const node = document.createElement('div');
    node.className = `node node-supplier-${s.type} ${isDown ? 'down' : ''}`;
    node.style.left = (s.x * sx) + 'px';
    node.style.top = (s.y * sy) + 'px';
    node.onclick = () => toggleSupplier(s.id);
    node.innerHTML = `<span class="node-icon">${isDown ? '🔴' : s.icon}</span><span>${s.short}</span>`;
    canvas.appendChild(node);
  });

  // Draw lines
  factories.forEach(f => {
    suppliers.forEach(s => {
      const key = f.id + '_' + s.id;
      const sc = sourcing[key];
      if (!sc) return;
      const x1 = (f.x * sx + 120);
      const y1 = (f.y * sy + 35);
      const x2 = (s.x * sx);
      const y2 = (s.y * sy + 32);
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      const cp1x = x1 + (x2 - x1) * 0.4;
      const cp2x = x2 - (x2 - x1) * 0.4;
      line.setAttribute('d', `M${x1},${y1} C${cp1x},${y1} ${cp2x},${y2} ${x2},${y2}`);

      const isDown = supplierDown[s.id];
      const hasQuota = sc.quota > 0 && sc.status === 'active';

      if (isDown && hasQuota) {
        line.setAttribute('class', 'supply-line switching');
        line.setAttribute('stroke', '#ef4444');
      } else if (hasQuota && !isDown) {
        line.setAttribute('class', 'supply-line active');
        line.setAttribute('stroke', s.color);
        line.setAttribute('opacity', Math.max(0.3, sc.quota / 100));
      } else {
        line.setAttribute('class', 'supply-line inactive');
        line.setAttribute('stroke', '#555');
      }
      svg.appendChild(line);

      // Quota label on line
      if (sc.quota > 0) {
        const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        const mx = (x1 + x2) / 2;
        const my = (y1 + y2) / 2 - 8;
        label.setAttribute('x', mx);
        label.setAttribute('y', my);
        label.setAttribute('fill', isDown ? '#ef4444' : s.color);
        label.setAttribute('font-size', '11');
        label.setAttribute('font-weight', '600');
        label.setAttribute('text-anchor', 'middle');
        label.textContent = sc.quota + '%';
        svg.appendChild(label);
      }
    });
  });

  // Draw supplier quota badges
  suppliers.forEach(s => {
    factories.forEach(f => {
      const key = f.id + '_' + s.id;
      const sc = sourcing[key];
      if (!sc) return;
      const sx2 = (f.x * (w/960));
      const sy2 = (f.y * (h/520));
      // Badge near factory
    });
  });
}

function toggleSupplier(id) {
  supplierDown[id] = !supplierDown[id];
  const action = supplierDown[id] ? '断供' : '恢复';
  addLog(supplierDown[id] ? 'error' : 'success',
    `${suppliers.find(s=>s.id===id).short} ${action}`,
    `模拟 ${suppliers.find(s=>s.id===id).name} ${action}${supplierDown[id] ? '，系统自动触发配额切换' : ''}`);

  if (supplierDown[id]) {
    autoSwitch(id);
  } else {
    restoreQuotas();
  }
  drawNetwork();
  renderQuotaControls();
  renderQuotaMatrix();
}

function autoSwitch(downId) {
  const downSupplier = suppliers.find(s => s.id === downId);
  factories.forEach(f => {
    const downKey = f.id + '_' + downId;
    const downSc = sourcing[downKey];
    if (!downSc || downSc.quota === 0) return;

    const freedQuota = downSc.quota;
    downSc.quota = 0;

    // Distribute to other active suppliers
    const others = suppliers.filter(s => s.id !== downId)
      .map(s => ({ id: s.id, key: f.id + '_' + s.id, sc: sourcing[f.id + '_' + s.id] }))
      .filter(o => o.sc && o.sc.cert === 'certified' && o.sc.status === 'active' && !supplierDown[o.id]);

    if (others.length === 0) {
      addLog('error', '无可用替代', `${f.name} 的 ${downSupplier.short} 断供，但无其他认证供应商可用！`);
      return;
    }

    let remaining = freedQuota;
    others.forEach((o, i) => {
      const add = i === others.length - 1 ? remaining : Math.round(freedQuota / others.length);
      o.sc.quota += add;
      remaining -= add;
      addLog('warn', '配额自动切换',
        `${f.name}: ${downSupplier.short} 配额 ${freedQuota}% → ${suppliers.find(s=>s.id===o.id).short} (+${add}%，切换准备 ${o.sc.switchLT} 天)`);
    });
  });
}

let savedQuotas = null;
function restoreQuotas() {
  if (!savedQuotas) return;
  Object.keys(sourcing).forEach(k => {
    if (savedQuotas[k] !== undefined) {
      sourcing[k].quota = savedQuotas[k];
    }
  });
  addLog('info', '配额恢复', '所有配额已恢复到断供前状态');
}

// Save quotas before any disruption
function saveQuotaSnapshot() {
  savedQuotas = {};
  Object.keys(sourcing).forEach(k => { savedQuotas[k] = sourcing[k].quota; });
}
saveQuotaSnapshot();

function updateQuota(el) {
  const key = el.dataset.key;
  const val = parseInt(el.value);
  sourcing[key].quota = val;
  document.getElementById('val_' + key).textContent = val + '%';

  // Normalize within factory
  const plantId = key.split('_')[0];
  const keys = suppliers.map(s => plantId + '_' + s.id).filter(k => sourcing[k]);
  const total = keys.reduce((sum, k) => sum + sourcing[k].quota, 0);
  if (total !== 100 && total > 0) {
    // Auto-adjust: show warning
    addLog('warn', '配额不平衡', `${factories.find(f=>f.id===plantId).name} 配额总和 ${total}%（需为 100%）`);
  }

  drawNetwork();
  renderQuotaMatrix();
}

function addLog(type, title, desc) {

  const ts = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  eventLogs.unshift({ type, title, desc, ts });
  if (eventLogs.length > 50) eventLogs.pop();
  renderEventLog();
}
