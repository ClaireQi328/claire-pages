<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI 在采购流程中的应用全景</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#f8fafc 0%,#e8f0fe 50%,#f0fdf4 100%);color:#1e293b;line-height:1.6;min-height:100vh}
.hero{text-align:center;padding:48px 20px 32px;background:linear-gradient(135deg,#1e3a5f 0%,#0d9488 100%);color:#fff;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 40%,rgba(255,255,255,.08) 0%,transparent 50%);pointer-events:none}
.hero h1{font-size:2.2em;font-weight:700;margin-bottom:10px;letter-spacing:-.5px}
.hero p{font-size:1.1em;opacity:.85;max-width:680px;margin:0 auto}
.container{max-width:1200px;margin:0 auto;padding:0 20px}

/* Timeline */
.timeline-section{padding:40px 0 24px}
.timeline-track{display:flex;justify-content:space-between;align-items:flex-start;position:relative;margin:0 auto;max-width:1100px}
.timeline-track::before{content:'';position:absolute;top:28px;left:40px;right:40px;height:3px;background:linear-gradient(90deg,#cbd5e1,#0d9488,#cbd5e1);z-index:0}
.stage-btn{display:flex;flex-direction:column;align-items:center;cursor:pointer;position:relative;z-index:1;flex:1;transition:transform .2s}
.stage-btn:hover{transform:translateY(-3px)}
.stage-btn.active .stage-dot{transform:scale(1.15);box-shadow:0 0 0 6px rgba(13,148,136,.2)}
.stage-dot{width:56px;height:56px;border-radius:50%;background:#fff;border:3px solid #cbd5e1;display:flex;align-items:center;justify-content:center;font-size:1.4em;transition:all .3s;margin-bottom:8px}
.stage-btn.active .stage-dot{border-color:#0d9488;background:#0d9488;color:#fff}
.stage-btn.visited .stage-dot{border-color:#0d9488;color:#0d9488}
.stage-label{font-size:.78em;font-weight:600;color:#64748b;text-align:center;line-height:1.3;max-width:90px}
.stage-btn.active .stage-label{color:#0d9488}

/* Detail Panel */
.detail-panel{margin:28px auto;max-width:1100px;background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.06);overflow:hidden;opacity:0;transform:translateY(16px);transition:all .35s ease}
.detail-panel.visible{opacity:1;transform:translateY(0)}
.detail-header{padding:28px 32px 16px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:16px}
.detail-icon{font-size:2.2em}
.detail-header h2{font-size:1.5em;font-weight:700;color:#1e293b}
.detail-header .subtitle{font-size:.9em;color:#64748b;margin-top:2px}
.detail-body{display:grid;grid-template-columns:1fr 1fr;gap:0}
.column{padding:24px 32px 28px}
.column-before{background:#fef2f2;border-right:1px solid #fee2e2}
.column-after{background:#f0fdf4}
.column h3{font-size:.85em;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.column-before h3{color:#dc2626}
.column-after h3{color:#16a34a}
.column ul{list-style:none;padding:0}
.column li{padding:6px 0;font-size:.92em;color:#475569;display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.column li::before{content:'';width:6px;height:6px;border-radius:50%;margin-top:7px;flex-shrink:0}
.column-before li::before{background:#fca5a5}
.column-after li::before{background:#86efac}

/* Metrics Row */
.metrics-bar{display:flex;gap:0;border-top:1px solid #f1f5f9}
.metric{flex:1;padding:18px 20px;text-align:center;border-right:1px solid #f1f5f9}
.metric:last-child{border-right:none}
.metric .value{font-size:1.6em;font-weight:800;background:linear-gradient(135deg,#0d9488,#1e3a5f);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.metric .label{font-size:.78em;color:#94a3b8;margin-top:2px}
.metric.highlight{background:linear-gradient(135deg,rgba(13,148,136,.04),rgba(30,58,95,.04))}

/* AI Capabilities */
.ai-box{margin:0 32px 28px;padding:20px 24px;background:linear-gradient(135deg,#eff6ff,#f0fdf4);border-radius:12px;border:1px solid #dbeafe}
.ai-box h4{font-size:.85em;font-weight:700;color:#1e40af;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.ai-tags{display:flex;flex-wrap:wrap;gap:8px}
.ai-tag{padding:6px 14px;background:#fff;border-radius:20px;font-size:.82em;color:#1e3a5f;border:1px solid #dbeafe;font-weight:500;transition:all .2s}
.ai-tag:hover{background:#dbeafe;transform:translateY(-1px)}

/* Summary */
.summary-section{padding:20px 0 50px}
.summary-title{text-align:center;font-size:1.4em;font-weight:700;color:#1e293b;margin-bottom:24px}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:32px}
.summary-card{background:#fff;border-radius:14px;padding:28px 20px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.04);transition:transform .2s,box-shadow .2s}
.summary-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.08)}
.summary-card .emoji{font-size:2.2em;margin-bottom:10px}
.summary-card .num{font-size:2.4em;font-weight:800;background:linear-gradient(135deg,#0d9488,#1e3a5f);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1}
.summary-card .desc{font-size:.85em;color:#64748b;margin-top:6px}

/* Bottom Note */
.bottom-note{text-align:center;padding:20px 20px 0;font-size:.82em;color:#94a3b8;line-height:1.6;max-width:700px;margin:0 auto}

/* Progress Dots */
.progress{display:flex;justify-content:center;gap:8px;padding:16px 0 0}
.prog-dot{width:8px;height:8px;border-radius:50%;background:#e2e8f0;transition:all .3s}
.prog-dot.active{background:#0d9488;width:24px;border-radius:4px}

/* Responsive */
@media(max-width:900px){
  .timeline-track{flex-wrap:wrap;justify-content:center;gap:12px}
  .timeline-track::before{display:none}
  .detail-body{grid-template-columns:1fr}
  .column-before{border-right:none;border-bottom:1px solid #fee2e2}
  .summary-grid{grid-template-columns:repeat(2,1fr)}
  .hero h1{font-size:1.6em}
  .stage-btn{flex:0 0 auto;width:80px}
}
@media(max-width:600px){
  .summary-grid{grid-template-columns:1fr 1fr}
  .metrics-bar{flex-wrap:wrap}
  .metric{flex:0 0 50%;border-bottom:1px solid #f1f5f9}
}
</style>
</head>
<body>

<div class="hero">
  <h1>AI 在采购流程中的应用全景</h1>
  <p>点击每个阶段，看 AI 如何重塑采购的每个环节</p>
</div>

<div class="container">

  <!-- Timeline -->
  <div class="timeline-section">
    <div class="timeline-track" id="timeline"></div>
    <div class="progress" id="progress"></div>
  </div>

  <!-- Detail Panel -->
  <div class="detail-panel" id="panel">
    <div class="detail-header" id="panel-header"></div>
    <div class="detail-body">
      <div class="column column-before" id="col-before"></div>
      <div class="column column-after" id="col-after"></div>
    </div>
    <div class="metrics-bar" id="metrics"></div>
    <div class="ai-box" id="ai-box"></div>
  </div>

  <!-- Summary -->
  <div class="summary-section">
    <div class="summary-title">端到端提效总览</div>
    <div class="summary-grid" id="summary"></div>
    <div class="bottom-note">
      数据为行业典型场景估算值，实际效果因企业规模、数据成熟度、实施深度而异。<br>
      基于公开报告与头部企业实践综合整理 · 2025
    </div>
  </div>

</div>

<script>
const stages = [
  {
    icon:'🔍', name:'需求确认', desc:'AI 预测需求，自动触发采购',
    before:[
      '人工汇总各部门零散需求',
      '依赖 Excel 历史数据估算',
      '需求变更靠邮件通知，响应慢',
      '重复采购和遗漏并存'
    ],
    after:[
      'AI 集成 ERP/MRP + 销售预测，自动生成采购需求',
      '预测准确率 85%+，提前 2-4 周预警',
      '需求变更实时同步，自动调整采购计划',
      '异常需求自动标注并推送审批'
    ],
    metrics:[
      {value:'85%',label:'预测准确率'},
      {value:'-70%',label:'人工汇总时间'},
      {value:'2-4周',label:'需求预警提前量'},
      {value:'↓60%',label:'重复采购率'}
    ],
    ai:['需求预测模型','ERP/MRP 数据集成','异常需求检测','采购计划自动生成']
  },
  {
    icon:'🌐', name:'寻源', desc:'AI 拓展供应池，智能匹配',
    before:[
      '依赖有限的供应商数据库和人脉',
      '资质审核靠人工逐项比对',
      '供应商风险靠主观判断',
      '寻源周期 2-4 周'
    ],
    after:[
      'AI 扫描全球供应池，自动推荐匹配供应商',
      '资质自动审核 + 风险信号实时监测',
      '供应链中断风险提前 60 天预警',
      '寻源周期缩短至 3-5 天'
    ],
    metrics:[
      {value:'3x',label:'供应池扩展'},
      {value:'-85%',label:'寻源周期'},
      {value:'60天',label:'风险预警提前量'},
      {value:'95%',label:'资质匹配准确率'}
    ],
    ai:['全球供应池扫描','资质智能匹配','风险信号监测','供应中断预警']
  },
  {
    icon:'📊', name:'核价', desc:'AI 建模分析，实时比价',
    before:[
      '人工收集市场价格，信息滞后',
      '成本分析靠经验估算',
      '比价数据散落在 Excel 和邮件中',
      '缺乏 should-cost 模型支撑'
    ],
    after:[
      'AI 自动抓取市场行情，实时比价',
      'Should-cost 模型拆解成本结构',
      '历史报价 + 市场数据 + 原材料指数综合分析',
      '自动识别报价异常并预警'
    ],
    metrics:[
      {value:'-90%',label:'核价时间'},
      {value:'15-25%',label:'成本优化空间'},
      {value:'实时',label:'市场价格更新'},
      {value:'98%',label:'异常报价识别率'}
    ],
    ai:['Should-cost 成本建模','实时市场比价','原材料指数追踪','报价异常检测']
  },
  {
    icon:'📝', name:'询报价', desc:'AI 发标评标，智能比选',
    before:[
      '手动编写 RFQ 文件，格式不统一',
      '投标文件人工逐份评审',
      '比价表手工整理，易出错',
      '评标周期 1-2 周'
    ],
    after:[
      'AI 自动生成标准化 RFQ，一键群发',
      '智能评标：自动解析报价 + 评分 + 排序',
      '多维度比价看板自动生成',
      '评标周期缩短至 1-2 天'
    ],
    metrics:[
      {value:'-80%',label:'评标周期'},
      {value:'100%',label:'格式标准化'},
      {value:'-95%',label:'比价整理时间'},
      {value:'5x',label:'同时处理投标数'}
    ],
    ai:['RFQ 自动生成','智能评标引擎','多维比价看板','投标文件解析']
  },
  {
    icon:'⚖️', name:'合同管理', desc:'AI 审查条款，管理履约',
    before:[
      '合同条款逐条人工审查',
      '关键条款（付款/交期/质保）靠人记忆',
      '合同到期和续约靠 Excel 台账',
      '合规风险难以系统性识别'
    ],
    after:[
      'AI 自动扫描合同条款，标记风险点',
      '关键条款自动提取并生成履约看板',
      '到期预警 + 自动续约流程触发',
      '合规偏差实时告警'
    ],
    metrics:[
      {value:'-90%',label:'审查时间'},
      {value:'95%',label:'风险条款识别率'},
      {value:'0',label:'遗漏续约'},
      {value:'100%',label:'关键条款提取'}
    ],
    ai:['条款风险扫描','关键条款提取','到期续约预警','合规偏差检测']
  },
  {
    icon:'🚚', name:'执行', desc:'AI 自动下单，跟踪交付',
    before:[
      '手动创建采购订单，逐条录入',
      '交期跟踪靠打电话/发邮件',
      '异常（延迟/缺货）发现滞后',
      '供应商回复不及时影响排产'
    ],
    after:[
      'AI 自动生成 PO，按规则分配供应商',
      '交期实时看板，物流状态自动同步',
      '延迟风险提前 7 天预警，自动推送备选方案',
      '供应商门户自动催办'
    ],
    metrics:[
      {value:'-75%',label:'下单时间'},
      {value:'实时',label:'交付状态可视'},
      {value:'7天',label:'延迟预警提前量'},
      {value:'-60%',label:'催货沟通量'}
    ],
    ai:['PO 自动生成','交期实时追踪','延迟风险预警','智能催办']
  },
  {
    icon:'✅', name:'收货对账', desc:'AI 三单匹配，自动对账',
    before:[
      '收货单、入库单、发票逐单人工比对',
      '三单匹配异常靠人工排查',
      '对账周期长，付款延迟影响供应商关系',
      '数据录入错误频发'
    ],
    after:[
      'AI 自动三单匹配（PO-收货-发票）',
      '异常自动标注并推送处理建议',
      '对账周期从 2 周缩短至 1 天',
      '匹配准确率 99%+，数据零手动录入'
    ],
    metrics:[
      {value:'99%+',label:'匹配准确率'},
      {value:'-93%',label:'对账周期'},
      {value:'0',label:'手动录入'},
      {value:'-85%',label:'付款延迟率'}
    ],
    ai:['三单自动匹配','异常智能标注','对账自动完成','付款智能排程']
  }
];

const summaryData = [
  {emoji:'⏱️',num:'80%+',desc:'流程时间压缩'},
  {emoji:'💰',num:'15-25%',desc:'采购成本优化'},
  {emoji:'🎯',num:'95%+',desc:'关键环节准确率'},
  {emoji:'👁️',num:'100%',desc:'流程全链路可视'}
];

let current = -1;
const visited = new Set();

function renderTimeline(){
  const track = document.getElementById('timeline');
  const prog = document.getElementById('progress');
  track.innerHTML = stages.map((s,i)=>`
    <div class="stage-btn" data-i="${i}" onclick="selectStage(${i})">
      <div class="stage-dot">${s.icon}</div>
      <div class="stage-label">${s.name}</div>
    </div>
  `).join('');
  prog.innerHTML = stages.map((_,i)=>`<div class="prog-dot" data-i="${i}"></div>`).join('');
}

function selectStage(i){
  if(i === current) return;
  current = i;
  visited.add(i);

  document.querySelectorAll('.stage-btn').forEach((btn,j)=>{
    btn.classList.toggle('active',j===i);
    if(visited.has(j) && j!==i) btn.classList.add('visited');
  });
  document.querySelectorAll('.prog-dot').forEach((d,j)=>{
    d.classList.toggle('active',j===i);
  });

  const s = stages[i];
  const panel = document.getElementById('panel');
  panel.classList.remove('visible');

  setTimeout(()=>{
    document.getElementById('panel-header').innerHTML = `
      <div class="detail-icon">${s.icon}</div>
      <div>
        <h2>${s.name}</h2>
        <div class="subtitle">${s.desc}</div>
      </div>`;

    document.getElementById('col-before').innerHTML = `
      <h3>🔴 现状痛点</h3>
      <ul>${s.before.map(t=>`<li>${t}</li>`).join('')}</ul>`;
    document.getElementById('col-after').innerHTML = `
      <h3>🟢 AI 赋能后</h3>
      <ul>${s.after.map(t=>`<li>${t}</li>`).join('')}</ul>`;

    document.getElementById('metrics').innerHTML = s.metrics.map((m,j)=>`
      <div class="metric${j===0?' highlight':''}">
        <div class="value">${m.value}</div>
        <div class="label">${m.label}</div>
      </div>`).join('');

    document.getElementById('ai-box').innerHTML = `
      <h4>🤖 AI 能力</h4>
      <div class="ai-tags">${s.ai.map(t=>`<span class="ai-tag">${t}</span>`).join('')}</div>`;

    requestAnimationFrame(()=>panel.classList.add('visible'));
  }, 180);
}

function renderSummary(){
  document.getElementById('summary').innerHTML = summaryData.map(s=>`
    <div class="summary-card">
      <div class="emoji">${s.emoji}</div>
      <div class="num">${s.num}</div>
      <div class="desc">${s.desc}</div>
    </div>`).join('');
}

renderTimeline();
renderSummary();
selectStage(0);

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight' && current < stages.length-1) selectStage(current+1);
  if(e.key==='ArrowLeft' && current > 0) selectStage(current-1);
});
</script>
</body>
</html>
