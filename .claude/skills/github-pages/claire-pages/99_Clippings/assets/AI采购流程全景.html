<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI 在采购流程中的应用全景</title>
<style>
:root{
  --c-bg:#f1f5f9;--c-card:#fff;--c-border:#e2e8f0;
  --c-text:#0f172a;--c-sub:#475569;--c-muted:#94a3b8;
  --c-teal:#0d9488;--c-teal-l:#99f6e4;--c-teal-bg:#f0fdfa;
  --c-blue:#2563eb;--c-blue-bg:#eff6ff;
  --c-red:#dc2626;--c-red-bg:#fef2f2;
  --c-green:#16a34a;--c-green-bg:#f0fdf4;
  --c-grad:linear-gradient(135deg,#0f172a 0%,#0d6e6e 50%,#0d9488 100%);
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
  --shadow-lg:0 4px 12px rgba(0,0,0,.06),0 12px 40px rgba(0,0,0,.08);
  --r:12px;--r-lg:18px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif;background:var(--c-bg);color:var(--c-text);line-height:1.7;-webkit-font-smoothing:antialiased}

/* Hero */
.hero{padding:72px 24px 56px;background:var(--c-grad);color:#fff;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E") repeat;pointer-events:none}
.hero h1{font-size:clamp(1.8rem,4vw,2.6rem);font-weight:800;letter-spacing:-1px;margin-bottom:12px}
.hero p{font-size:1.1em;opacity:.75;max-width:600px;margin:0 auto 28px}
.hero-badges{display:flex;justify-content:center;gap:16px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);border-radius:100px;font-size:.88em;font-weight:600;backdrop-filter:blur(4px)}
.badge em{font-style:normal;font-size:1.2em}

/* Container */
.wrap{max-width:1160px;margin:0 auto;padding:0 20px}

/* Section title */
.sec-title{font-size:1.3em;font-weight:700;text-align:center;margin:40px 0 28px;color:var(--c-text);position:relative}
.sec-title::after{content:'';display:block;width:48px;height:3px;background:var(--c-teal);border-radius:2px;margin:10px auto 0}

/* Timeline */
.tl{display:flex;justify-content:space-between;align-items:flex-start;position:relative;gap:4px}
.tl::before{content:'';position:absolute;top:30px;left:32px;right:32px;height:2.5px;background:linear-gradient(90deg,var(--c-border),var(--c-teal),var(--c-border));z-index:0}
.step{display:flex;flex-direction:column;align-items:center;cursor:pointer;flex:1;position:relative;z-index:1;transition:transform .2s}
.step:hover{transform:translateY(-4px)}
.step .dot{width:60px;height:60px;border-radius:50%;background:var(--c-card);border:3px solid var(--c-border);display:flex;align-items:center;justify-content:center;font-size:1.5em;transition:all .35s cubic-bezier(.4,0,.2,1);box-shadow:var(--shadow)}
.step.on .dot{border-color:var(--c-teal);background:var(--c-teal);color:#fff;box-shadow:0 0 0 8px rgba(13,148,136,.15),var(--shadow-lg)}
.step.visited .dot{border-color:var(--c-teal);color:var(--c-teal)}
.step .lbl{font-size:.76em;font-weight:700;color:var(--c-muted);margin-top:8px;text-align:center;line-height:1.3;max-width:88px;transition:color .3s}
.step.on .lbl{color:var(--c-teal)}
.step .num{position:absolute;top:-6px;right:8px;width:20px;height:20px;background:var(--c-teal);color:#fff;font-size:.65em;font-weight:800;border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(.5);transition:all .3s}
.step.on .num{opacity:1;transform:scale(1)}

/* Progress */
.prog{display:flex;justify-content:center;gap:6px;padding:14px 0 0}
.pg{width:8px;height:8px;border-radius:50%;background:var(--c-border);transition:all .4s}
.pg.on{background:var(--c-teal);width:28px;border-radius:4px}

/* Detail panel */
.panel{margin:24px auto;background:var(--c-card);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);overflow:hidden;opacity:0;transform:translateY(20px);transition:all .4s cubic-bezier(.4,0,.2,1)}
.panel.show{opacity:1;transform:translateY(0)}
.ph{padding:28px 32px 18px;border-bottom:1px solid var(--c-border);display:flex;align-items:center;gap:16px}
.ph .ico{font-size:2.4em;line-height:1}
.ph h2{font-size:1.45em;font-weight:800}
.ph .sub{font-size:.9em;color:var(--c-sub);margin-top:2px}
.body{display:grid;grid-template-columns:1fr 1fr}
.col{padding:22px 28px 26px}
.col-r{background:var(--c-green-bg);border-left:1px solid #dcfce7}
.col-l{background:var(--c-red-bg);border-right:1px solid #fee2e2}
.col h3{font-size:.82em;font-weight:800;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.col-l h3{color:var(--c-red)}
.col-r h3{color:var(--c-green)}
.col ul{list-style:none}
.col li{padding:7px 0;font-size:.9em;color:var(--c-sub);display:flex;align-items:flex-start;gap:10px;line-height:1.55}
.col li::before{content:'';width:7px;height:7px;border-radius:50%;margin-top:7px;flex-shrink:0;opacity:.7}
.col-l li::before{background:var(--c-red)}
.col-r li::before{background:var(--c-green)}

/* Metrics */
.mbar{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-top:1px solid var(--c-border)}
.met{padding:20px 16px;text-align:center;border-right:1px solid var(--c-border);transition:background .3s}
.met:last-child{border-right:none}
.met:hover{background:var(--c-teal-bg)}
.met .val{font-size:1.8em;font-weight:900;background:linear-gradient(135deg,var(--c-teal),var(--c-blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1}
.met .lab{font-size:.76em;color:var(--c-muted);margin-top:4px;font-weight:600}

/* AI box */
.aibox{margin:0 28px 24px;padding:20px 24px;background:linear-gradient(135deg,var(--c-blue-bg),var(--c-teal-bg));border-radius:var(--r);border:1px solid #dbeafe}
.aibox h4{font-size:.84em;font-weight:800;color:var(--c-blue);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.tags{display:flex;flex-wrap:wrap;gap:8px}
.tag{padding:6px 14px;background:var(--c-card);border-radius:100px;font-size:.8em;color:var(--c-text);border:1px solid var(--c-border);font-weight:600;transition:all .2s;cursor:default}
.tag:hover{border-color:var(--c-teal);color:var(--c-teal);transform:translateY(-1px)}

/* Summary */
.sum-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin:0 auto 24px}
.scard{background:var(--c-card);border-radius:var(--r-lg);padding:32px 20px;text-align:center;box-shadow:var(--shadow);transition:transform .25s,box-shadow .25s;position:relative;overflow:hidden}
.scard:hover{transform:translateY(-6px);box-shadow:var(--shadow-lg)}
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--c-teal),var(--c-blue))}
.scard .em{font-size:2.4em;margin-bottom:10px}
.scard .n{font-size:2.6em;font-weight:900;background:linear-gradient(135deg,var(--c-teal),var(--c-blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.scard .d{font-size:.84em;color:var(--c-muted);margin-top:6px;font-weight:600}

/* Footer */
.foot{text-align:center;padding:24px 20px 48px;font-size:.8em;color:var(--c-muted);line-height:1.8}
.foot a{color:var(--c-teal);text-decoration:none;font-weight:600}

/* Keyboard hint */
.khint{display:flex;justify-content:center;gap:12px;padding:8px 0 0;font-size:.75em;color:var(--c-muted)}
.khint kbd{display:inline-flex;align-items:center;justify-content:center;width:28px;height:24px;background:var(--c-card);border:1px solid var(--c-border);border-radius:5px;font-family:inherit;font-size:.9em;box-shadow:0 1px 0 var(--c-border)}

/* Responsive */
@media(max-width:900px){
  .tl{flex-wrap:wrap;justify-content:center;gap:10px}
  .tl::before{display:none}
  .step{flex:0 0 auto;width:78px}
  .body{grid-template-columns:1fr}
  .col-l{border-right:none;border-bottom:1px solid #fee2e2}
  .sum-grid{grid-template-columns:repeat(2,1fr)}
  .mbar{grid-template-columns:repeat(2,1fr)}
  .met{border-bottom:1px solid var(--c-border)}
  .hero{padding:48px 20px 40px}
}
@media(max-width:500px){
  .sum-grid{grid-template-columns:1fr 1fr}
  .hero-badges{flex-direction:column;align-items:center}
}
</style>
</head>
<body>

<div class="hero">
  <h1>AI 在采购流程中的应用全景</h1>
  <p>从需求到付款，7 个环节的 AI 落地路径</p>
  <div class="hero-badges">
    <span class="badge"><em>⏱</em> 流程压缩 80%+</span>
    <span class="badge"><em>🎯</em> 准确率 95%+</span>
    <span class="badge"><em>💰</em> 成本优化 15-25%</span>
  </div>
</div>

<div class="wrap">

  <div class="sec-title">采购全流程</div>

  <div class="tl" id="tl"></div>
  <div class="prog" id="prog"></div>
  <div class="khint"><span>点击阶段查看详情</span><span><kbd>←</kbd> <kbd>→</kbd> 键盘导航</span></div>

  <div class="panel" id="panel">
    <div class="ph" id="ph"></div>
    <div class="body">
      <div class="col col-l" id="cl"></div>
      <div class="col col-r" id="cr"></div>
    </div>
    <div class="mbar" id="mb"></div>
    <div class="aibox" id="ab"></div>
  </div>

  <div class="sec-title">端到端提效总览</div>
  <div class="sum-grid" id="sg"></div>

  <div class="foot">
    数据为行业典型场景估算值，实际效果因企业规模、数据成熟度、实施深度而异<br>
    基于公开报告与头部企业实践综合整理 · 2025
  </div>
</div>

<script>
const S=[
  {e:'🔍',n:'需求确认',d:'AI 预测需求，自动触发采购',
   b:['人工汇总各部门零散需求','依赖 Excel 历史数据估算','需求变更靠邮件通知，响应慢','重复采购和遗漏并存'],
   a:['AI 集成 ERP/MRP + 销售预测，自动生成采购需求','预测准确率 85%+，提前 2-4 周预警','需求变更实时同步，自动调整采购计划','异常需求自动标注并推送审批'],
   m:[{v:'85%',l:'预测准确率'},{v:'-70%',l:'人工汇总时间'},{v:'2-4周',l:'预警提前量'},{v:'↓60%',l:'重复采购率'}],
   ai:['需求预测模型','ERP/MRP 数据集成','异常需求检测','采购计划自动生成']},
  {e:'🌐',n:'寻源',d:'AI 拓展供应池，智能匹配',
   b:['依赖有限的供应商数据库和人脉','资质审核靠人工逐项比对','供应商风险靠主观判断','寻源周期 2-4 周'],
   a:['AI 扫描全球供应池，自动推荐匹配供应商','资质自动审核 + 风险信号实时监测','供应链中断风险提前 60 天预警','寻源周期缩短至 3-5 天'],
   m:[{v:'3x',l:'供应池扩展'},{v:'-85%',l:'寻源周期'},{v:'60天',l:'风险预警'},{v:'95%',l:'匹配准确率'}],
   ai:['全球供应池扫描','资质智能匹配','风险信号监测','供应中断预警']},
  {e:'📊',n:'核价',d:'AI 建模分析，实时比价',
   b:['人工收集市场价格，信息滞后','成本分析靠经验估算','比价数据散落在 Excel 和邮件中','缺乏 should-cost 模型支撑'],
   a:['AI 自动抓取市场行情，实时比价','Should-cost 模型拆解成本结构','历史报价 + 市场数据 + 原材料指数综合分析','自动识别报价异常并预警'],
   m:[{v:'-90%',l:'核价时间'},{v:'15-25%',l:'成本优化'},{v:'实时',l:'价格更新'},{v:'98%',l:'异常识别率'}],
   ai:['Should-cost 成本建模','实时市场比价','原材料指数追踪','报价异常检测']},
  {e:'📝',n:'询报价',d:'AI 发标评标，智能比选',
   b:['手动编写 RFQ 文件，格式不统一','投标文件人工逐份评审','比价表手工整理，易出错','评标周期 1-2 周'],
   a:['AI 自动生成标准化 RFQ，一键群发','智能评标：自动解析报价 + 评分 + 排序','多维度比价看板自动生成','评标周期缩短至 1-2 天'],
   m:[{v:'-80%',l:'评标周期'},{v:'100%',l:'格式标准化'},{v:'-95%',l:'比价整理'},{v:'5x',l:'处理投标数'}],
   ai:['RFQ 自动生成','智能评标引擎','多维比价看板','投标文件解析']},
  {e:'⚖️',n:'合同管理',d:'AI 审查条款，管理履约',
   b:['合同条款逐条人工审查','关键条款靠人记忆','合同到期和续约靠 Excel 台账','合规风险难以系统性识别'],
   a:['AI 自动扫描合同条款，标记风险点','关键条款自动提取并生成履约看板','到期预警 + 自动续约流程触发','合规偏差实时告警'],
   m:[{v:'-90%',l:'审查时间'},{v:'95%',l:'风险识别率'},{v:'0',l:'遗漏续约'},{v:'100%',l:'条款提取'}],
   ai:['条款风险扫描','关键条款提取','到期续约预警','合规偏差检测']},
  {e:'🚚',n:'执行',d:'AI 自动下单，跟踪交付',
   b:['手动创建采购订单，逐条录入','交期跟踪靠打电话/发邮件','异常发现滞后','供应商回复不及时影响排产'],
   a:['AI 自动生成 PO，按规则分配供应商','交期实时看板，物流状态自动同步','延迟风险提前 7 天预警','供应商门户自动催办'],
   m:[{v:'-75%',l:'下单时间'},{v:'实时',l:'交付可视'},{v:'7天',l:'延迟预警'},{v:'-60%',l:'催货沟通'}],
   ai:['PO 自动生成','交期实时追踪','延迟风险预警','智能催办']},
  {e:'✅',n:'收货对账',d:'AI 三单匹配，自动对账',
   b:['收货单、入库单、发票逐单人工比对','三单匹配异常靠人工排查','对账周期长，付款延迟','数据录入错误频发'],
   a:['AI 自动三单匹配（PO-收货-发票）','异常自动标注并推送处理建议','对账周期从 2 周缩短至 1 天','匹配准确率 99%+，数据零手动录入'],
   m:[{v:'99%+',l:'匹配准确率'},{v:'-93%',l:'对账周期'},{v:'0',l:'手动录入'},{v:'-85%',l:'付款延迟'}],
   ai:['三单自动匹配','异常智能标注','对账自动完成','付款智能排程']}
];
const SUM=[
  {em:'⏱️',n:'80%+',d:'流程时间压缩'},
  {em:'💰',n:'15-25%',d:'采购成本优化'},
  {em:'🎯',n:'95%+',d:'关键环节准确率'},
  {em:'👁️',n:'100%',d:'流程全链路可视'}
];

let cur=-1;const vis=new Set();

function init(){
  const tl=document.getElementById('tl');
  const pg=document.getElementById('prog');
  tl.innerHTML=S.map((s,i)=>`<div class="step" onclick="go(${i})"><div class="dot">${s.e}</div><div class="lbl">${s.n}</div><div class="num">${i+1}</div></div>`).join('');
  pg.innerHTML=S.map((_,i)=>`<div class="pg" data-i="${i}"></div>`).join('');
  document.getElementById('sg').innerHTML=SUM.map(s=>`<div class="scard"><div class="em">${s.em}</div><div class="n">${s.n}</div><div class="d">${s.d}</div></div>`).join('');
  go(0);
}

function go(i){
  if(i===cur)return;cur=i;vis.add(i);
  document.querySelectorAll('.step').forEach((el,j)=>{el.classList.toggle('on',j===i);if(vis.has(j)&&j!==i)el.classList.add('visited')});
  document.querySelectorAll('.pg').forEach((el,j)=>el.classList.toggle('on',j===i));
  const p=document.getElementById('panel');
  p.classList.remove('show');
  setTimeout(()=>{
    const s=S[i];
    document.getElementById('ph').innerHTML=`<div class="ico">${s.e}</div><div><h2>${s.n}</h2><div class="sub">${s.d}</div></div>`;
    document.getElementById('cl').innerHTML=`<h3>🔴 现状痛点</h3><ul>${s.b.map(t=>`<li>${t}</li>`).join('')}</ul>`;
    document.getElementById('cr').innerHTML=`<h3>🟢 AI 赋能后</h3><ul>${s.a.map(t=>`<li>${t}</li>`).join('')}</ul>`;
    document.getElementById('mb').innerHTML=s.m.map((m,j)=>`<div class="met"><div class="val">${m.v}</div><div class="lab">${m.l}</div></div>`).join('');
    document.getElementById('ab').innerHTML=`<h4>🤖 AI 能力</h4><div class="tags">${s.ai.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`;
    requestAnimationFrame(()=>p.classList.add('show'));
  },200);
}

init();
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'&&cur<S.length-1)go(cur+1);
  if(e.key==='ArrowLeft'&&cur>0)go(cur-1);
});
</script>
</body>
</html>
