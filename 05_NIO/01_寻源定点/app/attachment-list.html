<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>附件管理 — NIO 寻源定点</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: { primary:'#FF7A00', secondary:'#FFB400', neutral:{50:'#FAFAFA',100:'#F5F5F5',200:'#E5E5E5',300:'#D4D4D4',400:'#A3A3A3',500:'#737373',600:'#525252',700:'#404040',800:'#262626',900:'#171717'} },
        fontFamily: { sans:['Inter','system-ui','sans-serif'] },
        boxShadow: { 'card':'0 4px 20px 0 rgba(0,0,0,0.05)', 'card-hover':'0 10px 30px 0 rgba(0,0,0,0.1)' }
      }}
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap" rel="stylesheet">
  <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>
<body class="bg-neutral-50 min-h-screen flex">

  <aside class="w-60 bg-white border-r border-neutral-200 flex-shrink-0 flex flex-col sticky top-0 h-screen z-30">
    <div class="p-4 border-b border-neutral-200">
      <a href="index.html" class="flex items-center gap-2">
        <div class="w-8 h-8 header-gradient rounded-lg flex items-center justify-center"><i class="fas fa-cubes text-white text-sm"></i></div>
        <span class="font-bold text-neutral-800 text-sm">寻源定点</span>
      </a>
    </div>
    <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
      <div class="text-xs font-semibold text-neutral-400 uppercase tracking-wider px-4 py-2">寻源报价</div>
      <a class="nav-item" href="rfq-list.html"><i class="fas fa-file-invoice w-5 text-center"></i> 询报价管理</a>
      <a class="nav-item" href="supplier-quote-list.html"><i class="fas fa-store w-5 text-center"></i> 供应商报价</a>
      <a class="nav-item" href="partner-evaluation.html"><i class="fas fa-user-check w-5 text-center"></i> 合作伙伴评估</a>
      <div class="text-xs font-semibold text-neutral-400 uppercase tracking-wider px-4 py-2 mt-4">工具</div>
      <a class="nav-item" href="price-comparison.html"><i class="fas fa-balance-scale w-5 text-center"></i> 价格比较</a>
      <a class="nav-item" href="dimension.html"><i class="fas fa-ruler w-5 text-center"></i> 量纲管理</a>
      <a class="nav-item active" href="attachment-list.html"><i class="fas fa-folder w-5 text-center"></i> 附件管理</a>
    </nav>
    <div class="p-3 border-t border-neutral-200"><a href="index.html" class="nav-item text-neutral-400"><i class="fas fa-arrow-left w-5 text-center"></i> 返回总览</a></div>
  </aside>

  <div class="flex-1 flex flex-col min-w-0">
    <header class="bg-white border-b border-neutral-200 px-6 py-3 flex items-center justify-between sticky top-0 z-20">
      <div>
        <h1 class="text-lg font-bold text-neutral-800">附件管理</h1>
        <p class="text-xs text-neutral-400">RFQ20221030100001 · Firefly Rear Knuckle后转向节</p>
      </div>
      <div class="flex gap-2">
        <button class="btn-secondary btn-sm" onclick="batchDownload()"><i class="fas fa-download mr-1"></i>批量下载</button>
        <button class="btn-primary btn-sm" onclick="showUpload()"><i class="fas fa-upload mr-1"></i>上传附件</button>
      </div>
    </header>

    <main class="flex-1 p-6 overflow-y-auto">
      <!-- Filter -->
      <div class="card mb-6">
        <div class="flex flex-wrap items-end gap-4">
          <div class="flex-1 min-w-[200px]">
            <label class="form-label">文件名称</label>
            <input type="text" class="form-input" placeholder="搜索文件名..." id="file-search">
          </div>
          <div class="flex-1 min-w-[200px]">
            <label class="form-label">文件类型</label>
            <select class="form-select" id="file-type">
              <option value="">全部类型</option>
              <option>合同协议类</option>
              <option>报价模板</option>
              <option>技术规范</option>
              <option>采购通则</option>
              <option>质量文件</option>
              <option>其他</option>
            </select>
          </div>
          <div class="flex-1 min-w-[200px]">
            <label class="form-label">所属部门</label>
            <select class="form-select" id="file-dept">
              <option value="">全部部门</option>
              <option>采购部</option>
              <option>质量部</option>
              <option>法务部</option>
              <option>研发部</option>
            </select>
          </div>
          <div class="flex gap-2">
            <button class="btn-primary" onclick="filterFiles()"><i class="fas fa-search mr-1"></i>查询</button>
            <button class="btn-ghost" onclick="resetFiles()"><i class="fas fa-undo mr-1"></i>重置</button>
          </div>
        </div>
      </div>

      <!-- Stats -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
        <div class="card-flat p-4 flex items-center gap-3">
          <div class="w-10 h-10 rounded-lg bg-red-100 flex items-center justify-center"><i class="fas fa-file-pdf text-red-500"></i></div>
          <div><p class="text-xs text-neutral-400">PDF</p><p class="font-bold text-neutral-800">8</p></div>
        </div>
        <div class="card-flat p-4 flex items-center gap-3">
          <div class="w-10 h-10 rounded-lg bg-emerald-100 flex items-center justify-center"><i class="fas fa-file-excel text-emerald-500"></i></div>
          <div><p class="text-xs text-neutral-400">Excel</p><p class="font-bold text-neutral-800">5</p></div>
        </div>
        <div class="card-flat p-4 flex items-center gap-3">
          <div class="w-10 h-10 rounded-lg bg-blue-100 flex items-center justify-center"><i class="fas fa-file-word text-blue-500"></i></div>
          <div><p class="text-xs text-neutral-400">Word</p><p class="font-bold text-neutral-800">3</p></div>
        </div>
        <div class="card-flat p-4 flex items-center gap-3">
          <div class="w-10 h-10 rounded-lg bg-neutral-100 flex items-center justify-center"><i class="fas fa-hdd text-neutral-500"></i></div>
          <div><p class="text-xs text-neutral-400">总大小</p><p class="font-bold text-neutral-800">42.6 MB</p></div>
        </div>
      </div>

      <!-- File List -->
      <div class="card">
        <div class="flex items-center justify-between mb-4">
          <h2 class="font-bold text-neutral-800 flex items-center gap-2">
            <i class="fas fa-folder-open text-primary"></i> 文件列表
            <span class="badge-neutral ml-2">共 16 个文件</span>
          </h2>
          <div class="flex gap-2">
            <button class="btn-ghost btn-sm" id="view-grid" onclick="setView('grid')"><i class="fas fa-th-large"></i></button>
            <button class="btn-ghost btn-sm bg-neutral-100" id="view-list" onclick="setView('list')"><i class="fas fa-list"></i></button>
          </div>
        </div>

        <!-- List View -->
        <div id="file-list-view">
          <div class="table-wrapper">
            <table class="table-main table-zebra" id="file-table">
              <thead>
                <tr>
                  <th class="w-10"><input type="checkbox" class="rounded text-primary" onclick="toggleAllFiles(this)"></th>
                  <th>文件名称</th>
                  <th>文件类型</th>
                  <th>所属部门</th>
                  <th>上传者</th>
                  <th>上传时间</th>
                  <th class="text-right">大小</th>
                  <th class="w-24">操作</th>
                </tr>
              </thead>
              <tbody id="file-tbody"></tbody>
            </table>
          </div>
        </div>

        <!-- Grid View (hidden by default) -->
        <div id="file-grid-view" class="hidden">
          <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4" id="file-grid"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Upload Modal -->
  <div id="upload-modal"></div>

  <script>
    const FILES = [
      { name:'Legal-PP-032-蔚来汽车零公里质量索赔协议.pdf', type:'合同协议类', dept:'质量部（售后）、法务部、采购部', uploader:'Gavin TANG', time:'2022/7/20', size:'2.3 MB', icon:'fa-file-pdf', color:'text-red-500' },
      { name:'报价模板-Firefly-Rear-Knuckle.xlsx', type:'报价模板', dept:'采购部', uploader:'任亦喆', time:'2022/7/18', size:'156 KB', icon:'fa-file-excel', color:'text-emerald-500' },
      { name:'采购通则 v3.2.pdf', type:'采购通则', dept:'采购部', uploader:'Gavin TANG', time:'2022/6/27', size:'5.1 MB', icon:'fa-file-pdf', color:'text-red-500' },
      { name:'技术规范-A柱内饰板-Rev2.pdf', type:'技术规范', dept:'研发部', uploader:'李大米', time:'2022/7/15', size:'3.8 MB', icon:'fa-file-pdf', color:'text-red-500' },
      { name:'质量协议-Firefly项目.docx', type:'合同协议类', dept:'质量部', uploader:'王大锤', time:'2022/7/12', size:'890 KB', icon:'fa-file-word', color:'text-blue-500' },
      { name:'供应商评估表-V21994.xlsx', type:'质量文件', dept:'质量部', uploader:'王大锤', time:'2022/7/10', size:'245 KB', icon:'fa-file-excel', color:'text-emerald-500' },
      { name:'报价明细-V21994-第2轮.xlsx', type:'报价模板', dept:'采购部', uploader:'V21994 培奇爱', time:'2022/7/25', size:'312 KB', icon:'fa-file-excel', color:'text-emerald-500' },
      { name:'报价明细-B0821-第2轮.xlsx', type:'报价模板', dept:'采购部', uploader:'B0821 博世', time:'2022/7/24', size:'287 KB', icon:'fa-file-excel', color:'text-emerald-500' },
      { name:'模具报价单-M-2022-001.pdf', type:'报价模板', dept:'采购部', uploader:'V21994 培奇爱', time:'2022/7/22', size:'1.2 MB', icon:'fa-file-pdf', color:'text-red-500' },
      { name:'SOR-SU9-座椅总成_20260123.pdf', type:'技术规范', dept:'研发部', uploader:'张小米', time:'2026/1/23', size:'8.5 MB', icon:'fa-file-pdf', color:'text-red-500' },
      { name:'定点通知函模板.docx', type:'合同协议类', dept:'法务部', uploader:'Gavin TANG', time:'2022/6/28', size:'156 KB', icon:'fa-file-word', color:'text-blue-500' },
      { name:'NIO采购管理办法 v5.0.pdf', type:'采购通则', dept:'采购部', uploader:'Luca Luo', time:'2022/6/20', size:'12.3 MB', icon:'fa-file-pdf', color:'text-red-500' },
      { name:'IATF16949审核报告-V21994.pdf', type:'质量文件', dept:'质量部', uploader:'王大锤', time:'2022/7/8', size:'4.2 MB', icon:'fa-file-pdf', color:'text-red-500' },
      { name:'材料成分报告-6061铝合金.xlsx', type:'技术规范', dept:'研发部', uploader:'李大米', time:'2022/7/5', size:'780 KB', icon:'fa-file-excel', color:'text-emerald-500' },
      { name:'物流协议-上海仓.docx', type:'合同协议类', dept:'采购部', uploader:'Gavin TANG', time:'2022/7/1', size:'445 KB', icon:'fa-file-word', color:'text-blue-500' },
      { name:'项目进度表-Firefly.xlsx', type:'其他', dept:'采购部', uploader:'任亦喆', time:'2022/6/25', size:'567 KB', icon:'fa-file-excel', color:'text-emerald-500' },
    ];

    let currentView = 'list';
    let filteredFiles = [...FILES];

    function renderFiles() {
      // List view
      const tbody = document.getElementById('file-tbody');
      tbody.innerHTML = filteredFiles.map((f, i) => `
        <tr>
          <td><input type="checkbox" class="rounded text-primary file-check"></td>
          <td>
            <div class="flex items-center gap-2">
              <i class="fas ${f.icon} ${f.color} text-lg"></i>
              <span class="font-medium text-neutral-800 truncate max-w-[250px]" title="${f.name}">${f.name}</span>
            </div>
          </td>
          <td><span class="badge-neutral">${f.type}</span></td>
          <td class="text-neutral-500 text-xs">${f.dept}</td>
          <td>${f.uploader}</td>
          <td class="text-neutral-400 text-xs">${f.time}</td>
          <td class="text-right text-neutral-400">${f.size}</td>
          <td>
            <div class="flex gap-1">
              <button class="btn-ghost btn-sm !p-1.5" title="下载"><i class="fas fa-download text-xs"></i></button>
              <button class="btn-ghost btn-sm !p-1.5" title="预览"><i class="fas fa-eye text-xs"></i></button>
              <button class="btn-ghost btn-sm !p-1.5 text-red-400" title="删除" onclick="deleteFile(${i})"><i class="fas fa-trash text-xs"></i></button>
            </div>
          </td>
        </tr>
      `).join('');

      // Grid view
      const grid = document.getElementById('file-grid');
      grid.innerHTML = filteredFiles.map(f => `
        <div class="border border-neutral-200 rounded-xl p-4 hover:shadow-card transition-shadow cursor-pointer group">
          <div class="flex items-center justify-between mb-3">
            <i class="fas ${f.icon} ${f.color} text-2xl"></i>
            <button class="opacity-0 group-hover:opacity-100 transition-opacity btn-ghost btn-sm !p-1"><i class="fas fa-download text-xs"></i></button>
          </div>
          <p class="text-sm font-medium text-neutral-800 truncate" title="${f.name}">${f.name}</p>
          <div class="flex items-center justify-between mt-2">
            <span class="text-xs text-neutral-400">${f.size}</span>
            <span class="text-xs text-neutral-400">${f.time}</span>
          </div>
        </div>
      `).join('');
    }

    function setView(view) {
      currentView = view;
      document.getElementById('file-list-view').classList.toggle('hidden', view !== 'list');
      document.getElementById('file-grid-view').classList.toggle('hidden', view !== 'grid');
      document.getElementById('view-grid').classList.toggle('bg-neutral-100', view === 'grid');
      document.getElementById('view-list').classList.toggle('bg-neutral-100', view === 'list');
    }

    function filterFiles() {
      const search = document.getElementById('file-search').value.toLowerCase();
      const type = document.getElementById('file-type').value;
      const dept = document.getElementById('file-dept').value;
      filteredFiles = FILES.filter(f => {
        if (search && !f.name.toLowerCase().includes(search)) return false;
        if (type && f.type !== type) return false;
        if (dept && !f.dept.includes(dept)) return false;
        return true;
      });
      renderFiles();
    }

    function resetFiles() {
      document.getElementById('file-search').value = '';
      document.getElementById('file-type').value = '';
      document.getElementById('file-dept').value = '';
      filteredFiles = [...FILES];
      renderFiles();
    }

    function toggleAllFiles(cb) {
      document.querySelectorAll('.file-check').forEach(c => c.checked = cb.checked);
    }

    function deleteFile(i) {
      if (confirm(`确定删除 ${filteredFiles[i].name}？`)) {
        filteredFiles.splice(i, 1);
        renderFiles();
      }
    }

    function batchDownload() {
      const checked = document.querySelectorAll('.file-check:checked');
      if (!checked.length) return alert('请先选择文件');
      alert(`下载 ${checked.length} 个文件`);
    }

    function showUpload() {
      document.getElementById('upload-modal').innerHTML = `
        <div class="modal-overlay fade-in" onclick="if(event.target===this)closeUpload()">
          <div class="modal-box w-[500px] max-w-[90vw]">
            <div class="modal-header">
              <h3 class="font-bold text-neutral-800">上传附件</h3>
              <button onclick="closeUpload()" class="text-neutral-400 hover:text-neutral-600"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
              <div class="border-2 border-dashed border-neutral-300 rounded-xl p-8 text-center hover:border-primary transition-colors cursor-pointer mb-4">
                <i class="fas fa-cloud-upload-alt text-3xl text-neutral-300 mb-2"></i>
                <p class="text-sm text-neutral-500">点击或拖拽文件到此处上传</p>
                <p class="text-xs text-neutral-400 mt-1">支持 PDF、Excel、Word、图片，单文件最大 50MB</p>
              </div>
              <div class="space-y-3">
                <div><label class="form-label">文件类型 <span class="text-red-500">*</span></label>
                  <select class="form-select"><option>合同协议类</option><option>报价模板</option><option>技术规范</option><option>采购通则</option><option>质量文件</option><option>其他</option></select>
                </div>
                <div><label class="form-label">所属部门</label><input type="text" class="form-input" placeholder="如: 采购部"></div>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn-ghost" onclick="closeUpload()">取消</button>
              <button class="btn-primary" onclick="closeUpload()">上传</button>
            </div>
          </div>
        </div>`;
    }

    function closeUpload() { document.getElementById('upload-modal').innerHTML = ''; }

    renderFiles();
  </script>

</body>
</html>
